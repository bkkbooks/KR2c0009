body:
  text: 欽定四庫全書平定三逆方畧卷二十八康熈十六年正月己丑調兵赴荆州大將軍順承郡王勒爾錦奏言將軍穆占抵荆州增撥在荆都統伯伊里布前鋒統領碩岱副都統託代龔圖漢軍副都統祖澤純宜思孝及滿洲漢軍邉外䝉古緑旗官兵共六千餘率赴岳州長沙如賊覘知荆州大兵勢分乗虗侵犯我兵守汛尚患力單他處有警實難應援乞調隣近滿洲緑旗官兵移駐荆州以資防禦上論駐河南府滿洲漢軍䝉古兵令員外郎頗羅色統領其自陜西遣發滿洲漢軍兵令原轄將弁統領俱赴荆州鎮東將軍布顔暫駐懷慶庚寅命大將軍公圖海等分兵赴荆州圖海等奏臣等前調緑旗官兵本擬於二月内進取漢中興安今將軍侯張勇等咨稱宜視夏秋収獲豐歉再圖進取但漢中興安山峻路險延至彼時適遇霪潦賊守將益堅臣等仍欲調兵及時進取上諭大兵即克復漢中興安須設重兵重兵一設則運餉維艱若俟夏秋進取又頓兵曠日虛糜糧糗今將軍穆占方𠞰呉逆機不可失大將軍公圖海等暫停漢興之役留滿洲䝉古兵一萬同緑旗兵防守秦州諸隘分兵五千遣大臣一人統赴荆州到日順承郡王等量留官兵防守荆州彛陵諸處乗穆占由岳州長沙進取湖南之時相機渡江破賊尋又諭兵部曰前陜西分兵赴荆州欲令順承郡王等乗機渡江平定湖南今恐中途延緩爾部其檄趣進兵毋得逗遛貽悞軍機辛夘命大將軍簡親王喇布等防守萍鄉醴陵總督董衛國奏逆賊窺伺萍鄉賊渠朱君聘等欲俟偽將軍到日即趨萬載攻瑞州犯南昌疏入上諭萍鄉醴陵係大將軍安親王大兵後路所關最重其守禦機宜大將軍簡親王喇布副將軍希爾根總督董衛國等共商酌以行丙申遣户部侍郎班廸等察吉安兵失利罪大將軍簡親王喇布奏賊援吉安將軍額楚等率兵迎戰三次失利臣等議調南昌建昌諸處滿漢官兵俟到日即協力攻𠞰疏入下議政王貝勒大臣集議議政王等議曰我國家開創以來賞罰嚴明攻城野戰無不克捷今額楚等官兵屢敗皆由將懦兵玩大將軍簡親王喇布等應嚴察處分但見在𠞰賊俟事平日再議其臨陣先退者即行拘禁嗣後犯者勿論官員兵丁即于軍前正法將弁等有觀望不前者削職仍隨大軍効用喇布既稱調取建昌諸處官兵到日即宜整頓兵馬𠞰絶賊援攻㧞吉安將軍穆占已於本月十一日抵岳亦應速令相度機宜或攻取岳州或進𠞰長沙以分賊勢上報可仍令班廸等赴吉安嚴察罪狀以聞庚子命大將軍簡親王喇布等速取吉安固守袁州喇布等報來援吉安賊衆於本月初九日夜遁上諭我兵屢戰不利賊何故遁或因將軍穆占進兵長沙聞風掣回或謀潛襲袁州俱不可料今吉安已調建昌諸處官兵簡親王喇布等宜乗機速行攻取吉安至於袁州所繫甚大宜分兵固守勿致疎虞總督董衛國其檄令總兵官趙應奎協力防禦將軍穆占請發兵為後繼上不許穆占奏臣等率兵於本月二十二日由岳州赴長沙深入賊地岳州百里界内宜發千兵防守庻無斷後之虞上以穆占進𠞰湖南既精簡荆岳之兵率之前發餘兵單薄難以分駐不允所請尋大將軍貝勒尚善等亦疏言兵力單少不便分發上乃命尚善等作水陸攻戰之勢乗隙進取仍時探穆占兵消息以聞壬寅命發京口戰船赴岳州將軍穆占奏臣抵岳州相度形勢江湖之間非船不濟今安徽巡撫造送沙船四十於本月十五日到岳應再發江南荆州諸處沙船百餘艘齊赴岳州軍前儻長沙未能即克至三四月間臣等遣兵取船由洞庭前進或攻或圍均有攸頼若長沙既得則安親王及臣等之兵即乗此船水陸夾攻岳州庻乎有濟上命京口將軍王之鼎發沙唬船六十艘隨帶礟械水手人役量配官兵䕶送至岳州并靳輔所送船足百艘之數以備安親王岳樂將軍穆占取用甲辰大將軍康親王傑書奏官兵復汀州副都統伯穆赫林等由邵武追𠞰海㓂於十五年十二月初十等日抵泰寜諸處偽總兵王安邦等率偽官兵民等降泰寜建寜寜化清流四縣及汀州府相繼恢復二月辛酉詔蠲福建田租上諭户部閩地經海孽竊踞又遭三年變亂逆賊暴征横歛民困已極今年租税盡與蠲免其遭亂竄避人民俱招輯還籍俾各安本業壬戌調安慶提督標兵赴吉安先是侍郎班廸等赴吉安取道安慶上令傳諭巡撫靳輔云今安慶無事吉安用兵之際提標官兵應否就近調遣巡撫提督集議具奏至是靳輔等議於防守池州建徳及在皖提標兵内選調一千五百人令提標遊擊周時隆等率赴吉安其池州建徳别於撫提標兵内通融調防上報可丙寅調都統鄂鼐領兵赴岳州先是大將軍貝勒尚善等奏言今備船百艘遣赴長沙乞添發近地甲兵毎佐領四人以壯兵力先破賊船後遣我船進發上諭將軍穆占兵於本月初三日已抵長沙賊勢必分順承郡王勒爾錦等宜乗此機勢陜西兵一到即行渡江儻渡江未便則如貝勒尚善所請分兵赴岳州其或分兵或渡江速議宻奏以聞至尚善等前稱造挨牌車輛攻取岳州繼稱水陸齊進乃觀望不前其為誑奏明甚今據報岳州賊較前大减益我兵力正可以進取之時荆州發兵到日即宜速攻儻仍遷延時日併與前罪嚴行議處嗣勒爾錦又請發河南江南緑旗官兵上不許令遵前㫖速議具奏至是勒爾錦等兩議以聞一議俟陜兵到京更得緑旗官兵仍行渡江一議俟陜西遣發及所請緑旗兵到正值水發之時過江不能無阻今冝於每佐領四人外量行添發酌撥船艘遣赴岳州其間若有隙可乗亦即相機趨利上諭今正𠞰㓕吳逆時不可緩宜自岳州水陸夾攻勒爾錦等可於每佐領簡精兵五人量配船艘令都統鄂鼐率赴岳州速行夾𠞰於是勒爾錦給鄂鼐以討逆將軍印令其統領舟師前徃丁卯遣刑部郎中色度等諭岳州將士上諭色度等爾等至岳州勞問將軍大臣滿漢官兵並宣諭云岳州長沙勢如兩足此蹶則彼不能獨立我國家禁旅徂征戰勝攻克未有如此之相持曠日者也若都統用命於貝勒貝子將弁用命於都統兵卒用命於將弁以次争先指臂相効何功不成陜西官兵戮力成功今並獲体息諸將士倘能奮勇奏効亦與彼同奬賚官秩朕所不靳其戰守機宜令貝勒貝子等集議以聞至長沙諸處軍情爾不時偵報俟荆州兵到察其大勢乃歸爾色度曾至岳州熟悉地形戰守機宜俱與貝勒等言之爾等奉使非輕兵機尤重爾等到彼審度時勢而行倘勢處萬難勿强之使進以悞大事未幾大將軍貝勒尚善等奏郎中色度到岳州傳奉諭㫖集議水陸攻取岳州可否情形臣等議今者賊有可破之機正宜水陸夾攻但陸路賊備甚嚴應令舟師先進陸兵繼發兹分撥已定俟戰船器械整頓完備臣即親統進𠞰上允之臣謹按爾時岳州長沙之賊彼此相恃以為固若㧞取長沙則岳州餉道斷絶孤懸無助勢難自立如攻克岳州則我兵可以水陸齊進與大將軍安親王岳樂㑹兵夾𠞰長沙亦不能乆存矣皇上深知地利洞悉賊情故徃者屢命諸將帥相機規取長岳今復以曠日持乆遣色度等赴岳州諭將軍大臣以戰守機宜并鼓勸官兵令其争先用命於是官兵皆感恩思奮進戰洞庭徒以將軍鄂鼐不善將兵未能破賊藉口賊䑸甚大風濤危險遽爾引還致岳賊餉道復通又得茍延二載然其後我兵既圍困逆宼㧞取岳州長沙之賊遂不克拒守棄城敗遁果不出聖諭所指示云大將軍康親王傑書奏官兵復興化時傑書授都統拉哈達寜海將軍印令其統兵進𠞰興泉海㓂偽總督趙得勝偽虎衛將軍何祐等擁衆四萬餘於興化城西北太平山屯營二十六壁壘甚堅正月二十九日我軍進戰先擊賊於白茅山追至太平山盡破其營賊衆震懾棄城而遁遂復興化府己巳停叙進蜀軍功上諭兵部進蜀官兵並未平定地方大創賊㓂且屢奉温綸理冝戮力疆場乃至西安布匿名札惑亂衆心既抵隴州又妄行控告不赴平凉我國家創業以來寜有是事統兵將領不能約束兵丁肆行不法及至京師勅令首舉倡告之人官兵又互相隱匿殊干法紀此行軍功俱不准叙㝷議政王等議言據都統赫業等取到供狀及將軍穆占咨文西安將軍佛尼勒供詞則官軍棄營敗遁無疑宜將左翼四旗並陣亡署䕶軍統領喀西泰部下官兵俱行拏問上諭保寜蟠龍山軍營被衝官兵敗遁取供不明地方未得真實且官兵行役勞苦其免究問至署䕶軍統領喀西泰陣亡所部官兵棄將領而逃其未傷官兵可察拿治罪癸酉詔封䝉古貝子達爾扎為貝勒上諭議政王等固山貝子達爾扎聞定邉花馬池諸處叛變不待命遣即親率官兵撫定城堡擒獲賊渠深為可嘉其進封為多羅貝勒甲戌詔封䝉古貝勒索諾木為郡王上諭議政王等多羅貝勒索諾木為國効力應付驛馬不悞賫奏且提督陳福請兵不待命遣即令其子弟馳赴深為可嘉其進封為多羅郡王臣謹按我國家輯柔逺人靡不綏之以徳懷之以禮况䝉古諸部叨恩累世而受我皇上之寵眷尤為深厚當吳逆之變正其竭力圖報之時達爾扎索諾木咸不待命遣一則親率官兵進𠞰叛㓂一則遣發子弟馳赴軍前葢因天澤奫淪浹於肌髓故感戴至切遂不覺其急於自効雖其勞績可嘉要亦分誼所當為也乃皇上恩禮愈加特頒異數各晉爵一等於是不維䝉古益深感激即遐荒絶域亦罔弗聞風嚮化來享來王總由聖心至仁惠恤蕃邦備極優渥有以使之然爾削貝勒洞鄂爵降貝子溫齊等級上諭議政王等多羅貝勒洞鄂等統率大兵出征秦中並未能克復疆土撫安百姓貽誤軍機殊負委託可削去洞鄂多羅貝勒罷議政為閒散宗室降固山貝子溫齊為輔國公革去都統及宗人府右宗人罷輔國公綽克託宗人府右宗人停俸二年平定三逆方畧卷二十八

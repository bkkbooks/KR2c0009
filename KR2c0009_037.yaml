body:
  text: 欽定四庫全書平定三逆方略卷三十七康熙十七年四月庚午朔調副都統雅塔里率兵赴福建漳州安塘筆帖式報副都統伯穆赫林海澄公黃芳世等師次灣腰樹為賊所衝平和失陷賊逼潮州而營上諭大將軍康親王兵既分援諸路蒙古兵復撤回閩中兵力似屬未足今浙江平靖可於杭台衢三府滿洲蒙古漢軍兵內選六百人令雅塔里率赴福建聽康親王調遣據報賊逼潮州而營應檄將軍拉哈達賴塔靖南王耿精忠等交相計議𠞰滅漳潮間賊寇己卯命將軍穆占調兵防守郴州宜章諸處穆占奏官兵恢復郴州桂陽興寧宜章諸處其地為通粵要路幅􅊷遼濶不可不駐兵防守欲留臣等之兵即恐進戰兵力單弱茍不設防則新復之地又復可虞乞别調官兵駐守上諭頃因茶陵攸縣地屬要區已敕大將軍簡親王不必繼穆占前進與和碩額駙華善協同鎮守仍令護軍統領哈克三等會同穆占併力進𠞰今穆占既恢復郴宜諸處當增兵防守若粵東無虞鎮守南韶將軍舒恕之兵可調往駐防若粵東可慮則勿調舒恕兵或應於簡親王兵內通融分撥或量留哈克三兵增防並聽穆占斟酌以行尋穆占招撫偽總兵王育等收復臨武藍山嘉禾桂陽桂東五縣因奏言臣以兵抵永興渡河進𠞰檄將軍華善遣兵永興以續我師之後華善謂茶陵諸處留兵甚少不為遣兵臣因將郴州永興桂陽興寧諸處令都統伊里布前鋒統領碩岱護軍統領拉賽副都統託岱祖澤純宜孝思等率兵分汛防守但新復地方幅􅊷遼濶不可不增兵駐鎮茶陵有滿兵每佐領四人及總兵官趙應奎與臣等所留湖廣緑旗兵又留簡親王兵一半為數不少請於此兵內遣往郴桂永興諸處以資防守上諭頃有旨將軍舒恕之兵應否調守郴州諸處或酌分簡親王之兵或應留護軍統領哈克三之兵聽穆占酌行今穆占身在地方相視緩急作何調兵防守郴州諸處仍遵前旨相機從事庚辰遣部員分理進粵大兵糧餉先是因廣東糧闕進𠞰粵西大兵饋運難繼上命撥江西銀十萬兩安徽銀十五萬兩由江西採購米穀運送廣東至是總督董衛國奏言江西地方殘弊之後購米未可即得上諭該督奏稱江西經賊殘破購米艱難前撥安徽銀十五萬兩宜就近付江南督撫採辦陸續送至江西轉運粵東但輸挽軍糧所關最重可令戶部郎中吳什巴員外郎莫洛馳驛赴江西廣東隨宜區畫毋困民力毋誤軍需甲戌增設福建總督及海澄公標下官兵時海澄公黃芳世奏閩省變亂時臣叔梧弟芳度所部官兵並已離散臣抵漳之後頗復收集請減兵額為三千付臣弟芳泰統轄總督郎廷相又奏海逆勢焰日盛勾連山賊互相應援臣標兵止二千五百所在告警不能分應請增臣標兵二千五百設立五營今韓大任投誠之兵見在給糧即以此兵補入臣標可不煩别糜糧餉上諭海澄公黃芳世收集之兵往時遭亂奮志堅守孤城效力勞苦今逆氛未靖不當令其分散宜如所請以三千人𨽻籍給餉黃芳泰已授京口左路總兵官其令黃芳世標員分轄此兵總督郎廷相奏增兵二千五百設五營亦如所請但韓大任之兵新經招撫不宜聚處一軍大將軍康親王及參贊大臣將軍耿昭忠及該督撫提等詳議以撫提標舊兵與新附之衆相參配合以足兵額統轄官員該督選擇題補趣將軍額楚等𠞰滅叛賊祖澤清時祖澤清自髙州勾連山海諸寇水陸交犯電白上諭逆賊祖澤清背叛已調平南王尚之信副都統額赫訥等率兵進𠞰復遣將軍傅宏烈都統勒貝等率兵攻取鬱林諸處今賊來侵至於電白尚之信將軍額楚等其速行攻𠞰撲滅戊子命遣隨降兵衆歸雲南上諭兵部吳三桂背恩倡叛彼所部人員向沐國恩甚久其中不無被脅者韓大任等既經投誠該部仍議敘加恩外其同來護軍甲兵皆國家素所豢養之人若輩父母妻子俱陷賊中可發遣令歸滇中俾得完聚其續至者兵部逐一問明或有願歸奏聞并發庚寅趣大將軍康親王傑書等援海澄時漳州安塘筆帖式報海逆水陸環圍海澄我兵失利於灣腰樹賊勢益張堅守海澄道路乘船肆擾聞海澄城中糧已匱乏而賊復日犯漳州總督郎廷相復奏海賊猖獗而閩省兵單請調江南浙江廣東三省滿漢官兵赴援漳泉又請調三省水師戰艦并於福建召募水卒規取厦門上諭江南舟師調發嶽州諸處京口亦為濵海要地廣東之兵進𠞰祖逆鎮守潮州官兵及劉進忠所部官兵又調往廣西梧州署副都統孟安等已率兵往援漳州副都統雅塔里亦已率浙江大兵前赴福建此三省之兵已隨在分遣不可復行調發且目下事機援海澄為急郎廷相乃奏請調募舟師規取厦門不合俱不準行大將軍康親王等身受全閩重寄宜將雅塔里率往之兵并黃芳世郎廷相標下增設之兵隨宜調遣務亟解海澄之圍撲滅犯漳賊寇乙未命將軍侯張勇移鎮甘州張勇奏吳逆饋遺諸達賴台吉交相連結彜人受其誘惑益肆窺伺蓄意欲圖入掠且逆賊已知松潘茂州畨中有通西寧大路恐濳乘間隙侵茶馬之利上諭甘州肅州涼州三處為邊陲要地往時特令提督駐鎮甘州後因川賊侵犯秦州河東多事故移張勇於蘭州今逆賊吳三桂交通彛人圖擾邊境不可不加固守張勇久任邊鎮素著威名彛人懾服其仍移鎮甘州調度防禦進邊彛人相機遣出如有不遵約束恣意妄行嚴加隄備一面與大將軍公圖海等籌畫酌便而行五月庚子朔授大將軍貝勒尚善等進取機宜先是上諭兵部一等護衛雅圖侍讀學士格爾古德來自長沙奏言投誠偽將軍林興珠向安親王言前嶽州舟師再戰興珠皆在今我船甚多宜分其半泊君山以斷常德之道餘船泊香爐峽扁山布袋口諸處沿九貴山陸路立營以斷長沙衡州之道則嶽州賊路阻塞縱有糧米而薪芻器用必致乏絶賊可不戰而斃矣王令以此奏聞可即移文詹事宜昌阿知之至是宜昌阿奏我兵進湖後於髙家廟君山扁山九貴山九馬嘴諸處聯落泊舟以斷賊路九貴山復設陸營使水陸相望我船相去不逺縱嶽州賊出犯可以并力攻擊即長沙衡州常德諸賊來援亦可合勢𠞰禦賊內外阻絶勢必窮蹙如得嶽州後宜進取何地彼時方行請旨必致後期當如何進兵乞預示機宜上諭宜昌阿所奏水陸大兵進攻嶽州貝勒尚善等宜熟計萬全以期速克既克之後即乘勢速取常德澧州諸處勿令賊得為備尚善等前以所在逗留貽誤大事今宜殫心竭力勉圖自效毋得仍蹈前轍玩日稽時命發京師兵赴福建更戍上諭兵部進討福建官兵勞苦日久今撥每佐領護軍一人甲兵二人前往代戍署副都統嶽爾多已自福建率蒙古兵來京即令統轄前往調將軍賴塔等率師援海澄大將軍康親王傑書奏海澄危急臣已檄駐守廣東潮州將軍賴塔率所部兵之半及緑旗兵來援餘兵令副都統沃伸巴圖魯統領同靖南王耿精忠駐守潮州上諭海澄被圍日久勢在危急將軍賴塔可率兵速往救援潮州亦屬要地康親王更檄沃伸巴圖魯等嚴加固守但海逆勢甚猖獗不可不增發官兵浙江既有將軍總督巡撫總兵官足以固圉應選緑旗精兵三千令提督石調聲統之速往應援如或稽遲從重治罪命總兵官黃芳泰襲封海澄公先是海澄公黃芳世病篤上疏言臣叔梧弟芳度全家殉難不遺一孤臣止一男甫及九嵗臣弟總兵官芳泰久歷戎行備嘗險阻乞令承襲公爵已而芳世病故總督郎廷相以聞上命贈芳世少保以總兵官黃芳泰襲封海澄公癸卯恤出征兵士物故者上諭兵部各路出征兵士有奮勇陳亡者有不習水土病故者此屬皆纍朝效力盡瘁殞身殊可憫惻今其骸骨相繼而還念彼兵士悉皆貧苦應得恤銀宜行早給俾克殯葬爾部察明隨到即行奏發以副朕軫恤士卒至意己酉命調江寧提督楊捷為福建提督先是上諭吏兵二部向以閩省海疆要地雖經恢復海逆未平民生凋敝撫綏防禦惟在文武大吏相與殫心料理方于兵民有禆今總督郎廷相提督段應舉自簡任以來為時已久山谷之伏莽未靖閭閻之困苦未蘇吏治未見澄清營伍漫無整頓寇警頻聞地方躪擾更有甚者海賊侵犯內地事前不能預防事後不能勦禦皆由該總督提督庸懦無才職業不修所致殊負簡任之意豈可仍令在任貽誤封疆大將軍康親王參贊大臣等其會同嚴加確議密行具奏至是康親王傑書等奏郎廷相等應嚴加處分上諭郎廷相段應舉俱著解任吏兵二部嚴加議處江寧提督楊捷謀勇兼優威望素著歷任巖疆兵民感戴效力有年克稱厥職前以江南重地彈壓需人特簡賢能用資料理邇者江南地方寧謐著有成效今閩省海氛未靖正在用兵必得偉略竒材方克掃蕩鯨鯢底定疆圉楊捷著以原銜加少保兼太子太保調補福建全省水陸提督總兵官一切𠞰禦賊寇保固地方戰守機宜全資殫心籌畫展布壯猷以副朕簡擢倚任至意庚戌詔議敘嗒喇沁土默特部落塔布囊善達等時署副都統嶽爾多率出徴福建蒙古兵還京上諭兵部理藩院曰喀喇沁土默特部落塔布囊善達台吉察渾塔布囊霍濟格爾等奉調往浙聽大將軍康親王調度各統所屬官兵徴𠞰逆賊後深入閩省同大兵平定地方行間效力身先士卒衝鋒陷陳奮勇用命深為可嘉宜降恩綸即行議敘以勵後效爾部院會同速行議敘具奏乙丑尚之信奏復髙州雷州之信及副都統額赫訥等於四月十一日抵電白大敗賊衆越六日克其城祖澤清聞之宵遁十九日恢復髙州尋遣人招降雷州平定三逆方略卷三十七

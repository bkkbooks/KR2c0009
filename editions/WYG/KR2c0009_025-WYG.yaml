body:
  text: 欽定四庫全書平定三逆方畧卷二十五康熙十五年七月辛巳朔命巡撫韓世琦督造戰艦大將軍安親王岳樂奏賊船集長沙城下我兵無戰艦難以破賊請發江西得勝船十艘安慶九江沙船五六十艘赴長沙又長沙附近林木頗多并乞勅巡撫韓世琦伐木造船上諭得勝船僅可用之湖中非長江所宜其岳州沙船如安親王所請之數發往長沙江西總督董衛國巡撫佟國禎等仍辦料募工送赴長沙軍前繕治舟艦如不給用江南總督阿席熙安徽巡撫靳輔等速行採辦雇募轉送江西一并運致仍預檄安親王遣兵迎取付韓世琦督造申飭大將軍簡親王喇布等時賊據吉安將軍哈爾噶齊額楚等分布官兵水陸進𠞰五月二十六日擊敗逆賊克其外城追至城下斬首甚多哈爾噶齊等遣署前鋒參領郭濟奏㨗上命郭濟𫝊諭喇布等曰江西雖距京四千里朕朝夕聞之甚悉王以宗室懿親不乃心國家惟坐守省㑹日事騎射不思經理軍務恢復疆土諉避偷安殊負倚任之意今逆賊髙大節竊踞吉安諭㫖到日即宜刻期攻取又副將軍希爾根不思報國日惟晏坐省城安逸日便性尤偏執軍中每言及左右翼必庇右翼嗣後宜痛改前非力圖報効哈爾噶齊額楚亦遵朕命速取吉安勿得退諉坐失機宜況覺羅舒恕莽依圖穆成額見駐贑州南安王等宜令協力攻取吉安進兵兩粤凡行兵之道愛民為先若百姓富足粮餉充裕則徴調師徒不致困乏自今大兵所至務禁戢擾掠以稱朕撫輯兆民至意乙酉命鄂爾多斯兵駐邊外候調大將軍圖海奏將軍畢力克圖報所調鄂爾多斯兵僅千人馬又羸痩令進内地未必有益臣因移㑹畢力克圖令鄂爾多斯兵暫駐邊外養馬以待今平慶諸路雖已厎定川逆尚未殄滅已令彼即率副都統恰塔兵員外郎拉篤祐所部土黙特兵及副將來他緑旂兵速赴臣軍上諭鄂爾多斯兵暫駐邊外秣馬署副都統額業圖㑹同鄂爾多斯王等選擇甲兵補給馬甲軍械聽候調選壬辰命誅參將熊虎等宣諭寜夏官兵提督趙良棟奏臣按問謀害原任提督陳福者參將熊虎等四人實為首惡今撥兵拘禁伏候勅㫖上諭呉逆背叛以來濳布偽書煽惑人心原任提督陳福妻子在蜀初無瞻顧篤志忠貞𠞰禦賊㓂恢復城郭功效懋著及率兵進𠞰固原中途遇害前因變出倉卒弁兵不能救䕶俱釋不問至於倡謀為亂手刃主將者國法難寛今既察明熊虎等四人實屬首惡可即正刑誅用懲奸宄其餘兵弁各守汛地無或牽連嗣今如更有首告者即以其罪罪之其徧諭寜夏提標官兵咸使聞悉丙申命䝉古兵分駐河南兖州時翁牛特喀喇沁等分八旂兵共一千五百餘人已奉調進古北諸口上諭翁牛特等四旂兵往駐河南府喀喇沁等四旂兵往駐兖州府丁未諭駐防河南府參領瑚什巴等𠞰永寜賊時土㓂張成武侵擾河南永寜縣境駐劄河南府參領瑚什巴等移㑹巡撫進兵報至上責之曰大兵駐防河南府本為撲𠞰盜賊今永寜有警瑚什巴額勒布等距賊百八十里不率兵星赴乃稱移㑹巡撫遷延時日殊屬不合瑚什巴等可即率官兵進擊該撫鎮亦即遣兵㑹𠞰無使滋蔓仍禁戢軍士勿擾地方戊申大將軍圖海奏官兵敗賊於牡丹園六月二十六日偽將軍呉之茂自秦州率衆濳逸將軍佛尼勒等以滿漢官兵追及於牡丹園大敗之斬首五千餘級之茂率十餘騎越山而遁己酉命赦江西脅從人民上諭兵部吉安一郡逆賊盤踞日乆小民被脅蓄髮者衆此實畏死之恒情也且勞師討賊本以為民若大兵所至蓄髮者概行誅戮殊非朕撫恤殘黎至意儻有據守城池山寨執持兵械抗拒不降者仍行誅𠞰其餘概與免死俾得自新爾部通行曉諭各將軍一體遵行命郎中温岱自江西以造船貲費運送長沙先是遣温岱至長沙相視軍中情形及還京奏稱大將軍安親王岳樂等請發戰艦至岳州彼即遣官兵取赴長沙應用上諭長沙江路窄狹逆賊兩岸踞守泝流數百里取船不易且安親王及温岱等前奏長沙附近堪用材木頗多與其乗險運致不如就近採造可令温岱速往江西同偏沅巡撫韓世琦動支額銀二十萬兩運至長沙為犒兵造舟之用沿途令大將軍簡親王總督董衛國等撥兵䕶送如江西兵力分散難以轉運移文安親王發卒迎取其造船所需工料温岱亦㑹同江西督撫採募携往八月甲寅戒諭諸路將帥及文武各官上諭吏戸兵三部比年以來大兵諸路征𠞰軍需浩繁一切供應皆取給於民凡領兵將軍及督撫文武大小各官俱當以國計生民為念潔己奉公加意撙節表率屬官恪遵法紀以副朕戡亂救民之意乃有不以𠞰㓂安民平定地方為念惟圖營私射利糜費錢粮軍前所用米豆草束諸項自將軍以下有自行販賣囑託地方官多取價值地方官有徇其情面浮冒開銷者亦有地方官販買支放多行開銷者有已備本色不行收納折價入己者有民間運到米豆草束地方官故意遅延掯勒及至軍前又多方留難解官恣意需索方肯收納者至於購買馬匹不開實價以少為多濫行銷筭種種情弊難以枚舉皆由大小各官互為徇庇止知圖便己私殊為不合應嚴加禁飭以清積弊若仍不悛改事覺照貪官例治罪有能舉首者從優議叙議政王貝勒大臣等其㑹同詳加定議以聞於是議政王等議定處分叙録條例奏請上從之令通行曉諭大將軍圖海奏官兵復禮縣先是賊渠偽將軍王屏藩率衆踞樂門圖海遣將軍穆占斷賊餉道穆占於六月二十七日抵樂門賊已遁去因趣兵㑹都統赫業副都統希福於崖城進㧞禮縣分道追賊斬首甚多乙夘命將軍侯張勇嚴飭邊防勇奏彛人滚布窺我兵調征河東乗隙入内地收掠畨族人畜上諭彛人率衆濳入内地其心叵測將軍侯張勇其嚴飭甘涼沿邊將弁加意防守戊午命大將軍簡親王喇布等速取吉安接濟贑州諸軍先是喇布奏將軍舒恕等報稱駐守肇慶署副都統莽依圖等於六月初九日抵軍前士卒鎧仗耗敝馬匹缺乏上諭鎧仗馬匹皆大兵急需其令江南江西總督多備弓矢江西巡撫動支額銀製造甲胄俱存貯南昌令大將軍簡親王副將軍希爾根率兵速取吉安通贑州路以所貯甲胄弓矢運至舒恕軍前仍令理藩院𫝊示外藩䝉古諸王以下酌量捐助馬匹以濟軍需尋又諭議政王等曰大將軍簡親王副將軍希爾根等俱有保固江省𠞰滅賊㓂重責豈得各分疆界互相推諉今將軍舒恕等兵至贑州南康為日已乆馬匹資仗乏絶如聽其因糧自給必致擾害生民吉安雖未恢復豈無間道可通贑州王將軍總督等多撥官兵由間道運送糧械接濟士卒吉安既係南康贑州孔道大將軍王等率兵速行攻取仍酌留官兵同總督董衛國鎮守南昌己未諭大將軍安親王岳樂𠞰撫機宜上諭岳樂曰朕聞王恢復萍鄉大創逆賊直抵長沙甚為嘉悦今日之事利在神速若稍遲緩俾賊得固守則攻取不易今陜西全定逆賊十餘萬自四州來者盡已殱滅大兵即不下四川賊亦不敢復出若發見在陜西之兵前赴湖廣庶或有濟王其善撫百姓儻民困已極即得地方亦復何益至叛變之人皆係脅從情非得已且原皆朕之臣子王其時加招徠即吴三桂果有輸誠之心亦何不可納之有王膺此重任自有成筭特以朕意示知臣謹按帝王之用兵也將以勤恤民隐而除其害故師有容民之像而武以止戈為文聖人靖亂安人之意葢今古如一也當兹六軍南討進抵長沙皇上念切烝黎汲汲焉欲出之於湯火因趣岳樂速行攻取又特申天語令其善撫百姓且謂脅從之人皆我臣子宜加招徠誕播並生之徳丕彰不殺之仁仰見我皇上之心一天地之心大哉其無所不覆載也已己巳命陜西提督王進寶等駐固原諸處大將軍圖海奏陜西提督本駐平涼固原密邇平涼且為秦中形勝之區應令王進寶移駐固原兼理固鎮事務其西寜為邊陲重地距固原甚逺進寶難於遥制固原總兵官朱衣客向在西寜熟詣形勢調駐西寜於邊陲殊有禆益又慶陽一郡幅􅊷遼濶素為賊藪當此反側初安亟需彈壓宜令隨征總兵官陳竒謨暫鎮慶陽安輯人心上允之乙亥總督李之芳奏官兵殱賊于大溪灘時偽將軍馬九玉等率賊衆數萬人據守衢州河西賊將林福營於大溪灘輓運糧餉大將軍康親王傑書承詔進兵衢州集都統賴塔等議先斷賊餉道以奪賊勢遣賴塔等於是月十五日率滿漢官兵直抵大溪灘奮擊大敗之乗勝進取江山縣城九玉大懼棄營遁走丙子封大將軍圖海公爵上諭吏兵二部曰撫逺大將軍都統大學士圖海器識老成才猷練達贊襄機務宣力累朝以文武之長才兼忠愛之至性勞績茂著倚毗良殷前察哈爾布爾尼背恩反叛命圖海為副將軍帥兵征𠞰運籌决勝克振軍威未及一月㨗功立奏逆賊殱滅疆敉寜近以平涼阻兵日久屢命𠞰撫罔有成效特簡圖海為將軍統率大軍節制各路果爾謀畧淵深調度得宜軍鋒所至一戰克㨗更能體朕好生之心宣布恩威開誠招撫遂使平涼慶陽固原諸處文武官員兵民傾心向化悔罪歸誠生靈免於塗炭邊境賴以保安數日之間闗隴悉定皆由籌畫周詳布置神速𠞰撫並用克建膚功圖海以心膂大臣膺秉鉞重寄實心為國克副倚任朕心深為嘉悦於軍功議叙外應從優加恩封為三等公以示朕眷注忠勤酬答勲庸至意加將軍侯張勇等秩上諭兵部自逆賊煽亂以來奸徒附和侵擾地方関隴以西疆域遼濶大兵一時未集人心不無動揺靖逆將軍靖逆侯張勇提督王進寶總兵官孫思克一聞蘭州之變即帥兵星馳渡河𠞰禦収復城邑條奏機宜舉發偽劄緝獲奸諜綏定邊陲厥功甚大及大兵攻取平涼專任靖逆侯張勇等鎮守秦鞏復殫心籌畫調度合宜𠞰禦川賊屢奏㨗音紓朕西顧之憂功尤茂著伊等皆宿將重臣矢志報國同心協力展布謀猷兼以訓諌士卒忠義素孚故能身先行陣所向克㨗其所屬將卒亦皆効力共建功績朕甚嘉之於軍功議叙之外應從優加恩以示朕奬勵忠貞酬答勲勞至意張勇加為一等侯王進寶陞為一等阿思哈尼哈畨授為將軍仍兼管平涼等處提督事務孫思克陞為一等阿逹哈哈畨涼州提督戊寅命副都統瑪哈達為鎮守杭州等處將軍先是杭州將軍圖喇告病上令其還京以副都統瑪哈達暫為署理至是兵部以應補之副都統等列名具奏上乃命瑪哈逹為鎮守杭州等處將軍平定三逆方畧卷二十五

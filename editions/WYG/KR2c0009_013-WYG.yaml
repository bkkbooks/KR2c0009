body:
  text: 欽定四庫全書平定三逆方畧卷十三康熙十四年二月甲午恤保寧還師上諭戸兵二部自保寧歸來軍士勞苦已極深為可憫赫業瑚禮布瓦爾喀科爾崑等所領兵著每人賞銀十兩其前後所支錢糧俱免算除仍按月給餉命大將軍貝勒洞鄂等帥師定秦州平凉諸處將軍侍衛坤巴圖魯帥師開棧道前赴漢中侍衛坤巴圖魯奏鳳縣賊毁偏橋設兵守險糧不得入守鳳縣夸蘭大宗柱等以糧竭突圍出又同知張亢古來自秦州言王輔臣雖有降意其下阻之皇上赦勅未示兵衆今輔臣部下王好文等率兵斷截棧道上諭貝勒洞鄂等至西安不即隨經畧取道秦州乃由棧道進托言馬瘠竟住漢中致寧羌告變王輔臣回秦州時又不追躡𠞰殺急回漢中及保寧兵旋僅留將軍席卜臣等守漢中親統大兵輙回西安知棧道險要不設重兵致狡冦阻截俾廣元朝天復為賊據皆洞鄂等退縮之咎理應解聀今專守西安但正值臨敵姑令洞鄂總統兵馬定平凉秦州諸處勿仍前逗留有悞軍機此行令貝子温齊公綽克託將軍阿宻達前鋒統領穆占輔之如應分兵可給阿宻達穆占將軍印令為將軍侍衛坤巴圖魯可率兵開棧道以進漢中鄂善哈占量留官兵守西安茍近地有警即行𠞰滅尋洞鄂奏將軍阿宻達署副都統鄂克濟哈候補副都統覺羅夸岱於諸所調兵及京城西安兵共撥每佐領五人本月十四日率徃平凉臣與固山貝子温齊輔國公綽克託署前鋒統領穆占署副都統達理善巴圖魯副都統希福䝉古都統赫業䕶軍統領瑚禮布等於保寧還兵及達理善巴圖魯所領兵亦撥每佐領五人本月十九日率徃秦州又遣滿兵防守潼闗所餘之兵通計每佐領三人及鄂善所帶䝉古兵四百餘人付哈占鄂善副都統穆舒渾等守西安丙申命副都統鄂泰為建威將軍帥師駐太原上諭兵部陜西沿邊有路通山西汾州恐逆賊乗隙來犯其授副都統鄂泰為建威將軍統領所調盛京兵一千人徃駐太原防守汾州諸處以一等侍衛烏丹為署副都統叅贊軍事復調烏拉諸處兵一千人來京辛丑詔總督哈占陳奏陜西情形上諭兵部陜西情形邇來如何鎮守潼闗滿兵係誰統領兵數㡬何保寧失散前鋒䕶軍曾否抵漢中爾速檄總督哈占一一具奏未㡬哈占奏保寧失散前鋒䕶軍絶無踪跡聞平凉賊衆四千餘能戰止千人餘皆平民被脅為兵賊今將犯涇州又聞呉三桂以銀二十萬付叛臣巴三綱散給王輔臣及經畧標兵以相誘結今將軍阿宻達於本月十四日進兵平凉貝勒洞鄂於十九日進兵秦州夸蘭大拜音察莽奕圖以兵五百守潼闗署副都統阿爾祜以兵五百守寶鷄副都統延布率兵五百前徃鳳縣而棧道已為賊據今與將軍侍衛坤巴圖魯暫駐寶鷄至若三水淳化白水蒲城韓城諸縣土冦蜂起刼掠村聚分我兵勢臣揆度情形剿撫並施大約渠魁既殄小醜自當瓦解無足慮者至臣所請令䝉古由寧夏進駐固原雖曰為平凉蘭州實疑寧夏延綏官兵也今下馬闗靖逺營官兵心懐叵測俟偵探得實再疏以聞壬寅詔赦陜西從賊官吏兵民上諭兵部秦中兵民皆朕赤子年來保固地方轉輸糧餉急公好義勞苦倍常朕心每切軫念近因入川兵變人情惶擾一時無知割辮去纓以圖幸免事起倉卒情可矜原今特布寛典予以自新其臨鞏平慶等處文武官員軍民人等凡有割辮去纓者一概赦免不究官俱照舊供聀兵丁各歸原伍百姓各安生理乙巳大將軍康親王傑書奏官兵復處州副都統瑪哈達總兵官李勞等正月初八日復永康十五日復縉雲乘勝進取處州賊將王宗保以兵遏桃花嶺官兵擊敗之賊棄城遁處州遂復庚戍命副都統佛尼勒為西安將軍時西安將軍瓦爾喀卒於軍故以佛尼勒代之壬子勅陜西諸將速進兵𠞰賊總督哈占奏本月初五日賊犯蘭州撫標官兵倡亂應賊城䧟巡撫華善按察使伊圗奔凉州布政使成格未出上諭大將軍貝勒洞鄂將軍阿宻達等統領大兵分路速進恢復秦州平凉掃除逆賊以定三邊總督哈占周有徳鄂善巡撫杭愛張徳地等堅守漢中相機進𠞰併宻檄提督張勇總兵官孫思克陳福王進寶等整兵固守汛地前來夾攻丙辰命岳州荆州設水師營總督蔡毓榮奏賊船徃來長江狡謀叵測上命候補副將花善為岳州水師副將設兵一千五百人尚之禮為荆州水師副將設兵一千人各為左右二營以資防禦三月庚申勅大將軍貝勒尚善等防䕶戰船先是自岳州發徃荆州戰船遇風漂散有數船為賊所得坐塘筆帖式以聞上諭兵部戰船經由長江大將軍等應嚴飭所司加意防䕶乃怠忽漂失反為賊資嗣今凡船徃返宜以纜索牽引遇風則泊倍加慎謹爾部其速行檄諭至是尚善等奏風壊沙唬船五十餘隻沈没戰船四隻請敕撫臣速發修船物料上復諭沙唬戰船行兵急需闗係重大侍郎勒布巡撫張朝珍等速將修船物料委賢能官員送至岳州亟行修理岳州船兩次被風如果停泊得所風豈能壊其嚴飭大將軍貝勒等務擇地停泊善為防䕶諭大將軍順承郡王勒爾錦等進兵機宜先是將軍貝勒察尼請分岳州每佐領兵二人發安親王軍前協定江西規取長沙湘潭約荆州岳州將軍三路並進上諭勒爾錦等公同速議并令安親王岳樂叅酌奏聞至是岳樂等奏若岳州兵來足資臣進𠞰兵力即守江西亦有禆益上諭自岳州發兵至江西正值溽暑霪雨於王進𠞰之期又恐無及其罷勿遣發勒爾錦等奏臣商之貝勒尚善據云遣發江西之兵已經停罷欲撥岳州兵每佐領三人令貝勒察尼都統巴爾布率赴荆州臣俟此兵到日即從彞陵以下石首以上相機渡江上諭王及參贊大臣等身在地方具陳機宜固當如議但入川大兵見以糧餉不繼退駐西安今我兵渡江之後萬一川賊乘桴東下侵犯荆州彞陵茅廬山賊又出襄陽諸處則我軍必至却顧難以長驅王貝勒等皆朕懿戚參贊大臣皆朕股肱今與賊相持視可行則如所請行之儻有可虞寧俟秋冬相機進取甲子命大將軍康親王傑書詳奏軍中情形上諭傑書曰王前奏克取處州之後酌量前進又稱貝子治浮橋戰船將告竣旦晚由各路征𠞰逆賊而分兵取黄巖今台州浮橋成否已渡江否及王進兵之事與軍中情形若何浙江事勢若何王其一一奏聞尋傑書奏臣恢復處州即圖前進因兵少不能深入且仙居與縉雲桃花嶺通今復為賊據恐乘間突出以斷我後則我兵甚危處州經賊蹂躪兵無積粟轉運維艱綠旂兵旂兵守處州滿洲兵守縉雲分調台州兵速取仙居以㑹副都統瑪哈達之兵俟其兵到相機而行此臣二月中所奏報也後因偵探温州情形調兵仙居文移徃來日久賊衆已據温州青田陸路則險要俱阻水路則舟楫不備貝子又言俟定海舟師到始可水陸三路進兵以故調兵仙居之説中止此臣三月中所奏報也台州浮橋已成提督常進功素諳水戰因遣赴貝子軍前率舟師征𠞰今貝子言常進功以風信未順二月十九日始出定闗二十三日遇賊敗之再山賊多伏兵海島必俟餘逆盡殄始赴台州今賊將連登雲由松溪龍泉徐尚朝由温州合力逼處州臣已遣副都統瑪哈達總兵官李榮等擊却之繆村為衢州咽喉賊乘夜渡河掩襲副都統拉哈總兵官王庭梅擊敗之總之浙江大勢必俟舟師既至台冦已平再酌機宜共圖進取命西安將軍佛尼勒為振武將軍援漢中先是大將軍貝勒洞鄂奏今將軍侍衛坤巴圖魯留副都統阿爾祜延布兵一千守寶鷄自帥每佐領兵一人協臣等攻秦州臣思川賊近在沔縣不取棧道不特漢中可危而大兵糧糗亦恐有阻上命將軍侍衛坤巴圖魯等以文到日即率師開棧道進漢中至是總督哈占等奏漢中地方甚要今既授副都統佛尼勒為西安將軍宜令統一軍前進上諭侍衛坤巴圖魯等兵進漢中則已若未行即以兵付佛尼勒用振武將軍印由棧道進漢中副都統延布參贊軍務侍衛坤巴圖魯副都統翁受俱赴大將軍貝勒軍前不得與謀議令副都統徳業立阿爾祜守寶鷄鳳縣以疏餉道丁卯命都統拉哈達參贊大將軍康親王傑書軍務傑書以參贊諸臣俱分遣禦賊請令鎮守杭州都統拉哈達赴軍前參贊軍務上從之令副都統雅塔理署杭州將軍印并令寜海將軍貝子以下及各將軍兵聴康親王便宜調遣庚午大將軍貝勒洞鄂奏復闗山闗二月二十八日洞鄂等至隴州之仙逸闗偽總兵髙鼎蔡元率馬步兵四千立二營於闗山河岸前鋒統領穆占將軍佛尼勒副都統達理善巴圖魯等率兵進擊都統赫業復以兵繼之賊潰走追擊五十餘里乘勝遂復闗山闗辛未調太原兵援陜西涇州總督哈占奏將軍阿宻達等於本月初四日戰於平凉不利退駐涇州請調太原兵五百人赴涇上命調將軍鄂泰副都統烏丹兵五百人令賢能官員率徃西安聴總督哈占等酌遣阿宻達軍前鄂泰等仍統餘兵及太原保定兵防守山西更令順承郡王調岳州兵毎佐領二人以副都統一人率其半徃襄陽防守以賢能參領率其半徃西安已而大將軍順承郡王勒爾錦奏俟岳州發兵必至遲久因於見在荆州驍騎撥每佐領二人以夸蘭大達爾泰率其半於本月二十日赴西安副都統巴喀率其半於二十一日徃鎮襄陽命致巨礟於西安上諭議政王等大兵進取秦州平凉攻城破敵不可無礮其撥紅衣礮四十漢軍内每佐領選諳練甲士三人令漢軍都統海爾圖左翼副都統佟世徳右翼副都統張所養率之送致西安復撥每旗滿洲賢能官一員甲士十人同徃命都統畢力克圖為平逆將軍帥師赴大同上諭議政王等宣府大同俱係要地應設兵防守今調邊外察哈爾前鋒䕶軍驍騎令左翼由張家口入駐宣府右翼由殺虎口入駐大同授都統畢力克圖為平逆將軍率盛京兵六百赴大同總統兩翼軍每翼不拘滿洲䝉古各選賢能參領以行乙亥命大將軍安親王岳樂速定進兵機宜上諭岳樂曰王輔臣作亂陜西振動逆賊耿精忠出仙霞嶺將逼衢州王抵江西日久應速滅江西賊進取長沙今或俟平定建昌廣信後進兵或固守諸汛地即行前進其速議宻奏尋岳樂奏閩賊盤踞建昌叛冦以廣信為巢穴江西各處騷動皆由兩地賊亂之故今若不滅此賊即進長沙恐他處復有竊發則江西可危臣擬於本月二十六日徃𠞰建昌廣信稍有成緒即進取長沙湘潭諸處丁丑命提督張勇等進取蘭州勇奏自寧羗告變秦州諸處繼失臣與甘肅鎮臣孫思克西寧鎮臣王進寶率官兵兼程應援甫至中途蘭州䧟賊欲進兵恢復其如河氷已開邊報又至是以撫臣親至永昌與臣面議駐兵莊浪兩相應援當此在在多事之際河西三鎮兵已應經畧總督調遣宜召募補伍臣標及三鎮屬員被調員缺并投誠及年老宜更置者欲與督臣㑹題候部推補恐道阻不能卒至請聴撫臣就近選委河西官兵入春缺餉乞勅戸部撥山西餉銀從榆林寧夏接濟又道路梗塞臣欲從邊外奏請機宜乞勅䝉古貝勒遇臣差官毋得隔阻且為引導上諭三邊經調缺額官兵及標員宜更署者並聴提督張勇募補委換河西兵餉著總督哈占巡撫杭愛俟道路少通速行撥解至欲邊外齎奏甚當可遣理藩院賢能官於鄂爾多斯地方沿途設跕遇齎奏人員給驛馬導之使來今大將軍貝勒洞鄂等已圍秦州將軍阿宻達已進取平凉提督張勇巡撫華善總兵官王進寶等其速進取蘭州㑹貝勒等協力夾勦以定臨鞏命總兵官陳福為陜西提督先是逆賊王屏藩厚撫陳福妻子以誘福福執志不變上特授三等阿達哈哈畨至是復諭兵部寧夏總兵陳福効力巖疆勞績素著屢首逆劄克篤忠貞且其妻子家屬見在川中逆賊挾誘全無顧戀矢志不移深為可嘉著以見兼聀衘陞補陜西提督給與勅印仍駐寧夏管總兵官事務俟逆賊底定後即赴平凉料理提督事務福弟守備竒家口并䧟賊中亦可憫念著從優以參將擢用命提督張勇為靖逆將軍勅諭張勇曰爾以重臣宿將偉畧𢎞猷久鎮巖疆勞績茂著自逆賊煽亂以來保障西陲輯寧中外近復協同撫鎮率領將士矢志戡亂恢復城池克篤忠貞殫心籌畫朕甚嘉焉兹特命爾為靖逆將軍仍兼管甘肅提督事務總督不得節制一切征𠞰機宜聴爾便宜以行鎮將各官悉聴統轄調遣所屬武聀有應調補者即行補授具題爾即整頓兵馬㑹同撫鎮等進𠞰逆冦平定地方早奏膚功以副朕委任之意加總兵官孫思克王進寶聀衘上諭兵部甘肅總兵官孫思克西寧摠兵官王進寳見在領兵征勦宜加職衘以便統轄其加孫思克左都督王進寶都督同知事平之日俱以提督先用命總督哈占等遣兵援寧夏提督陳福奏王輔臣盤踞秦州使叛將朱龍之子引賊犯定邊賊家奴自内應城遂䧟上諭定邊係三邊咽喉要地其令總督哈占總兵官許占魁速發官兵前赴寧夏㑹同提督陳福并力進取己夘加都督許貞太子少保上諭兵部江西屯墾都督許貞屢𠞰逆賊著有勤勞深為可嘉其加太子少保癸未調總督鄂善等領兵赴榆林先是提督陳福奏花馬池副將賚圖於本月初八日叛從朱龍至是總督哈占又奏靖邊兵民自内應賊以致城䧟上諭總督鄂善周有徳巡撫張徳地各率所部兵速赴榆林㑹同總兵官許占魁協守地方𠞰禦叛冦又䝉古馬雖疲瘦不久草青宜酌調四子等部落兵由寧夏榆林兩路前進速定地方丙戍將軍張勇奏官兵敗賊於新城時逆賊沿河盤踞勢甚猖獗二月二十三日總兵官王進寶以革囊結筏潛行渡河敗賊於河口復設伏大敗之於新城平定三逆方畧卷十三

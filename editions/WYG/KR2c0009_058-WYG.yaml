body:
  text: 欽定四庫全書平定三逆方畧卷五十八康熈二十年五月丁巳命總兵官王用予馳赴永寜總督哈占奏言臣發前隊官兵自永寧啓行即親統士卒相續前進由赤水畢節追𠞰逆賊馬寳進定雲南但臣所部兵為數無多力甚單弱永寧係新復之地且接壌貴州土司雜處請勅固原總兵官王用予率其標下官兵來永寧為臣後繼上命總兵官王用予速率所部馳赴永寧固守勅大將軍貝子彰泰賴塔等招徠土司苗蠻將軍海潮龍奏言兵以食為重若不急先安撫百姓綏輯土司萬一失其所望遠避深山則軍糈從何措置上命大將軍貝子彰泰賴塔將軍總督蔡毓榮等加意招徠奬勵土司苗蠻勿致有悞兵餉將軍總督趙良棟抵雲南亦須善為撫綏令軍糈無誤庚午命巡撫韓世琦等𠞰撫黄明諸逆廣西提督哲勒肯奏逆賊黄明馬承烈等於三月十八日俱入湖廣靖州八萬猺内臣叠㨿偵報皆云逆賊深入古州猺峝是黄明等或由楚界投賊或入猺峝負固俱未可知疏入上命巡撫韓世𤦺署巡撫事麻勒吉沅州總兵官和山永州總兵官盧崇耀就近速行𠞰撫務盡根株丙子趣總督哈占等速運大兵糧餉將軍覺羅吉哈禮等奏言將軍趙良棟親統綠旗官兵進自雅州臣盡率前鋒及毎佐領䕶軍驍騎各一人於本月十一日起行相繼前進因見在米少滿洲綠旗騎兵止齎二十日糧歩卒止齎十五日糧已留參贊副都統席布統毎佐領官兵各四人有竒駐雅州令得糧即攜齎以進臣等所挈糧糗無多不可無米接濟請更行嚴勅疏入上諭將軍吉哈禮噶爾漢等兩路征進大兵糧餉最為急需總督哈占巡撫杭愛郎中蘇赫臣額爾赫圖范承勲等以進征大兵擕帶之糧及繼運之米陸續速運務令無悞如少稽緩從重治罪辛巳大將軍貝子彰泰賴塔等奏復鶴慶麗江時大兵抵雲南㑹城偽將軍李發美聞風震讋遂舉發逆賊吳世璠與達賴喇嘛請兵偽書率其部下偽官兵以鶴慶麗江二府降六月戊子命罷將軍穆占還黔大將軍貝子彰泰賴塔等奏言將軍穆占宜令率官兵還黔但今楚雄府有偽將軍陳光䘵等復叛從賊臣等擬令都統希福等率兵往𠞰如又量撥官兵付穆占率回黔中則圍城兵力不支况諸路賊勢悉向雲南請就近令常徳滿兵進貴州遣貴州薩克察巴圖魯等兵赴雲南則攻圍調遣似有禆益疏入上諭平定滇中最為要計將軍穆占不必遣還貴州令署前鋒統領薩克察巴圖魯率所部毎佐領兵三人速赴雲南常徳署副都統諾敏率所部兵速往貴州與總督董衞國提督趙賴周􅁲世等固守貴州荆州副都統莫達率所部毎佐領兵二人赴常徳駐鎮壬寅贈提督伯王之鼎總兵官費雅達太子少保時四川建昌衛陷賊之鼎等被執不屈遇害上諭吏部曰提督伯王之鼎總兵官費雅達等以單弱之兵堅守孤城衆寡不敵因致城陷矢志不為賊屈竭忠殉難深可憫惻王之鼎贈太子少保費雅達贈太子少保授為左都督凖副都統陣亡例其子俱授拜他喇布勒哈番甲辰命大將軍貝子彰泰賴塔等遣諳悉賊情人員乘傅詣京師上諭議政王等曰傳諭大將軍貝子彰泰賴塔將軍總督趙良棟等見在投誠人員内有原屬吳三桂下舊人且親近知賊情始末及吳應麒腹心信用者大將軍等親加詳察令馳驛來京至投誠土司偽總兵陸道清及海潮龍心腹同往達賴喇嘛處者并切知賊情始末人員令趙良棟親加詳察亦令馳驛來京以備詢問庚戌命副都統得爾徳率兵赴叙州將軍噶爾漢奏臣兵自重慶啓行時因副都統得爾徳兵丁馬疲令於重慶秣馬十日即赴軍前及檄令率所部兵馳赴叙州乃不遵檄前往比臣兵抵瀘州督趣攜帶糧糗得爾徳率兵至乃稱其兵馬疲宜遣赴叙州惟彼一身務欲隨征不從臣約束上諭副都統得爾徳兵沿途取支芻秣且荆州彛陵飼馬四月有餘而馬仍疲瘦及令率所部兵赴叙州復不遵將軍調遣欲孑身前進殊屬不合宜將得爾徳即嚴察議處但見在行間俟事平旋師日察議仍令得爾徳率所部兵赴叙州聽將軍佛尼勒調遣七月甲寅命總督哈占等速撫譚天秘提督徐治都奏臣檄駐守開縣叅將塗鎧遣人接應譚洪之子天秘天秘已約六月十六日赴䕫州投誠因川陜總督復遣官招彼屬員令赴陜投誠是以未即就撫上諭譚天秘先欲投誠已經檄送偽印今或赴哈占軍前投誠或赴徐治都軍前投誠俱宜速行招撫哈占等其更遣能員多方招致毋令遷延時日辛酉大將軍貝子彰泰賴塔等奏敗賊於烏木山彰泰等趣都統希福提督桑額率兵進擊楚雄逆寇偽國公馬寳等詐敗以誘我兵希福等追至烏木山賊復㨿險以待我兵奮擊大敗之擒斬甚衆馬寳越山而遁僅以身免乙丑將軍總督趙良棟奏復建昌時良棟遣總兵官李之芳等率兵進𠞰逆賊胡國柱等敗走建昌遂復戊辰命大將軍公圖海還京師上諭兵部大將軍都統大學士公圖海年老有疾今四川雲南諸地俱已平定可令攜大將軍勅印同鄂克濟哈還京師留將軍烏丹守漢中將軍王輔臣可孑身同圖海來京陛見命逮馬寳來京大將軍貝子彰泰賴塔等奏㨿都統希福等報偽國公馬寳偽將軍巴養元等繳印投降於本月五日馬寳等俱至軍前上諭逆賊馬寳所在抗拒大兵今無地可遁力窮勢廹始來投誠殊屬可惡所犯情罪重大斷不可宥大將軍貝子彰泰等其執馬寳撥官兵嚴解來京其餘偽屬官兵大將軍如常發落尋彰泰等又奏大兵至滇環困城池招撫賊寇馬寳等背叛國恩臣事吳世璠屢次招撫不即悔罪投誠反奔尋甸攜妻子赴楚雄紏集逆黨蹂躙疆圉為大兵所敗窮蹙己極方率衆不滿百人往姚安投降非首先向化歸誠者可比偽將軍巴養元趙國祚鄭旺李繼業偽總兵郎應璧等亦與馬寳同在一所若輩宜作何發落仰乞睿裁上命巴養元等亦同馬寳執送京師趣將軍覺羅吉哈禮等進兵安塘筆帖式報偽將軍胡國柱王叙等所部賊衆自姚安逃散過半胡國柱等俱遁入山中上命以此事移知將軍吉哈禮噶爾漢趙良棟總督哈占令速行進兵乙亥勅巡撫楊雍建速修鐡索橋兵部奏大將軍貝子彰泰咨稱前經行文黔撫楊雍建令其修理鐡索橋至今尚未興工請由部具題移令作速修理凡修理橋梁乃地方官専責宜移文該撫速行修理上諭鐡索橋係運餉及大兵往返要路關係重大大將軍貝子彰泰行文修理該撫理宜速行葺治乃至今尚未興工殊辜職任著該撫將鐡索橋速行修理以便行軍轉餉平定三逆方畧卷五十八

body:
  text: 欽定四庫全書平定三逆方畧卷十七康熙十四年七月丁亥朔命將軍阿宻達等速定平凉阿宻達奏言王輔臣親領精鋭及秦州逃出餘孽畢集平凉慶陽羣盗依山結壘臣以孤軍前進恐未易奏功乞勅將軍貝勒洞鄂等酌量留兵駐守秦州餘兵盡㑹平凉提督陳福及鄂爾多斯兵令其攻取定邊固原并遏賊慶陽之援臣率在涇兵出白水由平凉東面進攻則下平凉較易上諭曰兵貴神速機不可失平凉逆賊聞大兵克取秦州衆心驚擾我兵宜乘勝長驅攻取平凉將軍阿宻達逗留不前殊屬非宜前曽添發兵馬近總督周有徳又將紅衣礮運送平凉阿宻達當尅期攻取如勢有未便當移㑹大將軍貝勒等㑹商夾勦之策再勅提督陳福速取定邊固原將軍畢力克圖等急定延安移師平凉㑹勦庚寅諭赦耿昭忠等罪上諭吏兵二部耿精忠背恩附逆煽亂閩疆荼毒生靈罪惡重大兄弟親屬律應不赦但念其祖耿仲明於太宗文皇帝時航海歸誠効力行間著有勞績其父耿繼茂於世祖章皇帝時亦効力行間鎮守邊陲今精忠雖行同禽獸上負國恩其弟昭忠聚忠及親族屬下人等道途越隔實未同謀竟爾株連朕心不忍其概從寛典盡釋之所有官爵悉令如故臣謹按負國之賊必加以族誅用懲亂逆耿精忠世受深恩叨襲王爵不思竭誠守節報塞髙厚乃妄行煽亂荼毒封疆惡極罪大戮及九族於法允宜况昭忠等係精忠親弟尤不可赦而我皇上猶憫其先人曽經効力且念昭忠等道途隔逺未與同謀免死宥辠俾服職如故即其他逆犯族屬法應同坐者往往予之寛貸不忍悉誅如天好生之仁誠度越千古矣將軍畢力克圖奏復延安畢力克圖率兵自綏徳趨延安六月二十五日逼城而陳賊宵遁遂入延安乃分兵追賊於宜川縣斬獲甚衆連復宜川保安塞延安安定諸縣申諭王輔臣勅曰吳三桂為逆人心驚擾懐疑瞻顧者多惟爾知守臣節出首逆書遣子繼禎入奏朕甚嘉之是用錫爾世職官爾子卿貳以勵忠悃後經略莫洛率師進蜀調遣失宜變生倉卒爾被逼脅陷於叛亂朕聞之未忍加誅即遣爾子往諭葢謂爾封疆舊臣屢受國恩自當悔禍來歸不意爾反生疑畏竊踞如故殊負朕至誠惻怛之懐近大將軍率諸將已破秦州蜀冦相率竄遁平逆將軍又取延安蘭州鞏昌以次底定大兵雲集平凉㓕在旦夕但平凉兵民皆朕赤子克城之日必多殺傷以爾之故而驅民於鋒鏑朕甚不忍今復勒爾自新若果輸誠而來豈惟洗滌前非兼可勉圖後効爾標下官兵及地方文武官民諸當坐者概行寛宥其拘留祝表正之罪悉赦除之朕為百姓主務期保全以靖民生慎毋惛瞀自干天討負此殊恩雖悔曷追爾其欽哉臣謹按行師之道撫勦不同至於戡亂安民其意一也時王輔臣負恩反叛稱兵秦隴之間六師致討無難撲㓕而皇上念叛冦固當殱除但陷賊良民皆吾赤子慮兵威所及玉石俱焚故先遣其子往彼宣諭旋頒勅㫖特行招撫迨輔臣執迷不悟復陳利害以曉示之諄切再三必開以自新之路者葢欲免秦民之塗炭亦所以保全輔臣也使輔臣稍有人心捧誦徳音自當感泣悔罪束身請降夫何反覆成性狙詐多端累次招徠終不悛改皇上鑒度情事謂非以兵威重創之不能使之革面乃授圖海為大將軍往督官軍大敗其衆於平凉城北輔臣惶迫始俛首來歸皇上撫勦兼施恩威並用神武不殺之概於兹益著矣丙申命都統噶爾漢為鎮安將軍帥師駐河南副都統龔圖等帥師自河南赴荆州尚書科爾擴岱等帥師守兖州時理藩院尚書阿穆瑚朗奉命調科爾沁等部落䝉古兵三千人期以八月先後入京上諭授都統噶爾漢為鎮安將軍率每佐領䕶軍一人䝉古兵一千七百人駐守河南令副都統龔圖等率見在河南滿州䝉古兵赴荆州此兵到日或遣往彛陵或分荆州兵遣往聽大將軍順承郡王等酌量以行復令散秩大臣博羅特率䝉古兵六百人赴兖州付副都統額赫訥管領其後至䝉古兵七百人尚書科爾擴岱率往兖州駐防尋噶爾漢將行上召入面諭之曰爾所率䝉古兵馬雖不甚肥健今野多青草必不誤師行聞前發䝉古兵卒沿途頗肆擾掠此行爾其加意嚴禁毋侵奪民物凡行軍駐營俱令與滿兵相近勿得逺離癸夘西寧總兵官王進寶奏復蘭州官兵圍蘭州賊數路出進寳率官兵分禦力戰賊大敗奔入城又造木筏百餘將渡河遁進寳設兵沿河邀之賊計窮偽總兵趙士昇等於六月二十六日率偽官兵以城降原任布政使成格同筆帖式二人來歸尋命逮成格等至京師拘禁之後伏誅甲辰將軍侯張勇等奏復鞏昌叛賊陳可等竊據鞏昌張勇與巡撫華善圍之兩月不下㑹秦州已克將軍穆占等率兵來㑹賊知勢窮援絶遂降乙巳提督陳福復定邊陳福同䝉古貝子達爾扎各台吉郎中額業圖等圍困定邊擒叛將朱龍父子於沙家澗斬之定邊遂平丙午命諸將分道攻平凉時王輔臣再疏奏言皇上念及兵民概從赦宥但如何撫輯天語未及在事兵將未免瞻顧上諭曰前頒勅諭官兵百姓一概免罪炳若日星且秦州諸處投誠官兵俱已安挿得所逆賊王輔臣豈不聞知若果傾心投誠當遣伊子王繼禎或標員齎奏今不遣來而本内之詞又復驕倨是則借端推托特為緩我大兵之計著將軍侯張勇速赴秦州㑹同大將軍貝勒洞鄂等酌量留兵防守秦鞏等處速行進取平凉提督陳福速取固原夹攻平凉將軍畢力克圖統領官兵速赴將軍阿宻達軍前都統海爾圖等速運紅衣礮赴平凉仍固守隴州斷賊後路命紀大將軍安親王岳樂等失利罪岳樂等既克建昌欲平附近餘孽令都統霍特等取石峡村六月二十五日霍特等率兵至石峡時天暑甚賊伏兵從兩山出我軍陳亂奔却署副都統雅賚等戰没霍特等退保新城岳樂以其狀聞上命事平察議臣謹按初安親王岳樂之既克建昌也上以時方盛暑命率大將軍還南昌息兵秣馬俟秋凉候詔指揮此誠審時度利萬全之勝筭也岳樂宜恪遵成命俟時而動乃狃於小利遣兵急攻石峽卒以衝熱致人馬疲困損將喪師無不如睿慮所料者皇上於萬里之逺瞭若目前而岳樂身在軍中昧於從事於此益見聖筭如神非諸將所能仰窺也戊申戒諭大將軍貝勒洞鄂等上諭洞鄂等國家仰承天眷秦州鞏昌蘭州諸處相繼収復朕甚嘉悦此皆保寧還斾之兵間闗跋涉戮力効命之所致也爾等當時時軫念勞苦方見恤下之恩爾等將兵在外諳練已乆事無大小務期恊和持平而行乃克有濟亦知爾等必體朕意不為己利但所慮如此故加告誡將軍張勇勞績甚茂慎勿輕侮致滋嫌隙爾等殚心謀國運籌制勝尚期一徳同心早奏蕩平以副朕倚毗至意己酉調兵守潼闗險要總督哈占奏興安逰擊王可成等於本月初八日復叛總兵官党塞及道官興永朝奔至西安請移潼闗緑旗兵守商州遣臣標緑旗兵守舊縣闗及子午太乙二峪分省城滿洲兵守潼闗總督鄂善巡撫張徳地停赴延安留守省城上諭先因將軍畢力克圖自延安赴將軍阿宻達軍前延安係新復之地安撫殘黎保固彊土事極𦂳要故遣鄂善等速往今省城見有副都統徳業立等兵鄂善等至今未行殊屬不合諭到鄂善等仍著速赴延安興安兵既叛潼闗地屬最要應檄駐太原將軍烏丹分兵潼闗同夸蘭大鄂爾博西等恊力固守餘悉如哈占請辛亥詔増荆州彛陵兵時大將軍順承郡王勒爾錦奏荆州兵少今雖調副都統龔圖兵援荆州未能即至乞令龔圖移駐南漳更調南漳襄陽滿洲䝉古兵就近來援上從之既勒爾錦又奏彞陵賊進據江渚火器甚多我兵須多用鳥槍居前步騎續進乃可長驅乞調發緑旗鳥槍手三千人并就近撥滿洲兵速赴軍前上諭逆賊吳三桂見在松滋大將軍貝勒尚善疏言廖祖二賊復以賊七千餘前至松滋則荆州彛陵兵力似屬单弱撥岳州兵内每佐領一人速赴荆州着見駐兖州䕶軍統領察哈㤗盡率滿洲漢軍兵河南提督佟徽年選標下鳥槍手三千人並赴荆州聽大將軍順承郡王勒爾錦調度壬子命平南親王尚可喜等討叛賊祖澤清總督金光祖奏總兵官祖澤清以髙州叛上諭將軍尼雅翰見統兵駐廣東前鋒統領舒恕亦率兵前往着平南親王尚可喜將軍尼雅翰總兵金光祖等會商撲勦毋使賊得滋蔓仍嚴飭沿邊將弁固守地方癸丑將軍侯張勇請還師防邊上不允張勇奏彛情叵測久蓄内犯之心今聞大草灘帷幕滿野麾不去實因臣奉命東征乘虚窺伺乞許臣還駐莊浪以便兼轄上諭秦州鞏昌蘭州諸處雖次第恢復而底定全陜惟在速取平凉逆賊王輔臣一日不滅則秦省百姓一日不安將軍侯張勇應同大將軍貝勒洞鄂等㑹商速㓕輔臣定平凉不宜還駐莊浪如彛人果顯然作惡擾害邊民即令總兵官孫思克回甘州防禦平定三逆方畧卷十七

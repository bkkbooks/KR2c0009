body:
  text: 欽定四庫全書平定三逆方畧卷二十康熙十四年十二月戊午勅大將軍貝勒洞鄂斷賊糧道洞鄂奏臣等已克平凉第一闗廂去城三里許對南山屯營以礟攻城欲向前薄城溝深城險難以下壘故城不能速下上諭逆賊久踞平凉皆因有糧可恃若斷其餉道則賊自窮平凉西北通固原要路大將軍貝勒等宜速斷截以困斃之庚申命解左都御史多諾侍郎勒布任革候補侍郎覺羅阿上諭大學士圖海等前遣多諾勒布總理湖廣大兵糧餉節省浮冒招集殘黎責任綦重伊等宜仰副朕責成之意實心料理竣事而還乃未著有成效希圖規避奏請回京順承郡王勒爾錦等屢奏多諾等任極重大不宜發回前欲遣勒布往荆州貝勒尚善亦奏糧餉重務不宜發徃屢奏甚明今乃忽稱無事伊等竟自回京是何故也阿範㕘贊簡親王軍務不思効力託言有疾來京俱屬越例著議政王貝勒大臣察議議政王等議革多諾左都御史佐領及其世職革勒布侍郎佐領勒爾錦尚善等前後奏請舛錯事平議罪阿範革候補侍郎及其世職仍發江西軍前充伍奏上上命留多諾佐領及伊父世職留勒布佐領餘悉如王等議壬戌勅荆岳大將軍等分兵夾攻長沙上諭荆岳大將軍等曰今大將軍安親王由江西進取長沙爾等應發兵夾𠞰前者荆州添設綠旗兵及鳥鎗兵甚多貝勒察尼又帥兵赴彞陵已數月矣尚未奏捷順承郡王勒爾錦等或分見在荆州兵或調地方可緩之兵速發長沙倘彞陵賊未能即破察尼等應量留官兵於彛陵遣餘兵與荆州兵合或由雲溪驛或由别路酌量議定并量及安親王將抵長沙之期彼此闗㑹協力齊進斷賊糧道夾攻長沙貝勒尚善亦分遣官兵與荆州彛陵兵同徃尚善等仍作攻取岳州之勢移兵逼之如機有可取即取岳州爾等帥大兵駐荆岳將及二載糧費師老曽未得尺寸之地坐失事機罪不勝數今安親王進攻長沙若又不發兵夾𠞰俾賊偵知荆岳按兵不動死守長沙要路則爾等貽悞之罪更大矣其遣發之兵誰可統率著公議遣往無分彼此同心協濟務期有禆國事授大將軍安親王岳樂進兵方畧岳樂奏偽總兵張存遣使來言閩逆軍餉匱乏軍士逃亡恣意削剥百姓怨讟存有兵八千人屯於順昌不聽耿逆調遣又偽總兵羅元生等統兵自守其地邵武總兵彭世勲雖降逆而按兵不動此皆耿逆之内患也若大兵自江西進閩伊等即為内應但臣見赴長沙尅期進發仰祈睿鑒詳度無失事機疏聞上諭招徠逆賊克取福建令大將軍簡親王副將軍希爾根將軍額楚總督董衛國等相機以行至於進攻長沙𠞰滅吳逆惟王是賴但恐逆賊覘知我兵進取長沙固守袁吉阻我兵行至或揚言取道别路出其不意或合兵前進或兵分數道在王必有定見其悉心籌畫萬全務速行之癸酉平南親王尚可喜奏請大將軍安親王岳樂移師入粤上不允可喜奏逆賊劉進忠勾引鄭錦入潮祖澤清勾引馬雄至高粤東十郡竟失其四今將軍舒恕總督金光祖復退回肇慶事勢危急較昔為甚聞安親王由袁州進攻長沙恐時當春水汎濫且吳逆全力集常澧其守禦必堅請以公沃赫之兵仍駐袁州令安親王赴廣東撲勦賊㓂上諭吳三桂未滅故諸賊得以猖狂今安親王進取湖南則粤東之勢自緩若由粤東進兵則道路迂迴稽延時日前以粤東危急已命大將軍簡親王發每佐領甲兵二人馳赴應援此兵到日平南親王與將軍舒恕等公同詳議固守疆圉剪除逆賊又諭簡親王喇布曰前以粤東告急命爾發每佐領甲兵二人速援乃至今尚未遣發殊誤事機今再撥每佐領䕶軍一人并前所發兵或副都統額赫訥或署副都統宗室巴爾堪令一人為將軍統之速赴廣東毋得仍前遲滯致悞軍機乙亥詔責大將軍順承郡王勒爾錦勒爾錦等奏臣等身在地方目擊逆賊情形今若不速行渡江前進必致餉匱師老馬力減損細籌之若得滿兵每佐領十人則戰守俱足今調集各路兵合在荆之兵每佐領得四人有半乞再發禁旅每佐領五人便可渡江破賊上責之曰方吳三桂之初叛也即命大將軍順承郡王勒爾錦等率精兵往討賊來甚速其力必疲勒爾錦等不乘此時擊之但頓兵荆州故賊得以其暇據有湖南厥後大兵齊集又不尅期渡江賊於是得固守要害犯我彛陵揆厥所由實由勒爾錦及叅贊巴爾布伊勒都齊碩岱等耽延時日不急討賊故逆賊滋蔓耿精忠孫延齡相繼叛亂前因欲渡江擊賊請發官兵已添發滿洲䝉古兵數千綠旗兵一萬而究未得湖南尺寸地今復請兵豈果欲速滅賊㓂亦不過冀免逗留之罪耳巴爾布伊勒都齊碩岱等著俱解叅贊留任効力贖罪丁丑命提督陳福速取固原先是上諭議政王等曰秦省要區叛賊王輔臣亟宜𠞰滅其令提督陳福整頓標兵或併力尅取固原或㑹同大將軍貝勒洞鄂等進攻平凉同副都統恰塔商酌以行至是福奏固原有賊萬餘若舍此竟趨平凉恐固原賊出斷我糧道應俟賊勢少衰進逼固原量留官兵圍困其城臣乃率兵赴平凉方無後慮上諭陳福身在地方熟悉賊形可如所請速取固原以遏賊勢平定三逆方畧卷二十

body:
  text: 欽定四庫全書平定三逆方畧卷十六康熈十四年閏五月壬辰詔責湖廣諸將大将軍順承郡王勒爾錦等奏逆賊兩路出犯南漳均州與我兵對壘邇來虎渡口諸處賊船日增聞逆賊呉三桂身在松滋聲言渡江與我兵戰且欲决堤水灌荆州使我岳州大兵不得援荆今三桂既親犯荆州餘賊或犯他處亦未可料賊勢甚熾我兵力單請發滿漢官兵速行赴援上責之曰初聞呉三桂叛即發大兵遣前鋒統領碩岱都統巴爾布䕶軍統領伊勒都齊率前鋒䕶軍日給芻秣令其疾馳巴爾布等至荆州時賊尚未至常徳澧州也所率前鋒䕶軍每佐領五人兵力不為弱矣乃遷延不即渡江而常徳澧州遂叛王親率大兵至荆州又不即渡江進取致令呉三桂至而常徳等處竟為賊據都統珠滿率兵至武昌時岳州長沙猶未叛也又不急趨鎮守而逍遥武昌六百里之程行逮一月而岳州長沙又䧟巴爾布等畏愞不前坐失險要使逆賊從容得據守湖南致我兵難以攻取且糜費糧餉倍於他所究之寸步不能前進因賊渠與我精兵相持荆岳間而廣西孫延齡福建耿精忠遂相繼叛變賊㓂蜂起又前諭王云荆河口以内何處宜設兵防守王疏稱賊船上下江中俱取道荆岳易以偵知俟有事之時就近調遣可以速至今復稱三桂來犯荆州餘賊或從他路出賊衆我寡特請增兵何前後舛錯一切軍機忽畧如此今禁旅遣發已多縱發亦難驟至但時方盛夏賊或􅂸命渡江應調附近官兵星馳赴援今安親王復建昌大兵已回南昌江南徽州又有滿洲蒙古兵鎮守其令駐池州署副都統蘇朗率䝉古兵一千至武昌换兵五百速赴荆州至鄰省綠旗兵各守地方無可調遣安親王或由寜州入湖南或由袁州進長沙其便宜以行既大将軍簡親王喇布奏江西賊宼窺伺池州諸處上乃命蘇朗止以䝉古兵六百行到日合武昌滿洲蒙古兵仍足一千速赴荆州甲午賞陜西䝉古綠旗官兵上諭户兵二部将軍張勇總兵官王進寳孫思克提督陳福標下官兵及進寜夏蒙古兵効力邊疆勞績可嘉應發銀遣官由邊外運至軍前賞賚示朕優䘏之意其兵餉俟路通速給臣謹按帝王之道行賞以為天下勸所以酬勲旌伐激勵三軍也是時張勇等標兵及蒙古兵雖効力邊疆尚未立有顯功而皇上乃命所司發銀由邊外運至軍前賞賚盖答其前勞䇿其後効徳意至深逺矣其他行間将士凡有勞績者必加之恩賜靡有所遺迨後王師征討底定疆圉所在官兵靡不奮其材武共奏膚功良由皇上推恩拊循能盡鼓舞之方故也乙未命将軍貝勒察尼帥師赴荆州署副都統諾敏統兵赴襄陽大将軍順承郡王勒爾錦奏松滋縣北山吴三桂復添四營沿江一帶賊船日增恐水陸齊犯荆彝亦未可定上諭荆州彝陵諸處闗係最要将軍貝勒察尼酌量留兵令都統伊里布范達禮防守襄陽均州南漳諸處親統餘兵速赴荆州又令往駐河南汝州署副都統諾敏副都統孫承祖率所部滿洲漢軍星馳赴襄陽己亥命大将軍安親王岳樂分兵取饒州總督董衛國奏樂平諸處逆賊乘間來犯復䧟饒州上諭安親王速回南昌固守疆界居中調度分兵収復饒州乙巳命副都統龔圗領兵駐河南府時左翼四旗察哈爾兵皆感皇恩願立功自効上因命察哈爾兵赴河南府駐防恐其難以鈐束復令每旗出驍騎五十人副都統龔圗統領前往庚戌命革總兵官金世需等職斬副将馬郎阿於軍先是大将軍順承郡王勒爾錦奏五月初五日逆賊突犯榖城縣城失守提督李胡拜䧟賊副将馬郎阿總兵官金世需劉文竒楊茂烈俱退走上諭榖城失守提督李胡拜䧟賊副将馬郎阿總兵官金世需等並皆退奔國家軍令素嚴未嘗有此馬郎阿等何以不顧提督遽自退歸范達禮駐襄陽去榖城甚近何以事前不為預備臨事不相應援今當大兵四出軍令豈容寛縱貝勒察尼速勘密奏至是察尼訊鞫上聞上命斬馬郎阿以狥革金世需劉文竒楊茂烈職令擊賊自効壬子大将軍安親王岳樂奏官兵復廣信将軍額楚等進取廣信沿途敗賊恢復萬年等縣前至弋陽賊将蒋徳宏率兵五萬以木石斷西崗橋於城北樹木柵為九壘偽總兵柯昇以五千人自廣信來援别營為六額楚同土黙特都統巴札爾等分布滿洲蒙古官兵擊敗之斬賊二萬餘随進兵於是月初四日抵廣信賊已遁去遂復其城提督陳福奏恢復花馬池時賚圗叛據花馬池提督陳福率綠旗官兵㑹同索訥木貝勒下䝉古兵自寜夏進圍花馬池屢敗賊援兵賚圗勢急於是月初八日降花馬池平六月甲子大将軍安親王岳樂奏官兵復饒州将軍希爾根進取饒州閏五月二十六日敗賊於餘干疾馳抵萬年復其城二十九日至饒州賊先一日遁饒州遂平己巳申命将軍貝子𫝊喇塔詳奏軍中情形上諭𫝊喇塔曰據報賊糧匱兵怨欲來投降以隔江不能遽至前以地逺不能詳悉賊情故令爾将逆賊情形具報爾宜将水陸賊壘地方形勢賊将姓名及我兵見壁何處可否進戰一一詳報廼畧而不言但云賊糧匱兵怨殊未明悉著再詳奏以聞既𫝊喇塔報曰陸營賊将偽都督曽養性偽将軍祖宏勲其下有偽總兵八人馬兵六千南自長石嶺北至三江延袤數十里連屯二十五營其領水師者賊将朱飛熊偽都督張恭萬許英其下有偽總兵四人水師萬餘舟三百餘泊城東十里小梁山下四月初十日我兵擊賊殺朱飛熊於茂頭至如台州寜波紹興杭州俱逼海濱不設水師似難取勝初得仙居即議進攻黄巖因賊據茂平嶺黄巖路斷我兵未能前進近聞有土木嶺可以間行自台州至黄巖三百里内不能行馬者四十里賊恃險故勿守今已密啟康親王濟師俟其兵至進取有期矣辛未大将軍貝勒洞鄂奏復秦州洞鄂等於三月初四日抵秦州圍其城四月二十日賊萬餘自四川平凉來援又賊八千餘自城内突出我兵分道迎擊大敗之嗣屢戰屢捷總兵官孫思克又奉調自鞏昌率兵來㑹賊驚懼偽總兵陳萬䇿等率兵民出降賊将巴三剛等遁走閏五月三十日復秦州甲戌将軍畢力克圗奏復綏徳州畢力克圗引兵自大同赴榆林是月初三日至謝村分兵三隊令䕶軍統領傑殷等率之先行傑殷等乘夜進發黎明軍河上賊三千餘拒守楊家店渡口我兵鳴角盡渡賊披靡遁去翌日克呉堡縣城遂趨綏徳初八日遇賊於胡爾崖口復擊敗之於時朱龍遁走定邊餘城出降綏徳平乙亥命調岳州戰船赴荆州大将軍順承郡王勒爾錦奏逆賊逼犯彝陵兵衆船多又於虎渡口諸處轉運糧餉火器宜急斷其運道但斷水路必須戰艦今荆州但存沙唬船四十若盡發往則虎渡口見有逆賊不可無船分半則兩處俱不足用上乃命大将軍貝勒尚善發岳州沙唬船四十艘速赴荆州丁丑命前鋒統領覺羅舒恕領兵援廣東先是平南親王尚可喜等奏海澄公標下遊擊黄藍來㑹城請援兵臣即與将軍尼雅翰議發滿漢官兵赴援尋原任總兵官黄芳泰來言本月初三日海宼圍漳州臣思潮城未克閩賊方張目下在在需兵更有意外之虞勢必至於束手請就近速調大兵來援廣東上命安親王每佐領發滿兵一名令副都統一人率赴廣東至是将軍尼雅翰疏言粤東四靣受敵廣州兵力又復無多今平南親王年力漸衰臣又才識短淺若隣近有警恐難支守乞令見在江西䕶軍統領桑格率兵前來總統兵馬則粤東可保無虞上諭䕶軍統領桑格仍留江西所發每佐領兵一名令前鋒統領覺羅舒恕率赴廣東同将軍尼雅翰商酌以行己夘命大将軍貝勒洞鄂分兵援漢中總督周有徳等奏報本月十八日闗山賊遁上諭漢中要地應速發援兵今秦州闗山既復著大将軍貝勒酌撥兵每佐領一名或二名令大臣一人率赴漢中應援席􅁲臣等兵其貝勒等大兵或約将軍阿密達夾攻平凉或先勦川賊速議以聞尋洞鄂奏撥兵一千五百名付将軍佛尼勒同副都統徳業立喇布重等開棧道以援漢中令副都統翁愛率西安兵同綠旗兵守隴州仙逸闗諸處都統海爾圗等運紅衣礟至平凉平定三逆方畧卷十六

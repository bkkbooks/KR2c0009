body:
  text: 欽定四庫全書平定三逆方畧卷二十四康熙十五年五月癸未命巡撫韓世琦率兵赴長沙大將軍安親王岳樂等奏自圍長沙以來地方諸務無人辦理上命巡撫韓世琦盡率標下官兵赴長沙軍前其岳州軍需付湖南布政使安世鼎調度命議叙緑旗有功將士上諭兵部自逆賊變亂以來各省緑旗官兵𠞰禦賊㓂恢復地方戮力行間著有勞績朕心時切軫念凡以前奉㫖事平議叙者爾部逐一察明功次即行議叙以昭朕酬庸鼓勵之意乙酉以原任總督河道楊茂勲撫治鄖陽勛陽與秦楚豫三處接壤舊設撫治軍門居中彈壓後因湖北湖南兩撫分轄且别設總督遂議裁罷時叛賊楊來嘉等㑹合興安逆㓂盤踞鄖陽之西不時竊發督撫治所遼逺控制為難議政王等請復設撫治以専責成上允所請以原任河道總督楊茂勲為之設標營如巡撫例丁亥詔宥河東諸堡脅從居民提督趙良棟奏言自提督臣陳福遭變逆賊直犯寜夏河東諸堡俱被脅從今二十餘堡一聞招撫相繼投誠上諭河東諸堡因堡小民稀不能禦賊一時被脅誠非得已其概從寛宥該提督仍加意撫綏以副朕恵愛元元至意癸巳勅將軍覺羅舒恕等固守南贑諸處大將軍簡親王喇布奏粤東之韶州南雄俱已叛變將軍舒恕額赫訥等兵退守南贑福建巡撫楊熙總兵官班逹禮等亦各率所部官兵隨滿兵引還上諭舒恕額赫訥等嚴守南安贑州梅嶺以保固江西其副都統莾依圖總督金光祖音問及平南親王尚可喜存亡並確探以聞尋總督董衛國奏南安兵餉缺乏官兵不能守今閩粤諸㓂又侵犯贑屬孤城危急上諭贑州既危應速取吉安合兵勦賊簡親王等亟檄將軍哈爾噶齊額楚提督趙頼等克取吉安㑹合將軍舒赫額赫納兵撲滅閩粤諸㓂并檄舒恕等酌量倘可由贑州攻吉安即分兵夾攻之乙巳大將軍圖海奏敗賊于平凉城北圖海于是月十七日至平凉越日率官兵至城北虎山墩相視形勢賊衆萬餘突来迎戰前歩後騎布列火器挨牌我兵分路進擊自己訖午大敗賊衆斬其偽總兵二人餘賊被殺傷及墜崖死者甚衆獲馬及器仗不可勝計戊申授提督王進寶子用予為副將進寶奏臣渡河以來身多疾病長子用予賦質雖愚尚有膽力臣欲令練習軍事凡遇征𠞰輒俾領兵而前臣即將來病劇猶幸有子可以報効上乃擢用予為副將從其父進寶効力行間六月甲寅調喀喇沁諸部兵上諭議政王等今遣内大臣哈代一等侍衛阿爾尼往兩哈喇沁兩土黙特兩翁牛特敖漢奈曼四子蘇尼特撤木占額駙郡王等十旗察閲兵馬如馬肥每佐領調兵七八名否則止各調四名調江南兵援江西大將軍簡親王喇布奏南安變亂將軍舒恕等兵棄城却數十里南昌兵少有事無可調發上命駐防池州每佐領滿兵一名將軍華善遣才能夸蘭大一人領之江寜䝉古兵七百名令署副都統額思赫領之俱赴江西尋簡親王喇布又奏攻取吉安非紅衣礮不可請勅江南總督選攻城大礮十具速運軍前并請先發江南附近兵以濟江西目前之急上諭調江南兵援江西已有前㫖今復調每佐領兵一名前往此二隊兵到日聽大將軍等公議相地緩急便宜調遣其攻城大礮移文總督阿席熙等速行遣發遣郎中温岱等閲視軍情時湖廣大兵與賊相持上因命户部郎中温岱往長沙兵部郎中麻爾圖往荆州刑部郎中色度往岳州閲視軍中情形面諭之曰爾等各往所遣地方詳閲大將軍官兵及賊中形勢所有民情速行來奏丙辰命大將軍簡親王喇布等移鎮袁州總督董衛國奏自渌口至唐山口水路賊船不時出犯復有孫延齡賊船七十餘自衡州來泊於蒼頭鋪且遣賊三千侵犯攸縣上諭逆賊知安親王進取長沙欲斷大兵後路窺伺袁州亦未可定江西既發有江南大兵省城又有總督駐守簡親王喇布副將軍希爾根其以文到日即撒無事地方官兵赴袁州鎮守𠞰禦賊㓂癸亥勅巡撫靳輔造鳥船送岳州大將軍貝勒尚善奏江西所送得勝船不宜於岳州請易為鳥船上諭尚善受大將軍之任不務速破逆賊每生事端虚糜嵗月宜不允所請嚴行處治但今與賊對壘可令安徽巡撫靳輔速造鳥船十艘解赴岳州戊辰命大將軍貝勒尚善遣兵援江西上諭兵部近覽大將軍簡親王喇布總督董衛國等奏尚之信背恩反叛逆賊孫延齡馬雄等分路來㓂江西袁州諸處閩賊亦乗機侵犯江西吴三桂部下逆賊髙大節死守吉安大兵尚未克復等語見今江西兵力單弱分布𠞰禦防守地方又欲接應大將軍安親王兵實難支應前貝勒尚善請分岳州兵遣發江西謂大有禆益今阿晉泰韓世琦雖往長沙然京師所發每佐領四名兵見已抵岳尚善等合計官兵量留防守其餘官兵於文到日盡發赴江西并嚴飭領兵官兼程速往尋尚善奏自河南來每佐領兵一名更益以盛京兵及外藩蒙古兵共一千名令署副都統尼雅漢率赴江西庚午赦和碩額駙尚之隆等罪尚之信既叛其弟和碩額駙尚之隆率子弟赴部請罪上以尚可喜矢志勤勞悉宥之隆等罪所屬人員俱從寛免壬申命副都統錫三等領兵赴江西内大臣哈代等發四子蘇尼特兵五百餘名將至張家口上命遣此兵赴大同調太原員外郎瑚思哈領之郎中瑚什巴領大同兵五百名如太原并率太原兵五百名先往河南發京城每佐領驍騎二名烏拉寜古塔兵一千名悉改為䕶軍以副都統錫三統之率赴河南并統瑚什巴兵偕往江西多諾為署副都統同赴軍前効力圖功其兖州每佐領兵一名亦調往江西將軍布顔仍留駐兖尋又諭兵部曰副都統錫三署副都統多諾等所領甲兵皆係精鋭以此破賊定可成功爾部即移文大將軍王副將軍等知悉務令全軍制敵勿分其勢倘萬不得已必需分遣則酌量以行戊寅大將軍圖海奏王輔臣降先是圖海奏大敗賊衆於平涼即遣劄委參議道周昌入城招王輔臣輔臣隨遣其副將謝天恩來乞降上降詔赦之至是圖海奏本月初六日赦詔一到臣即令周昌等賫入城中次日輔臣遣偽布政使龔榮遇等率士民詣軍門納軍民冊又遣其子繼楨及偽總兵蔡元等上所受吴逆偽勅偽平逺大將軍印陜西東路總管將軍印及諸偽劄臣見輔臣尚懐疑懼於十三日復遣周昌并臣姪前鋒侍衛保定温言開諭輔臣於十五日即至臣營叩頭謝恩遂入城薙髮率衆來降固原偽巡撫陳彭慶陽偽總兵周楊名下峪闗偽總兵王好問闗山偽副將孔印雄及雲南土司總兵陸道清等各率所屬官兵相繼來降上諭圖海曰卿恭承簡命秉鉞臨邊宣布恩威𠞰撫並用平涼一帶旬日綏平具見籌畫周詳布置神速克副委用立奏膚功朕心深為嘉悦著從優議叙有功人員一併議叙王輔臣既感戴國恩悔罪投誠著復其原官加太子太保擢靖㓂將軍立功贖罪部下官弁照銜給與劄付兵民酌量安插臣謹按方王輔臣之初叛也上即命大將軍貝勒洞鄂率師掃蕩洞鄂輒逗遛不進繼詔㫖頻趣仍因循嵗月致賊偷息平涼我師疲老皇上念平涼不下秦省未能驟定大學士圖海曽征察哈爾有功知其智勇足以破賊乃授撫逺大將軍使専征焉圖海密受方畧甫抵平涼即敗輔臣於城北因其窮蹙遂宣皇上不殺之仁遣使降之旬日之間收復平涼諸處於是賊黨解散全秦悉定是皆皇上知人善任制勝廟堂所致也己卯命發猓苗官兵還雲南大將軍圖海奏平涼投誠猓苗官兵祈請遣還故籍願捐軀報効上諭猓苗官兵若留内地恐其父母妻子或被逆賊殘害其官員各加一級兵丁酌量賞賚俱發回雲南并曉諭令各於原籍招撫從賊人民倘立功績准與優叙臣謹按猓苗官兵本係吴逆遣往平涼為賊應援及是窮迫無歸乃始隨衆來投此即概行誅殛未為不可而我皇上念加之刑戮不若放遣以收脅附之心既曲全其軀命且憫念其家屬咸加恩賚縱還滇中是誠踰格之恩出於猓苗之望外者也迨後大兵入滇所在猓苗皆仰慕皇仁或輸饋糧糗以資我軍或鄉導前軀并力殺賊無不傾心歸順効力抒誠葢因徳意深逺仁澤汪濊故能使絶徼之人咸感化悦服也命總兵官陸道清等前往湖南招撫逆賊時署都統烏丹奏事至京向議政王等言土司總兵官陸道清原任提標􅄁將黃九疇劄授叅議道周昌俱願赴賊地招撫逆賊議政王等以聞上命優加陸道清為左都督兼太子少保黃九疇周昌俱為布政使遣往湖南招撫命大將軍康親王傑書等乘機進𠞰閩賊大將軍簡親王喇布奏本月初六日偽將軍耿繼善焚燬營壘并建昌新城諸賊踰闗遁走上諭耿精忠撤回建昌諸賊必閩中有變其為海㓂所逼無疑乘此機㑹大兵即宜前進大將軍康親王傑書將軍貝子傅喇塔頼塔總督李之芳等速行進兵隨宜𠞰撫以靖閩逆勿得坐失事機平定三逆方畧卷二十四

body:
  text: 欽定四庫全書平定三逆方畧卷十九康熙十四年十月庚申命將軍噶爾漢自河南帥師赴襄陽大將軍順承郡王勒爾錦奏逆賊楊來嘉洪福謝四等五路齊出屯均州諸處荆州兵少不能分遣檄河南鎮安將軍噶爾漢率所部兵赴襄陽上諭河南當秦楚之衝噶爾漢之兵未可全調留䕶軍二百䝉古兵六百委兩翼䕶軍叅領各一員統之仍駐河南府其餘滿洲䝉古兵噶爾漢速行帥赴襄陽勅陜西諸將固守要地總督哈占奏偽總兵魏姓者率衆自洋縣犯黒水峪豊峪口及西洛口諸處偽將軍王屏藩出漢中抵畧陽譚洪出西河呉之茂率偽總兵五人營於單家河同犯秦州上諭逆賊聲言出犯各口意在分我兵力乘間而動耳諸將其各守要地悉力勦禦毋使賊勢蔓延癸亥調西安兵援大峪口總督哈占奏興安叛賊渡江將出大峪口上諭大峪口去西安最近若調兵逺地慮稽時日總督哈占將軍席卜臣等於漢中還兵内簡精鋭者遣守大峪口西安要地宜増兵防禦以大同察哈爾兵三人太原滿洲兵三百人調赴潼闗此兵既抵闗將軍烏丹即遣所部兵五百人速赴西安未幾烏丹哈占等奏賊犯商州舊縣闗諸處已遣副都統徳業立率兵五百人往援商州兵少賊勢甚盛潼闗商州賊皆有路可通見在危急上諭將軍噶爾漢所留河南䕶軍二百䝉古兵六百馳赴潼闗聴將軍烏丹等調遣復於京師發每佐領甲兵一人令叅領瑚什巴額勒布統之往駐河南府甲子詔責大將軍貝勒尚書尚善奏長沙岳州如唇齒相依若偏攻一隅未能猝㧞必長岳兼攻庶可破賊今安親王進攻長沙岳州亦宜恊力規取但兵力尚少乞添發河南山東兵每佐領四人以資進討上諭前貝勒尚善奏岳州逆賊浚壕立樁甚固不能攻取故將岳州兵分遣荆州諸處並非罷岳州之攻也頃尚善等報岳州賊黨吳三桂已檄往彛陵今計我兵之在岳州武昌者每佐領約有九人又有緑旗官兵我兵雖減於舊而賊勢亦分若以之取岳州未為不足尚善又請發河南山東兵不合速移㑹尚善作何攻取岳州即酌量以行壬申調大同諸處兵赴固原提督陳福奏九月二十三日平凉賊奄至固原賊亦自城内突出齊犯我軍遣副將太必圖率兵擊之方與賊戰中衛副將賈從哲忽退逰擊張元經亦率兵走於是衆軍驚擾太必圖遂没於陣臣與前副將恰塔等於二十八日回至靈州上命即於軍中斬從哲元經以狥又諭曰固原賊衆城守甚堅今川賊又入平凉應速遣兵勦禦鄂爾多斯兵已遣還不宜復調調駐大同兵及神未歸化城兵令副都統恰塔員外郎拉篤祐領之或由延安或由定逺速赴固原此兵既到陳福即率本標兵或先定固原或㑹大將軍貝勒先取平凉與恰塔拉篤祐酌行大同兵既往固原令郎中瑚什巴分太原䝉古兵五百人赴大同駐守甲戌授大将軍貝勒洞鄂等攻取平凉方畧上諭兵部頃大将軍貝勒洞鄂總督哈占等報興安反賊犯商州大峪口川賊譚洪救平凉皆因王輔臣未㓕我兵俱集平凉故諸賊乘隙侵犯欲分吾兵力以援輔臣今洞鄂等官兵至平凉日乆自宜急圖攻取設使平凉未破而四川之賊來援興安之賊又至大兵往來路阻後雖恢復平凉亦復何益若平凉破輔臣㓕則賊應援之念絶而窺伺商州之計亦沮全陜可無虞矣平凉南山俯視城中甚悉若乘南山以紅衣大礮攻之城中賊衆自不能支洞鄂等速奪南山則平凉可克未㡬哈占又奏慶陽賊業已就撫臣遣固原逰擊屠遵義率兵守之未至而逆賊王輔臣已遣其黨周養民圍慶陽伏兵斷路我兵不能救慶陽復陷賊又犯皂社皂社與涇州常武邠州接壤為平京大兵後路臣已遣固原總兵官朱衣路赴救於是上復諭議政王等曰貝勒洞鄂駐平凉日乆兵力不少但圖自便憚於攻戰以致逆賊王輔臣分兵救固原今又襲慶陽洞鄂及㕘賛大臣從未赴敵任賊四出若罔聞知平凉賊勢既分又不乘虚攻取伊等在平凉所司何事及今不取更待何日耶若仍頓師不進必致我兵漸渡糧儲漸耗賊益窺伺蹂躪地方貽害不小洞鄂等其公同籌畫𠞰除逆賊辛巳遣署副都統穆成額􅄁賛将軍覺羅舒恕軍事舒恕奏言軍務最重須􅄁賛得人右翼中無可委署副都統議軍事者協守吉安署副都統穆成額乃右翼人乞遣發臣軍㕘賛軍事上諭廣東軍事繁多㕘賛不可乏人都統副都統等官在江西者頗多穆成額即赴舒恕軍前􅄁其軍事大將軍簡親王别委大臣代守吉安十一月丙戍朔命将軍侯張勇固守鞏昌諸路先是上諭張勇曰陜西重地凡平定地方掃除賊冦惟爾是頼今大将軍貝勒洞鄂雖攻圍平凉而逆賊王輔臣嬰城死守恐稽時日又川賊已過昌寧驛來援平凉我兵若不速滅輔臣則陜西不能即定爾量留官兵守鞏昌親自率兵赴洞鄂軍前協力進取平凉若鞏昌必不可離多發標兵往平原以助攻戰并宜設策截川賊來援之路於是勇言逆賊吳之茂率衆進屯單家河諸處臣若赴平凉恐賊乘虚直犯臣斷不可逺離鞏昌且官軍皆已分遣臣兵單實無可發上下議政王貝勒大臣集議議政王等奏言鞏昌所闗亦重應如張勇所奏令固守鞏昌秦州諸處相機勦禦上從之丁亥罷都統海爾圖㕘賛海爾圖以運礮屯夫俱逃請發搶手步軍四百人綿甲八百人防䕶又以礮手熟練者少請於八旗滿洲漢軍内擇素習者遣發赴軍前大将軍貝勒洞鄂以聞上責之曰貝勒洞鄂等帥師抵平凉為日已乆不速㓕賊平定地方及命礮攻平凉海爾圖又托故具啟遷延時日洞鄂等並不議其可否但據啟以聞殊為不合前送紅衣礮撥漢軍每佐領二人海爾圖謂不足又添派一人及海爾圖去時藉口沿途養馬不即速行至闗山又請兵二千欲靖賊冦復如所請添發而究不能開通闗山今令用紅衣礮急取平凉海爾圖復請自京師發搶手綿甲躭延時日有悮軍機殊負任使著解􅄁賛之任洞鄂等仍遵前㫖速定平凉丁酉大将軍簡親王喇布請益兵上不許喇布奏安親王已分毎佐領甲兵十人進征湖南江西留毎佐領下人分駐建昌諸處省城所餘止毎佐領二人今欲𠞰㓕諸路賊冦而兵難調集欲分守而兵又不足乞将在江寧烏喇及盛京兵發來江西上諭江南要地烏喇盛京兵不宜調發江西見有毎佐領甲兵十人又南昌饒州建昌廣信吉安諸處皆添設緑旗官兵已足調遣大将軍酌量緩急有可緩之處調其官兵以資戰守庚子命提督趙國祚等隨大将軍安親王岳樂進𠞰岳樂奏逆賊吳三桂聞臣進取長沙必固守要害非緑旗無以涉險阻非紅衣礮不能破營壘提督趙國祚乆在行間熟練火器兼有緑旗兵三千屯墾都督陳平有兵二千乞俱令隨臣進討其廣東送來紅衣礮甚重路險難致西洋礮輕利乞發二十具為攻𠞰之用上諭勦㓕逆賊平定湖南皆於安親王是頼練習宿将及精兵火器俱不可闕提督趙國祚都督陳平并所屬官兵悉如安親王所請南懐人所造火礮可遣官兵凖數送至江西轉運安親王軍前王不必待礮到始行亟由吉安或袁州進發壬寅勅大将軍簡親王喇布分兵赴廣東總督金光祖奏叛鎮馬雄同滇賊王宏勲等至髙州髙雷亷叛兵合計約有十萬臣率兵深入髙州恐逆賊孫延齡乘隙犯梧平南親王尚可喜又無兵可調乞添發大兵前來應援上諭逆賊率衆來犯廣東不可不速遣大兵大将軍簡親王於留守江西兵内即選擇精鋭毎佐領二人命才能夸蘭大率之速赴廣東聼平南親王尚可喜将軍舒恕總督金光祖商酌調遣此兵仍著舒恕統轄江西兵既發往廣東山東兖州䝉古兵六百人令署副都統科爾擴岱統之即赴江寧科爾擴岱既到江寧江寧所有烏喇盛京兵一千令署副都統尼滿雅秦揚古岱統之即赴江西更發禁耳每佐領兵二人其半赴江寧同䝉古兵六百人俱聼将軍哈爾噶齊統轄其半赴山東同原駐䝉古兵聴将軍布顔統轄平定三逆方畧卷十九

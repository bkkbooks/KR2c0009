body:
  text: 欽定四庫全書平定三逆方畧卷四十九康熙十八年十二月壬戌朔命總督蔡毓榮為綏逺將軍毓榮奏言大兵進取辰龍關必由楓木嶺一路齊進請專責一人總統之議政王等以蔡毓榮周有徳二人請㫖簡用上命蔡毓榮為將軍賜勅諭曰大兵進𠞰雲貴各路緑旗官兵必需專責一人總轄調遣始克允濟特授爾為綏逺將軍總轄常徳武岡等處所有各省調撥官兵及湖廣全省緑旗兵馬聴爾酌量調度前進底定疆圉總督董衛國周有徳提督桑額趙賴周卜世俱聴爾節制酌量而行一切平定雲貴及𠞰撫諸事宜惟爾專責至楚中現任文武官員聴爾遴選賢能攜赴軍前調用如有能備芻糧克濟軍機及官兵有能首先奪關冒險直入擊敗賊衆者爾即開列勞績具疏奏聞論功加等議叙如有臨陣退縮運糧違悞者副將知府以下各官即以軍法從事其以上各官指名飛章叅劾從重治罪水陸兵將不相習者爾即具奏酌行更調爾定期進取恢復地方將破賊事宜密行知㑹廣西陜西等處王將軍督提等齊乘機㑹而行爾須嚴督兵將相機前進力行𠞰除毋得遲延坐失時㑹仍嚴加偵探毋致疎虞大兵一到抗拒不順者戮之有先被賊脅從即時迎降者俱免誅戮有能擒殺賊渠投誠者分别陞賞須嚴禁兵將申明紀律經過地方毋得騷擾百姓歸順良民加意撫恤爾膺兹重任宜攄忠竭力籌畫周詳𠞰撫兼施早奏膚功以副朕簡擢至意甲子大將軍公圖海等奏官兵復興安諸處圖海等率兵至鎮安偵知賊在梁河關據險拒敵之信即分兵分路率䕶軍統領烏丹力戰破梁河關賊營大敗其衆遂進攻洵陽縣偽將韓晉卿燬營而遁次抵興安州偽總兵王永世等率衆以城迎降於是洵陽白河漢隂石泉及湖廣上津縣俱平丙寅奬諭安南國王黎維楨時黎維楨疏稱呉三桂叛後與莫元清餘黨結連同惡相濟不惟餽賊儀物且為佐辦芻糧交銃等項賊黨兵馬萬餘濳入臣國為掩襲莫元清罪惡甚著臣謹辦方物入貢慶賀即遣兵追擒莫元清以正其罪上覽奏曰呉三桂背恩反叛屢邀安南國王繳印投降而王不忘國恩竭忠盡誠不肯從逆今又慶賀進貢可嘉禮部察例以聞辛未詔將軍侯林興珠等来京師給事中莫洛等奏請令大將軍安親王岳樂親率林興珠来京陛見上諭安親王率領林興珠来京其所部兵令賢能官暫理又諭凡隨征總兵官及給劄總兵官等非屬要地者該督撫提等俱遣令馳驛来京朕將親閲酌量擢用甲戌詔將軍巡撫傅宏烈率兵進𠞰時宏烈先遣叅將温紹賢等從小路㫁賊楓木嶺糧道請親統官兵進𠞰上命議政王貝勒大臣集議議政王等奏言近奉詔將傅宏烈駐劄省㑹同理事官麻勒吉等供應料理大兵糧餉應毋庸更議上諭傅宏烈欲乘機率兵進𠞰應如所奏命傅宏烈親率所屬官兵恢復滇黔諸處撲滅逆賊與大將軍平南親王尚之信將軍莽依圖等恊力同心酌量以行其粤西廵撫事務命麻勒吉姑行署理己夘趣各路將軍乗機分道𠞰賊時巡撫杭愛奏稱進𠞰四川大兵俱抵漢中日需糧餉皆於西安鳯翔二府所屬取給但山路狹隘轉運艱難若止從陸路輸送勢必難繼必水陸並運庶於軍糈有濟宜選賢能道官一員急赴畧陽兼管船艦由水道運致大將軍圖海奏稱臣欽遵上諭以建威將軍印給䕶軍統領烏丹同署理西安將軍事務佛尼勒分統大兵之半以行又以漢中要地雖有陜督哈占率兵屯駐經理糧餉然滿洲大兵不可不留駐守請于見存半兵内撥發千人令署副都統鄂克濟哈領振武將軍印同副都統恰塔鎮守漢中令鄂克濟哈已赴京師姑以副都統翁愛代之俟鄂克濟哈還日調翁愛往鳳翔臣率將軍王輔臣都統海爾圖副都統索訥木等亦往鳳翔防守上皆從之又諭議政王等曰將軍王進寳提督趙良棟等巳定漢中今又進平四川逆賊敗遁乗此震動之際諸路將軍等宜各率所屬官兵分進平定疆土如必欲㑹齊偕發或姑聴他路先徃似此觀望即坐失機宜速移檄各路將軍毋彼此瞻顧務期努力收輯疆圉庚辰詔招撫譚洪上以譚洪之叛或由迫脅所致令其侄前副將軍譚天叙齎勅徃撫勅諭曰爾譚洪昔自蜀中率衆来歸優加侯爵乆受國家豢養當呉三桂反叛之時爾被其廹脅為賊固守抗拒有日兹者湖南廣西漢興諸處已經底定各路兵馬奮力齊進賊勢摧敗殄滅可期諒爾亦所悉知爾乃深達時命之人豈肯玉石俱焚朕念爾宿將舊勲夙沐厚恩必非甘心從逆特降專勅詳加開諭恐爾尚懐猶豫特遣爾侄副將譚天叙前徃宣布朕意爾若果能翻然悔悟棄逆效順爾之前罪俱行赦免仍優加叙録至爾標下將士如同心歸順亦一概寛宥酌量加恩若能獻地輸城厥功尤懋近日各處歸順人員朕皆赦其前罪論功録用亦爾所知爾其勉勵忠忱無懐疑懼以副朕矜宥保全至意勅諭松潘土司畨民勅諭曰朕撫御寰區恒期中外臣民各得其所綏人之懐遐邇初無異視爾等俱係世守疆土之臣尤當鼓勵忠義報効朝廷自呉三桂叛亂以来呉之茂盤踞松潘荼毒肆虐蹂躪地方困苦已極念爾等皆係國家赤子今被其廹脅雖素懐忠藎莫能自伸朕心深為憫惻兹湖南廣西漢興諸處俱經底定各路兵馬奮力齊進賊勢摧敗立見蕩平正爾等出離水火之日不宜坐失機㑹今特降專勅詳加開諭爾等果能感戴國恩倡義聨絡執擒呉之茂以獻建功樹績朕即優加叙録寵以封爵撰給勅命以酬爾勲庸大兵到日爾等若相機䇿應恊同𠞰㓂亦爾等之功爾等宜速乘時㑹早奏膚功以副朕懐逺矜全至意壬午命提督趙良棟為勇畧將軍時良棟以所屬兵勢單弱請調興安一路兵及副將楊三虎兵簡選進定四川上諭平定四川事關重大其所請調興安進征之兵及楊三虎兵俱如所題調發至提督趙良棟與將軍王進寳分兵兩路前進趙良棟授為勇畧將軍給之勅印不拘陜西通省及各處官兵凡係王進寳趙良棟兩將軍所調大將軍公圖海以身任之速為遣發務至彼等所指之地勿致有悞若漫不經意調遣遲延恐悞進定四川重務又隨諭兵部將軍王進寳趙良棟率兵進定四川其標下官員各加一級臣謹按帝王之戡亂安民也在乎馭將若馭將克當則戰勝攻取功無不成是時湖南逆㓂悉皆奔潰皇上特敕諸路乗勢進師而秦中將帥尚懐猶豫惟提督趙良棟首請進兵深契睿算上意嘉焉因授良棟為將軍且令諸路士馬聴王進寳趙良棟徴調不使掣肘其部下各官悉各加一級標兵並䝉賞賚於是二將仰戴聖恩益思報効各率兵深入收復疆圉其他滿漢官兵亦由諸路進𠞰因而逆賊盡滅蜀土悉平原其所以能奏捷功者皆由畀之爵賞假之事權䇿勵鼓舞以致之皇上馭將之道誠夐出千古矣甲申詔責大將軍順承郡王勒爾錦勒爾錦奏臣遵㫖撤鎮守岳州兵每佐領各二人與安親王所統還師齊發外荆州諸處亦宜撤每佐領各二人但大兵鎮守要地發回二人頗屬未便今合滿洲䝉古漢軍共每佐領一人令署副都統敖哈率之還京上諭前大將軍安親王請撤岳州兵每佐領各二人已令順承郡王合岳州荆州兵内察其征行在先進𠞰勞苦者每佐領遣還二人與安親王率回大兵齊發今順承郡王不以勞苦之兵分别撤回止撤鎮守岳州兵每佐領各二人不合理宜駁察但此兵已行可如所撤来京丙戌命提督孫思克暫駐莊浪總督哈占奏請西寧總兵官朱衣客調赴漢中防守朝天廣元諸處提督孫思克暫駐莊浪防守上諭漢中有將軍鄂克濟哈駐守朱衣客或令防守朝天廣元或令進𠞰四川令將軍王進寳趙良棟㑹議酌行甘肅凉州諸處有靖逆侯張勇駐守足資彈壓其莊浪與凉州西寧蘭州臨洮隣近緩急皆可相顧即如所請令孫思克官兵暫駐莊浪防守河東河西諸處詔西安甘肅巡撫催運兵餉至漢中畧陽時將軍烏丹奏總督哈占即駐漢中請勅西安甘肅二巡撫速趣運餉至漢中畧陽上諭官兵進𠞰四川輓運糧餉事最重大即如所請令西安甘肅兩巡撫速備糧餉運至漢中畧陽漢中既有將軍鄂克濟哈駐守哈占標下官兵酌量留用外其餘悉聴將軍王進寳趙良棟調用平定三逆方畧卷四十九

body:
  text: 欽定四庫全書平定三逆方畧卷五康熙十三年四月丙申諭諸将帥防禦機宜時奉使雲南侍郎哲勒肯等還至武昌携有吳三桂奏章将軍尼雅翰疏聞上諭大将軍順承郡王勒爾錦将軍尼雅翰瓦爾喀赫業副都統根特巴圖魯席布及平南王尚可喜總督金光祖曰将軍尼雅翰奏言奉使雲南大臣已至武昌有吳三桂奏本朕思吳三桂素多狡詐此中疑有詭計如吳三桂服罪請降王及将軍等仍議招致之益加警備毋堕奸謀即三桂束身歸命王等但以禮受降其官屬當益加嚴防不可分散兵力急於前進務相機以行丁酉總督蔡毓榮奏洪福叛於鄖陽提督佟國瑶等率兵擊敗之鄖陽副將洪福素與楊來嘉合謀於三月十九日以所部兵叛圍攻提督佟國瑶署國瑶同遊擊杜英率兵奮擊敗之福引兵宵遁己亥革總督蔡毓榮職降鄂善五級俱留任戴罪圖功吏兵二部奏蔡毓榮總督川湖聞吳三桂反叛不能安民心固疆圉不令提督桑額往守常徳致常澧長岳相繼陷賊應革職雲南總督鄂善既奉㫖與蔡毓榮公議軍機事務地方失守罪亦難逭應降五級調用上命蔡毓榮革職鄂善降五級各留任戴罪圖功命内大臣阿宻達領兵赴懐慶上諭議政王等頃安塘筆帖式向侍衛闗保言河北總兵蔡禄潛通叛鎮楊來嘉令兵丁借稱捕魚披甲行走有叛状民心驚疑著内大臣阿宻達帯毎佐領䕶軍一人毎旗䕶軍㕘領一員速赴懐慶詳問蔡禄捕魚之由此行官兵該部量給馬匹翼日阿宻達即率兵起行癸夘調副都統徳業立協守襄陽上命經畧莫洛將軍席卜臣總督哈占於西安閒丁内選數百人令其披甲給以馬匹器械并席卜臣等所領兵内毎佐領出驍騎一人令副都統徳業立領赴襄陽同都統范達禮鎮守内大臣阿宻達事竣所領䕶軍亦令徳業立率往以資守禦其襄陽副都統託代於徳業立至時即領其所部官兵赴順承郡王軍前甲辰命平南王尚可喜總督金光祖㕘酌軍務機宜先是可喜奏言孫延齡偽檄有三藩之語閩省又倐告變臣與耿精忠本係姻婭不能不踧踖於中竊臣叨王位年已七十有餘雖至愚至陋豈肯向逆賊再求功名富貴乎惟知捐驅矢志極力撐持保固嶺南一塊土以表臣始終之誠奏上得㫖王累朝勲舊性篤忠貞朕心乆已洞悉近復屢攄猷畧保固巖疆厥功甚茂攬奏披瀝悃忱深為可嘉著益殫心料理相機𠞰禦以副朕倚任之意至是上復諭兵部平南王尚可喜所奏調遣官兵保固疆圉忠誠顯著深為可嘉兩廣一應軍機調遣及固守地方事宜著可喜與總督金光祖同心合力務酌萬全下巡撫盧震獄先因偏沅巡撫盧震棄長沙奔回上遣部員往逮之至是至京法司讞奏震為封疆大臣乃於長沙未變之先委地潜逃罪應死上命下震獄命都統拉哈達為鎮東将軍帥師駐兖州先是遣理藩院郎中馬喇等調發喀喇沁土默特部落兵至是上諭議政王等兖州駐防官兵既調江西今授都統拉哈達為鎮東将軍同副都統伯穆赫林幹都海率滿洲䝉古毎佐領驍騎一人及所調喀喇沁土默特兵二千人往駐兖州穆赫林幹都海㕘賛軍務尋拉哈達起行上面諭之曰爾等毋得犯民間秋毫并嚴禁兵丁勿行擾害其副都統穆赫林俟䝉古兵到時隨後遣發乙巳以平南王尚可喜子之孝襲王爵可喜奏稱太宗皇帝時襲職之子不論年長必選才能今臣年逾七十若不早决於生前竊恐僨轅于異日臣察衆子中惟次子都統尚之孝律已端慎馭下寛厚可繼臣職至於軍機戰守緩急事宜臣雖哀老不能馳驅然一日尚存當盡一日之心指揮調度斷不至有悮封疆也疏入上允之丁未詔削奪孫延齡官爵宣諭廣西軍民上諭兵部逆賊孫延齡原係定南王下末弁之子本無才能功績祇縁定南王孔有徳航海歸誠出師盡節世祖章皇帝憫其忠勲茂著官兵人等不忍分離收合散亡俾為一旅仍以所屬官員統之養贍加恩概從優厚迨朕御極念延齡既配王女理應量加寵榮故授為将軍使之管理定南王所遺官兵鎮守粤西在延齡叨冒榮階自應恪恭職掌殫忠報効乃涖任以來屢有過犯及累經王永年等訐奏贓罪部議從重處分朕猶以定南王之功曲加貸宥仍令管兵如故近復賜以撫蠻将軍之印委任有加恩寵罔替不意延齡包蔵禍心背恩忘義結連逆賊吳三桂輒行反叛煽亂地方國法難容宜加顯戮令削其将軍職銜大兵指日進𠞰立正典刑但念其所管官兵係定南王所屬受恩累朝忠義素著必不甘心從逆隳棄前勲其所管人員及地方官兵有能擒斬延齡投獻軍前者優加爵賞或以兵馬城池納欵者論功叙録或力有不逮能自㧞來歸者亦免罪收用至于伊等父兄子弟見在京城直𨽻各省者概不株連毋得心懐疑畏自罹法網負朕好生之意爾部即速行遍諭調江寧諸處兵援浙江先是上諭江寧將軍額楚總督阿席熙曰閩中告變兩浙需兵杭州將軍圖喇等如調爾滿兵時令副都統一員馬兵千名水陸往援爾等當預偹以俟爾兵若行可調安慶察哈爾兵至江寧鎮守并諭杭州將軍圖喇總督李之芳提督塞伯理等曰耿精忠反叛爾等率領滿漢官兵應作何防禦固守相機而行朕已勅駐防江寧滿兵預偹若有需用滿兵之時向江寧調取至是福建事急上復命江寧預偹之兵不必俟調副都統瑚圖即統率從水陸速赴杭州駐劄安慶副都統瑪哈達親率所部官兵及江寧左翼察哈爾官兵并速赴杭州同将軍圖喇等酌行将軍華善于所部漢軍内擇馬肥者五百人令夸蘭大二員領之亦即赴杭州聴圖喇等調遣其安慶右翼察哈爾官兵移守江寧華善仍令送赴京口臣謹按耿逆倡亂閩中兩浙宻邇賊巢所闗綦重兩浙固則江南財賦之地安堵無虞皇上燭知形勢要害故勅守土之臣盡力固圉呼吸之間援兵四集賊進無所據師老而潰仙霞不守葢扼要争先之效也吳應熊等伏誅吳三桂初反時執其子應熊孫世霖等拘之三月兵部尚書王熙及戸科給事中顧圖奏請将應熊等速正典刑疏入下議政王貝勒大臣集議既王等議覆於是命将應熊世霖處絞其餘人犯分别正法復諭兵刑二部逆賊吳三桂值明季闖賊之變委身從賊尋窮竄來歸世祖章皇帝念其投誠優封王爵授之軍旅委以事權異數殊恩振古未有爰及朕躬特進親王倚任等于腹心恩禮加于勲舊方期感恩圖報殫極忠忱詎意三桂以梟獍之資懐徂詐之計陰圖不軌自起釁端藉請搬移輒行叛逆煽惑奸宄荼毒生靈極惡窮兇神人共憤已經遣發大兵進𠞰刻期蕩平諸王大臣㑹議反逆子孫理應誅戮以彰國法再三奏請朕尚冀其悔禍自新束身待罪未忍加誅近覽三桂奏章詞語乖戾妄行乞請諸王大臣咸以三桂怙惡不悛其子孫即宜棄市義難寛緩朕思亂臣賊子孽由自作刑章具在衆論僉同朕亦不得而曲貸之也法應如廷議将吳應熊吳世霖并其餘子俱凌遲處死但以應熊乆在近侍朕心不忍故将應熊及其子世霖處絞其餘應坐人犯分别正法所有干連人等情罪稍可矜原者勅所司概行省釋以昭法外之仁爾二部即通行曉諭内外軍民人等俾咸悉朕意戊申命給甘肅提督張勇世職時勇舉首偽書并執逆使上嘉其忠因給一等阿達哈哈番己酉増遣滿兵守江寧上諭議政王等江寧滿兵既分千人援浙恐江寧兵單可出包衣佐領兵千人八旗毎佐領驍騎二人往守江寜以駐懐慶内大臣阿宻達為總統在京副都統拉哈吉勒塔布為兩翼領之尋授阿宻達為揚威将軍庚戍奨諭平南王尚可喜可喜奏逆賊吳三桂差奸細二人送書到臣臣不勝髪指即擒執來使将逆書一併解送上諭覽王奏逆賊吳三桂差人投送約結逆書王即将差來奸細二人鎻拿解京併原書舉發具見王純忠為國堅貞不渝屢著謨猷巖疆攸頼克副倚任之意朕心深為嘉悦事平之日該部從優議奏命禁耿昭忠等於家上諭議政王等耿精忠背恩反叛耿昭忠耿聚忠雖與吳應熊不同但係彼親弟國法亦難容縱著並禁於一室其屬下官員俱著間住議政王等又請並禁其諸兄弟上從之辛亥命都統賴塔為平南将軍赴浙江上諭議政王等副都統瑪哈達瑚圖部下兵及将軍華善所分遣兵以都統賴塔為平南将軍赴杭州統領𠞰禦瑪哈達瑚圖並同􅄁賛其杭州駐防官兵仍聴将軍圖喇哈轄一切𠞰守事宜賴塔圖喇商酌以行命副将軍哈爾噶齊帥師暫駐江寧将軍希爾根等帥師之江西是日起行上命副将軍哈爾噶齊前鋒統領覺羅舒恕領兵一半先行暫趨江寧駐防俟内大臣阿宻達等兵至仍赴江西癸丑大将軍順承郡王勒爾錦奏官兵敗賊於彛陵是月初八日偽将軍陶繼智偽總兵張權元等自宜都率賊萬餘水陸來犯彛陵都統鄂鼐副都統根特總兵官徐治都等率兵進擊斬賊甚多獲船六十餘艘甲寅命選副将堪任總兵者上諭兵部總兵官職任重大必得賢能方可勝任今員缺甚多尚未得人著将副将内堪任總兵者開列具奏以備任用宣諭從逆官員兵士上諭兵部逆賊吳三桂反叛所在鎮守地方文武各官因兵單力微不能拒敵欲棄城來奔又懼國法難逭迫於不得已而附從者有之或為奸計訛言所揺惑無知而附從者有之今大兵齊集刻期𠞰㓕逆賊盡絶根株朕念附從之徒皆朕赤子一時迷惑情非得已恐大兵進𠞰概行誅戮朕心實為不忍若有能自悔前罪或獻城池或率兵卒或斬殺逆賊頭目獻其首級來投者俱行免罪給以原官仍論功議叙若愚頑武弁執迷不悟助惡不悛部下有心懐忠義之士或擒斬逆弁或約獻城池或率領黨類來投俱從優議叙授官給賞爾部通行曉諭乙夘勅諸路将帥大臣節核糧餉上諭戸部各省用兵錢糧煩費其令出征王貝勒将軍經畧都統經理錢粮大臣及所在總督巡撫等凢各處軍需務期節省兵馬錢粮據實支散悉除浮冒戊午蔡禄謀叛伏誅内大臣阿宻達領兵至懐慶擒獲蔡禄以聞上手勅諭之曰爾行未踰旬克濟厥事以遏亂萌朕心深為嘉悦但人命闗係最重須嚴審得實方可正法毋得株連無辜至所俘人口散給士卒宜重賞被傷者以示鼓勸至是阿宻達訊鞠得其謀叛實迹奏請上命将蔡禄父子并同謀者俱行正法尋諭兵刑二部蔡禄係海上投誠之人念其來歸加以職銜給之世爵復優擢河南河北總兵官正宜殫竭忠忱力圖報効乃潜蓄逆謀欲應吳逆治甲練兵約期煽亂經坐塘筆帖式宻報遣内大臣阿宻逹前往察勘並不出迎及入城至伊署輒敢施放矢礟拒敵因其叛形顯著俱已收執奏請正法朕恐有寃誣復令詳加審鞫據其兵丁家人口供俱稱蔡禄造鳥鎗購騾馬與楊來嘉往來同謀約應吳逆謀反情真即将蔡禄父子并其姪蔡鼎席及同謀罪犯人等俱行正法其餘投誠墾荒弁兵事無干涉者概不株連叛逆法所必誅良善務加綏輯國有成憲軍民無得驚疑爾二部即通行曉諭俾咸悉朕意臣謹按河南宻邇畿輔旁通秦晉齊楚諸境乃四達之區也蔡禄叨居節鎮負恩思亂與楊來嘉潜相搆煽以應吳逆若撲㓕不早則中州騒動兵民為不寧矣皇上一聞其状隨默運神機夕發諭㫖命阿宻達率兵以往質明即令啟行中外皆莫測所以迨阿宻達星馳至懐慶出蔡禄之不意俾弗暇措手遂就執訊果盡得其反迹乃誅禄父子撫定其一軍是役也師不踰旬民無惶擾而亂萌銷遏大河南北安堵如故皆由皇上之運籌至宻而决策至速也命訪海澄公黄梧等聲問上諭兵部耿精忠反叛海澄公黄梧提督王進功隔越漳泉與浙江聲問不通著平南王及兩廣總督廣東巡撫江西巡撫浙江将軍總督等由廣東江西浙江設法遣人於梧進功處確探消息若梧進功等能各守地方令其固守倘力單不能自守廣東江西何處可通著來㑹合命副都統根特巴圖魯等領兵赴廣東平南王尚可喜奏據報吳三桂遣賊兵二萬屯劄黄沙河桂林兵民俱戴氊帽若孫吳二逆合兵一處則勢益猖獗乞就近調撥大兵速來廣東㑹同臣兵𠞰㓕孫逆上命副都統根特巴圖魯席布等俟将軍希爾根哈爾噶齊等兵至江西即率所部官兵急赴廣東同平南王尚可喜商酌以行尋授根特巴圖魯為平冦将軍己未勅江南總督提督防守崇明浙江提督塞伯理奏耿逆交通吳逆結連鄭冦沿海一帶皆可揚㠶直入内地至江南崇明一邑孤懸海外尤屬可虞上諭浙江及江寧京口諸處俱已遣發大兵崇明一邑雖云孤懸海外亦有重兵駐防但時方戒嚴著江南總督提督飭令崇明鎮将嚴加警偹倘有賊警總督提督即㑹将軍額楚華善王之鼎等公同謀議守禦接應辛酉詔削奪耿精忠官爵宣諭福建軍民上諭兵部逆賊耿精忠庸懦無能癡愚寡識祗縁伊祖耿仲明航海來歸太宗文皇帝念其投誠之功特封王爵寵眷優隆世祖章皇帝定鼎燕京復加委任令其統兵鎮粤中道殞身其子耿繼茂叨恩承襲兩鎮巖疆恪恭職守朕眷懐勲裔恩禮有加及其病亾尤深軫恤特遣部臣頒賜勅諭俾耿精忠襲封王爵自伊祖父以及伊身受恩三世四十餘年在精忠賴祖父之餘勲冒朝廷之崇秩自宜感恩圖報殫竭忠誠不意包藏禍心潜謀不軌乘吳逆之變輒行反叛煽亂地方罪惡昭彰國法難宥今削其王爵遣發大兵進𠞰指日蕩平但念其所屬官兵及地方官員軍民人等或被逆賊迫脅雖懐忠義莫能自明恐大兵一到玉石難分有能擒斬精忠投獻軍前者優加爵賞或以兵馬城池納欵者論功叙錄或力有不逮自抜來歸者亦免罪收用其直𨽻各省文武官員人等有原係精忠所屬之人概從寛宥雖有父子兄弟見在福建者亦不株連毋得心懐疑畏自罹法網負朕好生之意爾部即速行遍諭癸亥宣諭平南王尚可喜時可喜屢奏調發官兵征𠞰逆賊復奏長江宜設舟師偹禦上嘉之令兵部以分遣禁旅諸路調度情形移㑹可喜曰今寧南靖冦大将軍順承郡王及貝勒等率領大兵由常澧進平雲貴鎮南将軍尼雅翰都統珠滿巴爾布等帥師由武昌水陸進取岳長直入廣西都統伊里布等帥師駐鎮彛陵都統范達禮副都統徳業立等帥師駐鎮鄖襄安西将軍赫業副将軍瑚里布西安将軍瓦爾哈等帥師由漢中進取四川副都統科爾崑吳國禎等帥師駐防漢中鎮西将軍席卜臣等帥師駐防西安復遣尚書莫洛經畧陜西等處帥大兵居中調度鎮東将軍拉哈等帥師於山東河南江南要地駐防安南将軍華善等帥滿洲漢軍官兵同鎮海将軍王之鼎等於京口水陸駐防楊威将軍阿宻達等帥師同江寧将軍額楚等防守江寧安慶沿江險要平南将軍賴塔帥師由浙江平定福建浙江将軍圖喇帥師駐鎮杭州兼防海疆定南將軍希爾根副将軍哈爾噶齊等亦帥師由江西建昌廣信平定福建副都統根特巴圖魯席布等帥師赴廣東㑹同該藩進𠞰一切機宜􅄁酌以行平定三逆方畧巻五

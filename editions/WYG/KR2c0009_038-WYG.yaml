body:
  text: 欽定四庫全書平定三逆方畧巻三十八康熈十七年六月庚午朔詔責大將軍康親王傑書上諭議政王等曰康親王傑書用兵甚為選愞自至浙江安居無事之地及屢降嚴㫖督趣始破衢州之賊進定福建福建既平不事預防固守俾海賊登岸遂困海澄況我朝軍法賞罰最嚴且明無敢茍且輕忽浙江福建失機將士傑書未嘗察取供詞優柔庸懦不能嚴明賞罰預防海逆恣令登岸均屬不合其集議以聞既而議政王等奏言傑書罷庸已甚怠忽軍紀宜并參贊大臣嚴行處分但見在出徴俟師旋察議海澄危急且令盡力救援上許之敕駐守潮州官兵援海澄尚之信帥師駐潮州上諭議政王等曰福建之兵汛守沿海訖於潮州勢分力弱而解海澄之急又屬最要頃平南王尚之信已擊敗髙州逆賊令其速還㑹城即率兵馳赴潮州鎮守其在潮州滿兵及靖南王并其所屬官兵令赴將軍頼塔拉哈達所併力𠞰賊以援海澄如尚之信不能親行則速遣官兵至潮同總兵官馬三竒防守癸酉蠲浙江江山西安諸處逋賦上諭戸部浙江江山等十五縣及西安等四縣温衢各衛所逼近閩中首先被陷百姓困苦其康熈十六年以前錢糧概從蠲豁并令該督撫多方招徠逃避山谷殘黎各還故土俾事耕墾己卯勅將軍莽依圖等規定廣西先是將軍巡撫傅宏烈欲進兵南寧以向田州泗城後將軍莽依圖謂竟入南寧非䇿宜令將軍額楚取平樂桂林宏烈取南寧兩路齊舉上諭向因規定廣西調遣滿漢官兵甚多今進徴田州泗城若待他路諸軍齊舉必稽時日茍為不待則一旅孤軍似難有濟平粤事宜所闗鉅要不可忽易將軍莽依圖額楚傅宏烈及參贊諸臣與總督金光祖等俟克復潯州俱赴梧州面議宜何路前進先取何地相與恊志和衷詳加定畫務期有益國家勿圖自便甲申命尚之信遣兵防守宜章將軍穆占奏偽將軍胡國柱致書於郴宜參將陳武亨武亨不敢發函羈執賊使自首訊知桂東桂陽降將于賢何興所賊亦致書恐彼等為賊所煽惑上諭將軍穆占所守地方遼濶而永興見被賊侵儻桂東桂陽降將于賢輩復為賊所煽惑則疆圉深屬可虞宜章地處最要若駐兵防守其間西可以固臨武藍山嘉禾而東至桂東桂陽降人不致揺動宜令平南親王尚之信速調鎮守韶州緑旗官兵馳赴宜章固守參將陳武亨出首逆書忠誠可嘉該部議叙以聞丁亥勅諭大將軍簡親王喇布將軍穆占共相輯睦先是喇布奏茶陵攸縣安仁諸處實為江西咽喉且與賊宻邇將軍穆占啟臣謂前所遣援兵尚少更須増發如逆賊分路出犯則大兵之路被賊阻塞而江省亦甚可虞且永興介在茶陵安仁郴州桂陽之間急宜擊却永興之賊不當撤兵還郴請勅穆占先𠞰滅此賊穆占因奏曰自㓂侵永興臣遣駐防郴州䕶軍統領哈克三拉賽前鋒統領碩岱等領滿洲䝉古漢軍緑旗兵陸續往援並無撤兵還郴之事如果撤兵則署副都統雅秦所豈無臣印信文書此皆妄奏耳且簡親王疏云請勅臣先滅永興之賊是簡親王知臣不為皇上盡心而請耶抑知臣之盡心故不樂而為此奏耶臣所在𠞰賊恢復疆土皇上亦所洞鑒但郴州甚要臣未便輕離若遣一良將來守郴州諸處俾臣率兵討永興之㓂或進取耒陽必能成功上諭將軍穆占既言郴州甚要必難輕離穆占可駐守郴州酌調官兵撲𠞰逆賊穆占既未撤兵還郴署副都統雅秦前何所據竟以撤兵啟報大將軍簡親王簡親王何以竟不詳察即行具疏其令簡親王明白回奏又諭兵部將軍穆占大將軍簡親王總統師旅受將帥之任宜求濟大事彼此和衷若爾各懷嫌隙恐悞疆塲嗣令務相輯睦爾部即行傳諭敕大將軍康親王傑書速援海澄海澄總兵官黄藍奏五月五日夜半海賊四路攻海澄官兵力戰衆寡不敵致城外木柵礟臺俱陷賊復從髙阜瞰城中火攻不絶臣以勢迫請援於將軍總督恐援兵稍遲則海澄難保上諭總兵官黄藍死守孤城忠貞懋著大將軍康親王其速檄將軍頼塔拉哈達等赴援海澄宻遺書副都統伯穆赫林總兵官黄藍等如有隙可乗即率滿漢官兵棄城突出來㑹漳州大軍將軍穆占陳戰守機宜上從之穆占奏郴州等九州縣幅􅊷遼濶設有賊出犯無兵可遣因檄駐守廣東南雄將軍舒恕分兵馳赴郴州今逆賊逼永興而軍宜調江西提督趙頼往守攸縣畀和碩額駙華善將軍印即率署前鋒統領薩克察巴圖魯滿兵總兵官趙應奎標兵由安仁進發斷耒陽賊後路毁其浮橋如不可毁則遣赴永興與副都統雅秦雅哈喇額思赫等協同固守臣盡檄所部還郴州整兵前取耒陽則逆賊自潰至於都統伊里布何故戰沒俟嚴訊與戰官屬供詞成案以聞上諭特授穆占為將軍統率大兵由秦入楚自荆州啟行以來凡兵將或攜或留及調遣守禦事宜無不如奏允行即今破賊收疆亦皆穆占是頼此等調度俱如所請至都統伊里布縁何戰沒事闗重大穆占其明白宻奏大將軍貝勒尚善奏舟師敗賊於洞庭尚善等以滿漢官兵分布戰艦令將軍鄂鼐等率之入湖是月初三日賊逼栁林嘴君山諸處我師奮擊敗之擒斬千餘并沈賊艘己丑命大將軍安親王岳樂發兵赴大將軍簡親王喇布軍前援𠞰時喇布以賊逼永興而茶陵攸縣諸處防兵已經調援守禦力弱請濟師上諭議政王等曰簡親王喇布自抵江西未能𠞰除逆賊克復疆土而于失機將士復不嚴責軍狀及遣守茶陵攸縣諸處已收復地方又不能鎮防屢以力單奏請益兵凡所題奏率過其實此皆喇布庸劣不能効力之故其俟事平旋師之日嚴加議處大將軍安親王兵見駐守長沙無論䕶軍甲兵每佐領選一二人遣赴簡親王軍前且大兵既鎮守茶陵攸縣安仁諸處則吉安又為内地吉安署副都統尼滿等之兵亦聼簡親王隨宜調用尋復諭兵部長沙茶陵郴州地勢及逆賊情形久未知悉大將軍安親王將軍穆占大將軍簡親王各遣熟識情形具諳始末奏事𫝊㫖不致遺悞者一人馳驛赴京安親王仍遣䕶衛雅圖偕來壬辰授將軍穆占大將軍簡親王喇布用兵機宜時逆賊以大隊侵永興犯我河外營前鋒統領碩岱䕶軍統領哈克三等禦之失利哈克三戰沒賊遂據我河外營環攻永興時簡親王告急于安親王令發毎佐領兵二三人來援安親王遣夸蘭大塔爾拜畢里克率醴陵守兵每佐領一人有半馳往應援喇布具疏以聞土諭兵部覽大將軍簡親王等奏逆賊以大隊犯永興有必死之形由我軍每佐領一二人或數百人所在遣防兵勢太分以致失利將軍穆占大將軍簡親王其速收可援之地所有防兵還之要害㑹合羣力大創永興賊鋒期令蕩滅凡摧㓂破賊必審己之力可撃則撃之如賊衆我寡即宜調集諸路合為一軍壯其聲勢以圖攻𠞰儻株守新復城池以一經駐鎮憚于旋師遲留疑畏於大事殊無所濟爾部明白移文速𫝊示穆占簡親王知之甲午調兵援江西上諭議政王等曰賊并力犯永興諸處江西不無可虞頃據報副都統雅塔里提督石調聲總督李之芳等部兵陸續抵福建見在兵數已不為少署副都統岳爾多不必赴福建即率所部兵趨江西吉安至於陜西滿漢官兵甚衆將軍阿宻達同大將軍公圖海自外藩䝉古外餘滿洲䝉古漢軍無論䕶軍甲士合每佐領調四人量選大臣官員阿宻達率往南昌仍佩將軍印其原從䕶軍四十人并聽隨往總督帥顔保率其標兵亦往南昌漕運事務令總河靳輔攝理命前鋒統領薩克察巴圖魯等援郴州大將軍簡親王喇布遣官兵運糧永興喇布奏前鋒統領薩克察巴圖魯於本月十三日自安仁率師前赴永興賊於是夕渡河還據故營恐狡賊疑我虚作聲勢用偏師立營而以大隊潛赴郴州又臣等前得米百石已令運赴永興以道路阻塞復行撤還上諭逆賊如果併力郴州永興前鋒統領薩克察巴圖魯䕶軍統領拉賽等共議酌量留兵守城統率餘卒間道馳援簡親王隨所得糧米撥運官兵相續轉運速達永興乙未勅將軍穆占等𠞰禦郴永賊㓂穆占奏前鋒統領碩岱副都統託岱宜思孝等營壘被衝河之南岸失陷於賊退至郴州而碩岱已赴永興俟嚴取䕶軍統領拉賽口供另行奏聞碩岱等即宜拘禁但臣既已深入郴州兵力甚單而碩岱復逺在永興是以未行逮繋統候裁奪目今賊之大隊及有名偽將皆併力郴州請就近速發滿漢官兵守藍山嘉禾桂陽永寧諸處上諭今逆賊既併力郴永將軍穆占可盡撤間地防兵撃敗犯郴賊㓂保固廣東江西勿致疎虞并令大將軍安親王速遣兵赴大將軍簡親王軍至日簡親王等大振軍威𠞰除郴州永興之賊更令廣東韶州總兵官尚之瑛遣副將一員率樂昌緑旗兵二千速赴郴州聽穆占隨宜調遣授和碩額駙華善將軍印馳至永興總統鎮守至于署副都統多諾參賛軍務碩岱等失利即宜逮繫嚴加處分但因穆占調大臣官兵所在分防致兵力單薄遂爾失機其悞事之罪穆占及碩岱等俱不可辭碩岱等各暫留原任立功贖罪復諭穆占曰爾勿因永興兩次失利遂不計大事有禆與否冒昧妄動亟宜鼓舞人心振揚軍勢以圖克濟果能併力破宼前罪自當渙釋勅大將軍康親王傑書等救海澄被困官兵上諭兵部海澄官兵所闗甚重非尋常比急宜奮力救援其檄趣大將軍康親王將軍頼塔拉哈達等内外夾攻務期拔出城内官兵既而報至大兵四路攻進賊以火器拒戰我師退賊又用礟逼攻海澄上諭傑書等曰頃聞海澄援師退朕心甚為被困官兵憂之此非尋常事冝奮力急救使出切勿稍有疑難滿漢官軍閒散人及厮役有能倡率衝敵直過潮溝抵于海澄救出被困官兵者凖克復上等府城例從優議叙給以官職將軍以下將士即從前屢有失利退縮之罪俱從寛宥不必顧戀城池但使被困官兵得出即為克奏膚功也大將軍康親王將軍頼塔拉哈達總督姚啓聖提督石調聲等槩行曉諭滿漢官兵務期慰朕憂念丙甲命圖上永興茶陵諸處及岳州用兵形勢上諭兵部將軍穆占大將軍簡親王所得永興茶陵等九州縣之地我兵立營及賊壘所在令詳悉繪圖具奏岳州水陸駐兵形勢并賊所立營亦令詹事宜昌阿詳悉繪圖上之丁酉詔慰出征將士上諭兵部朕御極以來孜孜圖治欲使天下治安庶物豐裕人民富庶兵民樂業共享雍熈不意逆賊吳三桂背恩叛逆擾亂地方數年遣發大兵所在征討𠞰撫兼施次第蕩平止吳逆盤踞一方尚未授首以致出征軍士披堅執銳衝冒鋒鏑晝夜偵探盛暑勞頓且興師日久滿洲蒙古漢軍兵丁器械朽壞或有馬斃借貸置辦者或年幼之人原得分給田畆而經營器械馬匹厮役致多方稱貸種種疾苦深可憫惻但因逆賊未滅不得已而用兵各處官軍其奮勇爭先𠞰除逆賊底定疆土速奏膚功還京之時其一應借貸俱著該部代還諸處調集之兵俱各還本汛内外軍士咸令得所朕之勅㫖昭如日月將示大信于天下斷不食言至于從征官兵効績被傷猶堪軫恤勿俟大兵齊到其未干軍律被傷官兵應得銀兩速察給其家爾部即𫝊示内外俾諭朕恤兵酬勞至意臣謹按兵書有云用兵之法必先察吾士衆激吾勝氣乃可以撃敵焉是時因三楚秦粤諸路將帥逡巡未進曠日持久致出征官兵均被艱苦而滿兵猶感戴我朝養育之恩専欲為國効力毎各自稱貸以備馬匹器械諸物辛勤更甚我皇上洞鑒下情恐士卒或因勞瘁志氣稍隳爰特頒諭㫖慰勉各處官軍令其奮勇爭先速滅逆賊還京之時一應借貸俱著該部代還諸處調集之兵各還本汛内外軍士咸令得所于是將士皆懽呼感激勇心奮發敵愾倍増未幾即拔岳州下湖南而川粤黔滇以次蕩定矣此皆由我皇上深悉兵法鼓勵勝氣之所致也迨疆隅咸奠天下承平令諸路官兵各還本汛量加叙賞後乃優賜禁旅償其積負命戸部動支帑金數百萬兩併將兵士私債悉與代還恩綸始布之日閤城童叟莫不歡聲雷動讚頌聖明是誠亘古未有之大賚史册罕見之洪恩也豈獨酬六師之成勞直以固我國家億萬年無疆之基業大聖人謨謀深逺規為盛大洵迥出千古矣戊戌命總督董衛國増兵遣赴吉安大將軍簡親王喇布奏署副都統尼滿啓臣云萬安泰和諸處逆賊不時出沒吉安最為要地而防兵甚少臣觀吉安泰和諸處正當廣東贛州水陸之衝請調可緩之地緑旗官兵赴吉安協守上諭頃已調將軍阿宻達總漕帥顔保率兵前赴江西今簡親王既請遣發緑旗官兵宜令總督董衛國酌量撥遣馳赴吉安與署副都統尼滿等協力固守至于江西緑旗官兵屢經調赴湖南見在兵力亦屬單弱董衛國可募有資力精銳兵五千人以備調遣平定三逆方畧巻三十八

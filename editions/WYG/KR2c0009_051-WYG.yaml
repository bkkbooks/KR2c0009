body:
  text: 欽定四庫全書平定三逆方畧卷五十一康熙十九年三月辛邜將軍烏丹奏復重慶烏丹等所遣署副都統覺和托等於二月十六日至重慶偽文武官出城迎降於是達州東鄉太平新寧南江安岳等州縣悉定偽將軍楊來嘉彭時亨等亦各遣人詣軍門􅌳印投誠乙未遣刑部侍郎宜昌阿等赴廣東時尚之信䕶衛張永祥張士選赴京首告之信謀叛事上因命刑部侍郎宜昌阿等以巡視海疆赴廣東按其狀并令議政王貝勒大臣集議既議政王等議奏上諭令宜昌阿等攜帶張永祥張士選以往宻詢都統王國棟副都統尚之璋若事有實迹國棟等自任能執之信即一面奏聞一面赴潮州頃之信具疏自請撤還㑹城此疏其以不准行檄知之宜昌阿等抵廣東日詳察情形如應撤還即具疏言㑹城不可無之信彼時當獨調之還宜昌阿臨事之時毋多株連儻有意外聽酌便行事是日宜昌阿等啓行戊戌上親勞大將軍安親王岳樂於蘆溝橋先期上諭兵部大將軍和碩安親王等兵雖有微罪然擊敗逆賊立有功績朕親往迎勞爾部遣人諭王振旅而入茍疾急馳還使步伍不齊將失勞軍大體諸應行禮儀悉如大將軍信郡王等儀注行及岳樂至上親迎之蘆溝橋辛丑命都統夸扎自武崗州率兵赴廣西大將軍簡親王喇布奏臣親帥兵赴栁州二月二十八日至永福縣聞馬承廕反給傅宏烈登舟遣兵襲破其營臣等即欲進𠞰因滿兵力薄又念省城至重公議暫還桂林上諭覽奏馬承廕復叛今湖廣綠旗兵已取楓木嶺武岡州滿漢兵甚多廣西去武岡為近宜調貝子彰泰軍中滿兵每佐領六人綠旗精兵二千人令都統夸扎帥之速赴簡親王軍前與平南親王等協力𠞰賊夸扎至廣西即令㕘贊軍事命將軍噶爾漢帥師守荆州諸處大將軍順承郡王勒爾錦等言將軍噶爾漢之兵若留之荆州防禦地方誠有禆益上允所請即命噶爾漢以兵駐守荆州諸處壬寅命都統馬竒等率兵赴廣西上諭議政王等曰前遣往廣西大兵勞苦日乆宜酌量發兵畨休可撥京師每佐領䕶軍二人漢軍一千人令都統馬竒趙璉副都統洪世祿祖植椿等率往更賛癸卯命將軍頼塔帥師守廣東上諭兵部今大敗海冦攻克厦門金門諸處閩疆悉定頃簡親王奏馬承廕反恐此賊自廣西侵犯廣東且廣東海冦方張所係匪輕將軍頼塔以文到日即率滿兵二千馳赴潮州防守廣東全省臣謹按是時尚之信隂蓄不軌有復叛之形為所部張永祥等首告皇上即遣侍郎宜昌阿往按其事復慮粤城無滿兵彈壓倉猝變生難以驟制乃亟命頼塔帥兵赴潮防守全境雖由馬承廕復反海冦方張實恐廣城或有意外便於就近𠞰除也迨宜昌阿抵粤遵奉宻諭中夜調頼塔來赴㑹城所以之信被執後其黨與雖爾作亂旋為我兵所擒不致蔓延以滋疆域之害皇上籌書幾先運用不測誠可為至神宻矣甲辰尚之信請進取武宣上許之先是將軍莽依圖移文約之信由貴縣至賔州㑹師協取栁州至是之信奏總督提督官兵合為一路兵勢始盛今臣等定議臣可無往賔州㑹鎮南將軍之師即從貴縣同督提二臣由潯州水陸進取武宣上報可戊申大將軍貝勒察尼奏復辰州是月十三日我兵抵辰州賊潰遁偽知府傅祖祿等以城降偽將軍楊有禄周禎楊寶䕃祖述舜等各率兵來歸未幾將軍總督蔡毓榮亦奏復銅仁府瀘溪溆浦麻陽三縣逆賊呉之茂韓晉卿伏誅遣張起龍招撫雲貴時王屏藩陳君極首級及之茂晉卿起龍送至京兵部以聞上諭呉之茂韓晉卿即凌遲處死與王屏藩陳君極首級同懸示衆又諭議政王等曰今楓木嶺辰龍闗諸險隘俱已恢復四川廣西悉皆底定雲貴不日可平若行招撫更可速定雲貴人民得早安其生張起龍本呉三桂旗下之人宜使招撫雲貴可貫其死俾捧勅前往壬子將軍總督趙良棟奏進兵機宜上從之良棟奏湖廣大兵若作速前驅賊自奔潰請勅湖廣官兵限以立取貴州令廣西兵一路自泗城州渡八答河由安籠出雲南交水一路自思恩府渡八碍青羊江由廣南府出雲南維摩州四川兵一路自城都府走黎雅天全招討司過大渡河即由瀘江建昌㑹川金沙江出雲南武定府一路自保寧府下七星闗或走永寧出烟方堂堂可渡橋并請勅各路將軍大臣嚴督滿漢官兵加意秣馬川陜督撫等迅備糧饟湖廣廣西統兵將軍速整軍旅訂期八月終諸路齊進直搗雲南上諭趙良棟身在行間熟悉地方情形具疏入告宜悉如所請録其疏發湖廣廣西將軍大臣視雲南可取或賊内亂有機可乘毋俟定期即便宜帥師直進茍未有機㑹其以趙良棟所奏訂期進兵機宜詳加商酌於何所約㑹齊舉定議以聞癸丑命禁官軍擄掠時遣學士佛倫等赴滇黔理餉上因諭之曰大兵進𠞰雲貴務安輯民人撫綏苖蠻若肆行擄掠則賊冦不息賊冦不息則大兵何日得旋可傳諭將軍總督巡撫總兵官俾咸知朕意若等係特簡大臣軍士有妄行擄掠者令立行㕘劾甲寅命馬山等赴將軍總督趙良棟軍前上諭兵部曩者有事之時所選發人員之中馬山偏圖勞績屢著軍務素㛠四十六亦堪任使宜用之邊疆重地可發往將軍總督趙良棟軍前若四川需用即授為總兵官否則令趙良棟帥之隨征雲貴即於要地任用其標下官兵願隨者攜往準出征例給與糧餉此等人員爾部詳察議奏己未命將軍總督趙良棟等堅守四川要路上諭議政王等曰四川與雲貴接壤通道頗多逆賊必乘間來犯頃覽將軍總督趙良棟奏我兵已抵金沙江其檄趙良棟烏丹鄂克濟哈等當此進取之時宜於各要路立營深溝髙壘堅為守禦其守兵糧餉運致母悞四月壬申命大將軍康親王傑書發兵赴將軍頼塔軍頼塔奏所部兵二千鎮守廣東全省設遇警他援兵力單弱請増發二千人上命康親王更以兵一千増遣將軍頼塔軍前其餘或悉帥還京師或酌量留之先後還京詳議以聞戊寅命耿精忠來京精忠奏今逆賊敗遁恢復海澄閩疆悉定圖報有心効力無地伏懇准臣赴闕待罪上命精忠來京尋以精忠所屬阿思哈尼哈畨徐鴻弼等首告精忠雖已歸降仍懐反叛遣王進功潛通海賊與劉進忠宻語結為心腹偕徐文輝等晝夜宻謀勾連海冦又不收繳軍械濳埋黒鉛於王昇家欲俟大兵旋日復行反叛隠匿奸細於投誠時殺死總督范承謨以滅口又遣王于玉許應兆往呉逆處乞援命議政王貝勒大臣集議議政王等勘審俱有實迹分别擬罪具奏上諭耿精忠革去王爵可即凌遲處死其子耿顯祚革去散秩大臣可即處斬徐文輝王世瑜白顯中江元勲曽養性王振邦蔣得䡌劉進忠俱即凌遲處死黄國瑞林芳孫廖廷雲李似桂夏季旺吕應斗武灝司定猷沈偉郭景汾羅萬里祖宏勲陳議陳斌吕八俱即處斬耿精忠劉進忠首級仍梟示田啟蛟金鏡李學詩陳夢雷俱從寛免死内係旗下人給與本主為奴係民入官給與新滿洲披甲之人為奴己卯許將軍王進寶還固原治疾先是進寶子用予面陳松潘已屬内地願隨征自効至是進寶奏舊病愈深乞解軍職上諭卿乆鎮巖疆勞績素著進𠞰四川克奏㨗功地方初定倚毗方殷覽奏以病乞休言甚懇切其還固原任所調攝卿子王用予既願隨征効力卿標官兵令其暫統駐保寧俟進取雲貴之日隨征協𠞰壬午命大將軍貝子彰泰等量率湖廣滿兵進雲貴餘撤還京師彰泰奏留守武岡州每佐領驍騎二人有竒已選其中有馬者先令赴大將軍簡親王軍又自沅州撥每佐領䕶軍二人驍騎三人亦選有馬者及總兵官趙應奎并其標兵三千餘人俱令都統夸扎率之前往馬瘦及無馬者見留臣軍侯㫖調遣上諭今大將軍貝勒貝子大兵俱抵沅州總計兵數每佐領二十人有竒又總督董衛國蔡毓榮提督趙頼桑額周卜世等兵甚多皆由鎮逺一路進取貴州值此廣需糧餉之際大將軍貝勒貝子等於前發兵内視無馬不能行者遣毎佐領若干人還京師率滿兵每佐領若干綠旗兵若干進取雲貴集議速奏遇有機㑹仍進發母失平定三逆方畧卷五十一

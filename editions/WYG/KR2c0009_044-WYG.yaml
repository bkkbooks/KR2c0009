body:
  text: 欽定四庫全書平定三逆方畧卷四十四康熈十八年三月丁酉以王度冲等為總兵官大将軍貝勒察尼奏偽總兵王度冲等統官兵船艦投誠宜從優議叙又言伊等願改為陸兵効用上諭偽總兵王度冲偽将軍陳珀可為總兵官俱兼右都督偽總兵龍韜張宣柯喬棟等可為總兵官俱兼都督僉事令彼等俱入陸路同大兵効力甲辰命彞陵總兵官徐治都為湖廣提督兵部奏湖廣原設提督一員康熈十七年因江西撫建提督趙賴調赴攸縣𠞰賊授為湖廣提督今長沙諸府已經恢復湖南提督員缺應行裁去湖廣仍設提督一員上允之因授治都為湖廣提督庚戌勅大将軍安親王岳樂帥師進取寳慶諸處簡親王喇布等合兵進定廣西上諭議政王等今湖南賊宼悉已敗遁順承郡王與貝勒察尼等合兵一處簡親王方在衡州穆占已至永州進取廣西事屬最要順承郡王等所部兵為數甚多可撥每佐領䕶軍二人驍騎二人令貝子彰泰率往安親王軍前安親王親統大兵前赴衡州進取寳慶諸處簡親王可與穆占等合兵自永州進定廣西甲寅總督姚啟聖奏報偽總兵廖琠等來降時廖琠黄靖等率衆踞水晶坪聫絡山海賊寇以為邉害姚啟聖遣官往撫之廖琠等即率偽官三百餘員兵一萬二千餘人詣軍門降丙辰将軍穆占等奏官兵復永州道州時賊渠呉國貴等遁往永州為守城計穆占遣官兵追及之於白水市諸處擊敗賊衆斬殺甚多是月初九日遂復永州於是道州永明江華東安等縣所有之賊聞風俱棄城而遁詔統兵将軍大臣等確覈戰功上諭兵部曰我國家開創大業軍法最為嚴明凡擊斬賊衆攻取城池必據實奏報復行確覈功罪昭著故能信賞必罰鼔勵戎行初無虚偽冒功之弊今自用兵以來每覽各處奏捷章疏其中固有實建功績者亦有虚詞妄報者如擊敗賊兵動稱斬殺甚多或云數千或云萬餘或云不計其數甚至賊棄空城或云如何攻取如何恢復妄行虚報㣲功小冦任意鋪張議叙之時兾幸濫邀陞賞殊非人臣事上勿欺實心為國之誼嗣今諸領兵大将軍督撫提鎮等務洗心滌慮勿蹈前轍凡報捷必確覈功績㨿實上聞如因循陋習冒濫軍功定以軍法従重治罪必無寛貸爾部即通加嚴飭并曉諭官兵一體遵行丁巳大将軍簡親王喇布奏官兵復寳慶衡州諸郡既復喇布即令提督趙賴率所部官兵往取寶慶府趙賴等未至賊先於城内外縱火而遁我兵遂於是月初五日入城癸亥趣大将軍順承郡王勒爾錦速統兵進𠞰上諭兵部曰逆賊従湖南敗遁日乆我大兵隨後尾擊若推諉逡巡不速行追躡俾賊復得固守則勞費倍多乃順承郡王等至今猶未亟進殊為不合爾部速移文順承郡王等乘賊守備未固兼程前往四月庚午命諸将遣人招撫賊中渠帥提督趙賴奏逆賊胡國柱郭壯圖吳國貴呉應麒輩嫌隙已生互相陵轢勢不兩立宜乘渙散之㑹指名招徠上諭諸路大将軍将軍等乘逆賊互相猜疑之際其明諭以投誠人員寛貰前罪従優恩擢賊中渠帥分路遣人指名招撫辛未勅固山貝子準逹等防守荆州彞陵諸處安塘筆帖式報偽将軍王鳯岐等三人選船艦兵卒水陸齊下截禦巴東諸處以乘不備又有劉李楊王諸賊帥率衆屯踞巫山及草毛諸處上諭逆賊至巫潛生奸計或窺伺䕫山俟江水泛漲時乘虛突犯彞陵荆州殆未可定今固山貝子準逹都統根特等已率兵前赴荆州而彞陵又有大兵及提督徐治都在彼宜悉録報文移貝子準逹等及提督徐治都令於荆州彞陵諸處水陵宻防賊衆來犯即行𠞰禦詔責都統覺羅巴爾布大将軍順承郡王勒爾錦奏都統覺羅巴爾布啟言二月初二日分兵二隊攻金頂山及灘内所立之營兵鋒一至賊皆遁走隨遣署䕶軍統領董吉等率兵由陸路追之及於南津闗口江北岸之賊列陣迎拒我兵敗之斬殺甚衆上諭國家軍令本甚嚴明凡攻逐賊冦大臣身在顔行是以官兵鼓舞奮勇野戰必勝攻城必克所向無敵都統巴爾布統兵駐彞陵大兵既復岳州不於賊方震動之時偵察虚實即行𠞰㓕乃稱二月初二日分兵二隊攻金頂山及灘内所立營兵鋒一至賊悉遁走身統兵衆逼賊而營對壘之賊已遁尚爾不知又不自思贖罪率官兵疾追殄殱賊醜止遣董吉等前往巴爾布自率兵赴荆以来曾無奮力報効遲悞觀望其罪良多既至彞陵與賊對壘不躬親拒敵反云初二日撥兵前進作攻戰之形明屬欺罔且鎮荆山之賊遁於何處踞於何地並未察明以報順承郡王等一一嚴取供詞以聞戊寅命發馬於将軍穆占軍前時穆占奏自辰州啟行追賊二十日㑹大雨泥濘馬斃甚多致兵士乏騎上諭穆占與大将軍簡親王進定廣西宜速撥武昌馬千匹送至穆占軍前以給乏馬兵士己卯詔責大将軍順承郡王勒爾錦等勒爾錦等奏偽将軍胡國柱在辰龍闗偽将軍呉應麒等在辰州而近以木塞隘口而營上責之曰順承郡王勒爾錦等當逆賊驚遁之際宜亟遣賢能将帥追勦乘賊不備速行撲滅乃明知巴爾布怯懦令率官兵前取辰州巴爾布遲滯觀望延引時日不疾驅而進致辰龍闗復為賊守勒爾錦巴爾布等宜即行議處但見統大兵征𠞰俟事平凱旋之日再行察議壬午勅大将軍簡親王喇布等毋進廣西将軍莽依圖等分路進兵上諭議政王等曰覽學士孔國岱報廣西悉已底定宜速移文令簡親王及穆占等之兵不必進廣西但莽依圖舒恕額楚等兵力稍單簡親王及穆占等兵内選有馬精兵每佐領三人或四人遣前鋒統領希福帥赴莽依圖等軍前於通雲貴要路宜従何路恊力前進公議進發至於廣西見無官兵平南王或宜同大兵前進或宜駐廣西適中要地亦同将軍大臣等共議而行其彞陵兵徒爾坐守似屬無用宜整繕甲兵自歸州巴東作進兵狀以制之巴爾布本在彞陵即遣彼往歸州巴東効力并令都統噶爾漢等率兵同總督楊茂勲提督佟國瑶等前進宜由何路恊力撲滅山賊或規取興安聴其酌便而行乙酉頒勅招撫雲貴官民勅諭雲南貴州大小文武官員軍民人等逆賊煽亂以來爾等被其迫脅陷身賊中莫能自拔地方百姓乆遭荼毒誅求苛擾困苦日深在彼情形朕已洞悉每一念及深為惻然故屢頒勅諭廣示招徠開以自新之路今湖南悉皆平定廣西亦已納欵獨爾滇黔一隅民生尚在水火之中朕以仁覆天下為心豈忍西南萬姓顛連無告莫之拯救且當時倡叛罪止三桂一人所屬人員均係脅從情可矜恕今特頒勅諭再行招撫爾等其各體朕寛大好生之心翻然悔悟争先來歸於各路大将軍将軍等軍前投誠皆赦其前罪論功叙録加恩安挿令之得所爾等勿得仍懐疑畏坐失事機有負朕嘉與維新至意丙戌諭諸路将帥毋受祖澤清降上諭兵部曰逆賊呉三桂煽亂以來諸大小文武官員勢窮力竭迫而従賊朕乆已洞悉其悔罪來歸者槩行寛宥惟祖澤清父子兄弟向受國家恩養甚厚前澤清叛時意其必係被賊迫脅不得已而従逆及其既降復叛則甘心附賊可知情罪重大國法難容不許招撫亦不許其投誠爾部即宻諭各路大将軍将軍督撫提鎮等遵行總督金光祖奏復潯州時逆賊呉世琮等踞潯州府聞大兵前進即焚營棄城而遁金光祖等所遣副将林大忠遂於是月十九日入城撫定人民詔保全文武官員家口陷賊者上諭兵部湖南廣西已經底定滇黔指日蕩平凡在京在外大小文武官員内有家口陷於賊中者有孑身投誠家口仍在彼地者有前以抗賊被害而家口尚有遺留者大兵到日一一清察務加保全俾之得所聴其家屬完聚爾部即通諭各路大将軍将軍督撫提鎮等遵行丁亥命刑部侍郎宜昌阿等赴湖南議撤兵事宜上諭兵部今湖南廣西皆已底定大兵多集湖南遣侍郎宜昌阿學士噶爾圖赴順承郡王安親王簡親王軍前酌留進𠞰平定地方之兵餘兵防守荆岳及䝉古烏拉寧古塔兵應行調還事宜一一詳議速奏其招撫勅諭賫付大将軍等令其酌行招徠伊等不必留彼招撫軍事議畢即還壬辰命大将軍順承郡王勒爾錦等還荆州貝勒察尼帥師進勦勒爾錦奏将軍鄂鼐等啟稱署副都統圖爾篤渾等偵探辰龍闗賊情形賊跨路連設五營力為堅守山險林深前鋒未得禽獲生口距辰龍闗二十里止行一馬且不能轉旋辰龍闗一帶山俱峻險林木森宻徒步亦不易至且時值盛暑淫雨雖大兵前進亦不能行不如暫留為便上諭辰龍闗乃通雲貴孔道衆皆知之甚悉據奏辰龍闗相去二十里止行一馬且不能旋轉辰龍闗一帶山俱峻險林木森宻徒步亦不易至俟復辰龍闗時必於此路明白丈量茍與所奏不符圖爾篤渾等從重治罪今當廣西全定敗賊逃散之際宜分路前進底定疆圉前鋒屬在顔行捕獲生口乃其専責順承郡王委無能之圖爾篤渾為副都統俾之前行致前鋒不能捕一生口圖爾篤渾等乃又急行退還順承郡王勒爾錦可率其王府佐領之兵還赴荆州同巴爾布等進定歸州巴東圖爾篤渾可革去署副都統職以叅領隨順承郡王還荆貝勒察尼仍用其原大将軍印統兵平定地方平定三逆方畧卷四十四

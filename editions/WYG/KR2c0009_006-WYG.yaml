body:
  text: 欽定四庫全書平定三逆方畧巻六康熙十三年五月甲子朔設浙江馬站上諭兵部大兵進勦閩逆凡奏報軍機止由水路恐致稽遲自杭至衢令設馬站七處置筆帖式撥什庫以便馳遞戊辰戒諭往駐兖州䝉古塔布囊等先是上命喀喇沁部落四等塔布囊霍濟格爾土默特部落二等塔布囊善達等往駐兖州至是将行上召見諭之曰昔太祖太宗定天下時爾等祖父曾同心效力朕體祖宗撫愛爾等祖父之意恩典頻加念爾等生長朔方以粤西諸路炎蒸故不遣往今特命鎮守兖州至彼須節慎飲食凡有調遣聞命星馳朕遣爾等出師原為百姓爾等亦宜善加愛惜沿途毋有擾害至於設巡邏謹備禦軍旅之事凡百加慎勿得輕視輙生怠忽勉之勅大将軍順承郡王勒爾錦遣兵援岳州上諭勒爾錦等曰岳州水陸諸路兵力單弱王可於荆州所有甲兵毎佐領内酌撥二三人以彛陵領兵大臣曽厯戰陣者一人統之各備甲胄鞍轡由水路速援岳州如尼雅翰珠滿巴爾布等尚未破敵須俟援兵到始可進戰非謂尼雅翰等不能擊賊正欲我軍兵多力厚大敗賊衆挫其兇鋒耳范達禮等之兵足守襄陽可令徳業立等之兵暫往荆州駐守王貝勒大臣身在地方自能諳曉機宜應行之事即聼爾等裁酌如已得四川當分兵三路進取雲貴若逆賊将士來降即赦前罪厚加恩養其以此播告江南廣為宣諭至於賊兵各路來犯分我兵勢又毎聲言渡江狡情叵測我兵日乆恐偵探踈懈雖無賊之處亦宜加意隄防庚午命察捕奸究上諭兵部逆賊呉三桂雖竊伏常澧不日授首但恐狡賊計窮潛布奸細惑我愚民及本地奸宄借三桂之名煽動人心擾害地方俱未可知爾部行文各省督撫提鎮密察嚴捕毋得藉端擾害良民波累無辜辛未諭平南王尚可喜等戰守機宜可喜奏孫延齡叛形昭著且自稱安逺大将軍移牒平樂梧州諸府伏候廟謨指授協力蕩勦以抒皇上南顧之憂上命可喜與總督金光祖提督馬雄等㑹同商酌如逆賊孫延齡有可𠞰之勢即議進勦若未可速進則俟大兵協力剪㓕并令部臣𫝊諭馬雄固守所屬相機㓕賊儻賊盛難禦即率官兵赴廣東與平南王總督等協守以俟大兵之至壬申将軍赫業奏㧞朝天闗赫業等統兵前進於四月二十八日抵七盤闗賊棄闗遁是月初五日進至朝天闗偽總兵石存禮等率衆萬七千餘掘濠立柵連營相拒我兵力攻三日賊敗走遂㧞其闗斬首七千有竒丙子命江寧京口等處滿漢官兵習水戰将軍王之鼎奏耿精忠叛亂賊䑸往來無定應将分防江陰𤓰州戰艦調集天寧洲令右路總兵官率兵訓練以備戰守上允之并将軍阿宻達華善等以所統滿漢軍官并習水戰丁丑命給寧夏總兵官陳福世職時福舉首逆書上嘉其忠因給拜他喇布勒哈番庚辰命經畧莫洛議進兵機宜勅諭莫洛曰朕聞鄭蛟麟來降又聞克復朝天闗深為喜慰斯皆諸将軍謀畧頃者岳州賊衆擁聚霪雨連綿大兵不可直前俟雨霽風順即水陸並進吳三桂果在澧州乘虚徑襲其後乃今日至要之機如克復四川可疾由交水取貴州或徑取雲南其可否機宜爾與諸将帥酌議宻奏壬午命副都統拉哈領兵赴浙江時将軍圖喇報平陽兵變總兵官蔡朝佐被執總督李之芳等又奏逆賊曽養性至平陽與叛将司定猷等㑹兵圍瑞安衢州一路賊兵屯聚清海湖上賊䑸出沒内地山冦復起現在標兵四應不給乞調近省禁旅彈壓以保萬全上諭将軍頼塔既抵杭州可與将軍圖喇總督李之芳提督塞白理等㑹商平陽衢州等處緩急機宜猶恐勢分力薄其以駐劄江寧将軍阿宻達所轄包衣佐領官兵令副都統拉哈悉領赴浙聼頼塔調度又以駐劄兖州将軍拉哈達所轄喀喇沁土默特兵千人令副都統穆赫林領赴江寧聼阿宻達管轄甲申加甘肅總兵官孫思克西寧總兵官王進寳職銜上諭兵部總兵官孫思克王進寳俱効力邊疆其優加孫思克三等授為右都督加王進寳一等授為署都督僉事仍管總兵官事丁亥平南王尚可喜奏劉進忠以潮州叛潮州總兵官劉進忠陰通耿逆於四月二十日叛變擁兵與續順公沈瑞兵戰二十三日遂引閩賊入城己丑奨諭平南王下将士及廣東官兵上諭兵部平南王尚可喜累朝勲舊乆鎮巖疆勞績懋著自吳逆等叛後復能篤守忠貞殫心籌畫屢抒謀畧保固疆圉事平優叙已有前㫖其藩下官兵及粤省文武官員兵士皆能協力同心克効忠順防禦逆賊勞瘁行間朕心時切軫念事平之日俱從優叙賞爾部即速傳諭俾咸悉朕意癸巳命平南王尚可喜等宣諭廣西官兵上諭可喜及總督金光祖提督馬雄曰叛逆孫延齡奏稱督提二臣誘臣下都統王永年等謀為不軌暗託腹心掘通城塹宻約日期内外交攻謀殺臣身并戕害城中百姓事發兵變遂将王永年等剪除等語孫延齡交通逆賊吳三桂反叛復以巧計離間居臣飾辭具奏然延齡雖叛爾廣西所有官兵原𨽻定南王先因定南王為國盡節邊疆将所屬官兵離㪚家口收合一處使之完聚復因王無襲嗣以王女配延齡授為将軍統轄兵馬今延齡雖背恩作亂念其下官兵原随定南王効力建功國家累世豢養恐大兵一到概行誅戮朕心不忍前有㫖如延齡改過來降寛宥其罪爾等不可因此遂緩進𠞰機宜必延齡果悔罪歸誠爾等仍受降具奏其所屬官兵感念國恩或殺延齡或率衆來歸俱從優議叙即隻身自投亦收留恩養仍出示曉諭定南王下官兵俾悉此意平定三逆方畧巻六

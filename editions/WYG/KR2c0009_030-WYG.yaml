body:
  text: 欽定四庫全書平定三逆方畧巻三十康熙十六年四月庚戌削江寧副都統綽克托職時綽克托隨征廣東託言疾病白平南親王尚可喜遂還江寧上諭議政王等我朝用兵以來凡出征大臣無不奮力行間以終其事從未有軍事未竣半途而還者今廣東多事之秋綽克托借稱有疾竟還江寧顯屬規避其革職披甲發往將軍莽依圖軍前辛亥命歩軍總尉薩克察巴圖魯署前鋒統領赴吉安上諭兵部吉安諸處兵為數甚衆既遣參贊大臣宜更擇賢能為前鋒統領歩軍總尉薩克察巴圖魯善哨探習戰陣可署前鋒統領赴吉安參贊軍務左翼遣前鋒䕶衛噶爾麻右翼遣前鋒參領馬席泰同往戊午敕大將軍簡親王喇布等撥給將軍莽依圖軍時莽依圖奏入粤士卒無馬者衆上命喇布及總督董衛國撥江西滿漢官兵馬二千匹送莽依圖軍前自京師發往長沙馬四千餘匹抵南昌日太僕寺卿温岱撥二千以補江西馬額已而喇布奏將軍莽依圖等於本月二十四日已統兵赴粤天暑道逺送馬恐難驟至上命喇布等仍選江西官兵馬一千速送贑州付侍郎舒恕等轉送莽依圖軍前并詔責喇布曰喇布明知進粤大兵所關甚要不即遵㫖遣送馬匹竟使大兵徒歩前進殊忝大將之職宜即議處以見在用兵俟事平旋師之日嚴加治罪趣大將軍公圖海進兵四川圖海奏言臣令駐防秦州寶鷄官兵進逼禮縣驛門諸處隨移檄聲言大兵分路進𠞰今欲親統重兵深臨入川之路第恐去而即還則軍行無益若久留駐則又坐老我師且時多霪雨輸輓艱難當俟機㑹酌量前進上諭今將軍穆占協𠞰長沙貝勒尚善與將軍鄂鼐水陸攻岳故逆賊吳三桂親赴長沙集諸路賊兵死守湖南我兵若乘此機各路進𠞰則吳逆指日可滅計在陜官兵為數甚多當此逆賊勢分之時若不進逼四川則坐糜糧餉殄賊無期大將軍公圖海其仍遵前㫖速行進發命大將軍簡親王喇布檄諭原任提督嚴自明時自明遺書總督董衛國乞䧏衛國以聞上諭今將軍拉哈達莽依圖等兵兩路進粤嚴自明若悔罪反正來迎王師當赦其罪仍前録用簡親王喇布其即遣檄諭令知悉庚午命大將軍簡親王喇布等防守贑州諸處大將軍貝勒尚善等報逆賊吳三桂率賊衆往衡州上諭我兵攻圍長沙賊以窮蹙欲從衡州侵犯贑州吉安諸處以分我兵勢亦未可料其令簡親王喇布侍郎舒恕總督董衛國總兵官哲爾肯等分布防禦偵賊情形不時奏聞辛未申飭大將軍簡親王喇布等先是喇布遣學士王啓元等奏復吉安情形上諭喇布等統領重兵圍吉安一城日久不下虚糜國帑徒勞士馬被困之賊不能撲滅故使逸出逸賊率皆歩行復不能追擊聽賊渠脱逃情罪重大宜即處分念見在進兵俟事平旋師之日嚴加治罪又王啓元奏稱吉安雖復賊皆逃出與土宼合勢江西未為全定前因總督董衛國疏稱吉安已復逸出之賊見在圍𠞰故令酌量分遣大兵赴袁州南昌今江西既未全定可令參贊大臣到日相視地方輕重緩急如不能如前㫖分遣則聽其便宜調度至螺子山拒賊一案與縱賊逸出官兵其嚴察罪狀以聞至是啟元還吉安上復令傳諭喇布及諸將軍等曰諸路大兵俱各殫力殺賊惟江西一路屢厪朕憂爾等圍困吉安既已踰年乃縱賊盡令逸出又不恤人民肆行侵掠夫國賦出於民有一民則有一民之賦若不撫輯招徠地方何由底定又屢稱江西兵士戰馬羸痩多斃爾等頓兵江西未出四五百里外戰馬何由羸斃况康親王兵由浙江定福建入廣東彼馬何獨能進豈非爾等憚入楚粤預為託故乎嗣今宜竭力辦賊平定疆土勉建功績用贖前愆乙亥削佛尼勒將軍等官上諭議政王等西安將軍佛尼勒出征四川保寧虧損官兵貽誤大事可罷其將軍革去世職惟留所襲伊父拜他喇布勒哈畨令署西安將軍事五月癸未郎中色度等報舟師入湖時岳州舟師器械已具惟俟風信是月初三日㑹風利將軍鄂鼐隨率大兵以戰艦二百餘艘直越賊船進取君山我兵既逼君山與賊連戰數日不能破遂引軍還乙酉命傅宏烈為廣西巡撫時宏烈遺理事官麻勒吉書稱廣東震動若大兵速進南安宏烈從中接應前赴韶州以扼廣東咽喉則兩廣可計日而定廣東路通則廣西全省宏烈便可一靣當之但須假一虚銜方可行事并標下官員各照原銜換給印劄庻可鼓勵人心麻勒吉以聞上諭傅宏烈圖報國恩忠誠懋著可優陞為廣西巡撫今將軍莽依圖等大兵已進廣東俟宏烈迎見軍前即與勅印其標下官員亦令大將軍簡親王給以印劄壬辰將軍莽依圖奏復南安諸府四月二十九日莽依圖軍抵南安原任提督嚴自明以城䧏逆賊郭義等率其衆遁走於是我兵進發沿途屢敗賊宼克取南雄直抵韶州偽文武官俱繳印劄投誠偽監軍道信勝將軍傅宏烈迎大兵於始興辛丑詔粤東軍機許將軍莽依圖直行奏報上諭兵部莽依圖既授為鎮南將軍平定廣東一切機宜宜聽直行奏報若由江西大將軍王及侍郎舒恕等轉達似屬非宜且躭延時日嗣今凡軍機賊情地方形勢莽依圖其徑行奏報乙巳命留紅衣礮於南昌以銀及馬送長沙先是上諭兵部前安親王岳樂等疏請紅衣礮隨已發往今聞袁州至長沙道路險阻運礮夫役既多為費實繁若礮一到即得長沙則送往固宜儻難猝㧞則送亦何益念安親王兵久入湖南馬多致斃已自京撥馬陸續發往今將軍穆占率精兵㑹勦猶未克取長沙與賊對壘如故我兵甚衆芻秣無多即馬到長沙勢必坐致疲痩不堪驅䇿可令馬匹暫停袁州紅衣礮暫留南昌温岱先赴安親王岳樂將軍穆占等軍前詳議以聞安親王所統軍士雖曽給賞為時已久應撥正項再行頒賜總督董衛國無論何項錢糧撥二十萬両解赴袁州俟温岱自長沙回日酌量轉解至是温岱奏曰臣詢安親王岳樂將軍穆占等皆云紅衣礮即到亦未必能遂破長沙芻秣誠少而軍士缺馬甚多應否解送恭候睿裁上乃命留紅衣礮於南昌仍令温岱解銀馬赴安親王岳樂將軍穆占軍前平定三逆方畧巻三十

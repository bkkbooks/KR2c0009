body:
  text: 欽定四庫全書平定三逆方畧卷五十康熙十九年正月甲午命賞賚將軍王進寳趙良棟標兵上諭兵部將軍王進寳趙良棟標下綠旗兵既恢復漢中畧陽諸處又進定四川其酌量加恩賞賚將軍趙良棟奏復龍安是月初一日良棟兵從白水壩浮水渡江擊賊大敗之初三日追至青州石峽溝復敗其伏兵龍安府偽總兵姜應熊等詣軍門降我兵遂復龍安府丁酉命大將軍公圖海速調官兵赴將軍趙良棟軍良棟奏臣往者請於興安一路官兵分撥四千今到大安驛止有靖寇將軍標兵一千總督標兵一千臣不得已選寧夏兵四千五百人畧陽營四百人平陽營二百人甘肅撫標四百人西寧鎮標三千五百人共一萬一千帥之自大安驛同將軍王進寳進取四川上諭大將軍圖海部文到日即速遣趙良棟所調之兵不可有悞至興安一路官兵前奏調發四千今疏言僅得二千其缺悞之故令總督哈占核明以聞己亥命將軍烏丹鄂克濟哈帥師為王進寳等後繼大將軍公圖海帥師赴漢中上諭議政王等曰進取四川以滿洲大兵為後應相繼前發最為要策宜令將軍烏丹繼將軍王進寳軍之後將軍鄂克濟哈繼將軍趙良棟軍之後陜西已有將軍張勇提督孫思克巡撫杭愛巴錫等鎮守宜令大將軍公圖海帥師前赴漢中接濟進蜀諸軍糧餉駐鎮疆土鄂克濟哈率漢中滿兵馳往合之烏丹官兵均分統率以為王進寳趙良棟後繼轉餉源源不絶相隨而進丁未趣總督楊茂勲等速取重慶䕫州上諭議政王等曰屢命總督楊茂勲提督徐治都等泝江速上直取重慶䕫州今兵抵何處進止若何賊情形若何初未奏聞將軍趙良棟攻克白水壩青川招撫龍安去成都逼近恢復非逺將軍王進寳亦分兵三路於此月初旬進逼保寧逆賊王屏藩等困迫必各潰遁楊茂勲徐治都等宜乘機急取重慶䕫州𠞰禦逆寇其移檄嚴飭趣使進兵如遲延觀望悞此事機嚴治其罪以黄明為援𠞰總兵官授葉秉忠總兵官職銜先是馬承廕標兵餉匱鼓譟承廕報大將軍簡親王喇布即撥餉給發其後理事官麻勒吉等上言黄明葉秉忠在賊中俱係偽將軍今同來歸誠馬承廕授為將軍伯而黄明葉秉忠未授職銜致兵衆肆行葉秉忠己年老乞休無復異志惟黄明强悍為桞州官兵所懾服若不調用他所終恐為患上命授黄明為援𠞰總兵官率馬承廕標兵一千赴將軍莾依圖軍前隨大兵進𠞰雲貴葉秉忠授總兵官職銜許其休致庚戌命馬承廕標下設立五營先是上命馬承廕設立五營㑹𠞰雲貴至是大將軍簡親王喇布奏五營兵少應增援𠞰二營共為七營營各一千人上諭凡將軍標下無設七營之例馬承廕所屬官兵黄明率一千隨征雲貴外廣西省城甚重其更撥一千赴大將軍簡親王軍前馬承廕標下仍立五營兵五千叅將守備各官聴其選擇具奏甲寅授將軍烏丹王進寳進取機宜上諭議政王等曰將軍趙良棟等軍深入四川保寧重慶䕫州諸處速宜平定將軍烏丹王進寳等軍雖抵保寧必於蟠龍山相對立營果爾恐不能無稽時日今宜面蟠龍山分兵堅壘别遣一軍渡昭化江壁錦屏山下滿漢兵合勢以規取重慶䕫州則保寧諸處可以即定其趨總督楊茂勲提督徐治都等速即進兵提督王之鼎亦速入蜀㑹趙良棟軍乙邜將軍趙良棟奏復成都良棟率官兵自龍安𠞰賊是月初四日追至舊州明月江賊斷橋守江良棟遂督兵浮水渡江擊賊令總兵官王進才等分兩路直取成都而親率大兵繼進初八日至綿竹偽勁武將軍汪文元迎降十一日至成都二十里舖偽巡撫張文徳等率文武偽官二百餘人迎降成都遂復丙辰將軍王進寳奏復保寧十八年十二月進寳兵既復朝天闗廣元縣分三路趨保寧去城二十里據孔道而軍是月十三日賊二萬餘來犯進寳分遣官兵大敗之追𠞰至錦屏山破賊四壘賊退寳橋我兵又擊之奪橋斬闗遂入城賊渠王屏藩偽將軍陳君極自經死生擒偽將軍呉之茂等三人偽總兵郭天春等十七人保寧遂復丁巳命湖廣廣西諸將分路進𠞰上諭議政王等曰覽將軍烏丹王進寳等奏我兵大敗逆賊恢復保寧偽將軍王屏藩縊死呉之茂張起龍就擒將軍趙良棟前奏大敗逆賊恢復成都今正當賊衆動揺之際王進寳趙良棟宜同心協力惟期有濟大事𠞰撫餘賊綏輯地方商酌而行作何區畫仍令奏聞王屏藩等俱係賊帥王屏藩首級并呉之茂張起龍悉解來京諸路將軍等宜乘此時分路速進其移􅊾湖廣廣西諸處大將軍將軍總督提督等咸使知之己未命勇略將軍趙良棟為雲貴總督仍兼將軍上諭議政王等曰雲貴邊疆重地苗民雜處總督職任要重必得才畧㧞羣者方克勝任將軍趙良棟勇略茂著操守亷潔雖係武職精通文義若任為總督必能平定疆域撫綏軍民其改授雲貴總督仍兼將軍二月辛酉朔諭湖廣四川諸將進取機宜上諭議政王等曰今成都保寧皆已恢復乘此事機即宜速定雲貴四川既平湖南已屬内地順承郡王貝子凖達都統范達禮等盡率所部之兵泝江而上規取重慶順承郡王等即於重慶駐守將軍烏丹鄂克濟哈與趙良棟等同進取雲貴烏丹鄂克濟哈於順承郡王軍中簡精兵有馬者將之前行總督楊茂勲提督王之鼎駐守成都將軍王進寳駐守四川徐治都還軍守彞陵及荆州諸處命都統王國棟等𠞰禦海寇巡撫金􅖡奏海賊謝昌孝李積鳯等不時乘潮往來侵掠沿海之地請調平南王藩下都統王國棟等前往𠞰禦之上諭都統王國棟等身在省㑹不宜縱賊披猖王國棟與副都統尚之璋總兵官寗天祚等其率藩下舟師速圖𠞰禦賊退之後更有侵犯内地者王國棟等與巡撫金􅖡㑹商撲滅祖澤清父子伏誅澤清世受國恩歴官至髙州總兵官據城以叛及王師討之勢蹙乞降上貰其罪授鑾儀衛鑾儀使澤清不思宣力贖罪復行叛逆為官軍所執械送京師上命磔澤清并其子良楩於市諸子家口籍沒入官命總督楊茂勲等招徠四川流民户部上言四川久為賊據苛虐横征小民相率流亡請勅督撫急行招徠撫綏以副皇上愛民至意上命楊茂勲杭愛速赴任督理軍饟并招徠流民俾安生業毋悞農時乙丑命都督同知髙孟等為四川各路總兵官上諭兵部四川闗係重要新經恢復宜簡任素有謀勇之人髙孟王用予王潮海王進才才畧優長邊疆著績髙孟仍以都督同知授為鎮守四川川北等處總兵官王用予仍以都督同知授為鎮守四川松潘等處總兵官王潮海以副將授為鎮守四川重慶等處總兵官王進才以叅將授為鎮守四川建昌等處總兵官丙寅將軍王進寳等奏官兵復順慶進寳與將軍烏丹等既克保寧遂遣鎮守西安將軍佛尼勒總兵官王潮海等率兵取順慶我兵前進沿途招撫塩亭潼川中江南部諸州縣悉下之正月十八日抵順慶偽知府彭天夀等率衆迎降於是蓬州廣安州合州西充岳池營山渠縣鄰水儀隴遂寧蓬溪諸州縣相繼悉定丁卯命郎中蘇赫臣等運餉給大將軍順承郡王勒爾錦軍上諭議政王等曰今四川已定楊茂勲等所乘之船俱無所用運饟事闗重要郎中蘇赫臣員外郎噶爾薩其親督粮務即以此船載楚餉泝江運致順承郡王軍勿令斷絶有悞軍需命將軍莾依圖等帥師進取雲貴上諭議政王等曰成都保寧順慶諸府今巳恢復四川底定湖廣大兵今正分道進定雲貴其廣西滿州綠旗大兵休息日乆亦當乘機速進大將軍簡親王留每佐領兵一人於桂林其餘官兵王盡帥之往屯柳州大將軍平南親王可駐守貴縣將軍莽依圖馬承廕都統馬九玉總督金光祖等可各率所部官兵并酌調平南親王藩下官兵分道進取雲貴戊寅提督徐治都奏復䕫州治都兵抵巫山縣偽將軍楊來嘉等擁衆拒守我兵擊敗之乘勝長驅是月初一日至䕫州偽將軍劉之衛率偽總兵瞿洪陞等出降遂復其城提督徐治都奏譚洪率所部官兵降譚洪遣子偽左將軍天秘齎辨明脅從疏及偽晉國公勅一廣威將軍印一偽文武官印十九偽劄牌八十二并偽官兵數目繕冊送治都所是月十三日洪率子姪并駐守雲陽偽總兵地晉地升等詣軍門降庚辰趨將軍烏丹等速進雲貴上諭議政王等曰今四川底定大兵宜速赴重慶進取滇黔否則逆賊復犯重慶亦未可料其移文烏丹鄂克濟哈即馳赴重慶精簡士馬進取雲貴命安置四川投誠官兵將軍總督趙良棟奏自恢復龍安以來投誠偽將軍一人偽總兵二十四人偽副將等官三百餘人偽巡撫一人偽司道府㕔州縣等官百餘人俱應隨宜安挿庶免不虞上諭投誠官兵内可簡總兵官六員設兵三千人即隨該將軍進定雲貴其餘皆散為民文官内堪用者暫行委署不堪任者旗下官員令其回旗呉逆所屬之人察明暫留成都如係各省人民悉遣還本籍辛巳命理藩院侍郎達哈塔等核䝉古軍功理藩院兵部㑹奏福建諸處凱旋外藩䝉古公台吉官兵陜西凱旋鄂爾多斯王固嚕等三旗貝子台吉官兵功績均應議叙若令俱至京師人數衆多恐致糜餉宜俟草青時令齊集適中道理藩院遣官四員兩路分往察核軍功案籍照例議叙上諭議叙軍功事闗重要其令理藩院侍郎達哈塔至彼察核兵部員外郎杜稜偕往平定三逆方畧卷五十

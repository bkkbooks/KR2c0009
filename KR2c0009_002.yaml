body:
  text: 欽定四庫全書平定三逆方略卷二康熙十三年正月戊辰遣都統覺羅巴爾布護軍統領伊勒都齊額司泰率護軍驍騎先赴荆州巴爾布等將行上諭之曰頃侍衛阿爾賽自荆州馳還奏稱彼土鄰境居民震恐爾等兼程馳赴能早至荆州則兵民可安然勿以行急致使馬疲仍宜酌量以行儻楚省告警可簡肥馬速進俟到荆州之後即諸將領及緑旗官兵馬匹足供爾兵騎乘亦可保固地方矣時前鋒統領碩岱領兵已起行傳諭亦如之命副都統科爾崑移駐西安先是科爾崑奉命駐防太原尚未行至是上以西安官兵既調往四川故有是命隨諭總督哈占曰今副都統科爾崑領兵將往西安俟將軍赫業等至漢中與將軍瓦爾喀同進四川如漢中必須守衛或令科爾崑之兵駐鎮或另行遣調爾可同科爾崑與西安副都統酌議以行尋又諭將軍瓦爾喀曰朕思賊兵必犯巴蜀爾所部官兵為數無多應戰應守宜熟籌以行爾須兼程前進當即令將軍赫業瑚里布等率領大兵隨後為爾應援又諭將軍赫業瑚里布瓦爾喀等京城所發官兵聽赫業瑚里布統轄西路官兵聽瓦爾喀統轄兩軍會合時毋得各分彼此致有不睦須同心協力以副委任之意癸酉命提督桑額領兵援沅州先是月朔總督蔡育榮奏賊兵已抵清浪逼近沅州亟請大兵馳救上因諭育榮及鄂善桑額等聞賊兵逼近沅州爾等前曾屢奏已調遣兵官徐治都李之蘭等率兵應援何至今未報到沅可速遣往督提俱在荆州沅州要地豈可獨委總兵官崔世祿一人應令桑額領兵疾馳赴沅協同固守蔡育榮等亦宜酌量以行大兵不久即至臣謹按沅州為滇黔門户堅守沅州賊可坐困是時督提俱在荆州誠使分兵捲甲以馳援世祿姑勿與戰而憑城據險遏其闌出之路以俟大師之至人心益固而勢自倍矣聖明洞鑒深以獨委世祿為失䇿已早知其有他變而沅州尋陷果如上諭自是諸將稟成謨無不捷而違則輒誤如神之智豈師武臣所能及萬一哉宣諭京師居民上諭兵部近聞京城小民驚恐欲於城外西山處所遷移逃避殊非朕撫安百姓之意前已有旨止令緝獲假稱朱三之楊起隆與良民毫無干預並無驅逐居民令移居城外之事即昨暫閉城門因有人舉首楊起隆潛藏大城之內故行嚴緝非有他故爾百姓勿妄聽訛言致生疑慮宜各安生業貿易居住如平時爾部即轉行五城御史順天府宛大二縣作速刋示通行曉諭江南江西總督阿席熙請發兵援湖廣止之阿席熙請調所屬官兵以備楚省告警即遣發應援上諭大兵不日抵楚兩省官省不必遣發江南沿海瀕江甚屬要害俱應有備其江西水陸皆與楚閩接壤尤宜固守阿席熙其飭令鎮將整頓兵馬於封疆扼要所在加意偵探嚴防臣謹按時閩逆尚未蠢動兩江晏然分其兵以援楚似便而睿慮周詳誠以江西密邇楚閩固不可以不豫防而江南財賦甲天下國用之所取資嚴兵以守所以安民心而壯軍實也厥後江西擾亂浙東亦弗寧而江南一隅獨屹立其間雖賊薄徽州旋即潰散民得免兵革竭其力於畎畝以佐公家而諸道之供億大半賴之豈非其兵足以衛民而不輕於調發之所致哉廟堂神算蓋相天下地利之所急而安定之於未然有如此乙亥大將軍順承郡王勒爾錦帥師之湖廣將軍赫業帥師之四川先是勒爾錦等將行上面諭之曰行軍之要惟得民心為至要耳所過冝厚加撫恤嚴禁侵掠誠能無犯及秋毫則百姓獲安矣至吾兵士暴露良苦亦宜拊循其進止處所謹設斥堠善自周防勿懈也南方卑濕念吾軍士逺役或不能其水土猝有疾病可致良醫豫善藥好護視之有能立勳績者即向所司支給賞賚勿致踰時是日上御太和殿內閣大學士捧敕印授勒爾錦敕曰兹以吳三桂背恩反叛煽亂雲貴爰發禁旅聲罪致討特命爾多羅順承郡王勒爾錦為寧南靖寇大將軍同多羅貝勒察尼都統鄂鼐覺羅巴爾布覺羅珠滿伯伊里布護軍統領伊勒都齊額司泰前鋒統領碩岱等統領官兵前往征勦凡事與貝勒察尼等酌定方略會議而行其進勦事宜緩則奏聞而進如有急應進兵機會或有一路或應分路與衆商確進取仍將進兵情形具疏奏聞毋謂自知不聽衆言毋謂兵強輕視逆寇嚴加偵探毋致疏虞抗拒不順者戮之有先被賊脅從大兵一到即時迎降者俱免誅戮有能擒殺賊渠投誠者分别升賞須嚴禁兵將申明紀律凡經過地方毋得搔擾百姓歸順良民加意撫恤務體朕定亂救民之意其行間將領功績及重罪俱察實紀明彚奏各官有犯小處當即處分至於驍騎校護軍校以下無論大小罪過俱商酌徑行處分收取雲貴勦蕩逆賊地方平地之後酌駐兩省要地具奏候旨爾等受兹重任宜益殫竭心力蚤奏膚功欽哉內閣學士捧敕印授赫業敕曰兹以吳三桂背恩反叛煽亂雲貴爰發禁旅聲罪致討特命爾都統赫業為安西將軍護軍統領瑚里布為副將軍同署前鋒統領穆占副都統延布統領官兵由漢中府至四川會同將軍瓦爾喀等進勦緩則奏聞而進如有急應進兵機會與衆商確即行仍將進兵情形具疏奏聞凡事與將軍瓦爾喀署前鋒統領穆占副都統延布會議而行毋執已見不謀而動毋謂兵強輕視逆寇嚴加偵探毋致疏虞抗拒不順者戮之有先被賊脅從大兵一至即時迎降者俱免誅戮有能擒殺賊渠投誠者俱與分别升賞須嚴禁兵將申明紀律凡經過地方毋得騷擾百姓歸順良民加意撫恤務體朕定亂救民之意其行間將領功罪俱察實紀明彚奏有犯小過者當即處分至於驍騎校護軍校以下除死罪外其餘大小罪過俱與衆將商確徑行處分收取雲貴勦蕩逆賊地方平定之後具奏候旨爾等受兹重任宜殫竭心力蚤奏膚功欽哉勒爾錦赫業跪受畢上親行告類之禮次祭旗纛畢還出西長安門王以下副都統以上俱令乘馬馳而過上目送之復遣內大臣禮兵二部大臣餞於郊外己卯發察哈爾兵駐防兖州副都統瑪哈逹往駐兖州至是添發察哈爾前鋒護軍驍騎兵往與瑪哈達同防守庚辰命大將軍順承郡王勒爾錦遣兵先赴荆州總督蔡育榮奏至稱賊于十二月二十九日陷沅州總兵官崔世祿被執澧辰路梗楚疆危急上覽奏令順承郡王於所領兵內每佐領先出驍騎二名以都統一員率之繼都統巴爾布之兵速往荆州并令都統巴爾布護軍統領伊勒都齊額司泰等於所領護軍內簡選肥馬以護軍統領一員率之繼前鋒統領碩岱之兵並馳赴荆州命都統尼雅翰為鎮南將軍駐防安慶調往駐兖州副都統瑪哈逹俱往安慶其前發兖州察哈爾官兵以副都統席布領之亦赴安慶癸未命副都統根特巴圖魯駐防兖州諭兵部宣諭湖廣軍民時大將軍雲集楚省上因諭兵部近因吳三桂背恩反叛已遣大兵前往征勦聞楚省百姓有先驚避者輕離家室恐致失所朕心深為憫念向來大兵紀律嚴明所過並無騷擾今寧南靖寇大將軍啓行朕復面加誡諭務令秋毫無犯安輯地方逆寇煽亂不過一隅大兵到日立見蕩平該地方軍民人等俱係朕之赤子遣發大兵原以衛民何必妄生驚恐著地方官廣行宣諭俾其各安生理勿致流離以副朕定亂安民之意爾部即行湖廣督撫提鎮等官通行曉諭甲申調德州諸軍從將軍尼雅翰赴安慶德州滄州及順義等十處駐防滿兵四百名調集德州命尼雅翰將之尼雅翰等尋奏請增兵竟往武昌俟王師克定湖廣臣願率兵從廣西進取議政王貝勒大臣集議令尼雅翰席布仍領德州等十二處官兵往兖州與瑪哈逹會兵分而為三擇馬肥者尼雅翰席布領之先往安慶其察哈爾兵亦同往餘兵以根特巴圗魯領之防守兖州議入報可尼雅翰臨授之敕印令瑪哈達席布同預參贊軍務丁亥命江寧將軍額楚鎮海將軍王之鼎遣兵駐防安慶侍衛夸塞自荆州馳還奏偏沅巡撫盧震棄長沙奔嶽州上諭安慶居上遊為江南要地令將軍額楚遣副都統一員領滿兵千名由陸路往王之鼎於漢軍暨緑旗兵內合選千名遣副都統一員酌領沙船由水路往尼雅翰將德州滄州及瑪哈逹之兵共選六百人速抵安慶即以尼雅翰統之命都統覺羅珠滿將兵速赴武昌上諭珠滿聞巡撫盧震已棄長沙奔向嶽州朕念武昌重地不可不豫為防守爾可率兵急往如有賊至務期保固地方賊勢儻衆勿輕與戰或武昌無警即於嶽州以北水路要地駐防又諭大將軍順承郡王勒爾錦比聞長沙巡撫盧震棄城向嶽州來朕念武昌為省會要地已令都統珠滿率兵急往防禦王將所部護軍每佐領撥一人速赴珠滿軍前王師抵楚後如武昌無事可與貝勒會同將珠滿之兵酌量調遣又諭副都統瑪哈逹俟將軍尼雅翰至兖州選兵去後爾將所餘官兵分領其半隨往江寧與將軍額楚同守其餘官兵留與參領噶篤渾沙納哈仍駐兖州馬若疲瘦則向河漕諸臣辦取船艘星夜速往其馬仍由陸路前去毋至遲緩戊子命副將軍瑚里布等速進四川先是上諭瑚里布署前鋒統領穆占爾等率領前鋒護軍兼程疾赴西安或軍中馬有疲乏者即取西安緑旗官兵馬匹馳行儻更不足取滿洲官兵馬匹即以爾等所留馬補給之可追及將軍瓦爾喀繼進四川與瓦爾喀合兵之後何處設防何處駐劄爾等相機區畫如有可進雲南之機必俟將軍赫業定議以行至是四川巡撫羅森遣人奏言蜀省軍心頗懷攜二上恐有意外之虞隨令瑚里布穆占輕騎速進并諭赫業瓦爾喀副都統佛尼勒等大兵進川之後宜一切加意毖慎勿得玩忽其軍中行止當謹嚴斥堠勿墮詭計又諭總督哈占以秦中緑旗官兵當拊循得冝更加鼓勵兵將保障地方命海澄總兵官馬化麟提督四川軍務時四川提督鄭蛟麟補授鑾儀衛使以化麟代之尋以道梗不得進命暫留荆州軍前申諭京師居民上諭兵刑二部近自逆犯楊起隆詐稱朱三煽惑愚民潛謀不軌其黨相繼緝獲俱經審明重者正法其株連者業行省釋除首逆楊起隆張子房金玉環鄭得勝仍嚴緝務獲外其餘黨與概從寬免緝以後著改行從善恪遵法紀勿得自干憲典軍民人等俱宜各安生業不得聽信訛言自生疑懼旁人亦不得妄行搜拿首告借端嚇詐擾害善良爾二部即出示通行曉諭己丑前鋒統領碩岱兵抵荆州命副都統佟國瑤為鄖陽總兵官上諭兵部鄖陽地介三省中多曠土山谷扼塞姦民易於嘯聚恐有竊伏其間與賊應和者又逆賊或乘間侵犯令副都統佟國瑶為總兵官駐防彈壓臣謹按鄖陽地曠而險皇上洞悉形勢設使置鎮使三省犬牙相錯之區屹然有重防所以洪福後雖內叛尋至奔逃賊始終不敢窺鄖况荆襄有屏蔽之勢雲夔有控制之形其資捍衛者更大也鄭蛟麟談洪羅森吳之茂以四川叛從賊時陜西總督哈占奏至稱四川總督鄭蛟麟與川北總兵官談洪合謀反叛洪為偽川北將軍蛟麟為偽總督將軍川湖總督蔡育榮尋亦馳奏四川巡撫羅森總兵官吳之茂背恩從賊聲言兵一出漢中一下夔州隨調尋陵總兵官徐治都仍回原汛以備不虞庚寅命都統席卜臣為鎮西將軍往守西安上諭議政王等大兵進𠞰四川秦省為接壤要地其授都統席卜臣為鎮西將軍接濟大兵保守西安等處令副都統巴喀德業立偕往命原任浙江總督趙國祚提督江南軍務阿思哈尼哈畨王永譽提督河南軍務時江西河南各增設提督一員以資調發應援故也辛卯遣近侍納爾泰至荆州時上命納爾泰傳諭總督蔡育榮鄂善提督桑額等近所屬地方雖有淪陷爾等不必懷憂朕聞爾等戮力共保荆州甚為可嘉俟王師之至恢復疆宇是即爾等之功前鋒統領護軍統領續當即至或馬匹疲瘦可以馬助之芻茭之屬豫儲勿誤提督桑額總兵官馬邦寧領兵赴常德壬辰録用投誠官兵上諭兵部各省投誠官兵有堪效力者準入督撫標下量材録用命副都統科爾崑領兵赴漢中兵部奏先奉上命副都統科爾崑兵駐防西安今鎮西將軍席卜臣已奉命往西安行守科爾崑之兵應前往漢中并遣漢軍副都統吳國禎率領漢軍每佐領兵二人以益科爾崑之兵自後繼進上從之又諭將軍瓦爾喀副都統佛尼勒爾等久歷戎行素稱諳練朕可無西顧之憂但大兵至蜀或緑旗已叛官兵或吳逆偽屬官兵有來降附者隨宜撫納仍應密為防間其嚴設巡哨整飭營壘爾等自能周知無庸冉諭兵部郎中託必泰前奉使往蜀今鄭蛟麟既叛度必羈遲不還爾等或令人持書往諭大略言爾雖反叛朝廷猶念從前效力著有成勞一時出於迫脅固不可知爾在京子孫家産並未按法收繫可將託必泰速行遣還否則大師壓境克復城池將悔莫及矣至緑旗兵叛官兵相機招撫在爾便宜行之平定三逆方略卷二

body:
  text: 欽定四庫全書平定三逆方畧巻五十三康熙十九年八月庚申命量撤福建大兵上諭兵部厦門金門諸處悉設兵防守福建大兵宜量行撤還將軍拉哈達副都統馬思文率千人守福州副都統吉勒塔布沃伸巴圖魯率千人守漳州兩軍悉令拉哈達統轄餘兵一千令尚書介山侍郎呉努春率之回京詔定福建經制兵上諭兵部福建瀕海要區總督提督標下可各設五營兵五千人巡撫標下設二營兵千五百人至通省防守兵依舊額畱五萬一千七百五十人餘一萬九千九十五人悉行裁汰提督駐鎮海澄其銅山厦門諸處分設總兵官副將鎮守見在水師畱二萬人汰其餘五千甲子勅將軍烏丹等取雲南先是議令大將軍貝子彰泰等由沅州取貴州大將軍簡親王喇布等由廣西取雲南將軍烏丹趙良棟㑹兵取遵義後亦進貴州至是彰泰以貴州地方𥚹小難以得糧為言上諭將軍烏丹等得遵義後毋經貴州即進取雲南大兵進𠞰之期定議奏聞後即檄湖廣廣西大將軍將軍等如期㑹舉戊辰詔責將軍總督蔡毓榮毓榮請特降勅㫖招撫逆賊呉世璠兵部議從其請上諭閣臣曰呉世璠為賊渠魁恃其險阻抗拒官兵殘害生民罪惡重大朕勅炳如日星豈可輕頒且賊勢迫自行納欵如未至窮蹙雖招徠何益況前招撫賊將呉應麟胡國柱勅内具有曉諭世璠歸誠其功更大之語蔡毓榮不圖早滅逆寇乃欲降勅招撫不揆事理率意妄奏兵部竟議准行均屬不合此疏可付兵部令該部密行嚴飭臣謹按逆賊呉世璠乃三桂孽孫負固抗順毒害百姓罪大惡極誠神人所共憤天地所不容故其他黨附之徒或可原情受納若世璠者斷不可輕議撫納稍行寛貸者也蔡毓榮闇於大義請降勅招撫世璠皇上念渠魁不誅無以為亂臣賊子戒況我大兵齊進剪滅何難乃不允所請嚴飭毓榮未㡬我兵果奪賊諸險直薄滇城世璠旋即授首羣醜盡殱人心靡不稱快葢惟我皇上能正天討彰國法所以聲靈赫濯薄海内外罔不寧謐廟謨深慮毓榮軰焉能揆測萬一也哉己巳詔諭廣東藩下兵上諭兵部前因尚之信屬員張永祥等首之信諸不法事朕欲明其真妄故令之信來京非以永祥所言皆真必欲治之信以法也平南藩下官兵本朝豢飬四十餘年世受國恩最為深厚初無欲行解散之心且諸官兵尚屬尚之孝今之孝固儼然在京何嫌何疑以致逃避嗣後諸官兵宜常念國恩釋去嫌疑各保身家妻子以副朕恩養保全至意其令將軍頼塔侍郎宜昌阿等宣布朕意咸使聞知命大將軍簡親王喇布分兵守廣州總漕帥顔保率兵往鎮南雄韶州上諭兵部廣東省會地闗重要合計廣西見有大將軍簡親王兵及將軍莽依圖兵與都統馬齊等率往之兵毎佐領共有二十八人今宜檄簡親王令簡軍中精騎毎佐領五人俾副都統博霽率之馳赴將軍賴塔軍協守廣東省城并檄馬齊速赴簡親王軍至所撤福建兵已就道者令其來京如未啓行仍暫留福建總漕帥顔保見在江西吉安令率所部速赴廣東視南雄韶州何地𦂳要酌量駐鎮以安輯人心壬申趨大將軍簡親王喇布進兵上諭喇布曰聞南寧距雲南邊界路僅七站向因逆賊尚之信馬承廕背叛或未可輕進今皆已就撫復何所瞻顧而遲延也見在廣西滿兵毎佐領幾三十人宜選精强有馬者各十人益以緑旗官兵協力進𠞰賊可立破矣王其速圖之進兵之時令巴爾堪哈爾噶齊為夸蘭大責以軍前報効壬午詔以都統勒貝為鎮南將軍上諭兵部頃聞將軍莽依圖以疾卒於軍中統兵重任不可久懸其以都統勒貝代莽依圖為鎮南將軍率師進討閏八月己丑授諸路將軍大臣進取雲貴招撫運餉機宜將軍總督趙良棟奏偽將軍海潮龍納欵繳送劄印欲聨絡迤西一帶身任前驅揺動滇中在此一舉請勅諸路將軍大臣速發官兵粮餉至所指之地上諭今進取雲貴為期已近將軍烏丹率兵進瀘州取合江仍兩路進取雲南湖廣大將軍將軍總督等宜速取貴州大將軍公圖海等趨所調陜西兵往四川海潮龍感戴國恩率衆獻地先機効順可嘉授為懷忠將軍令統所部為前導破賊至賊帥張國柱李本深王㑹髙啓隆俱係舊臣或一時廹脅降賊亦未可定宜如招馬寶例書赦罪勅馳驛發趙良棟相機招撫陜西四川督撫等速趨運粮餉毋悞兩路大兵進𠞰機宜辛邜命都統馬九玉為將軍統福建藩下兵和碩額駙耿聚忠奏福州府舊有旗兵三千今調千人駐防杭州其親戚及未披甲巳退甲閒丁甚多彼等或移或留伏候上裁上諭尚書介山率兵還日即攜調杭官兵閒散人口留駐杭州以馬九玉為將軍統福州府靖南藩下官兵侍郎呉努春且勿來還於九玉未至之先暫行管理乙未申諭諸路將軍大臣上諭兵部今四方悉就蕩平惟滇黔餘孽尚爾稽誅前經㑹議各路官兵俱於八月内進𠞰兹師期已屇士馬飽騰正宜分路並進奮勇長驅掃除殘寇以靖邊圉爾部其速傳諭湖南四川廣西諸大將軍將軍督撫提鎮等整頓兵馬速行進𠞰勿得借端推諉延緩時日有逗遛不前者即加重處又聞各路統領綠旗將帥不恤軍士令為滿州大兵葢房秣馬及私行役使恣意虐害以致兵卒苦累如桑額標兵逃亡千餘皆由於此不思為將者與士卒甘苦相同加意愛養方可責其用命罔惜卒伍惟便私圖貽悞軍機深為可惡爾部即通行嚴飭嗣後仍蹈前轍指名叅奏從重治罪丙申命將軍總督蔡毓榮軍中機事皆闗白大將軍大將軍貝子彰泰疏言蔡毓榮奉有調遣漢兵之㫖今進取貴州滿漢既已合兵若各自調遣彼此不相知㑹恐於事機無濟上諭蔡毓榮進取貴州凡屬軍機俱闗白大將軍商酌行之癸邜尚之信等謀作亂伏誅之信性凶悖酗酒嗜殺呉三桂反之信欲其父可喜從賊迫之不已可喜憤死之信遂降賊及其歸順也仍懷兩端上數命進兵潮州湖南之信不行永興危急亦坐視不救後雖出師輒自引退總兵官時應運水師逰擊張瑜出𠞰賊之信俱密止之令頓兵不進及之信協𠞰廣西復與之璋等謀令以計調還廣州冒兵餉擅殺無罪人甚至希邀異數毁斥乘輿於是藩人張永祥張士選來京告其諸不法事之信母舒氏胡氏都統王國棟總督金光祖巡撫金儁亦相繼䟽列其罪上遣侍郎宜昌阿與國棟等謀密檄總督金光祖提督哲勒肯總兵官班際盛副都統金榜選等執之於武宣之信具䟽辨上不忍遽寘於理命至京對簿之信謀益急令其弟之節等隂紏黨與誘殺國棟欲為亂將軍頼塔急帥兵圍之之節等就擒頼塔等遂訊鞫悉得其狀而舒氏胡氏復飾言之信無謀叛迹前告變疏皆國棟等偽為也事聞下議政王貝勒大臣集議於是議政王等奏之信當謀反律母母弟凡同謀者俱棄市其諸弟之孝之璋之隆等雖不同謀法應禠職枷責上諭平南親王尚可喜航海歸誠効力行間鎮守粤東著有勞績及呉逆叛堅守臣節不肯從逆為逆子之信所逼憤恨殞命朕毎念及深為憫惻其妻舒氏胡氏從寛免死并免籍没尚之孝尚之璋尚之隆等俱從寛免革職枷責尚之信不忠不孝罪大惡極法應立斬姑念曽授親王從寛賜死餘悉按律正法至是諭至廣東之信等遂伏誅丁未命䕶軍統領佟佳等率兵赴四川總督哈占率兵趨永寧都統范達禮率兵趨重慶諸路將軍大臣分道進征上諭議政王等曰四川漢中滿洲大兵雖為數不少今當進定雲貴之際宜添發大兵在京滿洲䝉古毎佐領下各䕶軍二人驍騎四人八旗漢軍共撥千人令䕶軍統領佟佳副都統得爾達莫達率赴四川既至將軍烏丹鄂克濟哈等酌量分為二路此兵未到之先四川萬一有警大將軍公圖海便宜調漢中滿漢兵往援酌調西安之兵赴漢中檄到總督哈占即簡本標及别部精鋭帥之馳赴永寧㑹烏丹軍凡綠旗兵俱令哈占統轄同心協力進定雲南都統范達禮率所部兵星赴重慶如兵少簡將軍噶爾漢兵率之前行大將軍貝子彰泰將軍蔡毓榮勒貝馬九玉總督金光祖等各路應期速進漢軍都統不必自京别遣其兵即令都統海爾圖率往原任總督張長庚布政使劉顯貴軍中著有能聲其以張長庚為副都統劉顯貴為夸蘭大後凡委署夸蘭大叅領等官於滿洲䝉古漢軍廢員内察精壯者以聞佟佳等啓行上諭兵部曰䕶軍統領佟佳等率兵抵懷慶時若由潼闗經西安出棧道其途甚逺宜自懷慶由鄧州出商州直赴漢中此路險易逺近可行與否確探明白並開晰道里報部甲寅命都統馬竒率兵趨南寧時都統希福奏南寧僻處邊疆兵丁缺馬今専從一路深入陸途險逺且無水路恐悞大事上諭今進定雲貴期㑹已近廣西兵為數不少大將軍簡親王等以栁州南寧桂林駐兵之馬通融給將軍勒貝軍毋悞進𠞰機宜都統馬竒帥兵出京已久報稱方至永州其趨馬竒速赴南寧送往廣西之馬并移文嚴趨之平定三逆方畧巻五十三

body:
  text: 欽定四庫全書平定三逆方略卷十八康熙十四年八月戊午命大將軍貝勒洞鄂等接應漢中兵總督哈占奏前聞將軍席卜臣等兵出漢中屯洋縣隨遣人偵探今據報席卜臣果離漢中但不知歸自何路臣已啓知大將軍貝勒等一面􅊾將軍佛尼勒停止進兵上諭佛尼勒分兵六百與駐守寶雞副都統阿爾祐兵共為一軍令阿爾祐統轄嚴防棧道諸險要餘兵著佛尼勒鄂泰等領至西安如得席卜臣等歸路確信即以兵往迎大將軍貝勒洞鄂等見統大兵駐秦省作何接應席卜臣等俾全軍而歸與總督哈占等籌度以行己未詔責總督哈占哈占奏興安叛兵已與蜀冦合攻陷舊縣關將逼西安南山郡盜又分出各口乞敕大將軍貝勒洞鄂將軍畢力克圖等速發兵應援見駐河南副都統龔圖亦乞遣至上責之曰始王輔臣叛朕以蘭州要地關係三邊令哈占發兵鎮守哈占稱西安要地不便發兵致蘭州諸處淪陷三邊動搖繼哈占復以西安要地屢疏請兵因將荆州大兵陸續調赴西安遂致荆州彛陵兵力單弱又延安為諸路要衝曽命鄂善周有德等駐守哈占又誑奏鄂善等兵少留之西安致延安陷沒哈占封疆大臣每當議事不一體籌度但于己身所在常欲增兵自衛不求速定地方貽誤匪小今又稱叛兵與蜀冦合欲調諸將軍兵悉赴西安是哈占但知有西安置他處于度外矣且蜀冦何能便與興安叛兵合即至西安不過因諸將齊赴平涼故為聲揚欲亂我軍心分我兵勢耳諸將當益急攻平涼勿得稍緩輔臣未滅西安潼關亦宜增兵勦禦近理藩院郎中瑚什巴調蒙古兵赴太原將軍烏丹可率所部兵速赴潼關與根特鄂爾博西等協守又蒙古鄂爾多斯土默特兵見駐榆林著理藩院員外郎拉篤祐率此二部兵速赴西安若鄂爾多斯兵必不可行即留與總兵官許占魁統領仍駐榆林己卯遣和碩額駙耿聚忠齎敕諭耿精忠敕曰皇帝敕諭耿精忠爾祖父宣力纍朝勳猷茂著俾世襲王爵格外加恩逮爾父沒令爾襲封仍鎮閩疆方謂爾克紹前猷殫忠報國不意爾反為吳逆狡謀所惑蹂躪土地戕害生民朕猶念爾祖父前功不忍遽絶將爾在京諸昆弟及所屬人員槩行寬宥給還官職恩禮如常今大兵雲集事勢昭然爾自知之朕復念爾變亂必有所由或為逼迫所致故復下敕書遣爾弟聚忠齎至軍前明諭朕意爾若悔罪率衆歸誠當復爾王爵仍舊鎮守所屬人員職任如故兵民人等照前安插儻能剿除海冦共奏膚功仍優敘賞賚使臣周襄緒等為爾羈留或别有故朕不介意朕以誠心待天下斷不食言爾毋聽信煽惑之言終懷疑懼負朕始終保全至意又諭兵部曰今遣耿聚忠齎敕赴大將軍康親王傑書軍前招撫耿精忠其招撫事宜王與聚忠悉心謀議相機速行俾閩省生民早離水火爾部即移文知會辛巳大將軍康王傑書奏官兵克黃巖將軍貝子傅喇塔遣副都統吉勒塔布等自土木嶺進兵是月初四日於半山嶺大敗賊衆乘勝進指黃巖縣賊將曽飬性等棄營據黃巖拒守傅喇塔進兵圍其城養性乘夜突圍走溫州餘賊開門降遂復黃巖九月丁亥設湖廣援勦二營大將軍順承郡王勒爾錦奏賊竪立營壘掘壕塹設鹿角挨牌我軍騎兵不能衝突必設緑旗精兵七千人造輕箭簾車二百輛炮車一百輛熟鐵炮一百具量配兵丁推向賊營填其壕擲火藥以燒鹿角挨牌用炮攻擊相賊形勢滿兵繼進則逆賊可滅地方可復如允臣所奏乞將此七千兵分為援勦二營設二副將統之上諭大兵與賊相持日久則軍糈日糜民生日困今大將軍順承郡王勒爾錦等既請設緑旗兵造簾車等項應如所請其副將等官聽會同該督酌選才能補用著工部精簡交槍二千五百桿遣賢能官員二人馳驛速送荆州軍前尋令二營援勦兵俱聽總督蔡育榮統轄命給將軍席卜臣兵馬匹器械席卜臣奏本年二月兵糧匱竭臣等取食賊麥以至七月又已罄盡計欲保全大兵仍于七月十七日自漢中出沿路擊賊以八月初六日至西安見在官兵俱無馬匹器械難以進取上諭席卜臣等兵自漢中出沿途擊賊馬匹器械俱盡著陕西督撫動正項錢糧買馬人給一匹并整頓器械令其鎮守西安戊子趣大將軍貝勒洞鄂等亟攻平涼洞鄂奏王輔臣啓臣云前疏未奉聖旨乞須赦午門仍遣威望大臣受降竊謂皇上既屢降敕諭招撫輔臣乞更須諭開示本末上諭前屢下明詔王輔臣果悔罪耒降當宥其前罪頃秦州諸處官兵來降悉赦其罪輔臣安有不知且先遣祝表正尚未歸豈宜復遣大臣彼乞降詐也特緩我師為茍延日月計耳爾等急宜攻取平涼若輔臣即投誠勿加誅戮再行請旨慎毋因其詐降以誤進取之機若不即投誠其以朕屢降恩赦而彼不悔禍之意布告官吏軍民使知所以不得不舉兵加誅之故臣謹按先是上欲速拯兵民之困屢降德音招王輔臣而輔臣觀望兩端不即歸正至是復詭計乞降兾緩我師以望逆黨救援洞鄂不察賊情遽為代請賴皇上聖明察其狙詐欲以兵威大創之因令洞鄂急攻平涼勿因其偽降而誤進取之機乃洞鄂憚于攻取依違如故皇上隨遣大將軍圖海督率將士薄城一戰而輔臣果震怖窮蹙束手來歸宸謨料敵神明如此逆賊亦安所施其狡計哉丁酉命理藩院郎中瑚什巴以蒙古兵駐太原瑚什巴等奏簡蒙古四子烏喇特茂明安三部落兵一千進殺虎口於八月三十日至太原上即命瑚什巴同蒙古領兵都統管轄鎮守太原庚子諭大將軍順承郡王勒爾錦詳奏彛陵情形先是防守彛陵貝子凖達因彛陵兵單請兵于勒爾錦遂發滿洲蒙古緑旗兵一千八百給貝勒察尼靖冦將軍印率赴彛陵月餘並無音問上諭兵部曰貝勒察尼往彛陵月餘曽否與賊戰即戰勝負若何賊情若何爾部其移文順承郡王令其速奏後順承郡王勒爾錦奏曰貝勒察尼於八月十九日至彛陵與臣書云彛陵城外東北有鎮荆山賊立營掘壕立樁堅壁以守難於進攻近偵知我兵日增隄備益嚴但思冦糧取給湖南必由長江轉運若斷此糧道别無轉運之所賊必飢困今惟俟兵卒與船耳臣隨將荆州所有划子船一百四十隻於本月二十五日發往提督佟徽年兵亦於十月初一日遣行命大將軍安親王嶽樂速取長沙大將軍簡親王喇布往鎮江西上趣嶽樂進取長沙嶽樂奏俟內大臣希爾根軍自饒州至創擊石硤逆賊殱貴溪諸冦撥兵守要地得便即進長沙上諭之曰賊渠三桂也今不早滅雖江西福建之賊盡除於事奚益安親王嶽樂其量撥官兵固守江西乘冬月速取長沙大兵進長沙後諸賊乘間竊發恐江西復擾其令簡親王喇布率江南兵二千赴江西以內大臣希爾根為副將軍與簡親王協同鎮守副都統額赫訥率在兖州盛京烏拉兵一千速赴江寧至即以兵付將軍哈爾噶齊令駐守江寧而身從簡親王往江西參贊軍務布顔赴兖州用鎮東將軍印管轄蒙古兵尼滿為署副都統赴江寧參贊哈爾噶齊軍務署副都統額思赫赴池州壬寅詔責大將軍貝勒洞鄂等洞鄂奏王輔臣報書言彼所遣官王起鳳赴省已逾兩月尚未遣還故士卒皆懷疑畏乞皇上再赦輔臣併所屬官兵之罪仍令駐守平涼遣王起鳳還則彼無不傾心來歸今大兵僅足圍平涼不能堅密儻賊勢窮突圍難保輔臣不脫去也疏入上責之曰逆賊王輔臣誘緩大兵其計顯然貝勒洞鄂不速率兵勦滅反請寬宥其罪若免輔臣罪仍令駐守平涼假使川賊侵秦州興安賊逼西安我兵勢必分路進剿當此之時貝勒洞鄂能必其不乘隙復叛耶今大兵雲集已困孤城乃云賊勢窮突圍難保其不脫去蓋恐王輔臣他日潰遁故設此辭預為地耳若輔臣果難圍困剿滅何以貝勒洞鄂獨言之而貝子公參贊大臣不言是獨貝勒洞鄂一意專主招降也貝子公參贊大臣皆朕所倚任若灼見城不可圍冦不可滅何以不據實陳奏凡事惟貝勒洞鄂退縮之意是從至今不攻取城池尚復何待行軍重事豈獨付之貝勒一人耶貝勒貝子公參贊大臣等速行圍城務期勦滅逆賊王起鳳著遣還平涼平定三逆方略卷十八

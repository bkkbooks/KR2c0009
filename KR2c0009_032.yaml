body:
  text: 欽定四庫全書平定三逆方略卷三十二康熙十六年八月丁未命遣猓猓總兵官陸道清還雲南大將軍安親王嶽樂等奏猓猓總兵官陸道清請還雲南從中舉事相機鼓動土司可否發往伏俟睿裁上命遣陸道清回雲南宣布寬大德意曉諭土司倘未便舉事亦聽其還鄉使彼父母妻子得以完聚其布政使周昌黃九疇仍留安親王所俟有機會題明遣往招撫命總督董衛國領兵𠞰逆朱統錩衛國奏逆賊朱統錩復犯江右已破貴溪瀘溪諸縣臣請親率所部官兵前往撲𠞰上命衛國便宜進𠞰命備養馬匹于南昌諸處上諭議政王等曰外藩蒙古王等捐馬甚多江西鄰近湖廣廣東乃適中之地可撥五千匹發往南昌令總督董衛國遴委賢能官員督視秣養後又命簡選兵部喂養馬及營驛馬二千匹發往湖廣武昌飼秣備用臣謹按馬匹為大兵急需所關綦重時禁旅徂征已歷數載皇上慮軍行日久戰馬不無疲損若進𠞰逆冦或有缺乏則江楚諸省素非産馬之區一時不能驟得從京師發往道里遙逺必致有誤事機故前此屢諭兵部解馬軍前至是復令撥馬于南昌武昌豫為備養以待不時之用其後大兵尅定湖南分路前進即以此馬分給士卒故征討所至甚得其力蓋由皇上先事區畫戎備充周所以王師規取滇南無少稽滯也乙卯命誅逆賊謝厥扶等尚之信奏祖澤清以所執偽順德水師總兵謝厥扶隨征總兵鄧震奇監紀同知謝濟水師遊擊韓達戎旗守備韓元龍中軍守備歐國勳鄧駿解送到臣今監錮候旨上命之信文到日即將謝厥扶等七犯正法丙辰命選便習舟楫者先是上命總督阿席熙招募鳥船所需舵工水手至是阿席熙奏舵工水手若于八月內召足隨船解送似難必得上諭鳥船需用舵工水手最為要緊宜用精熟諳練之人河南山東湖廣江南江西浙江山西俱有福建投誠開墾官兵多習水性其行令各該巡撫遴選便于舟楫者報部其舵工水手仍聽總督阿席熙多方召募如不能足數即以各省所報官兵酌量發往丁巳敕將軍穆占規斷賊後總督金光祖奏廣西馬逆及孫延齡交戰撫臣傅宏烈已統兵西行又楚逆方逼韶城與我兵對壘乞多遣滿兵以資𠞰禦上諭逆賊吳三桂分遣賊兵侵犯廣東韶州廣西桂林諸處皆由大將軍安親王嶽樂將軍穆占等擁兵坐守長沙不即破賊平定湖南所致也嶽樂等其以文到日即分兵令穆占率赴樂昌諸處以斷來犯韶州賊兵後路夾而攻之度未可行穆占即會同大將軍簡親王喇布進取衡永諸處以斷侵犯兩粵賊兵後路其撫蠻滅寇將軍巡撫傅宏烈既統兵赴援廣西聽其相機堵𠞰平定地方癸亥趣尚之信赴韶州時將軍莽依圖奏臣自省城啓行于七月十四日扺韶州見城北陸路逆賊掘壕數重與官軍對壘請發大兵星馳赴援尚之信又奏粵地土冦尚多潮惠人心未定且髙州四府屢報賊警臣屬官兵不得不留鎮省會上諭今將軍拉哈達賴塔等大兵至潮州劉進忠等俱已歸順海冦敗遁粵境悉平而尚之信又以土寇為辭不離省城則逆賊各路來犯粵東又復可虞不但廣西難復楚賊難滅而廣東勢亦難保尚之信其以文到日即親統官兵速赴韶州與將軍莽依圖等并力却賊丁卯將軍巡撫傅宏烈奏復梧州宏烈率官兵進取廣西會偽將軍趙天元等七人擁衆萬餘據守梧州是月二十六日賊出城迎戰我兵水陸奮擊敗之斬首無算乘勝遂復梧州天元等僅率百人棄馬遁戊辰命大將軍安親王嶽樂遣兵守醴陵嶽樂奏醴陵江楚接壤要地乞敕簡親王遣無事地方兵每佐領三人駐守上諭近覽簡親王奏江西大兵調發諸處𠞰賊防守要汛兵力既分無可復調將軍穆占自嶽州帶往兵令分每佐領四人留駐長沙聽安親王酌量遣發赴醴陵防守甲戌命署副都統赫埓布等協𠞰叛賊黃四標將軍莽依圖奏投誠總兵黃四標逃奔入山又據始興縣報投誠總兵薛起龍叛變率賊衆四千屯駐江口虜掠民間子女臣調兵省城今尚未至韶州官兵又不可動乞調附近之兵以資撲𠞰上命駐守南安署副都統赫埓布就近領兵前往會同南雄總兵官宋四針等協力速滅叛賊黃四標薛起龍等以靖地方九月丙子詔增荆州兵先是上諭兵部今廣東底定正當破賊之時亟宜添發大兵平定湖南𠞰滅逆賊吳三桂頃大將軍公圖海報我兵已經撤回陜西見有大將軍將軍提督𠞰賊防汛自無不足且滿洲大兵又復不少宜分滿兵每佐領三人并酌選將軍提督所部緑旗兵同京師兵每佐領三人遣赴湖廣其令圖海會同各將軍提督確議以聞至是圖海等奏臣等本宜撥滿兵每佐領三人發往湖廣但陜西􅊷員遼濶所在防汛今議分滿兵每佐領二人酌遣三將軍二提督標下緑旗兵三千人同滿洲大兵付大臣一人率赴荆州餘兵分守各隘上諭前覽大將軍順承郡王奏欲自荆州渡江請發將軍鄂鼐所攜舟師并將軍穆占所部精兵每佐領五人及前鋒兵緑旗兵以資進𠞰又大將軍貝勒尚善等奏請留將軍鄂鼐每佐領兵五人仍駐嶽州仍如前請添發鳥船四十艘精兵每佐領四人庶賊船可破今當秋爽正進兵破賊之時且吳逆現駐湘潭分遣荆嶽賊兵侵犯兩粵宜乘逆賊勢分增荆州諸處兵令順承郡王統率渡江鼓行滅賊即勢有未便仍當臨江揚兵以牽制逆賊俟鳥船告竣即將所添官兵發遣貝勒尚善軍前令擊破賊船水陸夾攻嶽州大將軍公圖海等速分滿兵每佐領二人委大臣一人速赴荆州其緑旗官兵可減一千止撥二千令原統轄官率往又山西提督周卜世亦令率所轄官兵同赴湖廣所調山陜緑旗兵其酌豫賞賚官各加一級更撥京師兵每佐領護軍二人驍騎一人添發湖廣令公溫齊統之副都統杭奇穆舒為兩翼溫齊杭奇參贊軍務命一等侯馬三奇為潮州總兵官先是大將軍康親王傑書等請以一等侯馬三奇補授平陽總兵官上允之至是傑書等又奏潮州重地非得材能不可馬三奇材力驍壯著有戰功且潮州官兵大半馬得功舊部若以三奇為潮州總兵官則衆心俱服上乃授三奇為潮州總兵官其前授總兵官王國棟著以粵東要地總兵缺補用命耿精忠仍駐潮州大將軍康親王傑書等奏言漳泉諸處稍定臣等隨授都統賴塔平南將軍印選前鋒護軍共二千餘暫守潮州其內府佐領兵及喀喇沁土默特兵令將軍拉哈達率赴會城靖南王下官兵亦留守潮州令耿精忠但攜其護衛親軍與拉哈達偕來上命耿精忠仍駐潮州復敕諭傑書及尚書介山侍郎吳努春等曰今當𠞰滅吳逆招攜拊順之時不宜遽調精忠還會城以疑衆心王及大臣等不將兹事預請即撤精忠殊為失計嗣今凡重有關繫若此等事者務熟籌請旨毋得輕忽癸未調和碩額駙華善等領兵赴江西大將軍簡親王喇布等奏臣等或進取衡永或救援韶州必厚增兵力始克有濟乞多撥就近官兵星馳前至上諭和碩額駙華善學士薩海率江寧所有盛京兵三百自京撥往漢軍兵三百徽州駐守滿兵五十蒙古兵六百速赴江西扺南昌日合多諾等兵多選有馬者率赴簡親王軍前以聽調遣華善所佩平冦將軍印留付署副都統科爾擴岱管理江寧事務至安慶見有撫標兵提督王永譽可量率所部兵往守徽州己丑總督董衛國奏瀘溪諸賊平衛國率官兵進𠞰逆賊朱統錩是月初三日大敗賊衆于瀘溪諸處擒偽總兵金洪尹文郁及統錩子議涵姪議漢盡殱餘賊統錩為賊黨執送閩省地方悉定乙未詔責將軍穆占穆占奏臣等于本月初二日赴袁州察訪進兵道路即赴樂昌如有未便則會合簡親王進取衡永又前議留臣兵每佐領四人于安親王所適兵部遣咨以文到日即分兵赴樂昌用是悉師以往未獲分留長沙上責之曰穆占不進取樂昌不赴茶陵攸縣徑回袁州以會同簡親王為辭又自違本議自荆嶽所帶官兵盡攜赴袁不分留長沙殊屬不合穆占其速如前議分每佐領兵四人留安親王軍前其或進取樂昌或由茶陵攸縣進取衡永作速定議前進一面奏聞戊戌命增造戰艦先是上諭議政王等逆賊吳三桂憑江湖之險抗拒大兵為日已久若不速行𠞰滅湖南民困無有巳時聞逆賊多備鳥船戰艦死拒我師我師亦宜倍製鳥船沙船更令捐助鹽船多載糧米由嶽江入洞庭盡占江湖斷賊糧道夾攻嶽州如事屬可行應遣賢能大臣官員會同督撫尅期造船多設水師營緑旗兵同大兵齊進期于一舉滅賊但增船破賊事關機要大將軍順承郡王勒爾錦貝勒尚善等身在地方與賊逼近應否舉行著速議以聞至是勒爾錦等議奏若令舟師入洞庭盡占江湖斷賊糧道即合新舊船艦亦不敷用久泊風濤我船不利若泊于南潯港一帶非並設陸路重兵則我船不得傍岸勢不能久占江湖阻賊餉路也但逆賊造船未巳長江關繫最重目前計之造船雖無大益然賊舟漸增之時我舟又非可驟得預行添造甚屬有禆鳥船沙船可載數月之米其捐助鹽船似應停止上命造鳥船六十艘沙船二百艘户部尚書伊桑阿赴江南同該督撫速行督造俟船將告竣更添發緑旗官兵鹽船停其捐助臣謹按逆賊所以久踞嶽州者恃有江湖之險舟艦之衆茍不奪其所恃嶽州難以遽拔皇上因多造鳥船沙船畢占江湖斷賊餉道誠為制勝要算而行間諸將猶以風濤可慮不能久泊為辭賴皇上神謨獨斷特遣大臣尅期督造配兵入湖扼其險要斷其資糧未幾賊果食盡援絶棄嶽州而潰遁矣由是觀之凡水陸情形攻圍機要無一不在聖明睿照之中洵非諸將所能仰窺萬一也平定三逆方略卷三十二

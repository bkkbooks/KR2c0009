body:
  text: 欽定四庫全書平定三逆方畧卷四十三康熙十八年正月乙巳調總漕帥顔保等標兵赴南雄将軍覺羅舒恕奏南雄府為兩廣咽喉三省接壤見在滿漢官兵無多南安諸處又安挿新附之人一有不測全省皆屬可虞上諭漕運總督帥顔保總兵官哲勒肯各選標兵一千人令賢能官貟管轄速往南雄府到日令副都統博霽總統防守地方戊申增設岳州隨征總兵官大将軍貝勒察尼疏言調往岳州兵六千人宜設隨征左右前後四營各以總兵官領之上從其請以副将李師膺為湖廣岳州隨征左營總兵官柯彩為隨征右營總兵官都督同知陳華為隨征前營總兵官李超為隨征後營總兵官辛亥趣尚之信等速援梧州總督金光祖奏廣西藤縣失守逆黨愈肆狂逞水陸三路逼犯梧城上命大将軍平南親王尚之信将軍舒恕即遵奉前㫖親統官兵倍道速援梧州壬子命大将軍簡親王喇布選發騎兵赴長沙喇布奏永州耒陽請停進𠞰選臣等兩股兵内有馬者每佐領三人遣往岳州上諭此兵不必發岳州令于自京發往䕶軍驍騎内簡閲有馬堪用者每佐領二人以大臣一貟統之速往長沙軍前命總兵官髙登科留駐饒州先是議調登科率其標下官兵恊守茶攸諸處至是巡撫佟國禎奏逆孽攻陷徳興侵逼樂平府縣有司力請留鎮臣駐守饒郡上命登科及部下官兵不必調遣湖南仍留饒郡與該巡撫提督等共商速復徳興務滅逆冦丁巳增設荆州隨征總兵官大将軍順承郡王勒爾錦奏新增兵一萬二千人應設四鎮各分管兵三千上従其請以副将葛秉貞為湖廣荆州隨征前路總兵官蘭泗為隨征左路總兵官姚珩為隨征右路總兵官胡世英為隨征後路總兵官乙未大将軍貝勒察尼等奏復岳州時逆賊呉應麒等窃踞岳州堅壘死守上命多調船兵飭令察尼等水陸圍困斷其粮道逆賊勢蹙偽總兵王度冲偽将軍陳珀等于是月十八日各以其舟師來降呉應麒等棄城逃遁我師遂復岳州察尼及詹事宜昌阿以聞上諭大兵既取岳州逆賊震動之際諸路大兵宜𠞰撫並用速行平定其令大将軍安親王簡親王順承郡王将軍穆占等乗賊此時震讋有悔過投誠者寛貸其罪叙功録用其宣布恩意兼施𠞰撫毋失機㑹酌量而行臣謹按善用兵者必先争要害之地若據有要害則其他不攻而自破皇上洞悉方隅形勢以為掃靖冦氛蕩平雲貴大勢所繫實在岳州故于王師初出之時即命都統覺羅珠滿等速赴岳陽控扼要地以遏繫賊冦而珠滿等逡巡逗撓致岳城失守皇上乃授貝勒尚善為大将軍統率勁旅恢取岳州又屢授機宜趣令尅日進攻既因陸路之賊防守頗堅特遣大臣亟營戰艦大集諸路官兵據江湖之險斷賊餉道尚善等猶諉托多端謂兵艦即鱗集湖中亦不能困賊迨入湖之後将軍鄂鼐等又以風濤洶湧請撤水軍賴皇上乾斷獨持不允其請復調益舟師授策于察尼增營要地圍困加嚴于是賊粮始盡至于饑蹙棄城遁走岳州既得遂成破竹之勢而長沙常徳諸郡賊不能守一時奔潰貴州雲南以次抵定矣所以削除冦亂克奏武功者誠由我皇上力排羣議獨運神謨專意規取岳州之所致也庚申增設廣東潮州官兵提督侯襲爵奏潮州與閩接壤逼臨大海諸島逆孽窺伺汛兵力单請如舊復設潮州鎮標中營官兵五百有餘及大埔營官兵六百潮州水師總兵官一貟並左右二營官兵二千以資彈壓上允其請以侯補總兵官劉顯芳為廣東潮州水師總兵官甲子敕大将軍貝勒察尼分兵速取湘隂上諭兵部頃者筆帖式馬爾賽去時令其傳諭主将克取岳州之後應發兵一支従京口河渡江立營于華容石首之地以為根本若由華容石首前赴常徳澧州則水潦難将軍輩亦曾奏言此路水澤甚多艱于前進已經飭示今在岳州滿漢官兵甚多宜乘賊未暇固守湘陰水陸亟進乗機克取湘陰即望長沙進發稍一遲疑觀望則江中有一洲直對湘隂賊堅守縣城而立營洲上預儲火器得為嚴備我舟師欲度難甚故不可不乗賊未及堅守之先急下湘隂也岳州地最險阻偏師足守其取湘隂往長沙宜令貝子彰泰署前鋒統領杭竒率每佐領滿洲甲兵十人提督桑額總兵官萬正色躬率標兵併多發緑旂兵丁整備大礮鳥槍火器水陸並發可速行大将軍貝勒亦令安親王知之乙丑詔議政大臣等直陳𠞰賊事宜上諭大學士索額圖等今正勦滅逆孽之時議政王大臣等如有確見勦滅逆冦事宜及應行應革之事各抒意見即于㑹議之所共議以聞庶便酌量採擇爾等其傳諭議政王大臣等于是議政王大臣等奏言自用兵以來凡𠞰撫逆賊之事俱厪皇上睿慮籌畫即行間諸将進止機宜亦無不仰賴廟謨指授遵奉而行所以疆隅次第收復羣醜望風潰遁雖餘孽竄入滇黔即日自爾銷滅是聖明謨畧周詳悉已盡善臣等實無他見茍有一得之愚寧不陳奏耶二月丙寅朔将軍莽依圖等奏敗賊于梧州逆賊呉世琮等侵犯梧城于正月初六日水陸齊進将軍莽依圖傅宏烈等率滿漢官兵拒戰大敗賊衆多所斬戮是夜賊棄營而遁命發馬于大将軍貝勒察尼軍前學士額庫禮奏今我兵進勦請以武昌備養馬匹撥至臣等軍前上諭大将軍貝勒察尼等恢復岳州向前進發其以武昌備養馬匹撥送一千酌給兵士無馬者己巳大将軍安親王岳樂等奏復長沙時岳州恢復長沙逆賊震恐不能久立于正月二十九日棄城潜遁我師遂入城安撫人民命大將軍貝勒察尼遣滿兵速赴長沙安塘筆帖式報大将軍安親王已復長沙今亟進取衡州移咨大将軍多羅貝勒令酌鳥船沙船及官兵貝勒遂遣自荆州來水師營總兵官張忠等率緑旂官兵三千八百沙船一百快船八十前赴長沙上諭賊失岳州長沙諸要地正當驚惶騷動之時乗機進取衡州擊滅逆賊殊為要務宜将岳州所有大兵并船礮速行多撥增發大将軍安親王軍前大将軍貝勒察尼等除先遣總兵官張忠標兵外今更速發滿洲大兵多撥船礮迅赴長沙既而安親王岳樂等奏賊離衡山縣二十里許水陸立營上復諭宜乗賊冦驚動之際速取衡州此𠞰滅衡州賊衆較諸處不同所調岳州舟師火器早至一日于大事有一日之益若緩至一日于大事貽一日之害調遣船礮官兵如或稍遲使賊江中置樁預為堅守阻我舟師致進取衡州事機有失則皆貝勒察尼悞之也諭到貝勒察尼即撥舟師火器速發安親王軍前於滅賊機宜勿致有悞其大将軍簡親王等亦已率兵進取衡州兩軍相合之後總用大将軍安親王印信協力𠞰滅逆孽恢復衡州諸路如有分兵之處仍各用大将軍印信施行甲戌詔責大将軍貝勒察尼等時賊渠呉應麒等従岳州遁去輔國公温齊等率兵追殺二百餘里陣斬甚多我兵因未攜爨具而還察尼等以聞上責之曰逆賊呉應麒等迫于饑餓徒步敗遁我騎兵追躡二百餘里因未攜爨具遂爾還師並未大創賊衆岳州雖得不過賊所棄之空城而窮冦呉應麒究未擒斬朕心未愜今以追殺賊衆地方里數詳度之虛實即立見矣命尚之信等速定廣西之信等奏臣等共議将軍莽依圖舒恕等同将軍傅宏烈守梧州臣駐封川縣總督金光祖駐肇慶府将軍額楚等駐徳慶州如有機㑹一面奏聞一面舉行上諭今長沙岳州諸處俱已恢復偽将軍總兵文武官員船艦兵卒來歸者甚衆又據塘報彛陵州對岸之鎮荆山盤踞賊冦盡行潜遁分逐諸路潰敗之賊多所斬戮大将軍順承郡王等已渡江平定湖南安親王又進取衡州諸處宜乗此各路賊冦渙解之際平定廣西大将軍平南親王尚之信将軍莽依圖舒恕額楚傅宏烈總督金光祖等勿失事機速定廣西乙亥詔總督董衛國率所部兵赴大将軍安親王軍前先是議令衛國率兵往岳州至是巡撫佟國禎疏言岳州既復請撤還督臣上諭江西屬在内地可以無虞今董衛國不必詣岳州率其標下官兵速赴大将軍安親王軍前聴王調遣協力進取衡州諸處庚辰命發馬于大将軍順承郡王勒爾錦軍前勒爾錦奏臣兵在彛陵諸處更畨來往水土不宜致馬多斃請以近地所備馬速行撥給以資進勦上諭兹正前往征𠞰之際于武昌預備馬内撥一千匹委才能官員速送大将軍順承郡王軍前辛巳大将軍順承郡王勒爾錦奏官兵復澧州勒爾錦聞岳州賊潰即遣署都統多謨克圖等率師前進于正月二十七日渡江太平街虎渡口諸處賊冦悉皆潰遁王率大兵于二十九日渡江次元始于是前隊官兵分路追勦松滋枝江宜都諸縣及澧州以次恢復守百里洲偽将軍洪福率舟師􅌳印劄來降敕大将軍貝勒察尼與順承郡王勒爾錦合兵進取常徳沅州鎮逺諸處上諭議政王等曰今岳州彛陵之賊以舟來降長沙之賊焚舟潰遁諸處賊冦困蹙逃竄無有舟楫宜固守荆襄乗此機宜速滅賊黨貝勒察尼酌留官兵于岳州水陸齊進速㑹順承郡王軍合力亟取常徳沅州鎮逺諸處至恢復常徳諸郡之後順承郡王貝勒察尼等㑹同安親王簡親王等作何進取雲貴定議具奏其大兵進討雲貴宜設将軍總督巡撫提督隨大兵征進吏兵二部開列應補者以聞尋吏兵二部以應補官列名具奏上諭雲南将軍不必添設可調湖廣提督桑額為雲南提督湖南提督趙賴為貴州提督四州總督周有徳為雲貴總督以原任巡撫李天浴為雲南巡撫副都御史楊雍建為貴州巡撫壬辰大将軍順承郡王勒爾錦等奏官兵復常徳是月十四日勒爾錦抵澧州遂遣固山貝子準逹等率領官兵進取常徳未至之先賊縦火焚城中廬舍并江中船艦而遁偽按察使陳寳鑰等迎降我師于十八日入常徳府城甲午大将軍簡親王喇布奏官兵復衡州喇布率大兵前進于是月初七日復衡山縣遂令前鋒統領希福等率官兵攻取衡州逆渠呉國貴夏國相等聞風棄城而遁十三日我師復衡州府城命總兵官哲勒肯為廣西提督總督金光祖奏廣西䕶設提督轄本標官兵四千六百餘人自馬雄變後未及復設當此用兵之際必仍設提督總統水陸之兵于戰守有頼其提標應設官兵即于廣西見在各營抽撥補入經制上従其請授哲勒肯為廣西水陸提督總兵官平定三逆方畧卷四十三

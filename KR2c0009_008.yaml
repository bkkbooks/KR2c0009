body:
  text: 欽定四庫全書平定三逆方略卷八康熙十三年七月丁卯命提督張勇嚴飭邊防上諭張勇曰邊陲重地恐奸宄竊發卿乃封疆大臣朕所簡任可率所屬總兵等官固守地方有妄行為亂者嚴行緝治以副朕倚任股肱之意癸酉命江南緑旗兵習水戰於黃浦江先是將軍王之鼎疏稱耿逆潛道海寇煽亂地方沿江沿海亟宜熟籌𠞰禦請於崇明沙船一百艘留三十以備巡邏餘盡泊黃浦江遣滿洲漢軍兵配緑旗兵操演以備策應奏入上敕將軍阿密達等公議酌行既阿密達等疏稱江南松江黃浦一帶現無警息若撥滿洲漢軍往駐則沿途百姓有供億之纍派取民房居住則土著之民有失業之虞請止撥緑旗官兵不時練習若黃浦江諸處有警相機應援上允之命大將軍貝勒洞鄂等各率所部速進四川經略莫洛奏言大兵在保寧與賊相持恐運餽日久秦民必致疲苦臣今親赴漢中酌量分路進發貝勒洞鄂等若率衆盡行慮致遲滯請敕貝勒洞鄂以所將驍騎併入康親王軍內自率所部輕騎赴西安旋進四川上諭洞鄂部下無多所將驍騎既入康親王軍內輕騎入川兵力單薄可令貝子公等亦各率所部輕騎并力前進楊富謀叛伏誅時南瑞總兵官楊富隱匿在官盔甲私置竹炮器械暗招閩兵千餘練習滚牌與賊潛通謀為內應江西巡撫董衛國與將軍希爾根等密商於是月十一日以計擒之即時伏誅乙亥命將軍希爾根等固守贑州袁州先是巡撫董衛國奏閩賊出犯杉關新城失守至是又奏賊攻破石城聲犯寧都上諭贑州乃入粵孔道將軍希爾根巡撫董衛國等務會同商酌固守之策併趣副都統幹都海署副都統公沃赫等速赴江西復諭兵部袁州與湖廣接界亦屬要區可令將軍希爾根哈爾噶齊根特巴圖魯等協心商酌守禦之策務期保固尋以袁州副將趙應奎為袁臨總兵官駐防袁州丙子命副都統喇哈領兵速赴衢州總督李之芳疏奏賊兵合力來犯衢州臣標兵單可虞請敕副都統拉哈統兵亟進以壯聲援上諭拉哈兵不必留駐杭州速赴衢州與將軍賴塔并力𠞰禦將軍拉哈達侍郎達都副都統瑪哈達雅塔里等仍駐杭州防守副都統吉勒塔布之兵視何處警急即往應援戊寅命平南王尚可喜等備交趾總督金光祖奏交趾知孫延齡叛逆乘機蠢動陳兵邊界其情叵測請加防禦上敕平南王及總督提督等嚴飭邊將不時偵察仍增官兵防守險隘壬午命副都統伯穆赫林率喀喇沁土默特兵速赴浙江先是上命副都統蘇朗署副都統額思赫率䝉古兵二千之江寧即留付將軍阿密達令之駐防其原駐江寧喀喇沁土默特兵令蘇朗等率赴浙江至是浙江賊寇蜂起衢州告警將軍拉哈達奏聞上諭衢州正在危急令副都統伯穆赫林率喀喇沁土默特兵自江寧速赴浙江與將軍拉哈達等㑹同𠞰禦副都統蘇朗等仍率䝉古兵鎮守江寧將軍拉哈達賴塔侍郎達都總督李之芳既同任𠞰撫之事一應軍務須公同商確毋分彼此如浙地何處有警即相機應援命平南王尚可喜等固守梧江諸處總督金光祖奏梧州失陷我兵據守梧江上諭將軍根特巴圖魯等兵由袁州取長沙進廣西以襲賊後則取道廣東必致遲久可令平南王尚可喜總督金光祖提督馬雄㑹同酌議添發官兵規取梧州否則固守梧江諸處相機𠞰禦命經略莫洛等措置進川官兵機宜將軍瓦爾喀等奏征四川總兵官王懷忠標兵因餉匱逃散今欲勦賊兵力單薄運餽不至乞發兵救援上諭康親王傑書及貝子準達所部驍騎俱令貝勒洞鄂率之以行其大兵或仍據壕塹圍守保寧或因糧運艱難暫還廣元令經略莫洛將軍瓦爾喀等公同商酌王懷忠標下逃兵姑寬其罪應如何撫納亦令莫洛商酌速行丁亥大將軍順承郡王勒爾錦奏官兵敗賊于嶽州是月十一日貝勒察尼將軍尼雅翰等分部滿漢官兵水陸齊發進攻嶽州僞將軍吳應麒等率賊七萬餘列鹿角牌銃陸路相拒我兵奮擊大敗之斬首萬級舟師抵七里山以炮攻賊沈其船十餘艘己丑大將軍康親王傑書帥師之浙江大將軍貝勒洞鄂帥師之四川先是傑書奉命征討候調䝉古兵到同發至是傑書奏浙江告急宜速往援若俟䝉古兵同行恐稽時日請率兵先往上遂命於是日啓行洞鄂亦同日率兵之四川辛卯詔收葬耿精忠祖父骸骨上諭兵部耿精忠雖背恩反叛其祖父投誠效力纍世舊勳朕豈以精忠之罪及其先人大兵平定閩省之日其祖父骸骨仍許收葬八月癸巳命給大將軍等分兵印信上諭兵部諸路大將軍止各給一印儻分兵赴𠞰别無印信則招撫賊寇宣諭百姓及調遣防守地方兩軍移㑹機宜何以為憑其再給大將軍順承郡王勒爾錦印二至大將軍康親王傑書處有將軍賴塔印一再給印一大將軍貝勒尚善處有將軍尼雅翰印一再給印一大將軍貝勒洞鄂處既有將軍赫業瓦爾喀印二不必另頒若分兵他往即以所頒印信付統兵者復合一處則收回所頒止用大將軍印命科爾沁公圖訥赫嚴禁兵卒上諭圖訥赫曰我太祖太宗以來爾祖父同心效力佐定天下爾國賦稅聽爾自取若爾國窮困朕加意撫養今聞調至爾所屬兵卒有掠取民物者在京尚如此况離此逺去豈不益肆搶奪爾久歷行間務宜嚴禁兵卒毋得恣行强橫如有亂法者即㑹同貝勒議行懲治且中夏炎熱爾衆早晚飲食各宜自慎以副朕軫恤軍士之意命將軍希爾根調署副都統公沃赫兵赴江西巡撫董衛國奏饒州營兵變餘千賊勢猖獗上命將軍希爾根速調公沃赫兵赴江西同副將軍哈爾噶齊巡撫董衛國提督趙國祚商議𠞰滅賊寇平定地方仍檄江南總督阿席熙安徽巡撫靳輔於饒州接壤所在增設官兵嚴加防守甲午大將軍貝勒尚善等帥師之嶽州貝子準達等帥師之荆州乙未命總督蔡育榮率所部兵協同大兵進𠞰湖南上諭兵部王師進𠞰湖南須用緑旗官兵總督蔡育榮管轄通省可率所部兵隨王師協力平定地方又荆州地關緊要進兵時大將軍順承郡王勒爾錦宜酌撥官兵防守丁酉諭福建總督郎廷佐𠞰撫機宜郎廷佐奏耿逆背叛勾連海寇虛張聲勢但海寇止習水戰陸地非其所長宜𠞰撫兼施乘機底定上諭廷佐入閩之日海寇宜用撫精忠宜用𠞰或用間相機便宜以行壬寅命海澄公黃梧子芳度襲其父爵時芳度遣官黃藍間道奏稱臣父於本年三月二十六日病故臣不得已權以父命送敕印賊處仍密行招募合舊兵共得六千餘人六月初四日斬僞城守都督劉豹等三人拒守漳州惟望大兵入閩救應臣偵知來路隨往迎接上諭海澄公黃梧自海上歸誠殫竭忠藎鎮守巖疆勞績茂著據奏於三月二十六日病故朕心深為軫惻應得恤典從優議奏黃芳度設計全城招集兵卒斬僞都督劉豹等三人固守地方以俟大兵具見芳度能繼父志克篤忠貞殊為可嘉芳度應令襲公爵今大兵由浙江江西廣東三路進閩芳度偵何路兵先到即來迎㑹既芳度兄一等侍衛芳世自陳生長閩地深知道里情形乞隨大兵進𠞰救援伊弟芳度上因授芳世為隨征福建總兵官令同平南王尚可喜兵進𠞰福建命副將軍哈爾噶齊為平寇將軍時平寇將軍根特巴圖魯卒於軍副都統席布以聞故有是命命治理厯法南懷仁製火炮上諭南懷仁曰大軍進𠞰亟須火器爾可鑄造火炮務加意精工俾越山渡水輕便利用于是南懷仁多造木炮等火器陸續解送軍前以資征𠞰之用甲辰增陜西緑旗官兵先是經略莫洛以秦省兵單請添設緑旗兵萬餘以資戰守上諭增兵必須增餉國家錢糧止有此數兹大兵進𠞰浙江江西湖廣需餉浩繁爾經略所知前因餽運不給以致王懷忠等兵逃散秦民供億入川兵餉已極勞苦若增兵萬餘貝勒經略又統諸軍深入萬一糗糧難繼恐禁旅有匱乏之虞而緑旗兵復蹈前轍矣經略身在地方洞悉情形或不煩增兵即親行入川或必須議增方可進發或以秦省重要不必親行遙措兵餉其逐一詳議以聞至是莫洛奏陜西舊兵內王懷忠所率四千悉已逃散今王輔臣又率二千以行除此六千外所增無多蓋增則戰守調遣均有禆益陜西得以保固故臣以為增之便若四川速定則錢糧有資而秦民又得息肩臣仍宜親統官兵協力進𠞰平定四川疏入下議政王貝勒大臣集議悉如所請行上允之己酉命將軍賴塔等𠞰禦寧海諸路賊提督塞伯理奏黃巖圍困請援甚急又寧海象山新昌餘姚四縣賊衆蜂起恐賊竊踞寧海斷我糧道請速救台保寧上諭黃巖危急杭州將軍拉哈達已發兵赴援今大將軍康親王已領兵赴浙無庸别遣其寧海等處賊衆作何𠞰滅并救台保寧之策康親王未到之先聽將軍賴塔拉哈達等商酌以行庚戌申飭䝉古官兵上諭公圖訥赫等近聞䝉古兵違法擾掠其嚴加禁飭嗣後有不遵紀律者自驍騎校以下即審明正法辛亥諭護軍統領桑格進兵機宜時桑格參贊江西軍事上手敕諭之曰江右為粵東咽喉江浙唇齒所關綦重今兵民之心或懷兩端若不先滅地方小醜大兵難以前進至袁州吉安贑州尤屬要地若有失陷則廣東聲息必至梗阻廣東梗阻則勢益危急今令滿兵駐袁相機進取長沙否則固守地方庶三府可保無虞將軍當親統重兵以行毋使兵力單薄致有疏失臣謹按吉安贑州南通嶺外而袁州與湖南接壤乃逆賊必爭之地均關要害皇上預料賊必來犯若守袁州既可為吉贑聲援又可以內捍西江外略南楚乃密授桑格以戰守機宜復命將軍等統重兵往駐未幾逆賊果侵軼袁州賴兹兵力大創其衆于西村之地江西得以保固而大兵亦長驅無梗直抵長沙皇上先機洞察誠所謂坐照如神者也己未命將軍尼雅翰帥師由江西規取長沙嶽州上諭議政王等聞嶽州三面臨湖賊于陸路一面浚壕築壘拒守頗堅難以進取應令將軍尼雅翰率兵沿流赴江西與副都統幹都海兵合併率袁臨總兵官趙應奎由袁州進復長沙夾攻嶽州相度便宜以行平定三逆方略卷八

body:
  text: 欽定四庫全書平定三逆方畧卷十四康熈十四年四月己丑朔命總兵官張和善率所部兵還真定上諭兵部曰曩者一有賊警即遣真定官兵赴楚防守已閲年餘備極勞苦今武昌見有滿洲䝉古及撫標城守水師兵可令真定總兵官張和善率所部仍回原汎乙未封将軍張勇為靖逆侯授西寧總兵官王進寳世職時王輔臣遣人持吴三桂偽諭劄印投勇勇斬其使以聞進寳擒獲間諜舉首輔臣逆書上嘉之封勇靖逆侯授進寳阿思哈尼哈畨丙申命将軍佛尼勒等勦仙逸闗諸賊先是命佛尼勒率兵開棧道進漢中至是總督哈占奏報仙逸闗有賊三千餘夸蘭大宗柱等兵不滿四百難以防禦又平隴之間亦有賊三千餘竊踞華亭上諭仙逸闗係通大兵要路将軍佛尼勒親統官兵勦滅諸賊或令副都統徳業立延布領兵赴勦其酌量速行丁未命鄂爾多斯兵進邊㑹勦上諭兵部曰理藩院郎中喀喇賫來報文鄂爾多斯部落多羅郡王固嚕多羅貝勒索諾木固山貝子達爾扎鎮國公都棱以提督陳福等移㑹徵兵俱量行遣發駐邊外候調又達爾扎親統所部即欲進邊前者本以隆冬雪盛暫止其進兵今彼既調兵而來可即令入邊㑹同提督總兵等兩路進勦郎中額業圖員外郎拉篤祜即參贊軍務至鄂爾多斯兵進邊之後糧餉毋得缺乏額業圖等如户部所定餉額從所屬有司支取散給癸丑将軍侯張勇等奏官兵復臨洮時偽總兵陳可等據臨洮總兵官王進寳率綠旗官軍及土兵由金縣提標兵由沙泥站兩路進攻三月二十三日真抵臨洮拔其城甲寅詔撫左翼察哈爾時調宣府左翼四旗察哈爾鎮大同衆譟毁邊墻私遁參領舒什蘭以聞上命察哈爾散秩大臣綽爾濟都爾瑪等副以八旗官員及侍衛賫勅撫之曰昔察哈爾潰散時爾等祖父來歸太宗文皇帝以次賜與世職分𨽻八旗眷顧撫養以迄於兹吴三桂造亂調爾駐守地方今叅領舒什蘭奏爾等不請於主者遽爾遁歸理應治罪但先既調爾八旗察哈爾同官兵進勦今又盡徵餘兵爾等或慮妻子牲畜無人養育馬又羸痩難以從征以此亡歸其情可恕今特行寛宥其各返故伍如常毋生疑畏昔額哲阿布柰被俘不沒入旗下為奴尚額哲以公主封為親王所部人員亦加撫養亡國苗裔無功而施大恩若此古所希有阿布柰曾有大罪又全其命以其子布爾尼襲封親王布爾尼不思報効背恩叛逆故命大将軍信郡王率兵進討於是月二十二日大破之荅鹿盡殱其衆科爾沁等諸部王貝勒貝子公台吉等俱以布爾尼罪大惡極發兵㑹勦恐爾等不知此等情事妄惑流言䧟於罪罟故特賜曉諭調兵援秦州漢中大将軍貝勒洞鄂等奏逆賊萬餘自四川來援秦州屯於南山臣等勦禦内外賊㓂兵力單薄已令副都統延布率兵六百守隴州副都統徳業立率兵六百守仙逸闗将軍佛尼勒率每佐領兵一人速來軍前請再将西安官兵酌量調發上諭貝勒洞鄂等圍困秦州所闗最重倘秦州之軍可慮西安亦且難保今佛尼勒雖已調至而兵力尚單除荆州調往每佐領兵一人外或西安兵或附近汎兵令總督哈占鄂善等速撥五百人赴秦州并令總督周有徳亦率所部兵星馳前往同貝勒等㑹勦賊㓂俟擊敗川賊後貝勒等即酌分官兵赴援漢中尋又諭漢中地屬𦂳要不必俟下秦州即宜發兵赴援可令将軍鄂泰率駐防太原盛京兵前往西安至日總督哈占等擇西安兵内馬肥者并酌分隴州寳雞兵俱付副都統徳業立率往漢中其鄂泰建威将軍印留與署副都統烏丹代署如烏丹與平逆将軍畢力克圖軍合則用畢力克圖印烏丹為叅贊更自京師發每佐領驍騎一人令署副都統一人率赴太原乙夘諭總兵官孫思克防邊廵撫華善等奏邊外䝉古前犯洪崖堡今又乘我兵進勦河東乃拆毁關隘襲執官吏與官兵㑹戰永固城副将陳達戰歿上命孫思克嚴飭将弁加意防備邊疆如䝉古仍行肆害即率兵勦禦陳達如例恩䘏復遣使往諭達賴台吉約束部落毋為邊患㑹達賴喇嘛使來并予勅使轉諭達賴台吉勅曰皇帝勅諭達賴喇嘛吴三桂初叛朕諭喇嘛大兵分路進討若三桂勢蹙投降喇嘛其即執送續覽喇嘛奏云吴三桂背主負國人皆惡之不來則已來即縳之以獻三桂曾取界得毋楊大毋二城今已發兵攻取防守沿邊若欲徵兵深入惟候詔㫖又言達賴台吉故居土黙特今遣居胡虎諾兒令其有事則相援無事則鈐轄其部屬朕思自聖祖太宗皇帝聖父世祖皇帝至今遣使往來恩禮無間喇嘛崇尚信義必如所奏而行故遂以達賴台吉等進兵滇蜀之故曉諭兩省及達賴台吉尋辭以松潘路險未進四川喇嘛又奏言䝉古兵力雖强難以進邊縱得城池恐其貪據且西南地熱風土不宜若三桂力窮乞免其死罪萬一鴟張莫若裂土罷兵三桂乃明時微弁父死流賊揺尾乞降世祖皇帝優擢封王尚其子以公主朕又寵加親王所受恩典不但越絶朝臣盖自古所罕有三桂負此殊恩搆釁殘民天人共憤朕乃天下臣民之主豈容裂土罷兵但果悔罪來歸亦當待以不死今将軍張勇等奏達賴台吉諸部落入邊侵掠彼以王輔臣倡亂内地亦皆騷動故也今西陲晏然内地無事已下勅禁諭達賴喇嘛宜確守前言令其統轄部屬毋得生事擾民戊午命内大臣國舅佟國綱為安北将軍帥師鎮宣府散秩大臣綽爾濟等奏臣等至張家口詢關吏據云本月二十七日察哈爾兵至鄂西奚地方将御馬厰并諸大臣牧馬人役附近旗下蒙古婦女牲畜盡行掠去及臣等至齊澇地方遣一等侍衛阿納等前進遇察哈爾被脅四人遂擒以歸其言亦如之臣等欲竟将勅諭送往恐此輩無知不體聖意故将詔㫖大略抄冩即令擒來二人賫送精竒尼哈畨阿遇席等復遣二人傳諭被掠人衆上諭察哈爾兵狂悖如此應發兵防禦其授内大臣國舅佟國綱為安北将軍率每佐領䕶軍一人驍騎二人往鎮宣府令䕶軍統領傑殷副都統恰塔偕往以散秩大臣綽爾濟都爾瑪為署都統并預叅贊平定三逆方畧卷十四

body:
  text: 欽定四庫全書平定三逆方略卷四十康熙十七年八月庚午詔撤海澄公黃芳泰等還京大將軍康親王傑書等言海澄公黃芳泰年少柔懦不勝兵事上諭海澄公黃芳泰功臣之嗣既年少不能軍而仍授以兵茍至失律恐反為彼罪且於地方無益可令黃芳泰及黃芳世之子並其家屬俱赴京師務安置得所以副朕終始保全至意其標下官兵督撫等察其可用者補入各營罷老不堪者量行安插得所又諭兵部向因靖南王耿精忠𠞰賊外出遣鎮平將軍耿昭忠赴閩暫理旗務今精忠還省城昭忠可攜其祖父骸骨來京甲戌敕將軍覺羅舒恕仍守南雄先是尚之信奏宜章地甚要守不可不固臣於七月二日遣都統王國棟署總兵官寧天祚等率兵前往請敕將軍舒恕同赴宜章統轄官兵協同防守上諭南雄韶州若無虞將軍舒恕即赴宜章否則速以狀聞至是舒恕奏南雄諸處為江西廣東湖南接壤要地不可輕離上命舒恕仍駐南雄己卯詔授貝勒察尼為安逺靖寇大將軍大將軍貝勒尚善於是月四日以疾卒於軍固山貝子章泰以聞上命多羅貝勒察尼代貝勒尚善為安逺靖寇大將軍赴嶽州統其軍甲申詔諭親征上諭議政王等曰今日之事嶽州最要不可不速行攻取乘此民心讐賊羣相內嚮之時朕欲親統六師躬行伐罪若逾此機恐滿兵不耐水土因而挫鋭所遣諸將軍破賊無期後雖勉圖終成掣肘國家所賴在於僉謀此外如有早戡逆亂救民水火之策並宜預籌爾等其詳議之於是議政王等上言吳逆首啓亂階諸方震擾皇上特抒神略命將出師分路進征𠞰撫並用陜西福建江西浙江廣東諸省以次削平僅三桂困守一隅旦夕可滅緣臣等才智疏淺不能仰副宸謨議多謬誤在外諸將亦不能仰體聖意迅掃妖氛逆首逋誅致煩睿慮伏讀詔諭深中機宜臣等敢不遵奉但皇上一身關天下之重今宸馭所至雖賊不足平然京師要地萬一車駕逺行奸宄因而竊發此亦事之未可料者臣等以為皇上不必躬臨戎陳但宜居中指麾內外臣僚相機調度請敕大將軍貝勒察尼或見困嶽州水陸兵之外更增立營於九貴山則嶽州可下或雖增立營壘戰艦不可久泊湖中嶽州似難克則宜掣調水軍如前固守而以餘兵益安親王嶽樂軍進定湖南或益順承郡王勒爾錦軍進定常德澧州令王貝勒等詳議敷陳再為籌度上從之臣謹按是時閩粵江浙陜右皆已底定民心讐賊亟望王師湖南諸將正宜及時征討蕩定滇黔而彼此觀望按兵不進雖奉詔㫖屢趣授以方略猶遷延如故皇上慮進勦更復稽緩陷賊人民因之觖望他方姦宄或將竊發爰下親征之詔無非欲迅掃賊氛出斯民於湯火也以議政王等懇切諫阻故暫留未發敕令行間諸將詳議進𠞰事宜於是諸將始皆震竦惶愧請戮力辦賊皇上乃停六飛之駕復授策於察尼等添營要害斷賊餉道及湖水消涸又令多益官兵圍守嚴密未幾嶽州果下而諸路逆賊遂次第削平是皇上雖未親行而布昭聖武振作軍威所以能使閫臣感奮克奏膚功也丙戌尚之信請罷遣都統王國棟赴宜郴上不許之信奏自漳州海澄告變惠潮震驚又鬱林失守梧州可慮髙雷亷三府逆賊肆行兼之海賊楊二侵擾沿海之地官兵不足分遣請令都統王國棟勿赴宜郴上諭今逆賊犯永興肆行猖獗宜章郴州地屬重要都統王國棟仍速率兵往援已命將軍莽依圖等暫止勿進廣西潮州有警尚之信隨宜策應命設福建水師提督提督楊捷奏福建水陸進兵勢不能兼顧上諭提督楊捷可專轄陸路兵水師提督别行補授當此海寇鴟張之㑹統轄水師非才略優長諳練軍事之人不可總督姚啓聖提督楊捷巡撫吳興祚其遴選保奏調山東河南江南緑旗兵赴福建提督楊捷奏臣向在山東深悉山東河南兵熟習交槍鳥槍者甚多乞各發千人江南兵有熟習弓箭火炮者亦發千人赴閩上諭福建土著兵丁未諳行陳雖經召募無禆實用若得久習營伍之士隨到即可成功總河靳輔山東巡撫趙祥星其各發標下兵善交槍鳥槍者千人河南巡撫董國興發河南兵善鳥槍者亦千人前赴福建所遣兵缺速行募補辛卯命大將軍康親王傑書調兵援泉州總督姚啓聖奏臣前啓大將軍康親王調提督石調聲等兵並省城滿兵同援泉州臣願親統緑旗協力進𠞰而漳州緑旗兵止一萬攻守不足請發江西贑州總兵官哲勒肯廣東潮州總兵官馬三竒惠州提督侯襲爵各標官兵共五千名來援上諭泉州地要大將軍康親王俟署副都統嶽爾多兵至日酌發滿漢官兵往援頃者已調駐守潮州靖南王耿精忠侍郎達都等率兵救泉州提督侯襲爵往潮州而江西緑旗兵屢經調赴湖南哲勒肯等標兵不便更遣可速檄耿精忠等統率官兵馳赴漳州㑹同將軍拉哈達賴塔總督姚啓聖兩路夾擊務解泉州之圍大將軍康親王傑書條奏事宜上不允傑書奏請簡旗下老成歷練總兵官調補潮鎮以代馬三竒其潮州鎮標見在委署各僞員宜速改調至將軍劉進忠標員宜分布各標或發廣西將軍軍前效力又如續順公沈瑞降賊受其侯爵結為姻婭恐其勾連起釁宜黜其公爵所屬旗兵分𨽻督撫提鎮各標家口宜徙山西諸省上諭康親王曾言馬三竒材力精强行間茂著勞績因擢潮州總兵官且潮州將士己發援泉州今無故妄有猜疑輒行改調使效力者且至心寒續順公沈瑞及標下官兵素懷忠義緣衆寡不敵為賊所脅向者副都統張夢吉等言伊等身在行間請發家口入京朕以道路遼逺不必遷徙來京令暫駐潮州已有成命所奏請黜沈瑞公爵分其標兵從其家口俱不准行癸巳敕尚之信等保髙州總督金光祖奏祖逆敗竄廣西收集餘黨勢必糾合大隊肆行侵擾况賊既陷鬱林必乘勢犯髙州所關甚巨亟宜預籌上諭頃命將軍莽依圖等整頓軍械暫駐以俟機㑹今既不急進廣西如賊犯髙州平南親王尚之信將軍莽依圖額楚傅宏烈總督金光祖等或增遣滿漢官兵赴髙州協力𠞰賊或遣兵攻北流鬱林以分賊勢俾不得侵髙州其公同酌議務令髙州諸處勿有疏虞甲午命將軍穆占帥師赴永興將軍華善帥師赴郴州副都統夸岱率兵赴茶陵先是調華善自安仁赴永興與護軍統領拉賽等協力固守𠞰禦逆賊既而華善奏臣欲移㑹永興護軍統領拉賽等因道阻難通復自郴州大路發檄迄今尚未得報且兵力單弱不能前進致行期稽滯上諭授華善為將軍調赴永興為日已久即宜率兵馳赴乃藉口兵單道阻逗留不前殊屬不合應即治罪但見在行間暫緩處分俟事平旋師再行察議永興關係重要華善務設䇿相聞約期夾擊速退逆賊如未便夾攻華善可求他道前往永興合力而舉尋穆占奏臣啓大將軍簡親王速遣將軍華善星夜馳赴郴州俟其到日委以地方臣遵諭率隨征遊擊馬升標兵火炮前赴永興討賊其總兵官趙應奎標兵請速發至臣軍上諭前以永興地要曾敕穆占親往今既稱親率兵丁前赴永興宜如所請移文將軍華善不必前往永興率兵馳赴郴州并移文大將軍簡親王遣總兵官趙應奎攜其標兵火炮速赴穆占軍令按察使馬斯良催徵郴州諸處糧餉運至永興毋誤軍需簡親王喇布復奏若總兵官趙應奎兵從將軍穆占調往則茶陵攸縣安仁諸處兵力單弱請增遣兵防禦上諭永興警急趙應奎兵可速行發往俟陜西調至副都統夸代所統每佐領兵二人抵彬州日大將軍貝勒察尼等視馬罷者易以嶽州兵丁健馬速遣至簡親王軍聽其隨宜調遣已而喇布遵諭圖繪永興城池我兵營壘及逆賊盤踞形勢進呈御覽議政王等因奏省閲來圖永興殊為困迫宜再趣穆占華善等各率兵星赴所指處所上諭前屢敕華善速赴永興竟不如期而往殊玷將軍之職今若更有延滯不即至郴兵部題參從重治罪平定三逆方略卷四十

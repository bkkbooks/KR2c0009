body:
  text: 欽定四庫全書史部三平定三逆方略紀事本末類提要臣等謹案平定三逆方略六十卷康熙二十一年奉詔修纂恭紀平定逆藩吳三桂耿精忠尚之信事敬考實録以大學士勒德洪明珠李霨王熙黃機吳正治為總裁官內閣學士阿蘭泰達岱張玉書翰林院掌院學士牛鈕為副總裁官其承纂銜名則原書未載莫能詳也仰惟我聖祖仁皇帝神武天授統一寰宇是時平西王吳三桂封藩雲貴平南王尚可喜封藩廣東靖南王耿精忠封藩福建恃恩驕恣日形跋扈康熙十二年因其自乞移藩詔允所請逆謀既伐是年十一月三桂舉兵反直窺湖廣乃遣將馳赴荆州進據常德以遏賊勢復簡八旗徑旅命將總統隨機剿禦其明年三月耿精忠亦據福建反而尚可喜子之信迫其父從賊可喜憤死之信遂遙為煽附閩粵郡縣並時騷動於是分遣諸將指授方略撫剿並施以次戡定三桂旋伏冥誅逆孫世璠尚踞滇中拒命而耿精忠歸正自請入朝旋訊得其通賊反覆狀磔于市尚之信雖嘗歸正而心懷兩端鞫實賜死廣東平逮二十年十月大兵攻圍雲南省城世璠惶懼自殺其屬悉以衆降乃戮世璠首獻馘京師雲南平用兵甫八年三逆悉已掃蕩集勳之速耆定之隆亘古未覩也是編告成年月實録亦未載惟恭載康熙二十五年十一月上諭閣臣曰爾等所進平定三逆方略四册朕已覽畢其中舛錯頗多如王輔臣由雲南援勦總兵官授為陜西提督今謂由陜西總兵官升任至論贊中援宋太祖杯酒釋兵權事吳三桂非宋功臣可比乃唐藩鎮之流耳爾等其酌改之仰見是書纂輯悉經聖訓裁定詳慎成編是以紀事精審措詞簡括於以彰盛烈而昭萬世洵足嫓徽謨典矣當時未奉刋布僅有寫本尊藏大內今蒙皇上宣示特命繕録編入史庫臣等校録之餘既欣睹聖祖仁皇帝實兼守成創業之隆亦彌仰我皇上覲揚光烈之盛云乾隆四十八年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀

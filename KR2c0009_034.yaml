body:
  text: 欽定四庫全書平定三逆方略卷三十四康熙十六年十一月丁丑將軍巡撫傅宏烈奏官兵復潯州十月初二日逆賊水陸犯梧州總兵官楊國泰分遣官兵前後夾擊大敗賊衆乘勝追𠞰初三日抵潯州城下連戰凡五晝夜殺賊殆盡遂復潯州己卯命大將軍簡親王喇布遣兵𠞰逆賊韓大任時韓大任擁衆踞萬安縣梁口坐塘筆帖式以聞上諭逆賊韓大任自寧都敗遁竊踞萬安必且與楚賊合勢護軍統領哈克三副都統錫山雖已統兵前往恐兵力尚少簡親王其速調滿漢官兵與哈克三等并力進𠞰務期剪滅毋仍前踈縱俾賊得逸入湖南壬午命將軍穆占帥師𠞰韓大任大將軍簡親王喇布奏言據報韓大任等欲渡河潛遁楚賊來迎非乘其未合預行𠞰滅不可但護軍統領哈克三等部兵甚少若𠞰逸賊則無兵以遏楚敵若禦楚敵則追𠞰逸賊又復無兵今吉安無可調之卒臣等議分將軍穆占兵之半暫守永新安福令其半赴泰和萬安諸處遏禦賊冦上諭簡親王喇布自到江西並未建尺寸之功晏坐會城虛糜糧餉逮赴吉安以重兵圍城逆賊韓大任奔逸不能擊滅致大任竊踞寧都雖遣副都統布舒庫等率兵前往究未大創賊衆今大任等自寧都任意竄突延及萬安泰和諸處又不能撲𠞰反以兵少藉口計喇布所轄滿漢官兵為數不少一韓大任未能勦除任其出入宜即嚴加處分念見在與賊相持姑俟事平日議罪喇布等既不能撲𠞰韓逆可令將軍穆占率兵急赴梁口務速剪滅勿使蔓延尋穆占奏賊渠韓大任敗遁當時圍賊官兵宜即尾追今當仍令大將軍簡親王或和碩額駙華善率兵𠞰禦頃聞吳三桂遣偽帥三人由永新犯吉安臣身在地方洞悉情形偽帥來犯非迎擊不可臣是以率兵前進於本月三日抵永新俟後軍一至即𠞰除永新百里外所屯賊冦進取茶陵上復諭簡親王速調前赴寧都副都統布舒庫提督趙賴等兵亟滅韓逆將軍穆占身臨賊境必悉情形或先赴梁口協𠞰遁冦或已進取茶陵遏禦楚賊即乘機平定湖南其詳悉籌度無失事宜甲申命尚之信進兵廣西之信奏言臣量留標兵守廣東省城盡率餘兵赴廣西圖賊上諭之信躬率所部同將軍莽依圖等平定廣西戊戌命大將軍安親王嶽樂分兵取湘潭嶽樂奏言臣前所請紅衣炮及緑旗火器官兵若以付臣即可攻取長沙如無緑旗官兵請調簡親王率兵來止長沙臣親統所部赴嶽州仗皇上威靈得下嶽州即同嶽州兵由水陸進逼長沙逆賊必不能支長沙可易破也若不令進取嶽州臣當即取茶陵攸縣平定衡永斷來犯廣東逆賊之路直搗湘潭以殱吳逆上諭簡親王兵屢經發往韶州兼𠞰逆賊韓大任緑旗官兵無可調者簡親王鎮守吉安亦不便輕離今將軍穆占奏取茶陵攸縣將軍莽依圖又同將軍巡撫傅宏烈平定廣西大將軍安親王其乘此逆賊震動之時速分官兵摧破楚逆取湘潭諸處十月丙午命將軍穆占移師定湖南穆占奏茶陵攸縣新經恢復臣未敢輕離乞調副都統龔圖帥往長沙之兵及袁州總兵官趙應奎兵來此戍守臣即遵前旨赴梁口𠞰賊上諭大將軍簡親王已遣護軍統領哈克三副都統錫三署副都統雅哈喇雅秦等先後追𠞰逸賊韓大任副都統布舒庫提督趙賴等復自寧都躡擊已抵萬安將軍舒恕又遣署副都統尼雅漢率兵赴梁口計會𠞰大兵為數已多簡親王等其并力殺賊務在殄滅穆占當以恢復茶陵攸縣啓聞安親王而親統大兵抵定湖南摧破逆賊及將軍莽依圖傅宏烈略定廣西之時應機而行已而穆占又奏逆賊吳三桂死守衡州茶陵相距甚近水陸兼通臣部兵戰守未足乞調安慶提督王永譽率標下官兵前來併力上諭前以徽州要地遣王永譽率兵駐守不便逺調安親王軍前益以副都統龔圖之兵為數頗衆今將軍穆占已復茶陵攸縣將進兵湖南安親王其速遣提督趙國祚盡率所部兵復量加滿兵往守茶陵攸縣俾無誤穆占進𠞰安親王穆占更宜互為聲援同心協謀以期破賊癸丑詔責總督金光祖光祖請就近調發滿兵星馳赴粵東以為後援上責之曰進征廣西合計將軍莽依圖平南親王尚之信將軍巡撫傅宏烈并光祖所轄之兵為數已多光祖正宜乘此機會效力先驅以贖前罪況傅宏烈當時未任封疆尚能募兵擊賊直入粵西恢復梧潯諸府鼓勵將辨為國宣力光祖本有總督重寄曽疏請同總兵官祖澤清取南寧柳州至今無意前進遷延引日反請濟師以為後援殊屬不合其遵前旨速取南寧柳州命大將軍簡親王喇布速調兵勦韓大任喇布奏護軍統領哈克三啓云欲與賊戰而山路險狹騎兵難騁請調遣緑旗官兵相機𠞰殺否即分兵守隘斷其餉道賊當可破臣隨令總督董衛國相戌兵可緩者酌量調遣協力往𠞰上諭護軍統領哈克三副都統布舒庫錫三雅秦提督趙賴等所統官兵頗多且將軍穆占擊敗楚賊收復茶陵攸縣逆賊韓大任已無外援宜乘此時即行蕩掃乃稱山路險狹騎兵難用欲調兵守隘延引時日使賊復得間固守殊誤機宜簡親王量調附近官兵并嚴檄哈克三等乘賊勢蹙亟行𠞰滅末幾大任遁入興國寶石寨將軍舒恕以聞上諭簡親王前擁重兵圍韓大任于吉安未能殱滅致令遁出逮大任竊踞梁口而護軍統領哈克三副都統布舒庫提督趙賴等又不能撲勦復使奔竄簡親王其嚴檄哈克三等并力窮追務在剪除若縱賊入楚從重治罪總督董衛國亦宜統兵協力進𠞰甲寅命尚之信等協取宜章郴州將軍穆占奏賊帥馬寶率衆赴衡州又賊二千餘屯據宜章上諭今賊盡赴衡州宜及此時令粵東官兵就近由樂昌取宜章郴州則逆賊自難持久平南親王尚之信不必赴梧即速趨韶州同都統勒貝及統領江寧兵額楚進取宜郴兼定永州丁巳命統領江寧兵額楚專奏軍務上諭兵部廣東韶州地屬緊要一切軍務額楚若啓簡親王轉奏慮多遲誤其令額楚以江寧將軍印統轄兵馬都統勒貝參贊軍務凡事許得專奏乙丑命總督董衛國赴吉安衛國奏江西省城已有副都統多諾鎮守請身赴吉安會同大將軍簡親王商酌𠞰禦機宜上命衛國親率標兵赴吉安與大將軍簡親王共圖𠞰滅逆賊緑旗官兵聽其便宜調遣滿洲將軍毋得干預命將軍巡撫傅宏烈等定平樂桂林諸郡宏烈奏吳三桂偽總統馬寶取道宜章來犯前隊已抵富川祈更發一軍以為後繼或令韶州大兵奪取宜章郴州隘口臣同將軍莽依圖進取平樂桂林則逆賊不能兼顧湖南可立下矣上諭頃命平南親王尚之信將軍額楚都統勒貝等已統大兵速平宜郴諸處將軍巡撫傅宏烈可同莽依圖急定平樂桂林諸郡庚午命撤浙江福建蒙古兵上諭兵部福建已定見駐浙江福建蒙古兵俱宜撤還康親王可遣滿洲副都統一人同台吉塔布囊率之還京師平定三逆方略卷三十四

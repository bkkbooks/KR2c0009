body:
  text: 欽定四庫全書平定三逆方畧巻五十六康熙二十年正月丁巳勅大將軍貝子彰泰等親帥師𠞰賊彰泰等疏言提督桑額等報偽留守將軍及三偽將至普安率其衆萬三千人欲據盤江臣隨遣安順府駐防署前鋒統領薩克察巴圖魯等率每佐領兵三名有竒令固守鐡索橋諸處上諭廣西大兵已入滇境貝子彰泰等兵宜乘機速行進𠞰今大兵秣馬貴陽已經月餘且鐡索橋盤江最為要地提督桑額等既報逆賊欲據盤江貝子彰泰總督蔡毓榮等不躬親馳赴扼據要害撲滅賊寇止遣薩克察巴圖魯等率兵前往殊非事宜彰泰等其親統大兵迅往𠞰賊平定滇中勿失機㑹臣謹按盤江鐡索橋乃滇黔咽喉為必爭要地我兵據之則可以長驅無梗直薄滇城若為賊所扼亦可以負固自守茍延喙息故賊將數人統萬餘之衆悉力來爭是時彰泰等宜即躬統重兵星馳拒守乃竟不親行僅遣薩克察巴圖魯率每佐領兵三人以往皇上聞之即慮兵力尚單脫賊先據其地則我師不能驟渡或致相持日久亟勅彰泰等統率士馬疾行進𠞰彰泰等奉命遄行果能乘賊未到先渡盤江遂得進抵滇中與諸道㑹師擊滅逆寇葢皇上深知地利先事調度故能使賊狡計莫展勢蹙力殫不旋踵而悉皆顚踣也庚申以龍天佑為管領土司總兵官大將軍貝子彰泰等奏土司龍天佑詣臣軍迎降即𠞰茂口賊仍身率土司目兵防守要隘感念國恩特為輸力上諭以龍天佑為都督僉事授管領土司總兵官丙寅趣大將軍貝子彰泰等速進雲南上諭議政王等曰貝子彰泰等若乘逆賊敗走雲南之際即行追躡則雲南早已蕩平乃先借秣馬逗遛今復以逆賊肆犯推諉殊屬不合目前逆賊困迫已極旦夕滅亡若不乘機剪除恢定滇土更需何日且大將軍賴塔等兵抵田州即進定雲南為日已久彰泰等於諭㫖到日即率滿洲綠旗大兵之半速進雲南至於貴州亦屬重要可選賢能大臣及總督提督等統留半之兵令其固守彰泰等若仍前逗遛不疾馳進定雲南旋師日從重治罪命候補馬山偏圖為雲南總兵官提督桑額奏雞公背鐡索橋乃險要重地悉為我有滇省蕩平可立而待雲南舊設七鎮分汛防守今當地方初復請勅部遴選能員星馳赴鎮彈壓上諭候補雲貴總兵官馬山偏圖可先授為雲南總兵官其餘五鎮員缺俟雲南收復日遴補壬申詔送李本深至京師大將軍貝子彰泰等奏原任提督偽將軍李本深及大小文武官悉繳偽印劄相繼歸誠上命送李本深來京餘令量行安挿俾其得所將軍王進寳請赴瀘州𠞰賊上不許進寶疏言乞以將軍佛尼勒調往官兵及隨臣駐防保寧官兵付臣與臣子用予率之先𠞰瀘州逆賊乘勝進取遵義俟遵義克復臣仍還保寧上諭保寧諸處所關最要將軍王進寶仍遵前㫖駐鎮保寧綏輯蜀境乙亥將軍噶爾漢等奏復忠州萬縣諸處時逆賊譚洪死噶爾漢等兵復擊敗鄖陽之賊洪子天秘震恐遂焚萬縣賊巢天賜城寨以遁於是我兵直進萬縣開縣建始忠州梁山悉定丙子命將軍噶爾漢進取遵義貝子凖達還荆州初凖達奏水陸兩路進兵上以凖達前屢被勅進討譚洪彭時亨等乃推諉不前今見噶爾漢哈占等撃斬逆賊譚洪彭時亨殆盡始奏水陸進兵殊為不合因下詔責之復諭兵部今譚洪黨羽俱已就戮萬縣諸地悉經收復宜簡精兵健馬速取遵義將軍噶爾漢其簡選士馬疾行率赴重慶盡統貝子凖達軍速定遵義副都統得爾徳等兵亦聽調用萬縣地處狹隘難以飼馬可趨至重慶秣馬而進噶爾漢軍中効力有年困乏無馬者凖達悉行收取率還荆州至於䕫州要地令提督徐治都率標兵暫駐防守總督哈占可率所屬兵馳赴叙州府與大兵協力前驅𠞰賊戊寅命巡撫王新命運進蜀大兵糧餉郎中額爾赫圖奏請速撥湖廣額銀十萬兩解至臣所又運到軍糈僅支目下初無嬴積今乘川江水退宜多運糧米於軍中上諭大兵糧餉所闗重大巡撫王新命可先撥湖廣銀十萬兩星夜解交郎中額爾赫圖至於由川江運送兵米亦宜乘此水退之時源源不絶速運軍前如或遲緩貽悞軍機所司各官俱按軍法重懲不宥辛巳大將軍公圖海請赴援叙州上不許圖海奏逆賊并力來犯四川叙州諸處汛守滿漢官兵頗為單弱臣請量率兵馬往援上諭大將軍公圖海既調副都統翁愛率所部官兵自成都往援叙州總督哈占總兵官髙孟又各率官兵赴叙圖海所奏不准行其仍駐漢中防守秦蜀癸未贈將軍巡撫傅宏烈太子太師時宏烈陷賊不屈不受偽職賊怒遂遇害理事官麻勒吉以聞上諭傅宏烈自歸誠以來効力粤西著有勞績今陷賊不屈捐軀殉難忠義深為可憫從優贈太子太師廕一子入監讀書革學士孔國岱等職先是孔國岱等奏報已抵廣東㑹城上諭議政王等曰孔國岱等當進兵時不趣尚之信速發凡事又不預行詳報今乃以抵㑹城奏聞不合俟還日審取確供議奏至是孔國岱等至京議政王等取孔國岱及侍講學士薩喇供詞議各銷一級罰俸一年上諭初遣孔國岱薩喇前往時曾有密㫖令其以粤東事機滇黔賊情及尚之信狂悖之狀不時報聞乃孔國岱等行後從無一報情殊可惡所議尚輕其再議具奏於是議政王等又議各降四級調用上諭孔國岱薩喇奉遣時諭㫖甚明乃凡事不行奏報其畏懼尚之信無疑議政王大臣于駁令再議之事仍行輕議殊為不合孔國岱薩喇俱革職二月乙巳大將軍賴塔奏復安籠所時偽將軍何繼祖等據衆萬餘距安籠所三十里堅據石門坎隘口賴塔等遣都統貝勒希福馬竒䕶軍統領額赫訥等率前隊官兵先驅撲𠞰正月一日大敗賊衆奪石門坎隘口尋復安籠所城偽總兵陳義魁等率衆迎降戊申命巡撫鄂愷等遣官購買永寧一路兵糧總督哈占言永寧一路大兵糧米最要秦民輸運軍需困敝已極若於永寧瀘州諸處採買支給實兵民兩便上諭陜西巡撫鄂愷等支西安庫銀六萬兩遴選道員同知等官遣往永寧瀘州諸處與永寧道官㑹同採買四川巡撫杭愛布政使劉顯第等督趣監理勿悞軍需壬子勅巡撫楊雍建招集流民雍建奏言貴陽省㑹尚有未燬民居宜令流散人民復其本業量減徭役俾得補葺室廬至貴陽南北大路民居皆新經招集亦應量減差徭其供應夫役私派並請禁止上諭貴州巡撫楊雍建速行設䇿招集流民還業務令得所除供應大兵諸正役外有以私事借端多索人夫擾民者該巡撫即指名劾奏兼檄在黔將軍提鎮令嚴加禁戢癸丑將軍穆占等奏復平遠時偽大將軍髙啓隆偽將軍夏國相王㑹王永清張足法楊應選儂朋擁衆二萬餘人屯踞平逺西南山上將軍穆占提督趙賴率滿漢官兵於正月二十二日進擊連敗之髙啓隆等俱遁走王㑹率其標下弁兵詣軍前降我兵遂復平遠府平定三逆方畧巻五十六

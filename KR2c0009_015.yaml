body:
  text: 欽定四庫全書平定三逆方畧卷十五康熈十四年五月壬戌大将軍安親王岳樂奏復建昌岳樂等進取建昌於四月二十五日抵長興賊将邵連登等率賊八萬餘水陸迎敵岳樂與将軍希爾根等分布官兵擊敗之斬獲甚衆遂復其城庚午侍衛竒塔特等奏左翼察哈爾輸誠先是一等侍衛竒塔特博羅特等齎勅招撫左翼察哈爾至是奏臣等於本月初七日抵察哈爾營問以叛故據云右翼四旗被戮将馬分給綠旗今又欲調左翼四旗至大同誅之又聞四十九旗部落俱叛我等妻拏為所俘掠故衆心驚惶毁墻私遁以致擅奪牲畜遣人交通布爾尼此皆我等死罪豈望生全臣等因頒赦詔察哈爾欣感遂復歸順臣謹按先因陜西有警調左翼四旗察哈爾駐鎮宣府嗣布爾尼叛搆造流言轉相煽動若輩怵於其説遂毁邊墻私遁意欲仍歸故地依附黨類皇上諒其頑㝠無知特因一時疑惑疑懼逃歸不忍遽加誅戮乃遣竒塔特等前往招撫諭以國家優遇察哈爾之恩併疏布爾尼倍逆罪状大兵勦滅情形委曲開示曠若發䝉所以羣心聳悟銜恩悔罪踴躍歸誠仰見皇上大徳好生真上侔乎天地也甲戌命都統海爾圗總督周有徳等平仙逸闗賊運紅衣礟至秦州送礟都統海爾圗等奏臣等於本月初八日抵西安聞自荆州來之兵及貝勒催買弓矢䕶衛俱為賊阻暫駐隴州仙逸闗諸處若不滅此賊恐紅衣礟不能前進乞添發滿兵二千勦滅闗賊疏通道路上諭秦州需礟甚急若俟發禁兵恐稽時日今都統海爾圗總督周有徳叅領達爾泰等兵合計已足二千其即合兵以平闗賊速運紅衣礟前往秦州嗣海爾圗等至仙逸闗與賊相持上復諭兵部欲平陜西諸㓂必先取秦州欲取秦州必須大礟今海爾圗等率兵䕶送紅衣礟與賊相持於仙逸闗但在彼諸臣各自将兵恐互相推諉致誤軍機其令周有徳海爾圗為兵主滿洲漢軍副都統等俱為叅贊衆軍合而為一復立隊伍設官統制若至貝勒軍前周有徳海爾圗仍為叅贊諭大将軍康親王傑書安親王岳樂進兵機宜先是議政王等奏據貝子傅喇塔報稱俟提督常進功舟師自寜波到日令其䕶守浮橋即自率兵渡江取黄巖但時方風信未順水師不能遽至恐需時日以致師老且大兵俱集貝子所故康親王兵單未得進閩今安親王恢復建昌廣信諸郡若乘機進取建寜則仙霞賊勢必分貝子應量㽞兵駐守餘兵悉令康親王統轄規取仙霞若賊并力拒守則安親王乘虚而入建寜必破如此兩路夾攻得一路克捷便可翦滅閩賊上命康親王安親王詳議以聞至是康親王傑書疏言寜波舟師不能至台州已回定闗近攻小梁山又不能克台州兵止三千餘不宜輕調處州見有賊警金華兵力單弱似難驟進閩疆若安親王果進取建寜以分仙霞賊勢臣豈敢坐失機㑹按兵不前安親王岳樂又疏言常興賊已勦滅建昌賊亦解散見調将軍額楚副都統席布兵撲勦廣信之賊如令臣下廣信由分水闗取建寜則當分兵留守建昌親統官兵前進如令臣由杉闗取福建即當分兵留守廣信由杉闗前進上乃諭曰近報寜州䧟賊且時方炎暑安親王酌留官兵固守建昌諸處率大軍暫回南昌息馬俟秋凉或取湖南或攻福建候㫖以行額楚席布等應速廣信信賊臨分水闗陽為前進斷仙霞後路康親王即令将軍賴塔等兵乘機攻取仙霞或康親王兵與額楚等兵兩路並進夾攻江山賊㓂二王亦宜遥通聲勢以赴機㑹戊寅命貝勒察尼勦南漳諸處賊大将軍順承郡王勒爾錦奏據都統范達禮報逆賊五六千絡繹來犯南漳楊洪二逆兩路齊出臣随畀都統伊里布討逆将軍印并遣副都統根特統兵於本月初三諸日前往旋報榖城失守又畀貝勒察尼靖㓂将軍印率兵赴援上諭既以貝勒察尼為将軍率兵赴援即令統轄襄陽諸處官兵速滅南漳榖城賊㓂平定地方又襄陽要地宜設重兵其令汝州副都統色格率所部兵星赴襄陽安慶署副都統諾敏副都統孫承祖各率所部兵赴汝州駐守未㡬察尼等議遣伊里布范達禮率兵収復榖城庚辰調将軍畢力克圗等帥師援榆林上諭議政王等今左翼四旗察哈爾既已歸順應調山西兵援陜西以将軍國舅佟國綱所領前鋒兵及每佐領䕶軍一人駐大同盛京全軍綠旗馬兵三百人右翼察哈爾兵三百人付将軍畢力克圗率赴榆林同總兵官許占魁協力平定延安諸處令䕶軍統領傑殷協領覺和托叅贊軍務覺和托仍署副都統又令副都統恰塔率每佐領兵一人赴大同兼統見駐大同兵鎮守其餘每佐領兵一人調赴太原併太原汛守及保定調往兵令署副都統烏丹總統用建威将軍印鎮守國舅佟國綱散秩大臣綽爾濟都爾瑪等俱著回京既延安綏徳諸處䧟賊榆林危急許占魁請援又遣其子登隆至京師言状上復命畢力克圗速分兵付覺和托先赴榆林畢力克圗速率兵繼進癸未命副都統徳業立率兵勦闗山賊總督周有徳奏叅領達爾泰兵見阻闗山請調滿漢官兵赴棧道者來共滅賊以便運礟至秦州上諭大将軍貝勒等大兵在秦州路梗不通為日已久應先㓕闗山賊以開道路其令赴棧道副都統徳業立率所部兵速往闗山㑹同延布達爾泰海爾圗兵并力破賊開道運礟軍前平定三逆方畧卷十五

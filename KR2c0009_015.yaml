body:
  text: 欽定四庫全書平定三逆方略卷十五康熙十四年五月壬戌大將軍安親王嶽樂奏復建昌嶽樂等進取建昌於四月二十五日抵長興賊將邵連登等率賊八萬餘水陸迎敵嶽樂與將軍希爾根等分布官兵擊敗之斬獲甚衆遂復其城庚午侍衛竒塔特等奏左翼察哈爾輸誠先是一等侍衛竒塔特博羅特等齎敕招撫左翼察哈爾至是奏臣等於本月初七日抵察哈爾營問以叛故據云右翼四旗被戮將馬分給緑旗今又欲調左翼四旗至大同誅之又聞四十九旗部落俱叛我等妻拏為所俘掠故衆心驚惶毁墻私遁以致擅奪牲畜遣人交通布爾尼此皆我等死罪豈望生全臣等因頒赦詔察哈爾欣感遂復歸順臣謹按先因陜西有警調左翼四旗察哈爾駐鎮宣府嗣布爾尼叛搆造流言轉相煽動若輩怵於其説遂毁邊墻私遁意欲仍歸故地依附黨類皇上諒其頑冥無知特因一時疑惑疑懼逃歸不忍遽加誅戮乃遣竒塔特等前往招撫諭以國家優遇察哈爾之恩併疏布爾尼倍逆罪狀大兵勦滅情形委曲開示曠若發蒙所以羣心聳悟銜恩悔罪踴躍歸誠仰見皇上大德好生真上侔乎天地也甲戌命都統海爾圗總督周有德等平仙逸關賊運紅衣炮至秦州送炮都統海爾圗等奏臣等於本月初八日抵西安聞自荆州來之兵及貝勒催買弓矢護衛俱為賊阻暫駐隴州仙逸關諸處若不滅此賊恐紅衣炮不能前進乞添發滿兵二千勦滅關賊疏通道路上諭秦州需炮甚急若俟發禁兵恐稽時日今都統海爾圗總督周有德參領達爾泰等兵合計已足二千其即合兵以平關賊速運紅衣炮前往秦州嗣海爾圗等至仙逸關與賊相持上復諭兵部欲平陜西諸寇必先取秦州欲取秦州必須大炮今海爾圗等率兵護送紅衣炮與賊相持於仙逸關但在彼諸臣各自將兵恐互相推諉致誤軍機其令周有德海爾圗為兵主滿洲漢軍副都統等俱為參贊衆軍合而為一復立隊伍設官統制若至貝勒軍前周有德海爾圗仍為參贊諭大將軍康親王傑書安親王嶽樂進兵機宜先是議政王等奏據貝子傅喇塔報稱俟提督常進功舟師自寧波到日令其護守浮橋即自率兵渡江取黃巖但時方風信未順水師不能遽至恐需時日以致師老且大兵俱集貝子所故康親王兵單未得進閩今安親王恢復建昌廣信諸郡若乘機進取建寧則仙霞賊勢必分貝子應量留兵駐守餘兵悉令康親王統轄規取仙霞若賊并力拒守則安親王乘虛而入建寧必破如此兩路夾攻得一路克捷便可翦滅閩賊上命康親王安親王詳議以聞至是康親王傑書疏言寧波舟師不能至台州已回定關近攻小梁山又不能克台州兵止三千餘不宜輕調處州見有賊警金華兵力單弱似難驟進閩疆若安親王果進取建寧以分仙霞賊勢臣豈敢坐失機會按兵不前安親王嶽樂又疏言常興賊已勦滅建昌賊亦解散見調將軍額楚副都統席布兵撲勦廣信之賊如令臣下廣信由分水關取建寧則當分兵留守建昌親統官兵前進如令臣由杉關取福建即當分兵留守廣信由杉關前進上乃諭曰近報寧州陷賊且時方炎暑安親王酌留官兵固守建昌諸處率大軍暫回南昌息馬俟秋涼或取湖南或攻福建候旨以行額楚席布等應速廣信信賊臨分水關陽為前進斷仙霞後路康親王即令將軍賴塔等兵乘機攻取仙霞或康親王兵與額楚等兵兩路並進夾攻江山賊寇二王亦宜遙通聲勢以赴機會戊寅命貝勒察尼勦南漳諸處賊大將軍順承郡王勒爾錦奏據都統范達禮報逆賊五六千絡繹來犯南漳楊洪二逆兩路齊出臣隨畀都統伊里布討逆將軍印并遣副都統根特統兵於本月初三諸日前往旋報榖城失守又畀貝勒察尼靖寇將軍印率兵赴援上諭既以貝勒察尼為將軍率兵赴援即令統轄襄陽諸處官兵速滅南漳榖城賊寇平定地方又襄陽要地宜設重兵其令汝州副都統色格率所部兵星赴襄陽安慶署副都統諾敏副都統孫承祖各率所部兵赴汝州駐守未幾察尼等議遣伊里布范達禮率兵收復榖城庚辰調將軍畢力克圗等帥師援榆林上諭議政王等今左翼四旗察哈爾既已歸順應調山西兵援陜西以將軍國舅佟國綱所領前鋒兵及每佐領護軍一人駐大同盛京全軍緑旗馬兵三百人右翼察哈爾兵三百人付將軍畢力克圗率赴榆林同總兵官許占魁協力平定延安諸處令護軍統領傑殷協領覺和托參贊軍務覺和托仍署副都統又令副都統恰塔率每佐領兵一人赴大同兼統見駐大同兵鎮守其餘每佐領兵一人調赴太原併太原汛守及保定調往兵令署副都統烏丹總統用建威將軍印鎮守國舅佟國綱散秩大臣綽爾濟都爾瑪等俱著回京既延安綏德諸處陷賊榆林危急許占魁請援又遣其子登隆至京師言狀上復命畢力克圗速分兵付覺和托先赴榆林畢力克圗速率兵繼進癸未命副都統德業立率兵勦關山賊總督周有德奏參領達爾泰兵見阻關山請調滿漢官兵赴棧道者來共滅賊以便運炮至秦州上諭大將軍貝勒等大兵在秦州路梗不通為日已久應先滅關山賊以開道路其令赴棧道副都統德業立率所部兵速往關山會同延布達爾泰海爾圗兵并力破賊開道運炮軍前平定三逆方略卷十五

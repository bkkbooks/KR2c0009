body:
  text: 欽定四庫全書平定三逆方略卷四十五康熙十八年五月乙巳命調福建水師提督伯王之鼎為四川提督時上以湖廣嶽州水師總兵官萬正色諳習水性令其進勦海冦特授為福建水師提督故以之鼎調補四川丁未詔理事官麻勒吉赴廣西暫轄定南王所屬兵士將軍穆占奏廣西省城投誠僞將軍劉彥明徐洪貞線成仁等仍為都統副都統令其總轄藩下及緑旗之兵頗于事有益上諭劉彥明等所領投誠緑旗兵內有願歸農者皆令歸農願入伍者撥入廣西經制兵內其定南王下舊兵有老弱者裁去不必足從前三千之額數年以來定南王官兵分散各處收聚甚難宜令督捕理事官麻勒吉前赴廣西暫行統轄定南王下藩兵有分散者令其察訪料理一切調度軍務㑹同將軍莽依圖等商議舉行其廣西文武各官辨定南王下各官職名麻勒吉俱察明繕册以聞劉彥明等為都統副都統之處俟冊到日再議辛亥遣副將徐升耀賫敕招撫王屏藩等時升耀言願往招撫王屏藩吳之茂談洪張起鳳等上命加升耀都督僉事賫敇招撫諭王屏藩等敕曰自吳逆煽亂以來所在官民多被誘惑陷身賊中莫能自拔朕已洞悉情形屢頒敕諭廣示招徠開以自新之路念爾素受國恩必非甘于從逆或心存忠義遲回有待或勢被驅迫歸化無由朕甚憫焉兹湖南廣西俱經恢復各路兵馬齊進滇黔爾所悉知四川一隅皆朕赤子久罹兵燹不得早見太平每一念及殊多惻然特遣副將加都督僉事徐升耀前往宣布朕意爾其翻然改悟勿失機㑹率先來歸朕必赦其前愆論功叙録爾無懷疑畏勉圖後效以副朕定亂安民至意癸丑命遣官採購湖廣糧米運赴廣西時因廣西官兵乏糧議政王等議請令兩廣督撫由廣東設䇿運糧上諭不必自廣東挽運令遣户部賢能官二貟採買湖廣米運至廣西軍前其湖廣武岡諸處官兵亦令料理備辦己未命大將軍貝勒察尼治澧州以南軍事大將軍順承郡王勒爾錦治荆嶽彛襄諸處軍事察尼奏臣等前進荆嶽彛襄諸處相隔漸逺調遣防守事宜必致有誤上諭大將軍貝勒察尼等親統大兵往前進勦自澧州以南軍務聽大將軍貝勒察尼調度荆州嶽州彛陵襄陽等處軍務聽大將軍順承郡王調度辛酉調大將軍簡親王喇布等兵赴桂林將軍莽依圖奏桂林相近之兵請速調一支往駐桂林以張聲勢臣俟副都統額赫訥兵至貴縣即前赴橫州以絶栁州南寧之路因遣人趣馬承廕郭義等速行剃髮上命簡親王及穆占等兵內撥每佐領三人或四人遣一副都統率赴麻勒吉所令麻勒吉等統轄鎮守桂林六月戊辰詔雲南提督桑額率湖廣官兵進雲貴桑額奏新任湖廣提督暫駐彛陵請以彛陵官兵𨽻其標下而湖廣提標官兵姑屬臣統領上諭提督桑額隨大兵進取雲貴其湖廣提標官兵准入雲南提督標下俟底定之日仍回楚中彛陵鎮標官兵准為湖廣提標至于隨桑額前往官兵方事勦賊收疆標下官員可各加銜一等兵卒可動正項錢糧賞賚以示鼓勵壬申詔誅叛辨趙天元尚之信奏粵東之變起自新㑹江門江門水師之叛由于天元一人請以天元賜臣使得明正其罪立置典刑上諭趙天元不思圖報國恩乘粵西逆賊侵犯粵東首獻江門背叛致粵東變亂及粵東歸順後又從逆賊數犯疆圉今度不能免脫窘困至極方始來降情罪重大趙天元本係平南親王所屬之人王其立誅之甲戌削都統覺羅巴爾布職大將軍貝勒察尼等取巴爾布供辭以聞上命議政王貝勒大臣集議議政王等奏言都統覺羅巴爾布自率大兵往湖廣以來並未前進效力因其怯懦削去參贊令其贖罪圖功乃身率大兵坐駐彛陵大兵既復嶽州不乘賊中震駭之時探其虛實力行勦滅以贖前愆鎮荆山對壘之賊迄于逃遁竟未之知乃誑云分布官兵進攻巧為飾辨又不親身追殺逸冦止遣夸蘭大二人前往其後令巴爾布率領官兵攻取辰州又遲回瞻顧遷延時日竟不速進致賊復踞辰龍關得為守備巴爾布怯懦退縮一步不能前進貽誤大事失機甚多今奉㫖取供巴爾布又不即行認罪據實供招反為巧飾殊失大臣之體宜將巴爾布都統阿逹哈哈畨佐領及所加之級盡行削去羇繫荆州彼所襲其父拜他喇布勒哈畨與應襲之人承襲上報可乙亥大將軍順承郡王勒爾錦奏請增兵上責之勒爾錦奏前者渡江已簡兵士有馬者攜往所留守彛陵諸處兵並屬頂補多係無馬今平定疆土兵力單弱請悉以所有前鋒護軍調益臣軍上諭前令順承郡王等固守荆襄諸處而順承郡王遣貝子凖逹都統根特等率兵前守荆彛今撤還順承郡王至荆彛令平定歸州巴東乃復請益前鋒護軍惟于身之所在必欲厚其兵力所奏殊屬不合念見在進兵平定疆土除將軍噶爾漢等所統進𠞰兵外其荆彛諸處所在之兵許酌量調往戊寅尚之信奏僞將軍馬承廕等來降承廕于五月二十六日率僞將軍郭義僞總兵齊人龍及僞文武官􅌳敕印來降之信以聞壬午將軍噶爾漢奏暫撤還大兵上責之噶爾漢奏臣等率領官兵逼臨賊境見山髙路狹小溪甚多草木叢塞今值六月時多霪雨若山水暴下則魚貫之兵必至斷絶不能相顧矣且挽運亦難是以暫撤兵衆俟木落水涸更率官兵先滅山冦續取興安上諭噶爾漢自任將軍以來初無勞績惟閒住襄均諸處今當逆賊震動之時遣噶爾漢㑹同提督等𠞰滅山冦或有克取興安之機酌便而行乃不率兵破賊以圖報效反稱草木叢塞竟以兵還若此當草木未盛之先亦曾效力前進否噶爾漢不行努力以贖前愆反規避退兵殊屬不合即行嚴察議處但見在統兵進勦俟大兵旋日察議又近日陜西大將軍圖海奏稱四川逆賊出寶雞立營則興安之地已空噶爾漢其統兵而前擊破賊冦規復興安諸處毋失機宜甲申詔大將軍簡親王喇布等罷發桂林兵仍與安親王嶽樂約兵𠞰賊先因馬承廕郭義等尚未投誠上命喇布及將軍穆占等撥每佐領兵或三人或四人遣一副都統率往桂林至是喇布奏稱分兵發往桂林鎮守永州則臣等所部進𠞰之兵力殊單弱上諭今馬承廕郭義等俱已投誠則平南親王及將軍莽依圖等兵皆可逹桂林簡親王等不必分兵發往仍與安親王約𠞰殺賊冦戊子敇大將軍公圖海等速取漢中興安平定四川先是提督趙良棟奏稱湖南已經平定應復漢中興安臣願獨當一路展竭愚忠以圖自效上命圖海等確議至是圖海等奏稱棧道驛門鎮各口逆賊率衆來犯據險為營今令提督趙良棟進臨武寨相機而行俟臣等擊破驛門鎮諸處賊壘如有進取之機酌量分道而行上諭湖南逆賊大敗困蹙遁走大將軍安親王簡親王等三路進發平定武岡新寧諸處𠞰殺賊冦貝勒察尼等進取辰州順承郡王及將軍噶爾漢等亦從鄖陽彛陵規定蜀賊又馬承廕郭義等並皆剃髮廣西已平平南親王將軍莽依圖等亦統兵進𠞰今逆賊震懾正當勦撫並用之時大將軍圖海與將軍總督提督等共議亟殱侵犯寶雞之賊恢復漢興以平蜀地臣謹按蜀中山峻谷深道里阻狹地實至險從來不逞之徒多據為窟穴不易削平是時湖南逆賊潰遁諸路進兵皇上料蜀冦聞風必皆震懾若不應機疾進使賊得屯聚一隅據守要害恐蕩平之績非旦夕可致爰命圖海等率師迅邁收復蜀疆逮圖海等奏稱賊毁偏橋道途有梗將軍張勇提督孫思克等又請姑止進兵皇上概弗之許仍下詔嚴趣于是諸將帥始部勒士馬分路並發果奪其關隘殱厥渠豪蜀境悉平直抵雲貴皇上洞察賊形深悉機勢以萬全之慮為必勝之謀睿略淵謨誠諸將帥所不能仰窺萬一者矣己丑詔撤福建內府佐領官兵大將軍康親王傑書等奏閩中濱海要汛及墩臺營寨俱緑旗官兵防守滿洲大兵惟駐形勢之地相為聲援滿洲兵數頗多宜酌量撤還上諭滿兵既云宜撤當如奏撤回但海氛未靖止先撤內府佐領官兵一千俟此兵到日再議發往更代庚寅詔大將軍安親王嶽樂等分路進兵時侍郎宜昌阿等至湖廣傳諭諸大將軍等酌議撤兵大將軍貝勒察尼奏言臣察見在進征常德桃源護軍每佐領各五人有餘驍騎兵每佐領各七人有餘漢軍共一千二百餘人緑旗兵共二萬七千餘人其兵足以前進所有在常德者外藩䝉古兵四百餘人在澧州者外藩䝉古兵二千三百餘人應行撤還松滋宜都驍騎兵五百人漢軍一百人緑旗兵四百餘人足以鎮守疆圉二處所有外藩䝉古兵五百人亦應撤還其在嶽州滿兵每佐領各三人有餘漢軍共三百餘人俱撤還荆州并入荆州兵內共成每佐領五人之數俾之鎮守其餘滿兵每佐領各二人有餘鎮守荆州外藩䝉古兵二千餘人鎮守嶽州外藩䝉古兵六百人亦俱應撤還大將軍簡親王喇布奏稱烏拉寧古塔之兵宜遵㫖撤還但新寧諸處見有賊冦請暫留烏拉寧古塔兵一千二百餘人臣等二支之兵合而為一每佐領兵各十一人有餘于其中選每佐領八人及緑旗官兵一萬二千餘人率之前往與安親王相期進勦新寧賊冦俟破賊之後烏拉寧古塔兵即行撤還其永州宜撥滿兵無馬者每佐領三人緑旗兵二千人鎮守令總兵官蔡元等率緑旗官兵三千五百人鎮守全州其兩支外藩䝉古兵一千七百餘人應行撤還大將軍安親王嶽樂奏稱臣所統護軍驍騎兵每佐領共十五人䝉古兵一百餘人簡親王等既進取新寧臣當率每佐領兵各十一人緑旗官兵一萬人與簡親王相期進勦武岡東口之賊其衡州宜留每佐領滿兵各一人緑旗兵一千二百人總兵官張忠標兵二千人防守寶慶宜留每佐領滿兵各一人緑旗兵一千人防守嶽州宜撥每佐領滿兵各二人前往與鎮守嶽州緑旗官兵協同防守其外藩䝉古兵應行撤還簡親王等儻不進取新寧其前欲攜往進勦緑旗官兵一萬二千餘人及得勝等炮祈發臣軍前以便攻勦武岡新寧東口賊冦上諭安親王兵可兩路進取武岡東口簡親王等兵與安親王兵約期進取新寧破新寧賊後烏拉寧古塔兵聽令發還貝勒察尼等兵攻取辰州等處蕩滅冦賊衡永荆嶽諸地俱如所奏留兵鎮守其諸處撤還滿州䝉古兵俱令大臣官員沿途嚴加鈐束詔送馬至武昌上諭兵部爾部見飼馬匹及營驛之馬可選擇二千如例送至武昌令善加芻秣備用平定三逆方略卷四十五

body:
  text: 欽定四庫全書平定三逆方略卷四十八康熙十八年十一月壬辰朔敕巡撫李天浴同廣西兵進𠞰先是上特遣大臣往廣西湖南陜西令王將軍總督提督等詳議𠞰滅賊冦事宜具奏至是總督金光祖奏言今方自粵西進取雲貴而雲貴督撫提督俱見在湖南請於諸臣中酌分一二來粵以資彈壓上諭雲南巡撫李天浴可前往廣西同王將軍等進𠞰并撫定新復地方甲午命減撤辰溪兵還京師大將軍貝勒察尼疏稱全撤屯駐辰溪大兵量留防守桃源常德澧州每佐領十人其八人有竒令都統鄂鼐等率之還京師上諭每佐領兵可撤還六人鄂鼐熟諳軍務其留之軍前更擇以次人員令率兵還京辰溪乃已得之地不可輕棄仍加意固守貝勒察尼等今方與賊對壘所撤之兵雖少而湖南諸處初經底定投誠官兵甚多恐乘此撤兵之際或有他虞察尼等宜密加防守每事相機詳慮而行乙未詔封䝉古郡王固祿為親王上諭議政王等多羅郡王固祿當榆林總兵官遣使請兵不及候㫖即調兵應援及聞神木變叛又即遣其子統兵先行嗣復力疾親往為國效力撫降神木縣固祿可封和碩親王丙申將軍王進寶奏克武關進寶率官兵至武關距五里許賊恃險拒敵我兵奮勇前進斬殺甚多擒僞總兵羅朝興等遂奪其關戊戌將軍王進寶奏復漢中進寶統兵於十月二十七日追𠞰賊衆直抵漢中賊渠王屏藩引賊兵自青石關遁廣元我兵遂復漢中府城復遣官兵追擊直抵青石關庚子敕巡撫張朝珍發兵赴提督徐治都軍前治都奏請調發撫標官兵及武昌漢陽各營官兵上諭將軍王進寶統率官兵于棧道險峻之地屢敗賊寇直前恢復漢中逆賊王屏藩所部之賊不及千人已經敗遁今當逆賊敗奔震動之時進定四川最為重要著如徐治都所請令巡撫張朝珍調標兵千人併武昌漢陽營兵一千二百人速行遣發如或稽延治巡撫以貽誤軍機之罪儻治都遲滯不進亦以貽誤軍機之罪罪之趣大將軍公圖海等進兵提督趙良棟疏稱臣率兵敗賊於打火店王家臺追抵白水江賊在在拒守于十月二十五日夜官兵始排險渡江惟是三路官兵不知逺近而臣以一旅尾擊而前似已深入儻少遲延萬一蜀糧得至賊心一堅復出守險則再進甚難上諭曩者大將軍公圖海奏言彼親率將軍佛尼勒等由興安路進將軍畢力克圖提督孫思克等由略陽路進將軍王進寶等由棧道路進提督趙良棟由徽州路進今王進寶擊敗棧道之賊直前恢復漢中趙良棟擊敗賊衆恢復徽州直抵略陽惟圖海畢力克圖等兩路之師如何擊賊已抵何所迄今尚未報一審問且畢力克圖等未至所指之地而趙良棟已抵略陽彼等所行者何事當此逆賊搖動之時圖海畢力克圖孫思克等可速統兵𠞰賊進定疆圉各路之兵令互通音問又王進寶趙良棟等統兵深入已經題報而圖海畢力克圖等兩路之兵竟未奏達情形可速以其故明白奏聞至趙良棟兵既己深入畢力克圖孫思克等速統兵繼其後以進儻若遲緩不前致有隔絶即以遲誤軍機之罪罪之未幾良㨂奏敗賊於巴都山恢復略陽敕將軍尚之孝𠞰建寧賊之孝奏據大將軍康親王咨福建江西接壤之地尚有逆賊江機楊一豹擾害建寧邵武諸處令臣速進兵𠞰滅臣星夜至汀州整頓甲兵進𠞰上諭尚之孝速先平建寧諸處之賊仍遵前㫖率兵赴江西與總督提督等共商𠞰撫江西餘寇未幾江機楊一豹等相繼投誠辛丑嚴敕陜西總督巡撫等轉運進蜀大兵糧餉上諭户部前者大兵進𠞰四川已破朝天關直抵保寧恢復在邇因周有德張德地席卜臣駐廣元不能竭力轉運糧餉達之軍前陜西總督巡撫亦不竭力輸運糧餉致大兵乏食難於久駐遂爾却回貽誤軍機關係重大此數年以來使逆賊逋誅封疆未復兵民苦纍休養無期皆周有德張德地席卜臣陜西總督巡撫怠玩遲延之故每念及之深可痛恨今大兵分路進取已恢復漢中不日前抵蜀疆相繼𠞰撫底定可期軍前糧餉最為重要其令陜西督撫諸臣殫心經理設䇿輸運務使士馬飽騰捷音早奏以副朕定亂安民至意如督撫諸臣漫不經心泄泄從事致饋餉缺乏有誤軍機俱以軍法從事决不姑恕爾部速傳諭遵行甲辰諭諸將大臣收復四川防守陜西機宜上諭議政王等曰將軍王進寶副朕超擢顯用之意親統官兵冒險前進首先恢復漢中提督趙良棟亦副朕優擢之意親統官兵恢復徽州隨取略陽彼等皆報朕之恩實心效力今乘此破賊之勢即恢復保寧平定四川亦有何難進取漢中各路總兵官所部官兵王進寶趙良棟等作何調遣前取保寧平定四川可詳加定議知㑹大將軍酌量而行大將軍公圖海率領大兵之半屯駐鳯翔防守陜西通省以護軍統領烏丹為將軍率大兵之半為王進寶趙良棟後殿務俾糧餉無或斷絶與總督哈占等㑹議而行提督孫思克止率其所部兵駐防原守汛地湖廣提督徐治都速統舟師乘兹勝勢沿江直取重慶將軍噶爾漢總督楊茂勳提督佟國瑶等已進興安迄今尚未奏捷怯懦已甚俟恢復興安之日噶爾漢等俱撤還原守地方前所有功績盡行削去該部嚴察議處噶爾漢佟國瑶令駐防鄖陽諸處楊茂勳率所部官兵速自鄖陽啓行由荆門當陽迅至彞陵與徐治都直從江上流而進奮力平定四川以贖其罪及大將軍公圖海等恢復興安兵部遵㫖議將軍噶爾漢等罪以聞上諭噶爾漢即宜嚴加處分苐見守地方暫停議罪俟事平嚴加處分佟國瑶免削前守鄖陽功留其所加太子少保楊茂勳到後佟國瑶所建功績俱行削去亦削楊茂勳所加一級詔給都統馬九玉官兵俸餉如滿洲官兵例將軍巡撫傅宏烈奏靖南王藩下都統馬九玉兵隨征逺涉支行餉九錢未足給用上諭馬九玉率兵自福建赴廣東廣西今又同大兵進平雲貴令如滿洲官兵例支給俸餉乙巳敕陜西諸將大臣收集糧餉上諭户兵二部前據大將軍等疏稱王屏藩諸賊於漢中興安諸處擁衆數萬堅守抗拒以此推之必廣儲糧餉為數年之備今我大兵驟入恢復之地賊所聚糧必已多得當此逆賊軍敗懷疑人心渙散之㑹削平地方似尚不難惟蜀路運糧最為重要宜於所復城池村落遍訪賊積米榖悉行察收俾進蜀官兵不誤支給則於國家大事禆益非細諸將軍大臣等俱宜殫心儲備所獲漢中諸處錢糧米榖節省支用副朕滅冦安民至意此後所至之地惟宜以此為急務爾部即遵諭速行臣謹按是時大兵分道進蜀需餉殷繁山路險隘轉輸非易皇上以軍糈所關至巨度蜀寇擁衆屯踞必蓄數年之食與其千里挽運不若藉其所有以裕軍儲乃諭陜西將軍大臣于入蜀之後察訪賊所積糧遍行簿録撙節支用因而我兵進𠞰士馬飽騰不虞匱乏而秦蜀之民亦免供億輸挽之纍兵法所云因糧而敵者正謂此也己酉詔總督蔡育榮修治船艦育榮奏辰沅水路直達武陵賊踞上遊于白溶諸處泊船最多賊既依陸路之險又從水路窺伺若我師悉由陸路進攻恐賊順流以襲我師之後上諭賊據水路我師船艦不可不備該督其動支正項錢糧造八漿小船二百配撥官兵水手舵工訓練熟習以濟𠞰禦壬子遣郎中蘇赫臣往趣總督楊茂勳進兵上諭議政王等曰今將軍王進寶等率領官兵直入恢復漢中諸處逆賊王屏藩等分道敗遁當此蜀賊震動之際速由重慶䕫州進兵則恢復蜀省不難今湖廣船艦已成前雖有㫖令提督徐治都等率舟師溯江而上直取重慶又令總督楊茂勳速往㑹徐治都協力進𠞰恐復觀望遲延亦未可知宜簡部院堂司官往趣進兵其情形并令不時具報議政王等㑹議以上諭最當請簡大臣官員遣往上命郎中蘇赫臣赴楊茂勳軍前趣兵速赴彞陵尅期前進并令與茂勳同行不時偵探軍情以聞甲寅趣將軍烏丹等速統大兵隨提督趙良棟後進定四川時良棟奏臣攻取略陽隨發兵三路追𠞰數次擊敗賊衆共斬六千餘人恢復陽平關上諭議政王等陽平關逼近寧羌係入蜀之路沔縣亦與漢中相近今提督趙良棟恢復徽州直取略陽陽平關其意或欲進定四川儻不及與將軍王進寶等共議乘機徑往定蜀則滿洲大兵不可不為後繼兹事最關重大其檄趣將軍烏丹偕總督哈占速統大兵為進定四川兵馬後應運致糧餉相繼不絶毋使軍機有誤乙卯詔安親王嶽樂率大兵還京師以固山貝子彰泰代為定逺平冦大將軍嶽樂奏臣等欽遵諭㫖公同酌議每佐領留兵十二人防守武岡州諸處其每佐領八人前鋒二百人護軍每佐領三人驍騎并漢軍每佐領五人俱行遣還此遣還之兵令固山貝子彰泰內大臣阿密達護軍統領桑額署護軍統領伯郎素輔國將軍宗室瓦山前鋒統領碩岱副都統伊巴漢署副都統穆森雅哈喇率往其留守之兵議令實授都統品級穆占護軍統領拉賽署前鋒統領薩克察巴圖魯學士薩海都統夸札漢軍都統釋伽保前鋒統領沙納哈副都統託岱花塞龔圖漢軍副都統祖澤純宜思孝署副都統公沃赫達漢泰沙禮等統領議政王等議奏頃者大將軍貝勒察尼每佐領發回兵八人奉㫖每佐領撤還六人今安親王軍前所有滿兵亦宜每佐領撤還六人大臣官員留者與發回者俱如王奏上諭安親王自統兵以來各處立功甚多隨往官兵亦多效力如王所題令其親率每佐領兵八人還京固山貝子彰泰授為定逺平寇大將軍以王敕印留與彰泰令彰泰穆占同心協意商確而行但見在與賊對壘所撤之兵數雖不多而湖南初經底定投誠之兵甚衆乘此撤兵之時恐姦宄竊發亦未可定彰泰等宜熟計防守其間有可行之機務乘時進取母失事㑹已而嶽樂又奏嶽州今係內地嶽州兵每佐領二人似宜撤還京師上曰嶽州今不必守大將軍順承郡王于在嶽州荆州諸處兵內撥征行在先進𠞰勞苦者每佐領二人與安親王率還大兵一同啓行又漢中諸處已經恢復順承郡王所統兵內若有應發回者速行奏聞丁巳詔提督許貞統轄江西全省軍務大將軍安親王嶽樂奏提督趙國祚等老病不能效力上諭趙國祚等固屬年老身病不能效力准以原品解任江西既有提督許貞其趙國祚提督員缺停其補授全省地方俱令許貞統轄速移文趙國祚等與發回大兵一同來京平定三逆方略卷四十八

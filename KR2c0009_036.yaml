body:
  text: 欽定四庫全書平定三逆方略卷三十六康熙十七年三月癸酉敕大將軍康親王傑書增兵守漳州海澄總督郎廷相奏海澄為漳泉門戶今海逆登岸據有王洲等寨復分路侵犯石碼江東橋諸處臣已同副都統瑚圖海澄公黃芳世公議酌發滿漢官兵前往應援但漳屬地廣兵少防禦尚恐難周上諭海賊分路侵犯不可不亟發援師大將軍康親王速增遣大兵與郎廷相黃芳世協力固守漳州海澄諸處𠞰滅海寇乙亥命和碩額駙華善等赴茶陵將軍穆占奏大將軍簡親王所遣護軍統領哈克三等之兵來自長途馬多疲憊臣茍俟彼同行又值炎暑若署副都統公沃赫總兵官趙應奎至日委以疆土即行前進則茶陵諸處曠濶兵力未足給守請先調江西兵內馬肥者每佐領二三人遣大臣一員率之速赴茶陵鎮守度簡親王兵必由茶陵進發臣等移兵候於耒陽郴州協謀以行上諭哈克三等之兵長途馬憊不能疾馳穆占若俟彼同行愈稽進𠞰之期且茶陵諸處所係亦屬重要理宜固守簡親王可就兵丁馬健堪用者每佐領選二人授和碩額駙華善定南將軍印與學士薩海領之速赴茶陵與沃赫等協同駐鎮哈克三等至吉安稍休士馬即繼簡親王進兵湖南共圖滅賊尋華善奏簡親王付臣每佐領兵二人但茶陵諸處止有沃赫一人其於分泛防守實為未足上復諭之曰江西通省所係惟在茶陵大兵前進初無後繼將軍穆占簡親王等公同商酌選良將精兵留之茶陵保固江西務俾萬無一失戊寅敕將軍莽依圖等守賀縣開建上諭兵部頃以江西底定因命大將軍簡親王進取永州寶慶遣將軍舒恕防守韶州南雄相機而行又令平南親王尚之信發兵赴廣西調將軍額楚等自肇慶赴梧州諸路並進滅寇恢疆正在今日總督金光祖又稱賀縣開建乃粵東門戶最為要地守此二處則兵餉可由封川運致今閲報文將軍莽依圖傅宏烈自平樂回軍儻莽依圖等還至肇慶德慶俾賊得據賀縣開建為死守計則復圖進取良屬不易梧州諸處將不可保即恐東粵亦至動搖莽依圖等宜固守賀縣開建諸處遇有機㑹可乘即行前進金光祖督運糧餉以給大軍毋致有誤癸未敕諭在外大小文武各官上諭吏戶兵三部朕統御寰區孜孜圖治期於朝野安恬民生樂業共享升平乃副朕宵旰勵精之願不意逆賊吳三桂背恩煽亂各處用兵禁旅徴𠞰供應浩繁念及百姓困苦不忍加派科斂因允諸臣節次條奏如裁减驛站官俸工食及存留各項錢糧改折漕白二糧顔料各物增添鹽課鹽丁房田稅契牙行雜稅官戶田地錢糧奏銷浮冒隱漏地畝嚴行定例處分用過軍需未經報部不准銷算以上新定則例不無過嚴但為籌畫軍需早滅逆賊以安百姓之故事平之日自有裁酌各省督撫提鎮大小文武等官俱宜上體朕意下念民生潔已奉公愛惜物力務期早奏蕩平與民休息以稱朕又安海宇至意命尚之信仍駐廣東㑹城之信奏前有㫖命臣親統官兵進廣西臣慮逆賊窺我兵已撤必肆潯梧且髙雷廉三郡初定人心尚未寧戢恐復為逆賊煽惑再四熟籌不得不駐鎮省㑹以圖四應上諭尚之信藩下兵著精選萬人遣赴廣西停其親往仍鎮守廣東省㑹兼顧潮惠勿致疏虞甲申命大將軍貝勒尚善圖功贖罪先是上諭議政王等嶽州前後船艘多於賊數倍合此船破敵何難之有乃尚善統兵駐嶽州已經數年未一大創賊寇今大將軍安親王分兵既克平江江西湖廣道路已通俟公溫齊等兵及自陜西調往之兵抵嶽州日尚善可率所部大臣及每佐領兵五人赴長沙駐守令安親王率所部大臣選每佐領兵五人來取嶽州進攻嶽州時應遣將軍鄂鼐率舟師前進陸地則令滿漢官兵實土蘆囤排列鹿角進逼賊壘晝夜火攻俾賊水陸應援不暇江之南岸石首縣城即宜攻取令水陸兵連營江岸或另立一營扼湖之險更於南潯港地方水陸立營斷賊後路安親王總統官兵相機𠞰援庶為有濟不必令舟師往泊君山無用之地若凖此而行斷賊餉道朕意以為必能克取嶽州至是尚善奏言臣等數年與賊對壘並無寸效仰慰聖懷今臣等仍願統率舟師務克嶽州以贖前罪上諭尚善等願率舟師自效可仍留嶽州務痛懲前非滅賊收疆勉圖贖罪詔大將軍康親王傑書罷遣廣東援兵傑書奏前令臣發兵守潮州今海逆侵犯海澄諸處大兵僅足支持無兵可遣上諭平南親王尚之信已停赴廣西見令兼顧潮惠而靖南王耿精忠將軍賴塔仍鎮守潮惠諸處大將軍康親王其速遣官兵𠞰滅侵犯海澄賊冦不必應援廣東乙酉敕大將軍簡親王喇布與將軍穆占合兵進定湖南先是上諭議政王等曰韓大任等既抵福州其江西追𠞰官兵度已回汛大將軍簡親王宜乘此機㑹統率大兵亟𠞰湖南逆賊一應機宜可與將軍穆占定議或并力㑹𠞰或分道進發相機速行一面奏報至是穆占奏請令簡親王兵與其所部兵㑹合一路自茶陵取郴州耒陽諸處即自永州渡江直向衡州上命簡親王整頓軍馬速與穆占㑹合詳加籌畫令江西萬無他虞保固茶陵諸處及大將軍安親王後路然後㑹師一路進發平定湖南其護軍統領哈克三等追𠞰韓逆直抵福建軍士馬匹羸乏可將現在南昌馬一千解至簡親王軍前均給缺馬軍士丙戌諭大將軍公圖海罷漢中興安進兵上諭圖海曰卿前疏言秦地遼濶留守兵單今當進取漢中興安之期度果萬無一失有收復之機仍行進取但秦地所繫重大卿等親率大兵前進而王進寶孫思克等倚任諸臣俱在戎行脫行後更有他虞殊難遏禦宜暫停漢興之役固守所在要害廣布恩威從事招撫俟後有可取之機再行聞奏其謹閟之命將軍莽吉圖守梧州上諭議政王等曰今逆賊侵犯潯州諸處梧州髙州所關最要將軍莽依圖可駐鎮梧州若遇髙州諸處有警即行應援將軍巡撫傅宏烈整頓士馬俟進兵平樂桂林與將軍額楚都統勒貝署副都統穆成額同行如兵力未足許於莽依圖等兵內量調前進既復諭議政王等曰自逆賊吳三桂叛變以來大兵諸路徴𠞰平南親王尚之信歸正之時將軍巡撫傅宏烈思念國恩密約反正所領官兵從未支領俸餉輒奮勇入粵西收復梧潯諸處殱戮渠帥屢奏捷功嗣以進取平桂規定滇黔奏乞迅發大兵以相助援因遣將軍莽依圖等協力恢取平桂本期莽依圖等與傅宏烈并力平定廣西克濟大事不意莽依圖等兵抵平樂寸步不前藉口緑旗營壘失陷遽奔還中山鎮仍復畏縮退至賀縣又託言糧餉不繼徑回梧州德慶以傅宏烈恢復如許城池盡棄與賊今若梧州乏糧必將退回肇慶肇慶乏糧必將退至廣州茍廣川乏糧當復棄廣州而還耶如此怯懦多端推諉不惟誤西徴之事即粵東恐亦可虞頃有㫖令莽依圖駐鎮梧州兼顧髙州諸處嗣今宜痛改前轍鼓舞軍士勉圖後效相機𠞰賊底定封疆爾等嚴行申飭臣謹按大兵自粵東進𠞰雲南必取道粵西前者傅宏烈率部衆西徴疏請濟師皇上念平定粵西所關重要宏烈孤軍或難集事已亟命莽依圖等合軍進𠞰是誠蕩平一大機㑹也當莽依圖等抵平樂敗賊之後即奮力環攻其城則平樂必下我師可以徑達桂林矣不謂攻城少緩俾逆賊吳世琮得統衆來援龔破宏烈等軍莽依圖復不能整兵擊賊藉口緑旗失利遽爾引退及至賀縣又託言糧餉不繼竟還德慶致潯州諸地仍為賊有祖澤清復叛於髙州粵東因之騷動幸賴廟算增調官兵迅討叛寇扼守要害使逆賊不得鴟張澤清旋即就縛而粵東無虞粵西亦相機底定大兵遂長驅而進直搗滇中蓋聖明調度悉合機宜所以行間諸將能稟承者克奏捷功稍有稽違則必致失利也詔廣東協濟廣西兵餉將軍巡撫傅宏烈奏粵西地方今僅存梧州一府滿漢兵馬芻糗浩繁力難供應上諭大兵糧餉關係殊急不可但取給廣西宜令廣東協濟平南親王尚之信可支餉銀二十萬兩解赴廣西并令廣東督撫運致糧草俾無誤軍需癸巳命大將軍貝勒尚善招撫杜輝尚之信奏僞水師將軍杜輝之子杜國臣向在廣東臣於本月初六日遣人送赴嶽州上諭杜輝原係雲南永北總兵官儻思念國恩傾心歸正於事甚有禆益杜國臣抵嶽州日大將軍貝勒選賢能人員密遣至輝所曉以伊子來嶽招令反正或杜輝實心歸化潜約何地乞遣其子或畏遣子泄漏答以他言貝勒應審察情狀若國臣可遣度萬無可慮則遣之務俾有濟大事如稍有可疑切勿輕畀俟有機㑹布朕德意移書招致爾宜加意慎祕勿使宣泄遣詹事宜昌阿赴嶽州上諭兵部遣詹事宜昌阿前赴嶽州與大將軍貝勒尚善㑹議隨宜招降杜輝並視大兵擊賊情形庚子命總督蔡育榮率兵赴嶽州大將軍貝勒尚善奏嶽州原有鳥船又奉㫖添造者一百艘沙船四百三十八艘官兵自陸路分布外餘滿洲䝉古漢軍配鳥船八十艘沙船一百七十三艘緑旗配鳥船二十艘沙船一百二十二艘猶餘沙船一百四十三艘須用緑旗兵五千人臣等兹役入湖務期破賊乞如數調發上諭公溫齊等率往所調陜西滿漢兵以及船數乃尚善所備知宜早為通計如有不足預當奏請今各路赴調之兵俱抵嶽州船艦營造已竟乃始奏請增兵殊屬不合但尚善等既稱兹役入湖務期破賊其令蔡育榮率標兵三千并荆州隨徴緑旗兵二千馳赴嶽州與尚善協力擊破湖賊攻取嶽州如荆州彛陵防禦兵少大將軍順承郡王參贊大臣總督蔡育榮公同酌調附近緑旗兵遣發汛守閠三月辛丑朔敕理事官麻勒吉等招撫馬雄孫延齡餘黨大將軍簡親王喇布奏麻勒吉等抵吉安稱孫延齡為吳三桂所殺馬雄病死上諭馬雄孫延齡雖經死亡其餘黨尚踞粵西理事官麻勒吉等仍同簡親王軍偕行以朕赦罪諭功之意槩行曉示其被脅從賊之人有悔罪投誠者即行招撫癸丑命尚之信等討祖澤清廣東肇慶安塘司庫報三月二十二日髙雷總兵官祖澤清復叛二十四日提督王可臣病故上諭祖澤清先經反叛及投誠之後隨加寬宥仍授總兵旋擢鑾儀使今復背恩反叛凶惡已極宜即行誅滅以懲奸類平南親王尚之信將軍莽依圖額楚傅宏烈總督金光祖等其㑹同商酌速行蕩滅至廣東提督職任綦重王可臣既已病故管理不可乏人其令總兵官侯襲爵暫理提督事務與大兵協力討賊丙辰命遷邊海界外居民於內地上諭議政王等曰海寇盤踞厦門諸處勾連山賊煽亂地方皆由閩地瀕海居民為之藉也應如順治十八年立界之例將界外居民遷移內地仍申嚴海禁絶其交通但窮苦之民一旦遷徙必棄其田舍難以為生殊可憫惻可將本年地丁錢糧差徭雜項盡行除豁該督撫揀委能員遷徙人民勿致苦纍仍俾安輯得所丁巳授將軍穆占進兵機宜穆占奏言接大將軍安親王檄稱湘潭僞將軍林興珠遣人約降大兵方渡江駐湘潭以圖進取臣若俟簡親王至日方行恐失機㑹今議以南昌所屬付總督董衛國贛州南安付將軍舒恕令之駐守而留每佐領兵二人於吉安令副都統一人領之防守太和萬安諸處又留滿兵三百人於永新亦令副都統一人領之𠞰禦郭應輔等賊兼顧茶陵後路乂令袁州副都統席布率每佐領兵二人鎮守袁瑞臨江諸郡兼顧安親王後路廣信尚有餘賊令總兵官許貞領標兵二千駐守其總兵官髙登科標兵一千贛州緑旗兵二千俱聽簡親王統率前進簡親王抵茶陵日留所部才能大臣精鋭官兵之半其餘簡親王率之仍遵前㫖從臣兵所由之路進定湖南至攸縣最為要地已留臣所部前鋒統領希福率副都統公沃赫之兵與將軍華善協同鎮守攸縣安仁諸處兼顧江西臣於本月十二日自茶陵啓行進取耒陽郴州桂東桂陽上諭將軍舒恕見鎮南雄韶州諸處不便更令移駐南贛其令巡撫佟國禎總兵官哲勒肯固守南贛餘如穆占所請當此逆賊震動之際穆占急宜進兵郴州耒陽以分賊勢耒陽諸處克復即於上游渡江斷賊歸路與安親王協𠞰賊寇如江未可渡則為渡江之形略定沿江北岸地方以張安親王大軍聲勢詔責將軍莽依圖莽依圖奏所部滿洲䝉古兵馬多疲甲胄朽敝上諭莽依圖赴廣西不能奮力破賊亟行退却前既藉口糧匱今又以兵無馬甲託詞具奏殊辜委任且以莽依圖退縮之故賊勢益張致廣東震動祖逆復叛宜即嚴加治罪但時方用兵髙州暫緩處分俟旋師日察議既而莽依圖以失利退兵致地方失陷自陳請罪乞罷將軍任上復切責之曰莽依圖至平樂不能殱寇拓疆擅自退還致潯州諸處陷賊今乃云彼未至梧州𫝊宏烈金光祖早已棄地明諉過於宏烈而託以認罪為辭巧飾妄奏殊屬不合宜立行處分但見在行間其仍留將軍任圖功贖罪己未遣郎中拉篤祜如凉州先是上諭兵部自席喇塔喇至瑚呼諾爾道路甚近此䝉古中情形及其地方朕皆悉知可令郎中拉篤祜馳驛來京面承密㫖尋諭大學等令拉篤祜赴凉州探厄魯特部落台吉噶爾丹信息不時以報至是拉篤祜來京請攜將軍侯張勇標員一人同往凉州上許之庚申趣大將軍貝勒尚善進兵上諭兵部據將軍穆占奏僞將軍林興珠赴大將軍安親王軍前投誠逆賊俱無固志嶽州長沙相距頗近貝勒尚善必已聞知前尚善等疏稱俟添造鳥船沙船皆至前破湖賊今方逆賊震讋之時若有隙可乘不必俟船齊備即以現在船艦進攻仍録穆占所奏示尚善及順承郡王知之丙寅命南汝總兵官周邦寧率兵赴荆州先是大將軍順承郡王勒爾錦奏前㫖令總督蔡育榮率兵五千赴嶽州但彼標兵自荆州以至彛陵諸路俱設汛防而大江賊船不時出沒滋陽逆賊復渡江置壘若育榮率兵赴嶽則荆州諸處不無可虞上諭攻取嶽州事機重大且大將軍貝勒尚善既稱兹役進湖必期破賊蔡育榮之兵不可不遣順承郡王仍遵前㫖行荆州兵既未足可令河南南汝總兵官周邦寧率標兵一千五百人赴襄陽既至順承郡王等量調襄陽總兵官劉成龍標兵赴荆防禦未幾勒爾錦復奏劉成龍標下及援𠞰兵俱應留守各汛上諭劉成龍標兵既與地方相習可仍留襄陽周邦寧率兵徑赴荆州巡撫張朝珍於武昌諸處兵內調足二千代援𠞰兵與蔡育榮偕往其援𠞰兵仍留荆州丁卯授林興珠為建義將軍封侯爵大將軍安親王嶽樂奏三月二十八日夜僞親軍水師右翼將軍林興珠自湘潭遣僞官楊廷言等詣臣軍前投致降啓隨遣副都統幹都海阿進泰以兵往迎又遣參領沙納哈率兵收取彼處船炮至林興珠部下官兵潰散幹都海阿進泰不守湘潭又不遣人請臣指示見獲之船竟盡行焚燬於本月初四日率領林興珠來至軍前及沙納哈還亦並無船艦收獲上諭林興珠不忘國恩率其所屬人員傾心歸正深為可嘉其從優封侯爵授建義將軍楊廷言等往來奔走開導曉諭亦與議叙若輩妻子該督撫安插撫恤務令得所幹都海阿進泰不守湘潭反擅燬已獲船艦急於退回致逆賊得據要害貽誤緊要軍機情罪殊為可惡著革職逮至江西南昌收繫安親王嶽樂明知湘潭關係最要不選擇賢能大臣遣往乃用幹都海等庸懦之徒以致誤事殊屬不合著飭行林興珠可留安親王軍前𠞰撫賊黨己巳命大將軍簡親王喇布鎮守茶陵護軍統領哈克三率兵赴湖南將軍華善奏茶陵為江西門戶重地將軍穆占留兵甚少恐吳逆乘間自衡州出犯安仁攸縣諸處請增發大兵為防禦計上諭茶陵攸縣關係江西全省將軍穆占因聞安親王渡江故率兵深入乃安親王實未渡江儻逆賊間道來侵江省可慮簡親王其率將軍華善前鋒統領希福學士薩海等共商鎮守茶陵諸處以兵付護軍統領哈克三由穆占進兵之路急行追及并力破賊穆占軍前聲息及逆賊情形簡親王不時奏報平定三逆方略卷三十六

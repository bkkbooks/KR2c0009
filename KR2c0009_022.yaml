body:
  text: 欽定四庫全書平定三逆方畧卷二十二康熙十五年三月癸未朔追封殉難海澄公黃芳度王爵其將士皆贈官有差海冦圍漳州芳度獨力死守孤城堅拒逆賊康熙十四年十月初六日叛將吳淑等與賊通引鄭錦入城漳州遂䧟芳度與標將蔡隆等力戰而死闔門老幼暨從弟芳世芳泰家屬同及於難芳世以狀聞上諭海澄公黃芳度自逆賊變亂以來矢志忠貞保守孤城勦殺逆賊屢建竒功及叛將吳淑勾引逆賊潛獻城池海澄公奮勇血戰闔家殉難以報國恩以盡臣節勲績茂著可優贈王爵如多羅郡王例遣大臣致祭令芳世仍襲海澄公爵芳泰給拜他喇布勒哈畨其同時殉難副將蔡隆贈右都督遊擊朱武贈都督僉事各致祭一次廕子弟一人為守偹外委官張瓊陳謙戴鄰等俱贈都司僉事廕子弟一人以干總用丙戌將軍佛尼勒等奏敗賊於秦州城北二月二十五日逆賊吳之茂率兵萬餘逼犯秦州城北佛尼勒等同王進寶率滿漢兵奮擊大敗之殺偽總兵四人擒偽總兵及叅遊二百餘人斬賊二千餘級庚寅大將軍和碩康親王傑書奏官兵敗賊於温州偽都督曽養性偽將軍祖宏勲等於二月十七日率賊四萬餘水陸來犯將軍貝子傅喇塔遣副都統吉勒塔布沃伸巴圖魯等統滿洲蒙古綠旗官兵分路逆戰斬賊二萬餘曽養性棄馬赴水遁趣大將軍康親王傑書等進兵傑書䟽言臣屢檄貝子傅喇塔速取温州傅喇塔乃稱温州形勝非舟師不能攻取且絫趣副都統穆赫林吉勒塔布沃伸巴圖魯提督段應舉等皆瞻顧不前臣察處州台州杭州衢州駐兵皆不便輕發若大兵前進須别得官兵一枝方克有濟請調江寧廣信兩處兵并調崇明京口戰船水師以資進勦上諭貝子傅喇塔始以待發紅衣礮為辭今又云必須戰船且覽絫次移文前後互異初無定見殊負委任我朝用兵紀律嚴肅從未有官兵抗違主帥不遵號令者今副都統穆赫林吉勒塔布沃伸巴圖魯提督段應舉等違令不前蔑視國法俟事平日嚴治其罪至江寧廣信兵已經調發吉安别無可發之兵崇明京口係瀕海重地舟師不可分遣况王奏報温州大捷斬獲二萬餘級則餘賊無多何難翦滅速復温州且命王為大將軍専委以戡定閩疆并非欲王安居閑地但分遣諸帥而已今王坐守金華將及二載徒以文移往來為事不親統官兵進勦則逆賊何日可滅王其速檄貝子傅喇塔刻期取温如或不能即撤傅喇塔還暫駐金華王親徃温州督兵攻取克復之日合兵進取福建毋得仍前瞻望貽誤軍機負朕委任之意趣大將軍貝勒尚善等進兵尚善等奏臣聞安親王已至袁州即欲綂兵前發但值久雨軍器難施若欲破賊濠㧞其樁我兵必致勞疲因是未敢輕動上諭尚善等統率大兵静坐日久未移寸步朕屢授軍機惟以雨雪為辭躑躅不前無非各持保身之計今安親王已復萍鄉醴陵進取長沙豈湖南逆賊不防他處獨固守岳州邪由此觀之繫征勦之力與不力亦甚顯然矣爾等冝痛改前非奮力用命乘湖南逆賊騷動之時仍遵前㫖速行進兵毋失機㑹癸巳命大將軍順承郡王勒爾錦等乘機進兵大將軍貝勒尚書等奏偵得逆賊呉三桂遣偽將軍馬寶及彝陵南漳諸處賊兵分路應援長沙上諭大將軍安親王兵已深入賊赴援甚衆恐致相持稽延時日貝勒尚善等冝乘機速取岳州儻未可取則分兵繞過岳州絶賊餉道若慮岳州兵單可調武昌兵以資防守其彞陵諸處賊勢既分順承郡王勒爾錦貝勒察尼等或攻彝陵逆賊或整理舟師以張渡江之勢俾賊撓亂不能救援長沙儻有隙可乘即渡江酌量以行至南漳逆賊既退可調南漳諸處大兵赴荆州併力破賊大將軍王等仍量留官兵同總兵官劉成能防守南漳尋荆州坐塘筆帖式報大將軍王已撤彞陵南漳諸處滿兵合荆州兵令貝勒察尼守荆州王親統大兵同總督蔡毓榮擬於本月十八十九日間渡江前進上諭渡江進勦事闗重大大將軍王等仍冝相機行事勿得輕敵甲午大將軍順承郡王勒爾錦奏官兵敗賊於南漳時將軍噶爾漢等偵知逆賊有移動狀即遣叅領該斯海等先取靈機寨噶爾漢親率滿漢䝉古兵攻賊大營於是月初一日師次太公山值賊三千餘出營拒敵我兵分擊敗之追至馬騣嶺賊遂潰遁己亥大將軍貝勒尚善等奏官兵克君山尚善等於是月初九日分布陸路官兵為進取之勢以䕶軍統領額司泰督舟師入湖賊䑸數百餘横列南潯港君山諸處奮擊皆敗之克復君山岳州城下賊船來援我兵復擊敗之追十餘里擒斬甚多獲船五十餘辛丑詔發兵援湖南上諭議政王等岳州尚未恢復而大將軍安親王軍已深上湖南亟冝增遣大兵應援大將軍圖海兵尚飼馬懷慶應以戍守河南兵每佐領驍騎一人選才能者署為夸蘭大率赴岳州其叅領瑚什巴額勒布至懷慶且令暫駐更發京師每佐領驍騎一人與盛京兵一千五百人合為一營令叅領達漢泰沙禮領之速行抵河南日留盛京兵五百人付瑚什巴等防戍河南府餘令達漢泰等率赴岳州前者大將軍貝勒尚善等奏請増發每佐領兵四人便可分兵由雲溪驛赴長沙今所發禁旅併河南盛京兵已足每佐領四人之數此兵未到時若長岳二郡尚未收復大將軍安親王酌撥官兵疾援長沙與大將軍安親王合兵攻長沙定湖南其盛京兵千人速遣發大將軍圖海軍前壬寅追封提督陳福公爵先是福以兵亂遇害報至上命總督哈占等察其情狀以聞至是哈占奏據陳福族弟禎言福為賊所害賊即乘夜南奔約二百餘人上諭提督陳福忠貞素篤為國㤀家勦除逆賊恢復疆土勞績茂著兹統兵進勦身殞行間深可憫惻著優贈公爵加為三等精竒尼哈畨令其世襲賜祭二次庚戌大將軍順承郡王勒爾錦奏帥師渡江時大將軍安親王岳樂兵抵長沙彞陵賊勢既分上趣荆州大兵渡江於是順承郡王勒爾錦量撤宜都彞陵南漳兵授貝勒察尼靖㓂將軍印以兵一千留守荆州躬與諸大臣統滿洲䝉古漢軍綠旗兵於是月十八日啟行至文村渡江敗賊於石首虎渡口諸處焚其二營又察尼於十九日遣署都統多謨克圖副都統巴喀等統兵渡江敗賊於太平街焚其營我舟皆在南岸逼太平街而泊命將軍佛尼勒等邀擊來援秦州賊兵佛尼勒等奏平凉偽總兵李國良王繼禎率賊八千餘由靖寧來援秦州上諭將軍佛尼勒等頃於秦州敗逆賊吳之茂是以王輔臣遣李國良等應援冝速行邀擊毋使逆賊得以并力將軍佛尼勒張勇巡撫華善等其共相籌度隨宜調遣𠞰滅援秦州賊㓂恢復靖寧壬子改貴州提督趙頼為江西吉撫等處提督貴州總兵官馬雲程為九江總兵官時大將軍簡親王喇布奏江西綠旗官兵無可調遣請以見駐九江貴州提督趙頼改為吉安撫州等六府提督調至南昌同大兵恢復吉安諸處提督趙國祚俟其旋師之日即統所部兵為九江袁州等六府提督又請以見駐湖口貴州左路總兵官馬程雲改為九江總兵官上允其請又諭喇布曰吉安繫廣東要路宜速恢復乃以調綠旗兵為辭因循日月殊誤軍事今不必俟提督趙頼官兵即遣將軍哈爾噶齊額楚等恢復吉安以通粤道平定三逆方畧卷二十二

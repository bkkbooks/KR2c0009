body:
  text: 欽定四庫全書平定三逆方略卷五十二康熙十九年五月丙申命將軍額楚暫守南寧先是令額楚帥師還江寧至是額楚奏報馬承廕叛於栁州將軍莽依圖等率大兵進𠞰今聞賊將何繼祖王宏勳等兩路來侵上命額楚帥師暫守南寧俟莽依圖等平定栁州仍還駐江寧庚子命大將軍貝勒察尼帥師暫屯沅州察尼奏臣兵向在常德兩月未支芻菽馬皆羸瘦後雖補給尚未充肥今自常德進取辰沅沿途霪雨泥濘疲乏遺棄者甚多軍士或有徒步僅能達沅州者且自三月二十日糧盡迄今猶未運致上諭貝勒察尼帥師暫屯沅州如將軍趙良棟所奏約齊舉行若此際有可進雲貴之機仍毋俟定期酌量進發其糧餉稽誤之故令巡撫韓世琦察明具奏辛丑命諸將稽察吳三桂與達賴喇嘛交通書札上諭兵部移文各路大將軍督撫提鎮等凡有平定雲貴恢復城池者俱令察訪吳三桂與達賴喇嘛相通書札隨得隨繳兵部乙巳命大將軍貝子彰泰等遣送偽將軍吳有爵崔世祿來京師彰泰等奏沅州既克偽將軍吳有爵崔世祿等率衆降上命遣送來京己酉將軍總督蔡育榮奏官兵復思南育榮遣隨征總兵官鄧秉志等進取思南是月十二日至太平關擊賊敗之隨三路進𠞰賊棄城遁十四日我兵復思南府贈總督范承謨太子少保兵部尚書先是范承謨為耿精忠紿至其家置刀鋸於前脅令順從承謨正色詆訶不為詘服賊因拘禁獄中又百端逼誘承謨堅貞彌厲於康熙十五年九月十六日夜遂為賊所害至是福建巡撫楊熙察明以聞上諭范承謨可贈太子少保兵部尚書廕一子入監讀書甲寅遣理藩院郎中詹璧喇往邊地偵探上諭詹璧喇曰爾往駐松潘等處凡有聞見當如拉篤祜不時奏報遣爾前往之故明諭厄魯特達賴巴圖魯台吉知之然達賴巴圖魯台吉等消息亦應密探若得賊寇交通書信即以奏聞并探往來貿易者凡奉使邊陲潛行詗察良非細故爾無攻戰敷閫之任宜慎自防護藏形斂迹常近大軍左右偵探奏報丁巳贈巡撫馬雄鎮太子少保兵部尚書當孫延齡叛時雄鎮為其所執脅令降服雄鎮罵賊不屈同妻子家口殉難至是將軍巡撫傅宏烈察明以聞上諭馬雄鎮可贈太子少保兵部尚書廕一子入監讀書贈總兵官吳萬福太子少保當耿精忠叛變時福寧總兵官吳萬福嬰城固守不甘從逆為賊所殺至是巡撫楊熙察明以聞上諭吳萬福可贈太子少保廕子弟一人以守備録用六月戊午朔命大將軍貝勒察尼率兵還京師察尼等奏臣等合計兩軍共前鋒四百有竒護軍驍騎每佐領二十餘人內留前鋒三百人每佐領護軍六人驍騎九人進取雲貴餘悉還京師上命貝子彰泰帥師進征貝勒察尼察滿兵出征在先效力勞苦及無馬者帥之還京癸亥以李芳述為隨征總兵官將軍總督趙良棟奏投誠總兵李芳述先曽拒絶偽命率衆來降今復能固守孤城不為賊誘請破格加恩上諭李芳述為隨征總兵官𨽻趙良棟標下隨征效力丁卯提督桑額革職總兵官周邦寧降級俱留任戴罪圖功先是以桑額等自常德澧州退還上命大將軍察取供詞至是大將軍貝勒察尼取供具奏事下兵部議兵部奏言桑額職任總統調度全省官兵一聞賊警不即馳赴常德以扼要害乃遷延日久始自荆州進發致常德為賊所據又不入守澧州但於城外駐營六日復致澧州被陷且稱彞陵一路賊警甚急托故引還應行革職周邦寧偕桑額赴常德時託病留澧州逮桑額還自常德又不入澧州防守即同桑額奔還應削去所加五級仍降一級調用上諭桑額可革職周邦寧可削去所加五級仍降一級俱留原任戴罪圖功將軍總督趙良棟奏官兵敗賊於永寧四月八曰賊以徑卒犯永寧官兵鏖戰彌日賊猶不却投誠總兵官李芳述等奮勇衝擊斬偽總兵毛有貴等賊始大敗遁逃陳斬凡千餘人丙子命將軍賴塔等安撫平南王下兵時賊流言欲分調平南王所部兵往雲南安置各營於是藩兵八千人聞之盡恐五月十三日夜遂鼓譟拔營遁歸巡撫金儶以聞上命將軍賴塔侍郎宜昌阿總督金光祖巡撫金儶都統王國棟等設策安撫逃兵發赴廣西壬午命大將軍康親王傑書率兵還京師先是令傑書等議奏旋師事宜至是傑書奏今當需餉之時在閩大兵理宜全撤但福建投誠之人甚多金門厦門諸處新經恢復人心未定宜留大兵一千二百人駐守福州六百人駐守泉州一千二百人駐守漳州餘兵臣與𠫭贊副都統銜禪布先率入京至於沿海緑旗官兵設防之外孰宜先撤孰宜鎮守應令尚書介山侍郎吳努春溫岱等會同總督巡撫提督議覆上報可大將軍簡親王喇布奏復栁州馬承廕降喇布與將軍莽依圖總督金光祖等率滿漢官官兵分路進𠞰承廕五月初四日光祖兵敗賊於武宣遂復縣城初八日莽依圖兵大敗賊於陶登乘勝前進遂定象州喇布兵於是月初四日至雒容縣即進取栁州十七日承廕率衆詣喇布軍門降栁州平七月辛卯命內閣學士薩穆哈往廣西分置馬承廕標下兵安塘筆帖式報大將軍簡親王兵距栁州二十里馬承廕等迎降上諭初馬承廕及所部官兵背叛蹂躪疆土擾掠生民罪惡已極後見湖南平定廣西恢復窮迫請降朕欲生民早獲寧息悉貰前罪封以伯爵授為將軍仍令管兵標員亦分營補用及大兵規取雲貴無故背恩復叛致誤征討大事今緣大敗兵臨勢蹙復窘急來歸令學士薩穆哈速往撥滿漢官兵押送馬承廕及標下守備以上官來京其標兵令督撫提鎮等分𨽻各營汰其老弱􅉰兵亦宜散置切勿令其黨聚廣東諸處被難人民詳察遣還故土提督哲爾肯可屯駐栁州乙未嚴飭川陜督撫協運蜀餉時總督哈占請秦餉由略陽陽平運至保寧令四川督撫接運至敘州巡撫杭愛復言四川官員部選者俱未蒞任且民間無船實不能接運上諭蜀撫既以官少船缺為言仍令陜西總督哈占巡撫鄂愷甘肅巡撫巴錫即以略陽糧艘運官竟運至敘州四川督撫速趨空船使回大兵進𠞰雲貴需餉至急既已尅期進取挽運無過今秋川陜督撫自宜殫心籌畫勿誤軍需乃妄分彼此互相推諉遲延至今殊負職任嗣今當同心商酌不拘疆界速為饋運無誤進取如仍推諉遲延有失軍機經管督撫以下各官俱以軍法從事將軍王進寶請撤還所部兵上不許進寶言臣標官兵歷歲從征備嘗艱苦今蜀疆底定督撫提鎮已各設營兵請量選臣標官兵付臣子用豫率之進𠞰被傷及從征日久者令暫還本汛議政王等議從其請發陜西兵以補其撤還之數上諭進取雲貴期在八月若撤還王進寶兵復以陜西兵補足往返商略必誤進𠞰機宜關係非小王進寶所奏不準行乙巳禁官兵騷擾驛遞浙江巡撫李本晟言大將軍康親王奉命旋師浙省河路額設驛船甚少大兵往至蘇州若不行更換仍越站逺送則後至官兵無以應給請命江寧巡撫備船更易上允其請因諭兵部曰聞官兵往來每有借端船艦勒索地方所用人夫額外多派或折價肥已鞭撻縴夫侵漁小民擾纍郵驛該管官不加約束地方官復科斂隱諱弊端種種殊屬可惡嗣今宜嚴行禁戢若仍前不悛必重懲不貸丁酉革左都御史覺羅舒恕職先是舒恕以病還京上諭議政王等曰左都御史覺羅舒恕當進定廣西之時奏稱病劇乞還肇慶調治朕以舒恕身為將軍病篤必真令其暫回肇慶後又以敇印私繳將軍莽依圖令莽依圖代為題請朕以舒恕之病危篤欲其生還召還京師今觀舒恕全無病狀神色如故舒恕前在髙州奔回肇慶復自廣州敗還不據韶州南雄諸要地竟還贑州江西全省因而震動及在江西又復虜掠大擾百姓以巡撫金儶之言盡泄於平南王又恐嚇將軍巡撫傅宏烈云汝若題請進兵我必殺汝舒恕身為將軍負如許重罪不思戮力以贖罪愆反詐稱患病凡為將帥者儻皆如此肆行欺罔軍法何以得申舒恕應羈候宗人府俟旋師之日嚴察議奏至是議政王等議革舒恕左都御史佐領及世職籍沒家産上報可免其籍沒戊申命將軍總督趙良棟等酌調緑旗官兵時四川分兩路進取雲貴將軍烏舟趙良棟等請調緑旗官兵上諭趙良棟曽任陜西提督烏丹等在秦亦久地勢軍機知之甚悉緑旗兵作何調發留守公同詳議一面調遣一面奏聞已而烏丹等奏雲南乃逆賊根本彼必死守進征官兵不可單弱永寧建昌兩路各得兵二萬方克有濟除四川見兵外其不足之數已移文大將軍公圖海總督哈占速於各路調足發往己酉詔大將軍順承郡王勒爾錦還京師先是上命勒爾錦赴重慶勒爾錦不能前進半途而返因具疏自劾請解大將軍任準發沅州軍前效力上諭勒爾錦既託故還荆州又奏請發沅州效力不合其攜大將軍敕印率所屬護衛各官王府佐領兵同沅州官兵還京壬子將軍侯張勇奏請率兵往鎮四川上不許張勇言總督哈占移稱將軍趙良棟請調涼州鎮兵三千今將軍王進寶已還固原治疾請令提督孫思克還兵駐甘肅涼州鎮守河西臣率本標兵三千往守四川庶不誤進𠞰上諭秦省乃邊疆要地將軍侯張勇毋往四川仍防守秦中今進取雲貴期迫若調沿邉之兵恐致有誤張勇簡標兵三千令賢能官率之速赴四川癸丑命將軍賴塔等𠞰撫廣東叛兵總督金光祖言平南親王藩下鼓譟逃亡之兵烏合肆行臣見與賊對壘不能兼顧上諭近報將軍賴塔都統王國棟遣總兵官寧天祚等率兵𠞰撫鼓譟之兵若寧天祚等力不能𠞰將軍賴塔巡撫金儶提督侯襲爵都統王國棟公同酌議增兵速行𠞰撫以靖疆圉平定三逆方略卷五十二

body:
  text: 欽定四庫全書平定三逆方畧巻五十四康熈十九年九月丁巳勅廣西四川將軍督撫等如期進𠞰大將軍貝子彰泰奏將軍總督蔡毓榮等率緑旗官兵分三路於是月十二日自沅州進取貴州臣率滿漢兵於十八日由沅州啓行進取貴州上諭今大將軍貝子彰泰等既奏進兵日期其移㑹廣西四川將軍總督等俱令如期速行𠞰賊癸亥命將軍噶爾漢等帥師𠞰滅譚洪諸逆先是將軍總督蔡毓榮奏臣已率先統兵入貴州境恐大兵進征之後内地兵單請調提督徐治都駐常徳防守上諭總督董衛國先已攻克黄毛嶺蔡毓榮乃奏稱率先統兵入貴州境非是著嚴飭其提督徐治都移駐事宜議政王貝勒大臣集議以聞於是議政王等議言蔡毓榮以内地兵單請調徐治都移駐常徳宜如所請奏上許之尋治都奏瀘州永寧叙州諸處俱陷譚洪等復叛夔州府民亦變上諭今譚洪復叛夔州民變宜調荆州大兵并令將軍貝子凖逹帥兵兩路速行夾𠞰撲滅毋使滋蔓將軍噶爾漢都統范逹禮副都統色格簡荆州大兵毎佐領三人率之提督徐治都毋往常徳亦率緑旗兵俱速赴夔州諸處𠞰滅叛賊以安疆土餘兵署副都統諾敏率之鎮守荆州仍檄貝子凖逹率兵前來夾𠞰毋失機宜尋復諭常徳要地亟宜堅守令襄陽總兵官劉成龍往鎮常徳河南汝南總兵官周邦寧往駐襄陽趣將軍烏丹速𠞰永寧賊將軍總督趙良棟奏湖廣大兵已集沅州永寧一路兵應直進雲南今將軍烏丹兵啓行將及一月猶未渡江如永寧不保賊勢愈張請嚴飭湖廣兵取貴陽分兵以取遵義令烏丹擊敗永寧賊即乘勝進取雲南上諭大將軍貝子彰泰等可率兵速取貴陽分兵以取遵義將軍烏丹往取瀘州行及一月逗遛猶未渡江不合其令速取瀘州𠞰除來犯永寧諸處賊寇湖廣四川大兵各路分進廣西將軍大臣不得以兵士無馬為辭將軍勒貝體朕擢用之意速率大兵乘機由南寧進定雲南乙丑遣户部郎中額爾赫圖等赴軍前趣諸將進兵上諭議政王等曰據將軍噶爾漢等奏逆賊譚洪率衆至巫山洪小醜耳我兵但奮力進擊彼自澌滅將軍噶爾漢提督徐治都等其溯江而上速定疆圉大將軍貝子彰泰等果如前疏訂期亟進克復貴陽賊勢何至滋蔓今宜令彰泰同將軍蔡毓榮等於文到日馳往速取貴陽以圖遵義四川諸將亦因觀望致事乃爾若能奮擊雲貴出犯之賊則譚洪無所逃匿自當摧陷今宜令專意進𠞰無復却顧前此曾命總督哈占馳赴將軍烏丹軍今宜令由保寧江直進破譚洪以㑹烏丹并行文大將軍公圖海酌發軍中滿漢兵為之聲援以分賊勢至運餉四川不由彞陵江俱自陜西轉運叙州兵糧度可無虞頃今䕶軍統領佟佳等率增發四川滿兵赴原指之地其漢軍官兵一千人文到日即由荆門州一月内赴彞陵鎮守户部郎中額爾赫圖馳赴彞陵趣將軍噶爾漢等兵速滅譚洪諸賊額爾赫圖凡事俱凖蘓赫臣例以行吏部郎中范承勲亦馳驛追及副都統張長庚趣其兼程而往一月内抵彞陵范承勲仍自彞陵趣官兵追及噶爾漢等軍與額爾赫圖同趣官兵擊賊又宣諭四川諸將曰皇帝勅諭將軍烏丹鄂克濟哈趙良棟總督楊荗勲巡撫杭愛提督王之鼎近覽都統噶爾漢提督徐治都奏譚洪叛逆夔州巫山亦俱變亂朕思譚洪變起倉猝四川兵民聞之必為震動洪雖盤踞萬縣實屬疥癬但破出犯之賊則洪無路可歸自必授首事所以至此者皆由各將軍大臣於所分撥之路逗遛不進以致若此今諸路調兵分途進擊爾等可速長驅勿以譚洪等小醜之故遂猶豫不前并以大兵雲集譚洪不日殱滅曉諭四川通省兵民爾等其速慰兵民之心以副朕委任至意命將軍頼塔為大將軍帥師進取雲南上諭議政王等曰頃因逆賊侵偪四川滿漢大兵已諸路進𠞰大將軍貝子彰泰將軍總督蔡毓榮等於是月十二日以次進定貴州今廣西一路亟宜速入以定雲南將軍頼塔在福建廣東勞績素著可授為大將軍赴廣西調遣廣西滿漢大兵由南寧直進速定雲南頼塔行日選廣州大兵内精鋭有馬者或五百人或千人親帥之赴南寧廣西所有一應大兵俱聼簡擇率往副都統慱霽統餘兵暫守廣東應給頼塔勅印可速送往其原在平南藩下官兵如可帯往聽頼塔酌量率之前行命副都統覺羅吉哈禮等領兵赴沅州上諭議政王等曰沅州兵出征日乆今應更代可發毎旗前鋒三十人毎佐領䕶軍一人驍騎三人内府兵六百人漢軍毎佐領二人付吉哈禮席布率之前往并撥内廐及兵部馬匹同發沅州軍前戊辰趣將軍噶爾漢等進兵上諭兵部覽安塘筆帖式蘇拜報九月初六日副都統色格毎佐領兵一人往守彞陵夫譚洪向在保寧屢經奔敗窮困兵仗全無今乗黔賊侵犯瀘州招集無頼持挺肆行刼掠將軍噶爾漢等前曾疏言士馬飽騰嚴装以待一聞賊警即當赴𠞰今噶爾漢范達禮徐治都等不親身馳入巫山䕫州𠞰除叛逆小醜乃遣副都統色格率毎佐領兵一人往鎮彞陵殊屬不合如此遲延觀望儻此寇與黔賊合勢彼時破之不綦難乎噶爾漢等聞命即統率官兵星夜馳赴巫山䕫州扼其要害俾㳺行羣醜不致滋蔓速為𠞰除若仍逗遛致逆賊與黔賊合勢至於猖獗將噶爾漢等治以失悞軍機之罪爾部速行􅊾知未幾噶爾漢疏言都統范達禮病甚不能同往上諭范達禮令在荆州養病俟病愈仍追及噶爾漢軍進兵之際轉運糧餉闗係甚重地方各官儻有違悞即以軍法從事丙子命䕶軍統領佟佳等率兵赴彞陵荆州副都統覺羅吉哈禮等率兵赴四川上諭議政王等曰今大將軍貝子彰泰率兵進取雲貴彞陵荆州諸處宜發大兵䕶軍統領佟佳所率之兵令毋往四川撥毎佐領䕶軍驍騎各二人佟佳同副都統一員率之自荆門州赴彞陵餘兵付一都統率之俾兼程赴荆州副都統吉哈禮等率兵赴四川辛巳命將軍王進寳往鎮保寧諸處上諭兵部進川大兵分路前取雲貴近又報四川小醜竊發保寧漢中一帯闗係重要其移文將軍王進寳馳赴保寧兼守漢中諸處十月丁亥命給事中莫洛等傳諭四川諸將學士額庫禮等趣廣西兵速進雲南上諭議政王等曰四川統兵諸將似有不睦之形遣給事中莫洛等往諭之併詳察地方情形學士額庫禮等往廣西收集滿漢官兵盡付大將軍頼塔統領趣令進取雲南復諭學士額庫禮郎中阿濟力曰爾等到南寧如頼塔未至將軍勒貝等簡兵已畢即趣令啓行於途中候頼塔以進如勒貝等簡兵未畢當檄趣頼塔速來到日即趣令前進署巡撫事理事官麻勒吉等委賢能司道官運致糧餉毋使有悞至分選滿漢官兵如有争競爾等即為裁決俟大兵啓行而還己丑趣都統馬竒等進兵上諭議政王等曰馬竒等出師以來即躭延時日遲緩事機今大將軍頼塔等自南寧進取雲貴馬竒等宜率兵急進如仍躭延遲緩兵部嚴察議處甲午解將軍烏丹任將軍總督趙良棟疏劾烏丹曰賊寇侵犯仁懷因而失守將軍烏丹擁重兵二萬不急赴援以致永寧復陷貽悞邊疆上諭成都去永寧路不踰七八百里烏丹不急赴援遲至六十餘日貽悞已甚烏丹不可仍為將軍其速解任攜勅印還漢中同大將軍公圖海鎮守其四川官兵俱付將軍鄂克濟哈與趙良棟㑹商進𠞰蜀中情形不時奏報命四川諸將速取永寧建昌署副都統熈符率兵馳赴漢中上諭議政王等曰前以蜀地與雲貴相接通道甚多逆賊必來侵犯而將軍總督趙良棟題報我兵已抵金沙江檄良棟及烏丹鄂克濟哈等於諸要路俱立營浚濠築壘堅為防守汛守官兵糧餉運給勿悞曾特行曉諭今逆賊攻陷永寧建昌路阻在蜀諸將軍大臣率如許滿漢官兵所遏禦者何事若遵前諭加意奉行永寧建昌何至失陷譚洪彭時亨何至變亂彼等殊負委任之意今宜協力𠞰却逆賊速行恢復永寧建昌諸處至漢中諸地所係殊要宜授㕘領熙符為副都統簡傅爾扈等官併前鋒及毎佐領䕶軍驍騎各三人兼程率往西安以巡撫布政司文武官員馬匹易其疲馬馳赴漢中丁酉命將軍王進寳調兵馳赴保寧進寳奏臣標兵除調征湖廣其餘臣子用予統領進𠞰又陜西督臣哈占調往二千餘人臣今無兵可統不得不於臣標攜回及留守歩兵内姑為抽選併與固鎮營中量行調撥以足千有餘人之數更請命督臣以固鎮官兵發還付臣統轄上諭逆賊既侵犯四川譚洪彭時亨復叛保寧最屬要地今將軍王進寳速調固原各營官兵兼程馳赴保寧規定蜀疆陜督哈占兩次所調之兵仍令王進寳統領命將軍噶爾漢等速赴䕫州𠞰賊貝子準達奏逆賊譚洪彭時亨等攻陷涪州上諭将軍噶爾漢等選毎佐領兵三人提督徐治都親統漢兵速赴䕫州諸處𠞰滅叛寇己亥申命四川督撫協供大臣糧餉總督哈占奏臣進兵保寧所需糧餉若支運自秦中見貯之米為數有限未足於用儻督餉各官不盡心料理軍需告匱貽悞匪輕上諭兵餉闗係要𦂳四川督撫同郎中蘇赫臣速委賢能司道董理蜀中諸軍糧儲無悞師行命總督哈占速赴保寧哈占奏逆賊譚洪彭時亨等合而為一去保寧不逺糧餉皆由此而過實闗要害臣自漢中往保寧恐所統兵無幾戰守不足請勅䕶軍統領佟佳等遣兵速往應援上諭前已令副都統吉哈禮等秣馬速進四川保寧順慶所係殊要總督哈占速往保寧偕總兵官髙孟𠞰滅逆賊勅陜西甘肅巡撫提督諸臣分兵固守畧陽陽平諸處總督哈占奏畧陽為水陸交㑹陽平為四川孔道廣元寧羌又屬全省咽喉俱轉餉必由之地逆賊譚洪等肆行猖獗此數處官兵不過百餘人難以防禦而部推陽平㕘將髙明霄尚未抵任請撥兵保䕶上諭略陽陽平寧羌廣元諸處皆糧運所經且為大兵後路闗係最鉅陜西甘肅巡撫提督其酌撥官兵加意保䕶陽平㕘將髙明霄速趣之任如仍延緩嚴加議處辛丑申命將軍噶爾漢等𠞰滅譚洪諸賊上諭噶爾漢等曰覽將軍等奏副都統色格等恢復巫山縣生擒偽總兵知爾等疾馳而進朕心甚慰今宜速進殱除逆賊安定地方譚洪彭時亨等諸逆或勢蹙投降或竟行𠞰滅其同族之人悉皆誅戮妻子家口賞給有功官兵甲辰諭大將軍公圖海防𠞰機宜上命給事中莫洛等傳諭圖海曰爾前奏暫停諸處進兵其說雖是但停止進兵徒使賊寇滋蔓於事無益前爾面奏請停進兵惟朕力催岳州始得恢復湖廣逆賊悉皆潰敗後又請暫停取四川朕又力催四川遂爾蕩平今賊以全力逼犯四川若從廣西南寧湖廣沅州進取貴州則寇蜀之賊自當敗遁從此諸逆漸平地方悉定將領士卒可踴躍凱旋矣至投誠官員不可深信務留置左右時加防範朕已屢行宻諭今譚洪彭時亨等復叛肆行侵擾朕向謂此軰俱在爾軍中不意竟置之别所此等背恩反叛之軰受爾何恩而乃深信如是也嗣後宜宻防之乙巳申飭議政王大臣上諭内閣大學士等順承郡王勒爾錦貝勒察尼率領大兵出征不思長驅効力平定疆圉惟向督撫司道各官索取財物兾歸家之時安享饒裕前曾屢經申飭置若罔聞悞國擾民老師失機之罪莫此為甚朕嘗遥度令造船圍困岳州幸賊寇窮蹙疆土以次底定否則不知若何矣況我太祖太宗之時軍法甚嚴今議政王大臣等豈可因事已定漠不經意不按事實草率定罪乎王貝勒若自謂未歴戎行係與衆商酌而行自後寧遂不用兵若俱以未歴戎行為辭將令何人統帥耶王貝勒係朕宗親理宜寛宥但悞國大事罪不容逭總之在他人或可原宥在王貝勒等實難恕也其諭議政王大臣等知之臣謹按賞罰者人君之大柄也惟信賞必罰然後有功者知勸而有罪者知懲當呉逆初叛勒爾錦察尼即統兵征討乃退縮不前糜餉勞師屢失機㑹罪誠大矣獨是勒爾錦等均屬懿親且事已平定即稍為寛假無不可者而我皇上心存至公謂在他人或可原宥王貝勒等實難容恕因命議政王大臣等嚴覈勒爾錦等罪狀重加處分以肅軍紀此所謂賞不遺疎逺罰不私貴近即古聖王大公至正之道也戊申諭諸路將帥進兵機宜大將軍貝子彰泰奏報本月十二日克鎮逺府賊夜遁大兵追𠞰復偏橋等衛上諭大兵已復鎮逺追𠞰逆賊鎮逺至貴陽道平坦料賊不守貴陽必據鷄公背鐵索橋諸處兹大兵進征係平定疆域拯救生民大將軍將軍大臣等務同心協力以濟大事速取貴陽即分兵取遵義諸處儻遲疑稽延如四川大臣彼此不睦貽悞兵機軍法顯然必不爾宥前恢復四川時在川大臣曽累奉固守疆圉堵禦賊寇之㫖因其不睦致疎防守使逆賊狂逞失陷地方不能如期進定雲南今大將軍貝子彰泰等兵已復鎮逺規取貴陽遵義遵義係賊後路寇川逆賊勢必退歸在川將軍及大臣等宜偵探確信乘勢長驅蕩平疆圉如仍前不睦遲疑稽延貽悞兵機定行治罪大將軍頼塔等亦應統領廣西滿漢大兵速進雲南毋失機宜尋復諭兵部據報將軍噶爾漢提督徐治都等恢復䕫州但不知重慶消息可否相通令噶爾漢等速行奏聞至萬縣在萬山之中噶爾漢等防禦諸路其熟計保全今䕫州既復宜令總督哈占速從保寧進勦哈占速進則賊不日撲滅至兩路分兵恢復鎮逺䕫州事宜應移會在蜀大臣併􅊾知廣西大將軍頼塔等乘此機㑹速定雲南辛亥勅湖廣偏沅巡撫轉餉軍前學士佛倫奏軍前糧米僅供三月當預為接濟令偏沅巡撫韓世𤦺應運協餉十餘萬石臣等親詣河干未見一船運到請勅速運以濟軍需上諭軍糧事闗重要韓世琦至今無一船運到殊負職掌至於湖北採買之米亦尚稽延未運令湖廣偏沅二巡撫星夜轉運軍前如稍稽延以貽誤軍需治罪壬子革總兵官朱衣客職將軍總督趙良棟疏劾朱衣客身荷邊疆重任且係旗下舊人率官兵八千往援建昌不能破賊乃於天王廟失利棄越嶲衛要地不守渡河却回上諭朱衣客懦怯却回輕棄汎守大干軍法著革職嚴拘擬罪以聞平定三逆方畧巻五十四

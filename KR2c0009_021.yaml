body:
  text: 欽定四庫全書平定三逆方畧卷二十一康熙十五年正月丁亥命貴州提督趙賴募兵總督董衛國奏江西提督趙國祚率標下官兵三千隨安親王進取長沙綠旗官兵遂至缺額江省伏莽未靖防守之兵不宜少減上命見駐九江貴州提督趙賴就近募兵三千暫令統轄即以此兵分屬將弁李廷獻等八人以時訓練命將軍侯張勇等撫寧夏叛兵時提督陳福統兵駐惠安堡欲㑹合土黙特兵規取固原十四年十二月二十二日夜提督營兵猝變福遇害員外郎拉篤祐等報至上諭寧夏三邊要地所闗綦重將軍侯張勇巡撫華善相與協議如鞏昌無虞分一人赴寧夏慰諭官軍其副都統恰塔兵及員外郎拉篤祐所領土黙特兵可駐防靈州定邊諸處至陳福被害之由總督哈占巡撫杭愛察實以聞尋張勇奏寧夏兵變民心驚惶又恐逆賊王輔臣出犯深屬可憂再四籌度必臣親徃始克有濟擬於本月十二日親統兵前赴寧夏撫輯既定如鞏昌秦州有事則仍還鞏昌無事即相度機宜進𠞰平凉固原命西寧總兵官王進寶為陜西提督上諭兵部陳福已為亂兵所害秦省提督職任重大宜得賢能以資彈壓西寧總兵官王進寶忠誠克殫勞績素著著授為陜西提督暫駐秦州仍令兼理西寧總兵官事其寧夏總兵官員缺聴將軍侯張勇巡撫華善遴選題補辛卯敕大將軍貝勒洞鄂等速取平凉時寧夏兵變上諭議政王等秦省不能即定皆由平凉未下王輔臣未滅之故目前攻取平凉最為急務大將軍貝勒洞鄂與將軍侯張勇總督哈占等宜相機公議速取平凉斷賊餉道綏靖地方丙申詔責大將軍順承郡王勒爾錦先是勒爾錦奏請益兵詔㫖詰責至是具疏首罪乞付部議上復切責之曰勒爾錦統領大兵進𠞰逆賊二載有餘未獲尺土以致師老餉匱坐失機宜今不直陳其罪又巧飾具奏殊為不合應即處分但現在進兵俟旋師日嚴加議罪申飭大將軍簡親王喇布喇布奏署副都統尼滿雅奏率兵自江寧至即遣徃與建昌兵更替若俟建昌兵到始令廣信撤來之兵與之同發恐稽時日故令夸蘭大伊都堪色赫率廣信兵毎佐領一人於本月初三日自南昌先赴廣東其建昌兵到即令副都統額赫訥率徃上諭粤東需兵甚急故前撥江西大兵每佐領二人尋復撥每佐領一人屢趣速赴廣東乃至今尚未全發殊悞軍機自後一切調度事宜務遵㫖速行命天津總兵官趙良棟為寧夏提督涿州參將陳竒為天津總兵官先是上諭兵部曩者將軍侯張勇請調天津總兵官趙良棟赴秦其時因秦地尚屬可緩津門地當海口故未即調遣兹寧夏有事應調與否令張勇宻行具奏至是勇奏良棟向隨臣征𠞰著有功績精明歴練才畧過人臣知之最深故前疏請調補寧夏總兵官今若令良棟統理寧鎮祈敕由邊路兼程速赴上諭寧夏要地宜重其事任總兵員缺著改為提督即以趙良棟陞補令其兼程速赴提督陳福為國捐軀忠誠顯著福弟涿州叅將陳竒即著超補天津總兵官戊申敕大將軍貝勒洞鄂等調兵赴秦隴上諭議政王等今將軍侯張勇請赴寧夏秦州諸處兵力甚單其令大將軍貝勒洞鄂將軍席卜臣總督哈占等相地方緩急西安近地兵有可撤者速行撤回發徃秦隴聴將軍佛尼勒提督王進寶等酌量調遣以禆戰守庚戌命巡撫佟國禎赴贑州先是總督董衛國疏請親統官兵進𠞰餘干諸處逆賊留撫臣佟國禎於南昌上可其奏至是大將軍簡親王喇布奏稱省城兵力單弱總督不便領兵他出贑州為江西門戸投誠將士雜處彈壓需人請留總督董衛國於省㑹令巡撫佟國禎速赴贑州上從之二月癸丑命大將軍平南親王尚之孝還廣州平南親王尚可喜奏言臣病日劇而冦在門庭臣子之孝又統兵在潮臣軀恐有不測則粤中危在旦夕請遣威望大臣星馳抵粤以資彈壓上諭王累世勲舊殊猷重望久鎮巖疆勞績懋著自逆賊變亂以來王篤守忠誠殫抒籌畧訓練士卒保障地方𠞰禦賊冦朕所倚毗今覽王奏稱年力漸衰身嬰疾疴請遣大臣經理廣東事務具見王實心為國計慮周詳朕與王情猶父子覽疏未竟心為惻然但王屬官兵駐鎮日久地方賴以寧謐措置咸宜軍民讋服若别遣大臣前徃恐該省之事一時未能周知所闗匪細王可於諸子中擇才畧素優者遣赴潮州整理軍務大將軍平南親王尚之孝回廣州侍王左右扞衛封守王其加意調䕶期於平復以慰朕眷念至意戊午命副都統額赫訥赴廣東平南親王尚可喜奏逆賊馬雄董重民等乘髙雷叛變益肆猖獗滿漢大兵退駐肇慶湖逆劉進忠引海冦入犯提督及平南大將軍等又退至惠州請大兵兼程赴援上諭頃據簡親王報以每佐領䕶軍一人驍騎一人付副都統額赫訥於正月初十日前赴廣東今粤中告急可令額赫訥等倍道速進庚申詔廣東大小將校各加一級上諭兵部粤東用兵二載將士勞苦自總兵官以下把總以上俱各加一級仍領本職如故命副都統恰塔等守寧夏先是提督陳福遇害上令副都統恰塔員外郎拉篤祐都統古魯副將賚圖等駐守靈州定邊諸處至是恰塔等奏若移定邊靈州有黄河之隔寧夏有事猝難䇿應臣等已率部兵屯黄河對岸以扼兩路要害上因命恰塔等協守寧夏以安軍民之心尋又諭兵部曰提督趙良棟今兼程赴寧夏軍機𦂳要良棟扺寧夏日一切軍務機宜恰塔拉篤祐等俱與良棟共議而行壬戌命都統大學士圖海為撫逺大將軍帥師赴陜西上諭議政王等曰大將軍貝勒洞鄂等屯兵平凉曠日持乆賊冦尚未𠞰滅城池尚未恢復夫秦省不能即定川賊尚在窺伺者皆由王輔臣未滅平凉未下故也其以都統大學士圖海為撫逺大將軍率每佐領䕶軍二人亟赴陜西總轄全省滿漢大兵斷賊餉道𠞰滅平固逆孽以靖地方大將軍抵平凉時盡收各將軍敕印遇有分遣酌量給付貝勒洞鄂以下悉聴大將軍節制甲子命將軍侯張勇還鞏昌時勇已赴寧夏㑹巡撫華善奏逆賊呉之茂自四川出犯踰風水嶺逼鞏昌上乃命張勇速還鞏昌𠞰禦乙丑命都統畢力克圖率兵赴寧夏上諭議政王等見駐寧夏滿洲䝉古大兵無人統轄其仍授都統畢力克圖平逆將軍印以所部前鋒赴寧夏統轄滿洲䝉古官兵鎮守地方俟草青時酌調鄂爾多斯兵協取平固戊辰詔增平凉兵時大將軍貝勒洞鄂奏頃分遣官兵令副都統希福徃守隴州諸處平凉兵力頗單上命增𣲖每佐領驍騎一人付大將軍圖海率徃抵河南日大將軍即統河南兵赴平凉而以此兵付統領兩翼叅領胡什巴額勒布駐守河南尋义令大將軍圖海選河南撫標下鳥槍手二百人并察西安物故之兵所遺厮役俱令披甲率赴平凉命郎中額業圖諭鄂爾多斯王貝勒等總督哈占奏言寧夏與鄂爾多斯接壤今乘内地有事䝉古入邊侵掠寧花塞平羌等堡上命署理藩院郎中額業圖為副都統馳驛赴鄂爾多斯以刦掠情狀諭其王貝勒等令之嚴禁毋擾内地仍令鄂爾多斯整理甲兵以俟調遣庚午命將軍哈爾噶齊帥師赴廣東平南親王尚可喜奏賊犯惠州肇慶諸處省城危急上諭粤省要地茍有疏失為賊利不小頃雖調遣江西兵尚恐單薄今以兖州每佐領驍騎兵一人䝉古兵六百及駐防徽州池州滿洲䝉古兵七百令將軍哈爾噶齊統領馳赴粤東如有稽緩坐以失悞軍機之罪其哈爾噶齊所用平冦將軍印留付署副都統科爾擴岱鎮守江南徽州池州餘兵七百人恐難捍禦或令見駐安慶提督移鎮池州或撥蘇州駐防兵五百徃駐徽池將軍總督等公同酌議調遣至山東兖州戍防不可無兵大將軍圖海所統兵内分每佐領一人徃山東駐守俟盛京兵到酌發圖海軍前辛未趣大將軍康親王傑書等進兵上諭兵部前命康親王傑書為大將軍平定閩中王奏先滅浙冦再進福建已允其請後授貝子傅喇塔為將軍進取黄巖乃借稱修橋俟船輾轉遷延屢下詔嚴趣始取黄巖進温州其時曾言紅衣礟至即取温州今據王所報稱礟已俱集而温州之即得與否初未奏及師行猶豫若此何時始得入閩邪王貝子統率大兵駐浙江曠日持久致師老餉匱今温州若刻日可下則速行進取儻不能即克宜分兵留守王親統大兵為先取福建之計如仙霞嶺路險難進或由分水闗入或别從間道當酌量速行福建一定則江西之兵可以全力辦賊而呉逆亦可指日定矣王貝子屬朕懿親大小將弁皆素所信任當各効心膂奮力前驅如仍瞻顧不前則師益老餉益匱貽悞大事莫此為甚王等其勉副委任乘此事機速議進止以聞甲戌趣大將軍貝勒尚善等進兵上諭兵部貝勒尚善等統率大兵徃駐岳州將及二載並未移師前進作攻城破賊之勢因循坐守馴至師老財匱今因大將軍安親王由袁州進取長沙湖南逆賊遂欲分我兵勢來犯江廣前據報岳州逆賊徃援彝陵諸處則岳州賊勢已分貝勒尚善貝子彰泰公蘭布皆朕懿親委以重任都統珠滿䕶軍統領額司泰副都統路什阿晉泰前鋒統領噶爾弼等皆以勝任簡用巡撫韓世琦提督桑額亦以才能著稱畀以封疆重任今岳州滿洲䝉古之兵為數不少桑額標下士卒頗衆今湖南賊勢既分即宜整理甲兵為進取岳州之勢可取則取如或不可即覘賊虚實或發兵聲言由岳州進攻長沙遇賊即邀擊以撓之俾不能分援他所則江西廣東冦警少息而大將軍安親王規復萍鄉以圖長沙亦易為力矣尚善等初無𠞰滅賊冦恢復疆土以副朕委任之心未嘗偵察情形期赴機㑹敵兵分遣置若罔聞止知畫地自守圖保身軀不能少進尺寸如謂逆賊深浚濠塹多用火器以傷我軍儻值大雨之時其火器亦尚可用耶總之不實心効力致賊得任意應援貽誤大事良非細故如此因仍逆賊何日得滅地方何日得平尚善等以文到日即作攻取岳州發兵長沙之勢以牽制逆賊儻有機可乘速行進取如有未便仍許奏聞命將軍哈爾噶齊帥師援吉安先是廣東告急已遣哈爾噶齊統江寧兵赴援至是賊將髙大節等乘大將軍安親王岳樂進取袁州萍鄉之隙擁衆數萬圍吉安大將軍簡親王喇布以聞上諭吉安為廣東要路今既被圍應速發兵救援駐江寧將軍哈爾噶齊於率赴廣東兵内選其半馳徃南昌與大將軍簡親王副將軍希爾根等共議即于所部兵及南昌兵内酌量派出率赴吉安速破賊冦以通入粤之路粤道既通哈爾噶齊仍率兵赴廣東其半留江寧之兵付賢能夸蘭大俟兖州兵到即令耑徃并移文大將軍安親王俾知吉安情形以便隨機䇿應乙亥詔加鄂爾多斯台吉等級上諭理藩院鄂爾多斯台吉等率兵入邊宣力戎行殊為可嘉其見在軍前者各加一級丙子申諭陜西諸將領上諭陜西諸將領曰我國家自創業以來克敵攻城必主帥奮勇先登軍士効死戮力故能速建膚功今聞爾等凡與敵遇率皆乘閒伺隙觀望不前但令士卒前驅衝突其督撫亦多坐失事機勞師匱餉職此之故因命都統大學士圖海為撫逺大將軍如平涼總制諸軍爾等痛改前愆殫心圖効若仍蹈徃轍一經大將軍指名劾𠫭必置重典至兵士行間勞苦朕已悉知亦宜體豢養之恩益奮同讎之勇果建功勲不吝爵賞爾等勉之發帑金賞平凉軍士上諭平凉滿漢軍士曰爾等比年所在征戰為國効命朕悉聞知今圍攻平凉屢次衝突奮勇殺賊嚴冬掘壕逺道樵採備歴艱苦朕心深為憫惻兹命撫逺大將軍都統大學士圖海統率禁旅征討逆賊雖目前國用殷繁念爾等戮力行𠞰勤勞已久特發内帑白金五萬兩齎至軍前普加恩賜以昭朕優恤軍士之意爾等一乃心力益勵忠義速翦羣兇朕不吝復加優賞爾等勉之臣謹案用兵之道必統兵將帥能身先士卒乃可使三軍用命我朝創業以來開疆拓土戰勝攻取莫不皆然時陜西諸將弁每與賊遇徃徃顧望不前惟遣士卒先驅令之攻突皇上深知其故乃下詔㫖開諭訓飭既又念兵士征行日久艱苦備嘗特發帑金加之賞賚自是將士感恩畏法咸矢死圖報各思一戰後大將軍圖海奉命討賊衆皆奮臂争先大創賊衆收復平凉是皆由我皇上洞悉軍事徳威並用故能勵軍心作敵愾立奏捷功也命大將軍簡親王喇布等亟取吉安時總督董衛國報吉安被陷上諭吉安最闗要害大將軍簡親王喇布副將軍希爾根總督董衛國等速議恢復以通入粤之路將軍哈爾噶齊率師星馳赴江西亦與簡親王等協力攻𠞰尋簡親王喇布奏欲暫棄廣信撤還將軍額楚所率兵併調樂平兵𠞰吉安賊俟吉安恢復後再為規取廣信之計上諭廣信兵既撤還饒州恐有他虞簡親王等其議所以固守饒州勿致有失戊寅大將軍圖海帥師之陜西己卯總督董衛國奏大兵復萍鄉大將軍安親王岳樂統領大兵進𠞰逆賊於是月十一日抵萍鄉相視形勢分兵四隊十五日我兵前進分路並擊大敗賊衆破其十二寨斬首萬餘級復萍鄉縣偽將軍夏國相棄印走董衛國以捷聞上諭安親王摧賊堅城賊已破膽宜即乘勝直取湖南但我兵進取湖南逆賊呉三桂或撤所在賊兵齊赴長沙亦未可知其在荆岳大將軍王貝勒等亦當部勒兵馬亟行偵探乘機進𠞰辛巳命總督哈占等運餉秦州時哈占奏秦州大軍餉道為賊所阻上命哈占同巡撫杭愛速遣賢能官絡繹運餉至秦州軍前毋致愆悞命將軍席卜臣等遣兵守闗山大將軍貝勒洞鄂奏稱聞逆賊聲言將斷闗山道臣欲發兵徃守但見兵無㡬勢難分遣至於鞏昌雖有副都統翁愛率兵前赴而賊日益近勢有可虞上諭闗山險要之地將軍席卜臣總督哈占宜相地方緩急調各隘官兵守闗山將軍侯張勇兼程速還同將軍佛尼勒等𠞰出犯秦鞏之賊自後一切軍機大將軍貝勒洞鄂等一面奏聞一面報大將軍圖海知之壬午命大將軍貝勒洞鄂等𠞰賊通秦州餉道提督王進寶等奏言賊薄秦州屯踞北山斷臨鞏道秦州軍需無從而得且兵力單弱戰守皆難上諭大將軍貝勒洞鄂及將軍席卜臣佛尼勒都統赫業總督哈占巡撫杭愛華善提督王進寶等逆賊來犯秦鞏如何攻禦大兵糧餉如何輓運不絶其共酌便宜以行至席卜臣既遣夸蘭大聶勒庫率兵三百赴隴州隴州副都統希福亦宜酌量分兵至秦州應援平定三逆方畧卷二十一

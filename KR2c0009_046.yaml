body:
  text: 欽定四庫全書平定三逆方畧卷四十六康熙十八年七月壬寅勅總兵官周邦寧還鎮河内侍郎宜昌阿等奏大將軍貝勒察尼軍前見有湖廣經制隨征緑旗兵共二萬七千人宜令河南總兵官周邦寧還豫鎮守上諭河南境内遼濶提督既已裁缺内鄉淅川二縣各口俱在深山今又值旱灾總兵官周邦寧可統標兵一千五百即還豫鎮守癸夘勅學士孔國岱等率尚之信所部兵赴將軍莽依圖軍前時之信奏言臣先因患痔由横州還封川今病日加有事醫療故臣於六月十八日還㑹城上諭今正進討逆賊勦撫並施之㑹尚之信所部往定廣西官兵令學士孔國岱等盡率赴將軍莽依圖軍前到日聴莽依圖統攝調遣孔國岱等即同莽依圖進𠞰其奮武大將軍印勅仍留與之信丙午削輔國公温齊等官爵先是温齊等賊遁不追且妄報殺賊之數上令嚴取供詞以聞至是大將軍貝勒察尼等取供具奏上諭我國家由来軍法嚴明曾無虛偽多報首功之事温齊乃有罪之人不思効力自贖岳州徒歩奔逸之冦不即窮追且殺賊不過三百餘人與原疏迥異彼時一等台吉格哷爾圖尚欲追𠞰賊冦承勝復城乃温齊反稱道隘馬疲不可前進選愞退却大悞軍機可削去温齊官爵罷其叅贊署副都統達頼削去阿思哈尼哈畨佐領及所加之級喀住削去副都統麻尼削去䕶軍叅領佐領及所加之級壬子命大將軍貝勒察尼等酌調投誠兵於内地將軍侯林興珠奏投誠偽總兵王度冲偽將軍陳珀標兵各一千人見留軍前其父母妻子俱在雲南恐乘間逸去宣洩軍情請調内地補伍上諭投誠官兵見隨大兵進𠞰若盡撤往内地則此後歸誠者將瞻顧不前大將軍貝勒察尼等身在常徳洞悉情形其有家口在滇實屬可疑者酌量設法撤至内地補入營伍癸丑命撤彞陵襄陽諸處外藩䝉古兵還京大將軍順承郡王勒爾錦等奏湖南各大將軍麾下所有䝉古兵已盡遣還其在彞陵襄陽等處䝉古兵一千七百餘人亦應撤回京師上命彞陵襄陽等諸處䝉古兵准令撤還於荆州諸處滿洲緑旗官兵内酌量抽撥鎮守地方又諭兵部柯鐸等投誠官員遇便一一遣發荆州即傳諭大將軍王將軍等知之勅提督徐治都速進歸州諸處𠞰賊治都奏設五板船一百艘令彞陵鎮臣胡世英統之以備水路臣親調官兵偕襄陽鎮臣水陸並發前赴歸州興山巴東形勝之地𠞰撫逆賊上諭所用戰艦督撫等委官速造毋悞軍需徐治都即偕彞陵襄陽總兵官赴歸州諸處討賊𠞰撫並用乙夘將軍莽依圖奏大敗賊於新村西山南寧圍解初偽將軍呉世琮等圍困南寧日乆城中食盡旦夕且陷投誠偽將軍馬承廕請救總督金光祖遣總兵官譚昇楊國泰等率兵徃南寧援之已而世琮率衆渡江越嶺於新村西山之巔列鹿角逆戰莽依圖與將軍覺羅舒恕額楚都統貝勒等分路撲𠞰殺賊甚多呉世琮負重傷遁遂解南寜之圍時金光祖又䟽報太平偽知府林輔世新泰偽叅將何應魁率城内文武官薙髮投誠丁巳命江西湖廣巡撫委官送馬長沙上諭兵部江西南昌備養之馬二千四百餘匹湖廣武昌備養之馬一千匹移文該撫令遣能員解赴長沙沿途管䕶勿致缺額付巡撫韓世琦加意飼秣毋令羸痩馬畢到長沙仍令世琦報部勅大將軍公圖海速調提督孫思克等平定漢中四川諸處圖海奏驛門鎮逆賊既敗即遣兵追𠞰而賊毁偏橋無路可通俟提督孫思克趙良棟到日㑹議進兵上諭今逆賊既敗所在震動自宜努力窮追收復疆土前稱逆賊屯踞寳鷄圖海等欲調各路之兵進𠞰及賊敗之後又不乘機撲滅反藉稱賊毁偏橋無路可通竟爾却還如此懦怯易退何時乃得破賊圖海等速調提督孫思克趙良棟等平定漢中四川諸處𠞰殺逆賊毋失機㑹勅將軍莽依圖等速發南寧平定雲南時莽依圖報稱南寧地方險隘輓運維艱議令將軍額楚都統馬九玉帥兵屯駐永淳上諭今當逆賊震讋揺動之時凡為將帥者各宜不失機㑹努力疾行滅賊以定彊圉莽依圖等既大敗南寜逆賊呉世琮等自當乘勢直取雲南乃稱南寧險隘輓運艱難令額楚等徃駐永淳懦怯如此逆賊何時得滅滇南何日得平今粤西底定乗賊大創之後莽依圖速調都統希福等兵自南寧取路進𠞰直抵滇中八月癸亥朔勅將軍頼塔兼轄潮州總督姚啟聖奏將軍頼塔久鎮潮州兵民俱已心服宜仍令兼轄漳州潮州上諭漳潮係兩省接壤之地將軍頼塔久駐潮州得士民心當此撲滅海賊恢復海澄之際潮州仍令頼塔兼轄其後頼塔奏言身在漳州與賊對壘且滿洲大兵係大將軍康親王統轄潮州地勢遥逺實難兼轄上諭成命已頒仍令將軍頼塔兼轄潮州如須用滿洲大兵許一面酌量調遣一面申報大將軍康親王乙丑勅廣西提督哲勒肯率兵赴南寜哲勒肯奏臣駐潯州三合嘴彈壓兩江接應大兵但慶逺太平思恩三府逼近交趾聨接雲貴為粤西藩籬今逆冦苖蠻嘯聚負固尚未克復臣請率兵先徃南寜㑹同將軍相機𠞰撫上諭哲勒肯身在地方有保守西粤之責關係甚重今既統兵前徃令速赴南寜偕將軍莽依圖總督金光祖等乗逆賊震動共議𠞰撫以靖封疆其原駐潯州三合嘴之地儻屬𦂳要總督提督可發兵汛守丁夘命大將軍順承郡王勒爾錦分兵固守均州鄖陽諸處將軍噶爾漢奏稱率兵偕總督楊茂勲提督佟國瑶等進𠞰興安賊上諭今正蕩滅賊寇平定疆域之時噶爾漢等率兵前進均州鄖陽諸處所係甚大大將軍順承郡王等於荆州岳州等兵内酌量抽調固守均鄖諸處務使無虞庚午詔封馬承䕃伯爵授為昭義將軍時承䕃既投誠請効力自贖上因諭議政王等曰原任廣西提督馬雄之子馬承廕不忘國恩誠心率衆賫􅌳偽勅印投誠可嘉應授承廕伯爵給與將軍勅印隨大兵進𠞰其標下應設官兵等處令理事官麻勒吉等與總督金光祖同馬承廕確議以聞其餘兵丁有願歸農者安挿得所願為兵者選撥入伍至同来歸附文武官員酌量給劄以示鼓勵甲戌以郭義為左江總兵官將軍莽依圖奏當逆賊圍困南寜時郭義齊人龍悉力固守數與賊戰非他處投誠者可比今聞左江總兵官缺員以湖北總兵官傅魁調補儻念邉疆要地乞以郭義或齊人龍補授兹缺用開歸誠之路上諭郭義原任左江總兵官率衆歸誠勤勞昭著仍復原任齊人龍亦有勞績如有應補之缺聴該將軍題補其湖北總兵官原缺尚未補人令傅魁仍回原任庚辰勅大將軍簡親王喇布等進兵武岡喇布奏臣遣將軍穆占於本月初一日克復新寜縣今與大將軍安親王尅期進𠞰武岡逆賊上諭屯聚新寜賊寇己遁走武岡簡親王等速統大兵即會合安親王等兵克復武岡楓木嶺諸處殱滅賊醜以定靖沅其由鎮逺進平雲貴應行事宜確議以聞儻逆賊不支屢至遁逃安親王等乘其無措隨行追躡以期蕩平如賊由武岡遁去烏拉寜古塔之兵可遣還京師大將軍安親王岳樂等奏官兵復武岡州及楓林嶺賊首呉國貴盤踞武岡率偽將軍胡國柱等以二萬餘賊逆戰隘口將軍侯林興珠提督趙國祚等率兵奮擊大敗之國貴中礟死餘賊棄武岡而遁貝子彰泰等復率兵追及於木瓜橋又大敗之遂復武岡州城及楓林嶺乙丑命内閣學士佛倫等徃湖廣軍前督理糧餉上諭議政王等曰今我大兵數路並進深入𠞰賊轉運糧餉殊為重要聞今嵗湖南亢旱所運糧餉一時不前殆未可定令學士佛倫侍郎金鋐并遴選部院賢能官員前徃湖廣同督撫商酌總理諸路大兵糧餉庚寅勅大將軍公圖海等分路進發𠞰漢中賊平定四川圖海奏進取漢中興安兵分為四路臣與將軍佛尼勒等由興安進總兵官程福亮為後援駐守舊縣關諸處將軍畢力克圖提督孫思克等由畧陽進西寜總兵官朱衣客為後援駐守西河諸處將軍王進寳漢中總兵官費雅達等由棧道進延綏總官髙孟為後援駐守寳鷄寜夏提督趙良棟等由徽州之巴都山進臣等於九月初八日四路並發疏入上諭今將軍莽依圖等大敗逆賊呉世琮平定粤西進取雲貴大將軍安親王恢復武岡州楓木嶺擊殺賊渠呉國貴大將軍貝勒察尼由常徳進取辰州將軍噶爾漢等自鄖陽進取興安宜乗賊處處敗衂逃遁震動之時分路撲滅大將軍公圖海亟統大兵乗機𠞰滅漢中諸處賊冦速定四川如賊敗走即亟躡其後直搗窮追勿使占踞險要辛夘詔責大將軍簡親王喇布喇布奏臣探得安親王大兵已克武岡賊冦敗遁故臣遣烏拉寜古塔兵還京臣統兵一支駐劄東安縣以將軍印信給與都統穆占令其率兵一支駐新寜侯㫖上諭逆賊既敗簡親王等宜統兵隨後速進與大將軍安親王共破賊寇乃不行追勦反勒兵新寜以致軍機大悞理應嚴加處分但今統兵進𠞰俟回師之日察議簡親王其速率兵士徃㑹安親王平定靖州沅州諸處俟至鎮逺日平定雲貴事宜定議以聞平定三逆方畧卷四十六

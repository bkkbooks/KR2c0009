body:
  text: 欽定四庫全書平定三逆方略卷二十六康熙十五年九月庚辰朔總督李之芳奏克仙霞關時馬九玉敗遁大將軍康親王傑書遣副都統瑚圖等率兵連夜追擊破之克常山縣又遣將軍賴塔副都統瑪哈逹等於八月二十日進至仙霞關分路夾攻翼日僞參將金應虎等獻關迎降官軍長驅而進二十三日抵浦城縣攻拔之臣謹按閩逆阻兵首尾三載所以茍延喙息未服天誅者徒以仙霞之險也先是建昌諸路賊衆退回諸將猶為持重之計頓兵不進皇上即知閩有內亂趣傑書赴衢約勒士馬尅期進討未幾遂有大溪灘之捷至是而仙霞不守枕席過師精忠麇身自歸八閩以次底定睿謨深逺決䇿如神史冊所載未之有也辛巳命遣馬承先等赴粵西招撫馬雄先是大將軍公圖海奏原任廣西提督馬雄之母及族人俱在固原今雄母欲令其孫承先承霄等持書赴廣西招雄歸降上令承先等馳驛來京至是至京師上命給馬承先等遊擊銜劄選賢能筆帖式一員同行赴大將軍簡親王副將軍希爾根總督董衛國軍前到日共議送承先等於將軍舒恕所轉送廣西若不能達舒恕軍可覔間道遣赴馬雄處承先等前往宜有符驗令録馬雄披陳原疏持以為信癸未敕大將軍簡親王喇布等攻醴陵喇布奏醴陵陷賊袁州萍鄉雖有署副都統揚古岱等統兵駐守其力頗單南昌兵卒分撥應援外止存甲士五十人别無可調之兵臣已檄揚古岱等固守袁州諸處聞署副都統多諾兵駐廬州養馬並檄趣馳赴江西上諭袁州鎮標近已增設多兵署副都統揚古岱又率兵駐防兵力亦不為少醴陵乃大將軍安親王大兵後路今既陷賊宜急圖收復大將軍簡親王等其速趣揚古岱及總兵官趙應奎等分遣官兵迅取醴陵并間道移㑹安親王發兵夾攻更檄署副都統多諾副都統席山等星夜馳赴江西聽簡親王調度丁酉諭大將軍康親王傑書招撫耿精忠上諭兵部曰大將軍康親王統率大兵大敗賊衆已入閩境耿精忠雖背恩反叛念小民遭罹賊亂困苦已極朕心深為惻然其以時事曉諭精忠早降以副朕安輯生民至意諭湖廣總督蔡育榮等轉餉鄖陽撫治楊茂勳奏賊渠談洪由水陸來犯欲斷餉道臣與防守均州副都統諾敏柯彛等共議發臣標兵併均州滿漢官兵分四隊以禦來援賊衆惟慮餉道一時難通遲延時日糧匱可虞上諭糧餉係大兵急需楊荗勳諾敏等協力𠞰賊速通水路湖廣督撫仍設法陸運至鄖毋至匱乏戊戌命江南江西將軍總督遣兵夾𠞰徽饒諸路餘賊浙江總督李之芳奏賊帥馬九玉敗走餘賊四竄濳匿尚多馬鵬等擁衆屯踞新建諸處地連徽饒廣信不可任其蔓延上諭大將軍康親王已統帥大兵大創逆賊深入閩境宜及此時掃除餘賊平定地方大將軍簡親王副將軍希爾根江西總督董衛國將軍華善江南總督阿席熙等其速檄駐守建昌署副都統尼滿駐守徽州署副都統嶽爾多等各率兵前進協𠞰徽饒廣信接壤諸寇務行撲滅以張浙閩大兵聲勢丙午命署前鋒統領穆占為征南將軍帥師赴湖廣先是大將軍公圖海奏今進取漢中必滿漢兵并力庶可有濟但大兵征𠞰逆賊二載有餘軍械殘敝緑旗兵丁馬已殆盡且秦地人民頻年勞困已極是以臣等公議暫停進攻漢中之役分兵防守諸隘餘兵每佐領撥足五人每翼設夸蘭大二員遣副都統希福領之前赴湖廣俟秦中兵民稍得息肩整繕器械儲備糧糗再相機進取上諭賊渠吳三桂竊踞湖南為日已久宜速遣重兵赴湖廣掃除逆賊克復疆土若止遣每佐領兵五人恐力仍未足今大將軍公圖海既招撫王輔臣底定平涼諸處可暫停進取漢中量留官兵防守隘口餘兵內簡擇精鋭仍携大將軍敕印率赴湖廣𠞰滅逆賊至是圖海又奏平涼慶陽雖已底定而投誠兵心尚未寧靖雖遣兵防守諸隘漢中興安尚未恢復臣若率精鋭赴楚恐不逞之徒心懷叵測上諭大將軍公圖海既稱新附兵心未靖漢中興安尚未恢復可勿赴湖廣署前鋒統領穆占懋著勤勞其實授都統佩征南將軍印統率原撥陜西每佐領騎兵五人益以每佐領護軍二人簡新附總兵王好問等所屬精兵二千人併見在湖南瑚什巴等所率每佐領兵一人俱付穆占統領前赴湖廣陜西所有諸將不論參贊與否俱聽穆占㑹同圖海公議簡擇以往抵湖廣日於荆州嶽州彛陵諸處滿兵及伊所統兵內共選官員及前鋒護軍騎兵每佐領足十人或從荆州渡江或由彛陵進𠞰或趨嶽州水陸夾攻聽相機從事如須用湖廣緑旗官兵亦令隨宜携往丁未大將軍康親王傑書奏官兵復建寧將軍賴塔率滿漢兵自浦城星馳前進於是月初三日抵建陽縣擊敗賊衆斬殺甚多遂克其城進至建寧府賊潰走府城亦復十月辛酉提督佟國瑶奏敗賊於鄖陽八月川賊談洪率衆乘船順流而下圍困鄖城將軍噶爾漢提督佟國瑶等出兵邀戰敗之陡嶺九月十九日復以水陸兵分路夾擊斬首甚多餘賊悉遁癸亥命叙賚甘肅鎮將士上諭兵部自逆賊變亂以來總兵官孫思克標下將士用命屢經戰陳勞苦可嘉所司速行叙賚以示鼓勵庚午總督李之芳奏復溫州浙江溫州總兵官陳世凱平陽總兵官王廷梅等遣兵分路復浙閩江西接壤諸縣溫州僞都統曽養性僞伯祖宏勳等聞大兵入閩勢迫無歸是月朔日率衆以城降浙土皆定壬申諭將軍穆占進兵機宜穆占奏防守陜西各隘外所餘滿漢兵若令大將軍公圖海等及臣率赴湖廣更酌選荆州嶽州彛陵兵分路並進則吳逆可滅若欲進漢中興宜宜停發陜西滿漢官兵令圖海及臣率之四路進取四川雲南吳三桂勢必退保巢穴則湖南地方亦易恢復上諭陜西兵所在征𠞰勤勞備至挽輸糧餉民殊苦纍若復進取四川恐師徒重困轉運維難故暫停漢興之役平涼雖已底定緑旗兵既乏馬匹新附之衆心猶未定陜西諸將及新附將士不便調往湖廣且荆嶽諸處有大將軍順承郡王貝勒尚善都統鄂鼐宜禮布等統兵駐守又大將軍安親王統率大兵圍困長沙今將軍穆占率師抵湖廣日合荆州諸處兵每佐領配足十人又添䝉古兵及陜西湖廣緑旗兵隨往兵力不為單弱著穆占仍遵前㫖行逮克復地方其應設鎮守官兵調遣機宜與諸將軍總督提督等議行大將軍安親王順承郡王貝勒等探知穆占何路進兵即相機應援大兵𠞰賊惟馬是賴可視其肥瘠擇可暫駐之處酌量飼秣尋又召穆占來京密授機宜隨令馳往軍前召還駐守河南府及潼關兵上諭兵部曰駐守河南府及潼關兵回自保寧備嘗艱險俱召還京師大將軍公圖海可分兵守潼關將軍布顔盡率兖州駐防兵移鎮河南今閩浙俱已底定兖州不必駐防又諭還自保寧官兵曰逆賊吳三桂負恩反叛大兵致討爾等為國盡勞攻取七盤朝天諸關大敗賊衆直抵保寧屯駐日久餉道梗塞遂爾旋師未獲成功責在將帥非爾等之罪沿途遇賊復同心合力屢次血戰擊敗賊衆後又久圍秦州屢敗四川來援之賊恢復秦州又擊敗平涼諸賊降王輔臣爾等披堅執鋭二年有餘𠞰寇開疆備嘗勞苦朕心憫焉今據塘報耿精忠已歸命關陜閩浙以次削平江西不日底定粵賊亦已敗走爾等於更替官兵到日即速還京所有勞績俱與議叙平定三逆方略卷二十六

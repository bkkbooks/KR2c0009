body:
  text: 欽定四庫全書平定三逆方畧巻三十五康熈十七年正月己卯總督金光祖奏復鬱林等州縣偽監軍道周遴元等拒守鬱林諸處將軍巡撫傅宏烈理事官麻勒吉等招降之鬱林等一州四縣悉復庚辰諭將軍莽依圖等廣西戰守事宜先是莽依圖奏臣抵梧州聞吳三桂之孫世琮等來粤西桂林誘殺孫延齡據其城三桂率衆於十一月初六日來至衡州檄馬寳由宜章入粤西臣以梧桂之間平樂最為要地非亟取不可因留總督金光祖駐梧州任轉輸防守之寄又遣兵駐潯州以禦栁州南寧之㓂將軍巡撫傅宏烈於十二月十八日發自梧州臣於是月二十日率師由封川趨賀縣㑹同宏烈進取平樂未幾金光祖言逆賊馬雄死於雒容栁州賊心惶怖臣欲仍遵前㫖乗機進取横州南寧以分賊勢率師于十二月二十日自梧州啟行上諭梧州兩粤之界又為將軍莽依圖等進兵後路頃將軍巡撫傅宏烈自梧州率兵㑹莽依圖等由賀縣進取平樂今總督金光祖復進取横州南寧恐梧州兵力單少莽依圖等身在地方情形緩急當所稔知應戰應守熟計而行務期萬全且平定廣西蕩平雲貴闗係重要莽依圖等其同心協意共相圖度毋致疎虞趣將軍穆占進兵湖南穆占奏聞吳逆自失茶陵攸縣諸處饋餉不給軍士胥怨民多逺避但新復地方非堅守不可臣惟俟安親王所遣滿兵及提督趙國祚抵茶陵日即進取湖南韶州滿兵及平南親王下綠旗兵何時由樂昌進取宜郴諸處知㑹到臣方可相機前發若逆賊韓大任等逸入楚境江西大兵宜追躡至湖南庶賊可撲滅新復地方亦得無虞上諭前命平南親王尚之信率兵赴韶州㑹將軍額楚等由樂昌進宜章郴永其進兵可否尚之信等尚未奏知穆占所領陜西荆岳諸處將士皆曽經簡擇平定湖南惟此精兵是頼兹當逆賊窮蹙之時即宜乗勢速定湖南殄滅凶醜不可待尚之信等兵坐失機㑹至江西大兵現在徴討逆賊韓大任平賊之後自有措置豈可懸揣即行指示穆占亦不必待江西兵至湖南即鼔行滅賊亟靖疆場安親王亦宜速遣提督趙國祚赴茶陵其逆賊地方失守軍士胥怨民多逺避情形可移荆岳長沙大將軍王貝勒等知之命總督董衛國追勦韓大任等衛國奏逆賊韓大任李懋珠陳堯元等敗竄永豐廬陵間復奔閬川洞白楊㘭上諭頃將軍舒恕言韓大任等敗走興國寳石砦已嚴勅䕶軍統領哈克三等速行追躡殱滅為期今大任等復竄去閬川洞白楊㘭董衛國其疾往追𠞰務期撲滅勅大將軍康親王傑書招撫民人依附海賊者傑書疏言臣遣知府張仲舉等持諭往招海賊鄭錦還報錦但云錢糧匱乏假託支吾語言無定觀此是海賊無降意矣上諭鄭錦雖無降意其附逆人民有革心向化者大將軍康親王仍隨宜招撫丙戌宥董重民等罪偽總督董重民等自廣東解至京師上諭大學士索額圖明珠曰逆賊吳三桂背恩倡亂其荼毒生民肆行逆惡罪在賊渠三桂與脅從之人無涉彼所部人員如能悔罪投誠槩行寛免屢經有㫖今偽總督董重民自粤東執送宜即正刑誅但朕屢經降㫖寛宥且此輩原皆朕之臣子爾等㑹同兵刑二部堂上官將董重民免死釋放同解罪人亦俱寛釋併交與兵部俾各得所戊戌申諭各路大將軍王貝勒將軍大臣上諭議政王等曰逆賊吳三桂等背恩倡亂荼毒生靈擾亂疆宇朕念切除兇志安民社仁育義正恩威並行大將軍等既承簡任當勵忠貞之誼早奏戡定之勲以副朕愛民至意乃自用兵以來大將軍王貝勒將軍大臣等固有盡心王事已著勞績者亦有觀望逗遛不思振旅遄進竟爾營私適已希圖便安或諉兵甲之不全或托舟楫之未具借端引日坐失事機者甚而干預公事挾制有司貪冒貨賄占踞利孔更有多方漁色購女隣疆顧戀私家信使絡繹尤可異者新定地方亟需安輯乃於所在攘奪焚掠種種妄行殊乖法紀本宜嚴察職名從重治罪但時當進𠞰姑免處分䇿勵後効各路大將軍王貝勒將軍大臣等各冝乗時速行進取恢復封疆振救民命一切違法之事嚴加禁止倘有不遵許督撫指㕘繩以重典兵丁厮役犯者其將領家主均行連坐官員犯者除本官重治外將帥分别議處地方官迎逢餽獻一併嚴懲如督撫不紏或經言官劾奏或為被害首陳該督撫以徇庇論督撫提鎮等官自違禁條加倍究治其以此傳示内外嚴加曉諭俾一體遵行臣謹按軍興以來皇上念切生民所以戒諭諸將者屢矣但用兵之地逺近各殊統兵之將賢否不一雖不無恪遵紀律乃心王事之人而托故逗撓營私罔利擾害百姓者亦自不乏彼其心以為身在疆隅去京師遼逺即稍違法禁亦未必播聞殊不知軍中進止一一難逃睿鑒故若輩之情事皇上早已洞悉復頒諭㫖申飭將帥併禁有司之餽遺懲督撫之徇隠訓誡嚴明益見聖主無日不以生民為念也二月甲辰命將軍額楚等赴梧州將軍覺羅舒恕守南雄諸處總督金光祖自潯州進兵失利額楚以聞上諭金光祖不守梧州希圖立功輕進失利梧州不無可虞萬一梧州失守則進取平桂大兵後路亦阻向調將軍莽依圖等速赴梧州因平南親王尚之信不亟發船至韶致悞軍行不可謂非王失機也梧州乃兩廣接壤要地不可不増遣重兵駐韶將軍額楚都統勒貝等即率兵前往戍防尚之信亦多遣精兵協守駐贛將軍覺羅舒恕率兵往守南雄兼顧韶州大將軍簡親王量遣官兵與巡撫佟國禎總兵官哲勒肯等同守贛州㫖既下㑹將軍巡撫傅宏烈疏言吳逆悉其驍銳俱向廣西乞遣附近官兵星馳應援上復命額楚等速赴廣西與將軍莽依圖傅宏烈等共籌攻守之䇿兩兵既合以莽依圖總統額楚勒貝參賛尚之信可親率將士速進廣西接濟大兵若之信必難離㑹城宜多揀精銳速往應援額楚等兵既進廣西將軍舒恕不必俟簡親王所遣之兵即率師迅赴南雄已而之信奏臣臣奉命進取宜章郴永行至清逺以總督金光祖及髙州等處報警遂還㑹城今潮陽諸處又報海賊突犯臣所屬官兵有限不能分應上諭潮州恵州既有將軍頼塔靖南王耿精忠提督王可臣等鎮守勦禦海㓂不為不足今將軍莽依圖等深入廣西事機所繋甚重且廣西早定則湖南之㓂不能自存尚之信其以沿海地方付賴塔等親往接濟廣西大兵毋悞軍事命察還兩粤被掠人民上諭兵部廣東賊變時被掠男婦子女可令平南親王尚之信總督金光祖等嚴行察出令人民識視悉皆發還俾其父子夫妻完聚粤西平日將軍莽依圖傅宏烈等亦各察明被奪人口遣還原籍庚戌命覈各路糧餉上諭户部積貯係國家大計年來各路兵馬需用糧餉浩繁在外總督巡撫及經管錢糧各官俱宜潔已奉公殫心稽察一應支放開銷務嚴加覈實節省方於軍國有禆近見各路奏銷或製備物料並不先行題明藉口軍機𦂳急濫請銷筭或不行察核重復支給又不為扣抵或朦混重領希圖利已致滋糜費以及侵欺浮冒種種弊端難以枚舉以後應作何禁飭處分爾部㑹同吏兵工三部詳議具奏調袁州總兵官趙應奎赴茶陵先是大將軍安親王岳樂奏提督趙國祚奉調茶陵理宜即遣但國祚所駐乃邊江要地日與逆賊礮火相加實難遣赴而他處守兵又不可撤今就近以守醴陵兵毎佐領二人付署副都統公沃赫率赴茶陵駐守已而將軍穆占奏茶陵攸縣安仁永興酃縣幅􅊷遼濶與賊逼近臣等雖撃敗賊首郭應輔等而餘賊大半仍匿酃縣山谷中且吳三桂擁衆盤踞衡州江之東岸有偽將軍馬寳等立營獨令沃赫控制諸地兵力殊單上諭穆占著俟簡親王至湖南日㑹同定議如協力同進則量留簡親王兵守茶陵攸縣諸處若由他道而行江西袁州已屬内地總兵官趙應奎可率標兵與沃赫并力趙國祚仍留長沙今江西已平簡親王進取湖南其江西緑旗官兵聽隨宜調用甲寅詔趣攻岳州先是大將軍貝勒尚善言得鳥船四十艘可以破賊因令江南造船如數送往後尚善復奏目前水小難行俟三月後湖水既漲且添造之船度亦告成爾時酌量水勢相幾進取上諭湖中所須之船已如數辦遣尚善復若爾遷延觀其所奏雖添造船成又必旁借事端稽緩時日且公温齊率往之兵本令𠞰賊非俾駐守荆岳也況添造之船難期三月必成時漸炎暑又逾進討之期大將軍順承郡王勒爾錦貝勒尚善等其公同確議添造船成可否撃破湖中賊艘具以奏聞尚善仍對如初勒爾錦言臣等因逺隔汎地船成之日能破湖賊與否未可遥度且水漲遲早難定臣等前疏曽謂如有可乗之機則率兵渡江頃者荆州相對沿江一帶賊勢稍减臣請調將軍鄂鼐舟師并岳州沙唬船五十艘來荆州臣等即帥師渡江進取上諭荆州滿漢兵數甚多攻守未為不足儻調鄂鼐兵船赴荆仍未能進取則往返稽遲反誤攻岳機㑹鄂鼐兵船不必調往俟船成之日即將温齊所領及陜西調往之兵一併發赴岳州尚善等其詳加籌度務期破賊丙辰命將軍賴塔等兼防廣東上諭兵部頃平南親王尚之信言廣東潮陽諸處海洋賊艘不時出沒因令靖南王耿精忠將軍賴塔提督王可臣等鎮守潮恵濵海之地今既命之信或親往或遣兵隨冝應援廣西若遇廣東有警耿精忠賴塔等可即行𠞰禦并速移大將軍康親王知悉己未命大將軍公圖海等議留守陜西規取四川機冝先是圖海奏當諸路𠞰賊之際亦宜進取漢中興安但臣欲三路進兵而在秦之兵若留守諸處要害則僅可進發一路請自京増遣大兵上諭在陜滿兵為數不少將軍侯張勇將軍王進寳王輔臣提督孫思克趙良棟總兵官髙孟部兵猶多可與張勇等公同詳議以聞已而圖海等奏臣等公議以將軍席卜臣西安副都統翁愛陜西巡撫杭愛領兵鎮守省城將軍畢力克圖副都統恰塔領兵守隴州寳雞闗山諸路内大臣侍衛坤巴圖魯副都統馬一豹領兵守潼關甘肅巡撫鄂善領標兵同副都統席第郎中拉篤祐等領蒙古兵守秦州將軍侯張勇駐莊浪以防邊四川巡撫張徳地仍留延安鎮守延綏總兵官髙孟統標兵備棧道諸隘賊㓂臣親率將軍佛尼勒署副都統烏丹鄂克濟哈都統海爾圖西安副都統穆成額副都統佟世徳將軍王進寳王輔臣陜西總督哈占以滿洲漢軍緑旗兵一萬三千餘人為一路將軍阿宻達率䕶軍統領傑殷副都統覺和托夸岱四川總督周有徳副都統吳國禎署副都統張所養凉州提督孫思克漢中總兵官費雅達以滿洲漢軍緑旗兵一萬三千餘人為一路尅期前進提督趙良棟統標兵繼大兵之後鎮守西和禮縣上諭進𠞰逆賊固守秦中皆大將軍公圖海將軍侯張勇將軍王進寳等是賴應作何留兵固守秦地使無他虞作何進取漢興諸處規定四川圖海等協謀熟計應機而行乙丑韓大任赴福建降先是䕶軍統領哈克三等大破賊於黄塘江卿嶺老虎洞鞍子嶺諸處賊勢窮蹙詣福建乞降總督董衛國以聞上諭兵部韓大任等屢為䕶軍統領哈克三等所敗奔至汀州乞降于大將軍康親王康親王可速發兵往汀招大任等降攜駐福州仍酌量防守汀州若康親王未及招降大任等勢迫降於哈克三亦付康親王遣去之兵攜往福州至是大將軍簡親王喇布等奏大任等率偽官數百兵萬餘赴汀州投誠哈克三等遣兵送往福州既至康親王傑書奏聞上命遣兵驛送大任等來京辛未命尚之信等簡發官兵赴廣西時將軍莽依圖奏臣等抵平樂圍其城賊水陸來援環攻將軍巡撫傅宏烈都統王國棟營緑旗官兵與戰不勝營壘失陷河路皆為賊據道阻糧匱孤軍難以久留因退至中山鎮此皆臣才具庸劣不諳軍機致然法當重懲乞速罷臣將軍職任以警衆宏烈亦奏損兵失壘臣罪誠無可寛但滿漢官兵各自調度非臣所得指揮臣標步軍零星分散難於前進倘益臣標兵專臣平定廣西之責而以金光祖堅守潯梧後路再令滿洲大兵或從韶州進湖南或仍駐肇慶以壯聲援庶可濟事上諭河水泛漲大兵不能相援賊衆我寡以致失利莽依圖傅宏烈等皆著免罪宏烈既以兵少請濟師平南親王尚之信可發精銳萬人多備火藥火礮速赴廣西應援將軍頼塔㑹同靖南王耿精忠選藩下兵千人并劉進忠標兵五千人付與都統馬九玉亦令疾趨廣西從莽依圖𫝊宏烈等并力破賊莽依圖傅宏烈以謀勇兼備並見倚任宜共相和洽同心協衷謀濟國事滿漢軍士務令輯睦俟尚之信馬九玉等兵及前調將軍額楚等兵至或一路進發或滿洲緑旗兵二路進發公同詳酌定議以聞總督金光祖已留官兵守潯身回梧州或即駐梧州接濟糧餉或莽依圖等檄赴軍前並聽酌行平定三逆方畧巻三十五

body:
  text: 欽定四庫全書平定三逆方略卷五十七康熙二十年三月甲寅朔命都統覺羅吉哈禮為宣威將軍將軍鄂克濟哈等言建昌官兵棄城突出悉由臣等庸劣不能救援所致罪俱在臣乞嚴加處分上諭鄂克濟哈久駐成都既不能退敘州諸處來犯之賊復不馳援建昌以致失陷令解將軍任還漢中同大將軍公圖海守漢中諸處以都統覺羅吉哈禮為宣威將軍統其所部官兵馳赴將軍總督趙良棟軍前會商𠞰禦賊寇綏輯疆圉丁巳貝子準逹請仍帥師進取遵義上不許準達奏言臣兵分防各路所餘無幾緣進討力單故以緑旗兵為請嗣以南川諸處賊警稍緩臣即親統官兵鼓行而進安敢推諉不前請以臣原轄之兵仍付臣率之以取遵義上諭準達自抵重慶並無寸功今若復令統兵必致貽誤事機其仍遵前旨率疲憊兵丁速回荆州令將軍噶爾漢疾馳進取遵義壬戌將軍佛尼勒奏復馬湖時偽將軍胡國柱等率衆二萬餘犯竇壩大溪口諸處佛尼勒率滿漢官兵進擊大破之乘勝遂復馬湖府癸亥命將軍噶爾漢等帥師赴敘州先是命噶爾漢同總兵官王用豫進取遵義至是總督董衛國等兵已克遵義賊犯瀘州敘州諸路上因復命噶爾漢率兵馳赴敘州速𠞰逆賊竟入雲南王用豫亦率兵與噶爾漢同至敘州滅賊之後即駐鎮敘州諸處甲子大將軍賴塔奏大敗賊于黃草壩時賊將何繼祖等自石門坎敗遁至新城所會偽將軍詹養等率衆幾二萬人據黃草壩列鹿角挨牌驅象迎敵賴塔于二月二日分布滿漢官兵躬親指示自卯戰至日晡賊大敗奪其營二十二生擒偽將軍詹養王有功及賊衆千餘人得獲象馬無算賴塔以聞上諭賴塔自閩廣深入雲南獨先諸路大創逆賊調度有方將士奮勇殊屬可嘉在事有功人員著從優議敘具奏將軍穆占奏復黔西大定穆占等既下平遠即公議遣土司頭目阿五等恢復黔西大定二府追擊逆賊斬殺甚多生擒偽巡撫張維堅等于軍前正法丙寅敕大將軍公圖海等遣兵𠞰慶陽賊巡撫巴錫奏報慶陽所屬地方有賊渠景飛妄自稱王偽設總兵副將等官聲言先取慶陽後定三邊臣已遣兵往𠞰上命大將軍公圖海將軍侯張勇提督孫思克等速遣官兵𠞰滅賊渠景飛等務絶根株勿使滋蔓戊辰大將軍賴塔奏復曲靖賴塔等率大兵自黃草壩前進二月十一日抵曲靖府偽總兵尹士元等率衆出城迎降賴塔分遣官兵并復交水城辛未大將軍貝子彰泰賴塔等奏敗賊於歸化寺彰泰等兵抵曲靖與賴塔合兵齊進距雲南省城十里營于歸化寺二月二十一日賊渠吳世璠遣發偽將軍胡國柄劉起龍黃明率馬步賊兵萬餘攜鹿角挨牌驅象迎敵我兵大敗之追至城下陳斬胡國柄劉起龍生擒賊辨兵六百餘人癸酉命將軍佛尼勒等帥師窮追逆賊先是上諭兵部將軍佛尼勒報瀘州江岸屯踞之賊已經敗走今大將軍貝子彰泰大將軍賴塔等兵已抵雲南省會大敗逆賊旦夕其城可下度敘州賊將胡國柱王敘黑邦俊等必且遁逃如胡國柱等遁去將軍佛尼勒趙良棟等即率兵速行追𠞰至是賴塔等奏言大兵已逼雲南省城掘濠圍困詢之降人言吳世璠殊無降意嬰城死守往調在蜀賊將馬寶胡國柱夏國相等應援佛尼勒等復奏敘州對壘賊將胡國柱等悉遁上因復諭曰逆賊胡國柱等退援雲南事關重大將軍佛尼勒趙良棟等于文到日即各統官兵速行躡擊俾逆賊不得至雲南悉就𠞰除將軍噶爾漢吉哈禮等到日亦即與佛尼勒等協力追賊如延遲觀望有失事機俱以貽誤軍情重處臣謹按當大兵之初抵滇省也皇上即料川中賊將必棄營奔還自顧巢穴若使之合勢併力恐撲滅需時乃命佛尼勒等於賊遁走時即率兵追𠞰至是逆渠吳世璠調賊將馬寶等還胡國柱等亦棄敘州遁回報至皇上復嚴諭佛尼勒等速行躡擊俾賊不得至雲南悉就𠞰除于是諸將奉命分道窮追賊果披靡潰散或迫蹙歸降或束手就縛或為我兵斬馘終無一人得至滇者蓋皇上先事預籌曽不少緩應機默運罔有或踈所以諸路賊黨次第殄平逆渠世璠不旋踵而授首也甲戌大將軍貝子彰泰賴塔等奏復武定大兵抵雲南偽將軍韓天福率偽官兵與和曲長官司偽總兵那天鳯等縳防守武定偽總兵王來吉何興祚以武定府城降四月庚寅將軍穆占等奏偽將軍楊應選降時偽將軍髙啓隆楊應選等自平遠敗遁穆占等遣人往撫於是應選棄其黨衆惟率所部偽官兵家口及偽將軍王永清妻子繳印劄來降壬辰將軍佛尼勒等奏復永寧時駐守永寧偽將軍宋國輔遣人乞降佛尼勒即令署副都統覺和托率兵往撫又親統官兵繼進於是國輔及偽將軍陸道清率衆以永寧降三月十五日我兵入城丙申敕巡撫王新命等速運進蜀兵餉提督徐治都奏言談天祕遁入叢山深麓進兵𠞰蕩轉餉維難已留兵開縣要地相機招撫外臣於三月十日自萬縣還駐夔州上諭巡撫王新命郎中范承勳等乘川峽未漲速運糧米用濟軍需茍有稽延俱以貽誤軍機治罪贈總督甘文焜兵部尚書當吳三桂初反文焜聞變自貴陽還至鎮遠為叛寇要截遂自殺至是偏沅巡撫韓世琦收其骸骨奏聞上諭甘文焜可贈兵部尚書廕一子入監讀書未幾將軍總督蔡育榮奏吳三桂初反時巡撫朱國治抗不從逆為其所害上因贈國治户部右侍郎亦廕一子入監讀書辛丑敕將軍噶爾漢等同總督哈占等速進雲南將軍佛尼勒疏言臣所部兵由陜入蜀諸路征𠞰歷有年所致馬匹缺乏軍械敝壞困苦已極如率此兵前進似屬無濟請以重慶護軍統領佟佳等所部每佐領護軍各二人將軍噶爾漢等兵內撥每佐領驍騎各三人西安副都統翁愛兵八百人付臣等統領進定雲南將軍吉哈禮所部兵盡發建昌一路漢中陜西諸處竟致空虛請以年久困乏之兵遣赴大將軍公圖海軍令防守漢中諸路上諭今諸路逆賊俱遁還雲南或恐中外交攻將軍噶爾漢不必於重慶秣馬即馳會將軍佛尼勒軍每佐領簡六七人以留兵之馬給之躬自統率同總督哈占等前進雲南佛尼勒量率留兵防守敘州諸處其困苦無馬之兵令署副都統覺和托率赴漢中將軍吉哈禮每佐領簡官兵六七人同將軍總督趙良棟速進雲南如有困苦無馬者令副都統恰塔率回成都防守甲辰命户部郎中明格禮等赴雲南採買兵糧雲南巡撫伊闢疏言兩路大兵齊集滇中請亟令貴州廣西二路協濟銀米上諭廣西雲南相去遼遠路險山多且有苗蠻盤踞大兵糧餉關係良急若由廣西轉運必致有悮軍需如止令該撫一人料理恐亦不無貽誤其遣户部郎中明格禮沙木哈馳赴雲南與大將軍將軍督撫提督等會同酌議撫恤民人設法採買勿誤軍需不必由廣西貴州運致命郎中額爾赫圖等趣將軍覺羅吉哈禮噶爾漢兩路進兵議政王等奏言克取雲南省會所關至要向趣大將軍賴塔等軍曽遣學士額庫禮今趣將軍覺羅吉哈禮噶爾漢等兩路之兵應遣部院賢能官各一員前往上諭自京遣官有需時日前遣理餉郎中額爾赫圖范承勳現在軍中可令額爾赫圖赴吉哈禮范承勳赴噶爾漢軍速趣大兵前進仍令兼理糧務大兵進止逆賊情形其令不時以聞戊申命將軍穆占還貴州穆占奏言平遠大定黔西遵義悉經恢復諸處向有賊將俱奔赴雲南貴州無警臣已同參贊都統華色漢軍副都統宜思孝遵大將軍貝子等檄率護軍驍騎漢軍兵每佐領四人指雲南而進餘兵付前鋒統領薩克察巴圖魯總督董衛國等留鎮貴州上諭賊雖奔散黔省有土司苗蠻雜處關係匪輕將軍穆占酌量率兵仍回貴州統攝官兵固守疆土副都統華色宜思孝既已前赴雲南薩克察巴圖魯不必赴雲南己酉大將軍貝子彰泰賴塔等奏偽將軍張國柱等降時彰泰等率大兵圍雲南省城宣布皇上好生之仁遣使招撫諸路大理府偽定逺大將軍東平公張國柱臨安偽總兵徐衷明李三彬羅文獻永順鎮偽總兵郭壯興范應泰姚安府偽親軍車騎後將軍劉漢章總兵謝文明自蜀遁回偽親軍鐡騎左將軍楊洪德及偽將軍趙玉楊開運髙啓隆劉魁白起升儂朋邵文魁劉培吾偽總兵髙攀喜楊斌等各率所部偽官員兵丁呈繳印劄相繼詣軍門降辛亥命郎中蘇赫臣等速運大兵糧餉將軍總督趙良棟等奏言臣遣人密探各營不惟前行無有褁糧即目前亦已告匱臣因檄令暫還銅河就食上諭大兵見圍雲南省會自蜀前進之兵關係至急郎中蘇赫臣等與該督撫會商務殫心竭力速䇿運餉勿誤軍需如誤饋餉致失軍機以軍法從事平定三逆方略卷五十七

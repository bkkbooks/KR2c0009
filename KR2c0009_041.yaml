body:
  text: 欽定四庫全書平定三逆方畧巻四十一康熙十七年九月己亥朔勅總漕帥顔保赴吉安上諭兵部向以江西可虞因調總漕帥顔保前徃今南昌已為内地其令帥顔保赴吉安鎮守辛丑大將軍簡親王喇布等奏呉三桂死永興賊遁簡親王喇布侍郎郭丕疏言八月二十四日據偵報三桂初病中風噎膈有犬登其案而坐因病甚口不能張且下痢十七日遂死賊黨匿不發喪閉郡城門潜調偽將軍胡國柱馬寶等於永興諸處取三桂孫於雲南越四日國柱等自永興至衡州始啟城門通行旅將軍穆占亦奏據䕶軍統領拉賽前鋒統領薩克察巴圖魯報賊自八月初二以至二十日屢逼永興滿漢官兵奮勇禦敵城壞于礮隨以筐及囊盛土補之晝夜堅守屢退賊衆二十一日夜賊焚其營遁勅諸路大兵乘機𠞰賊上諭議政王等曰覽大將軍簡親王等奏逆賊呉三桂已死渠魁既殞賊必内變諸路將軍宜乘時各統大兵分路進𠞰克復疆圉永興賊既遁去簡親王宜由茶陵赴安仁進逼衡州其永興官兵勞苦已久可駐茶陵諸處暫息自陜西調來副都統夸岱所領每佐領兵二人不必遣赴茶陵即留岳州軍前大將軍貝勒察尼等務水陸夾擊速取岳州臣謹按軍事之要必相其機之所在而亟乘之則畧地攻城所向靡不克捷是時賊渠呉三桂罪積惡盈已遭天殛皇上即料逆黨心攜必生内變乘機進師成功自易若失此事㑹遷延引日俾賊得徐相要結復為固守之計恐蕩定之勲未能尅期而奏爰趣諸將分路𠞰擊於是在岳大兵仰遵明詔指揮困賊愈急賊糧糗既盡遂棄城而竄岳州一拔而羣寇果望風潰散疆土以次底定皇上之審勢料敵應機決勝信乎為獨神矣壬寅命諸路將軍大臣招撫從逆人員上諭諸路王貝勒大將軍將軍督撫提鎮等曰兹據大將軍簡親王等報稱逆賊呉三桂頃已身斃三桂數年以來搆兵倡亂荼毒生靈罪大惡極故天命殛之當日許其遷移本欲保全安挿始終眷寵不意其包藏禍心輒行反叛背累朝豢養之恩逞一旦鴟張之勢橫肆兇逆擾亂疆土元兇既服天誅脅從宜施寛典凡在賊中文武官員兵民人等皆朕赤子素受國家恩養必非甘心從逆或志存忠義不能自拔或勢被迫驅懷疑畏罪陷身逆黨朕甚憫焉其各體朕好生之心翻然悔悟爭先來歸朕必優加恩賚論功敘録爾等即宣布德意廣示招徠務使懷忠抱義之士順天命以圖全審事機而建績撫綏戡定早奏蕩平以副朕嘉與維新至意癸卯黜將軍華善等令從軍効力上諭議政王等曰將軍華善署副都統多諾自六月調遣永興迄今未至殊負厥職其集議以聞於是議政王等議言華善多諾俱宜革職披甲令赴大將軍簡親王軍前効力上諭我國家將士凡遇調遣馳赴而已從未有若此遲延觀望者使華善等兵未事而至未必無功今已事畢至將安用華善多諾宜如議處分但正值討賊之際免其革職披甲俱委署夸蘭大付將軍穆占令軍前効力己酉趣大將軍貝勒察尼取岳州調副都統闗保率兵赴之先是上諭親征議政王等集議應作何進兵令大將軍安親王岳樂順承郡王勒爾錦貝勒察尼詳議敷陳至是勒爾錦奏言以守兵餘力併入行軍復多増槍手五路渡江齊力大舉庶可滅賊岳樂奏言臣親赴岳州仍舊布置舟師調諸路大礮急攻陸營勢必克復察尼則奏言舟師入湖三月餘雖未大挫賊鋒賊亦不敢公然出戰近聞逆賊糧餉將絶將軍林興珠又獻䇿謂湖水涸後宜圍以木栰立木樁列火礮俾小船巡警可乘之機正在此時然湖水之涸為期尚遲兩三月間賊中安知無變今乘水勢未退立一營於南靖港俟水涸酌撥舟師營於君山髙家廟絶其糧道賊勢窮蹙不難撲滅又一議言九貴山雖經立營而圍猶未匝若水涸則君山髙家廟諸處俱涸賊於石首華容澧州常德陸路皆通君山髙家廟不以大隊立營則圍城難遍風浪之中船不可泊徒至壞損若於舟師分撥立營萬無餘力上覽三疏因諭今呉三桂已死諸逆潰變之際宜急取岳州動支如許錢糧營治舟艦入湖三月餘而將軍侯林興珠獻䇿甚明俟湖水盡涸我船及賊船俱無所施彼時多掣舟師無不足用我之船艦兵卒頗屬有餘豈可推諉使大事中沮今宜於南靖港君山髙家廟諸處俱立營壘斷賊糧道務須困取岳州至於君山髙家廟諸處既需大隊應令副都統闗保所率之兵無徃江西改赴岳州聽貝勒察尼調遣如舟師必難久頓湖中速以狀聞貝勒察凡等既困取岳州安親王順承郡王所奏俱不必行辛亥遣刑部侍郎禪塔海造船於茶陵大將軍簡親王喇布奏茶陵攸縣水陸俱通衡州諸處宜造戰船及小沙船百艘備用議政王等議如所請令勸勉紳衿百姓輸助速行營造上諭造船事闗𦂳要令刑部侍郎禪塔海於江南動支正項錢糧備藥礮及需用器物前赴茶陵諸處督理修造前尚書伊桑阿帶徃造船官員仍令皆徃丁巳大將軍康親王傑書奏泉州圍解時傑書遣署副都統禪布等進𠞰海逆兩路夾擊遂敗賊衆恢復惠安解泉州圍是日福建巡撫呉興祚奏敗賊於白鴿嶺復永春德化等縣賊渠劉國軒等悉遁隨遣官兵擊海賊敗之於赤澳諸處沉燒賊船六十餘斬六千餘級辛酉勅將軍穆占等遣兵守永興先是穆占奏因華善等至郴州永興賊遁故臣未赴永興遣副都統保住總兵官趙應奎署副都統雅秦等各以所部兵從華善往守撤臣所部前鋒䕶軍甲兵及漢軍緑旗兵盡還郴州休息軍馬以候諭㫖已而大將軍簡親王喇布奏臣聞上三旗内府佐領兵三百人未發永興因檄詢華善等華善等言此兵至郴州皆願軍前効力穆占遂留之以臣所遣之兵華善不啟臣知竟留穆占軍前穆占亦不以留兵之事聞之於臣儻遇警急有所調發亦皆如此恐悞軍事嗣後華善之兵或聽穆占調遣或聽臣調遣伏候睿裁上諭簡親王方𠞰撫逆冦之際穆占盡撤其屬兵茶陵攸縣安仁諸處所存兵每佐領不足七人大將軍安親王毎佐領兵二人復遣還長沙致簡親王兵力單弱遇有調遣穆占又相去甚逺誠難應時即至今簡親王赴安仁相機進𠞰其所部兵當聽隨宜調遣簡親王所發官兵穆占並未商酌任意留之不合其内府佐領兵三百人仍令發回至永興地方本令穆占簡親王協同鎮守今若止令簡親王兵駐守儻簡親王相機前進或逆賊來犯恐兵力單弱闗係匪輕其令穆占簡親王協議各酌遣官兵共守永興今逆賊呉三桂已死正急宜𠞰撫之㑹穆占簡親王其凜遵諭㫖同心合力以圖濟事已而喇布復奏華善多諾俱已降黜永興見缺統帥因授内大臣阿密達揚威將軍印以夸蘭大碩塔阿進泰等副之遣往駐鎮上諭簡親王既赴安仁參賛不可無人阿密達仍與簡親王偕徃永興去郴州不逺況穆占前奏郴州别付一大臣鎮守以便親赴永興宜令穆占或選彼處所有大臣一員往鎮永興或親往鎮守酌可而行乙丑削副都統德業立等職留任圖功先是賊乘船自岳州赴湘陰取糧米火藥副都統德業立提督周卜世等駐扁山不行擒獲俾賊逸出已而賊船由扁山入岳州彼等又不邀擊縱之入城將軍鄂鼐等以聞上諭以如許錢糧造成船艦調集諸路官兵水陸並進以圍岳州乃賊船衝出既不行阻禦竟致逸出及其入城以如許舟師何以不行邀擊任意縱入大將軍貝勒察尼其嚴察明白具奏至是察尼奏言德業立周卜世等特率一百三十船截𠞰兹賊賊僅二十餘船未能獲其一艘畏縮怯懦縱賊入城議政王等議德業立周卜世等應革職充伍令軍前効力上諭德業立周卜世等本宜如議處分但值𠞰賊之際可俱革職留任効力贖罪鄂鼐總統舟師身為主將乃用庸懦之徒致悞大事事平之日從重議處丙寅尚之信請開海禁上不許之信奏𠞰除海逆亟需船艘其如公帑方匱勢難營造請暫開海禁許商民造船由廣州至瓊州採捕自便則臣得藉商船大創海冦由廣海海陵龍門一帶進取以收搗巢之功上諭向因尚之信言粤東雖已底定鄭逆仍踞厦門宜申海禁以絶亂萌故凖舊界嚴行禁戢今若開海禁令商民採捕自便恐奸徒乘此與賊交通侵擾邊海人民亦未可定海禁不可輕開其鼓勵地方官員捐助造船備征𠞰之用丁卯授尚之信為奮武大將軍初將軍莽依圖奏言進定廣西亟需厚集兵力見在緑旗之兵有名而無實臣思平南親王尚之信練習戎行器械整備請調赴梧州統轄官兵委以平粤之責與臣等協謀而行實於大事有濟上命尚之信㑹同將軍額楚總督金光祖巡撫金儁等定議以聞至是之信奏臣向以逆賊偏注永興恐都統王國棟不能制敵擬於九月初旬親徃䇿應頃聞呉三桂已死永興賊遁今湖南勢如瓦解取之甚易臣當進定廣西上諭乘此逆賊驚擾之時大兵亟宜前進𠞰撫並用綏定疆圉授平南親王尚之信為奮武大將軍統兵赴永興郴州諸處㑹合大將軍簡親王將軍穆占等併力同心以圖進取將軍莽依圖額楚傅宏烈總督金光祖等各駐本汎相度機宜規定廣西應給尚之信勅印凖滿洲大將軍王等例遣内閣官員齎徃平定三逆方畧巻四十一

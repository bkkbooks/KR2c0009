body:
  text: 欽定四庫全書平定三逆方略卷二十七康熙十五年十一月乙酉大將軍康親王傑書奏耿精忠降傑書帥師抵延平僞將軍耿繼美等以城降精忠探知大懼隨遣其精竒尼哈畨劉藴祥等赴延平獻僞總統將軍印續遣子顯祚來迎傑書師抵福州令侍讀學士尹泰賫免死敕諭以往精忠於十月初四日率僞文武官出城迎降獻所屬官兵冊籍尋精忠請隨大兵立功贖罪傑書以聞上命精忠仍留靖南王爵率伊屬官兵隨大兵征勦海逆圖功贖罪原任巡撫劉秉政等俱著來京其籓下官及兩鎮標下武職仍留原任兵丁照額設外其餘願效力者分𨽻提鎮各標願歸農者原籍安插丙戌命京口將軍楊鳳翔等率師赴福建上諭議政王等曰大將軍康親王帥師定閩進勦海寇分兵守福州諸處恐兵力未足可於駐守江寧盛京兵內發七百人自京發往京口漢軍兵內發五百人令將軍楊鳳翔署副都統嶽爾多孟安等率赴大將軍軍前聽其調遣又聞進閩大兵缺馬即發內廄及兵部驛營馬共二千選八旗官各一員送軍前散給其送馬官沿途或有騷擾許地方官指名參奏大將軍康親王傑書奏官兵敗海賊於烏龍江南海賊僞總統許耀率賊三萬餘逼福州烏龍江南而陳列十餘營都統拉哈達率兵進攻十月十五日渡江分隊奮擊敗之於小門真鳳諸山盡破賊營追奔四十餘里丁亥敕諭湖廣大將軍王貝勒大臣及諸將士上諭湖廣大將軍王貝勒參贊大臣及官兵曰我朝創業以來凡滅寇開疆動合機宜將帥皆身先士卒無不膚功立奏逆賊吳三桂背恩反叛朕念爾等宗室大臣簡閲官兵委以南征削平僭亂拯救生民今出師三年未獲尺寸坐失機㑹使疆圉日逼賊勢鴟張縻餉困民悮國孰甚罪在王貝勒將軍大臣於衆官兵無與今陜西福建江西浙江雖漸底定然賊渠三桂不誅於事何濟日者穆占在川陜時勞績茂著兹特簡為征南將軍命之討賊爾等亦當同心戮力殱寇拓疆以副朕靖亂安民之意慎勿妄分疆界各顧部伍互相推諉仍蹈前失也衆官兵自遣發後為國效力暑雨蒸濕浚濠築壘晝夜枕戈衝鋒冒刃分防偵探備極勞苦朕悉知之每念及此深用惻然爾衆官兵其念朕恤養之恩益加用命儻樹立功勳朕不吝優加爵賞其各勉之又諭理藩院覽大將軍順承郡王奏蒙古兵丁抵荆日久馬匹倒斃甚多其以見在外藩王貝勒等所獻之馬撥足一千九百匹速行前往用資征𠞰辛卯命大將軍簡親王喇布等調兵勦醴陵萍鄉賊總督董衛國奏臣偵知醴陵陷賊隨啓大將軍簡親王遣副都統錫三領兵赴援今賊復聲言犯萍鄉諸處臣思瀏陽醴陵皆前通長沙乃江楚門戶今為賊據誠恐安親王孤軍深入又無援師深屬可慮上諭醴陵萍鄉為安親王大軍後路所關匪細副都統錫三雖已赴袁州仍恐兵力單薄今閩省已定建昌諸處似可稍舒大將軍簡親王及副將軍希爾根總督董衛國等量調建昌撫州樂平饒州南昌諸處滿漢官兵速赴袁州萍鄉諸處同錫三楊古岱趙應奎等協力勦賊疏通道路仍間道移㑹安親王若可發長沙兵量行速發夾𠞰丙申命將軍穆占援長沙先是大將軍安親王嶽樂赴長沙上以我軍深入滑賊吳三桂必往來救援敕大將軍順承郡王勒爾錦貝勒尚善等揚聲進兵以牽其勢不時偵探賊情相機渡江進取至是總督董衛國巡撫韓世琦總兵官趙應奎等相繼奏言三桂知長沙被圍即遣馬寶高啓隆由嶽州星馳救應又遣僞將軍胡國柱等入長沙固守三桂亦自松滋擁衆來援長沙屯嶽麓山上諭荆嶽大將軍等違命不前遲延時日致逆賊得間四出應援今荆嶽之兵安處日久馬皆肥壯著將軍穆占速赴湖廣簡選荆嶽彝陵士馬由嶽州趨長沙接應安親王兵若長沙軍無虞或出彝陵或取嶽州或由荆州渡江便宜進發壬寅趣諸將取吉安先是總督董衛國奏醴陵陷賊萍鄉危急上諭將軍哈爾噶齊額楚等抵吉安數月不能𠞰除逆賊攻克城池故逆賊乘間陷醴陵窺萍鄉恣意肆逞覬斷安親王大兵後路及提督趙賴等領兵赴援又不能奮力協勦玩日愒時以致餉縻師老徒擁重兵惟務安居殊悮大事且屢檄簡親王喇布副將軍希爾根令其親統大師速赴吉安乃藉口南昌重地逗遛不前及屢次催趣始行進發又不多備炮藥鉛子等物至吉安始言火藥不敷遣人索取即此觀之顯誤大事喇布等其速攻吉安繼安親王大兵後路應援醴陵至是簡親王喇布等奏稱省城及撫州樂平諸要地汛兵單弱總督董衛國又以上高奉新諸處賊氛蜂起求發援師請調鄰省附近之兵前來防守上諭各路調集江西兵為數不少簡親王喇布等不速取吉安徒爾勞師縻餉吉安一郡尚不能取湖南逆賊何日得平前理藩院郎中瑚什巴所領䝉古兵已遣赴江西董衛國又身在省城鄰省之兵無庸調遣至恢復長沙平定湖南皆賴吉安大兵接應簡親王喇布副將軍希爾根將軍哈爾噶齊額楚等仍遵前㫖速取吉安若更遷延觀望安親王大軍脫有疏虞喇布等俱照坐失軍機例從重治罪决不輕恕癸卯命募補福建提鎮標兵如原額先是大兵赴閩提督段應舉請選調內地精兵𨽻其麾下以資勦禦上命應舉與大將軍康親王總督李之芳㑹酌調浙江緑旗兵以往至是大兵已抵閩上諭今大將軍康親王已抵閩中勦除海寇正需兵力該提督及隨征總兵官標兵均如原額募補十二月壬子命左都御史介山等赴福建參贊軍務大將軍康親王傑書奏臣率大兵平定閩疆諸凡咨謀軍務及分兵留守事宜不得不請增參贊之臣乞皇上遣在京大臣二三人前來參贊又靖南王耿精忠見隨大兵征𠞰其所部官兵家口在福州統轄乏人乞於額駙耿昭忠聚忠二人內速遣一人同大兵鎮守上諭左都御史介山侍郎吳努春參贊康親王軍務以耿昭忠為鎮平將軍駐守福州癸丑命大將軍公圗海遣兵與河南䝉古兵更調將軍布顔奏臣所統兵八百人俱繫䝉古難於應機調遣請發滿兵令臣兼轄以資戰守上諭將軍布顔所統兵丁俱繫䝉古遇有緊急軍務恐致稽延見在陜西兵數頗衆大將軍公圖海於滿洲漢軍兵內酌發四百赴河南府令布顔統之河南府所有蒙古兵分發四百人令理藩院員外郎頗羅色率赴圖海軍前丙辰敕大將軍康親王傑書等進勦海寇大將軍簡親王喇布奏僞將軍耿繼善等率賊數萬圍困南豐海寇亦侵犯廣昌上諭大將軍康親王傑書疏言耿精忠及閩省官兵俱已歸降廣信諸處亦皆嚮化僞將軍等盡已調回今江西南豐諸處耿繼善等何故仍行騷擾康親王傑書及耿精忠察實奏聞大兵抵福州日久若不速行進𠞰海寇則江西之賊勢難遽靖王等速進兵平定興泉漳諸郡或應遣兵從汀州夾攻其相度機宜分兵齊發丁巳敕諭尚之信時之信欲降自粵東具密疏遣人賫至大將軍簡親王喇布軍前喇布以聞上降敕諭之信曰昔太祖皇帝肇造洪基爾父航海歸誠功猷茂著後命駐防粵省平定海疆自吳逆叛亂以來益矢忠藎多方籌畫屢建功勳故特封爾父為親王授爾為討寇將軍正期克奮勇略掃除賊逆不圖粵省變亂道路梗阻今覽爾密奏稱父子世受國恩斷不敢懷異念願立功贖罪來迎大軍知爾父子不忘報國念篤忠貞因事出倉卒致成變異朕心甚為惻憫今特降㫖將爾已往之罪併爾屬下官兵槩行赦免儻能相機勦賊立功自效仍加恩優叙爾當益竭悃誠勉圖後效以副朕始終曲全至意戊午命副都統烏丹等赴將軍侯張勇等軍前議進兵機宜大將軍公圗海奏平凉慶陽雖底定漢中興安尚為賊據臣等議於來春進討應先調緑旗官兵提督孫思克量留兵守凉州親統官軍來秦州將軍侯張勇遣兵二千亦赴秦州提督趙良棟量留兵守寧夏親統官軍來鳳翔將軍王進寶遣兵二千亦赴鳳翔俱於明年正月二十日內如期而至上諭調兵征勦事關重大令副都統烏丹員外郎馬爾漢等赴張勇王進寶孫思克趙良棟等軍前調遣緑旗官兵或如大將軍公圖海所調或作何調遣將軍提督等孰宜親往作何前進至恢復漢興之時應駐守其地或徑取四川逐一公同確議遣同往官員馳驛奏聞己未遣督捕理事官麻勒吉招撫馬雄線國安侍郎覺羅舒恕奏總兵官黃芳世自粵東至贑州云尚可喜已病故孫延齡為其部兵拘執抄奪家産共推線國安為帥上諭馬雄線國安皆曾受國厚恩國安為孫延齡逼反雄屢疏請救因援兵不即至亦勢迫從賊今延齡既為其部兵拘執抄奪家産宜乘彼內亂速行招撫其招撫敕諭內閣撰擬令督部理事官麻勒吉齎赴大將軍簡親王軍前公同商酌將敕諭抄録遣賢能人員持往曉諭馬雄線國安如有回音麻勒吉即以奏聞敕諭馬雄曰爾世受國恩勞績素著鎮守西粵綏厥巖疆自吳三桂孫延齡二逆反叛整兵防禦力保孤城邀執僞差矢心報國爾之忠貞朕久已洞悉後緣賊氛逼近援絶勢單當力難拒守之時為暫爾自全之計推原情事諒非本懷兹者各路大兵勦撫並用平凉已經歸誠王輔臣優加將軍所屬官員兵丁照舊録用大將軍康親王統兵入閩耿精忠悔罪來歸仍授王爵藩下官兵任用如故每念粵西叛變各官身陷賊中自拔無由以爾攄忠有素簡任多年追遡前勞尤深軫惻今特頒專敕宣諭朕意爾果翻然悔悟棄逆效順將爾已往之罪并所屬官員兵丁悉行赦免照舊録用若能勦寇立功仍行加恩從優議叙爾其勉勵忠貞無懷疑懼以負朕篤念勳舊至意敕諭線國安曰爾初隨定南王航海來歸即授世職以爾才勇堪任補授粵西提督開闢地方勦禦賊寇著有勞績優加伯爵授為撫蠻將軍後以告老謝事孫延齡代領藩旅值吳逆叛變延齡狂悖無知被惑搆亂道路阻絶爾之聲息無聞朕心時切軫念每思定南王捐軀為國盡節疆場藩屬官兵俱受國家豢養效力多年必非甘心從逆况爾宿將舊勳忠貞素篤料必感戴國恩始終不渝兹者各路大兵勦撫並用平凉已經歸誠王輔臣優加將軍所屬官員兵丁照舊録用大將軍康親王統兵入閩耿精忠悔罪來歸仍授王爵藩下官兵任用如故惟粵西一隅叛變未寧即有忠節之士無由自拔以爾藩下舊臣衆所推服特頒專敕宣諭朕意爾其首倡大義鼓勵羣情藩下大小官員及兵丁人等如悔罪投誠棄逆效順已往之罪悉行赦免照舊録用安插若能𠞰寇立功仍行加恩從優議叙爾其勉勵忠忱勿懷疑懼以負朕篤念勳舊至意庚申加海澄公黃芳世太子太保以黃藍為海澄總兵官上諭兵部曰海澄公黃芳世矢報國恩不肯從逆間關冒險全節來歸忠貞茂著可加太子太保鎮守漳州黃藍屢次齎奏忠勤可加優擢為都督僉事充海澄總兵官並令馳驛赴大將軍康親王軍前俟恢復漳泉收集海澄公標下官兵鎮守汛地壬戌命送馬至長沙軍前上諭兵部長沙軍中少馬可於每佐領下各選肥馬四匹發往嶽州量撥八旗官兵護送若將軍穆占由嶽州進取長沙則以此馬付彼同大兵帶往交大將軍安親王若穆占不由嶽州則大將軍貝勒或即撥官兵送往或移令安親王遣兵迎取聽酌量以行己巳趣將軍穆占進兵大將軍簡親王喇布等奏僞將軍率衆數萬來援吉安距城二十里許總督董衛國亦奏賊自淥口抵攸縣界聲言犯萍鄉又云往援吉安聞賊帥馬寶等率賊三四萬已至永新安福並欲為吉安聲援上諭逆賊吳三桂知我荆嶽大將軍等斷不進兵故身往常德調集賊衆併力於長沙吉安將軍穆占速選荆州士馬相機前進以分長沙吉安賊勢平定湖南大將軍簡親王喇布等嚴飭所部保固疆圉辛未命裁耿精忠部下兩鎮兵大將軍康親王傑書奏耿精忠所部除編作佐領兵丁外又有左右兩鎮兵今福建經制兵及撫剽兵俱如原額全設精忠見率伊佐領下兵隨大兵征勦海寇未為不足今正節省糧餉之際其兩鎮官兵應請裁革又藩下總兵官曾養性及原任溫州總兵官祖宏勳俱自溫州率兵至福州宏勳應如劉秉政例赴京候補上諭康親王身在地方稔悉情形請裁兩鎮官兵俱如所奏其裁退官兵設法安插務俾得所祖宏勳令赴京師丙子大將軍康親王傑書奏官兵復邵武大兵抵延平僞將軍耿繼善棄城走江西海賊遂襲邵武是月初四日副都統伯穆赫林等自延平進兵浦塘隘口大敗海賊僞總督吳淑等又乘勝追擊陳斬僞總兵楊大任等萬餘人初六日僞將軍彭世勳以邵武降平定三逆方略卷二十七

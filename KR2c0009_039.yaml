body:
  text: 欽定四庫全書平定三逆方略卷三十九康熙十七年七月己亥朔調副都統馬思文率兵赴福建時安塘筆帖式報海澄長泰陷賊上諭海澄長泰既陷賊必猖獗閩省大兵無幾宜就近調發以資𠞰禦將軍華善所留江南京口漢軍兵四百人及京口將軍王之鼎所屬漢軍兵六百人令副都統馬思文率之馳赴福建聽大將軍康親王調遣京口地方亦關重要宜發京師漢軍兵一千令副都統關保率往協守至日聽將軍王之鼎統轄又諭康親王傑書等官兵失援海澄恐因之自沮將軍大臣當時加鼓勵果能滅賊恢疆則前罪自釋仍豫議敘其通行曉示尋傑書奏至言海澄糧盡六月初十日官兵委城突出海澄遂陷將軍賴塔拉哈達等所統官兵甚衆卒不能解海澄之圍致虧損將士宜即從重擬罪但見在禦賊俟軍務稍暇另行察議臣既身任調遣之責罪亦難逭上諭海澄何以不能救援其令將軍賴塔等明白具奏康親王俟事平日察議至於海澄突出官兵久被圍困勞瘁已甚該督撫其支取正賦錢糧辦馬匹鎧仗給之命和碩額駙華善為將軍鎮永興大將軍簡親王喇布奏逆賊吳三桂選偽將軍著名者逼犯永興而身踞衡州窺伺間隙臣所部守兵單弱不便分遣提督趙賴雖令來守攸縣尚未即至請速發緑旗兵二三千為戰守備上諭頃以吉安逼近茶陵諸處已遣發將士往守大將軍安親王又分兵遣赴茶陵簡親王宜固守茶陵授和碩額駙華善將軍印馳赴永興統兵鎮守俟穆占進兵之日簡親王宜速發逰擊馬升兵一千炮二十五具前往毋致有誤辛丑敕將軍莽依圖等遣兵援鬱林將軍巡撫傅宏烈奏吳逆調各路賊兵數萬渡河與我兵對壘六月十日我兵失利退守鬱林屢請援師竟無應者今臣望舊標惠潮兵至合力齊舉庶可成功上諭鬱林關係最重將軍莽依圖額楚總督金光祖速遣官兵馳往應援儻賊勢盛我兵難以拒守將軍傅宏烈都統勒貝等應退至要害之地會同莽依圖等協力守禦都統馬九玉行已兩月逗留不進不合宜檄令速赴梧州平南親王尚之信總督金光祖速備夫船以濟傅宏烈舊標惠潮官兵無誤前進詔責將軍穆占先是前鋒統領薩克察巴圖魯請援兵擊却永興之賊穆占謂永興軍事已付大將軍簡親王凡事宜請於王簡親王喇布以聞上諭防守江西全省及湖南茶陵永興諸處凡有敕旨皆署穆占名於前簡親王名於後蓋倚任穆占實甚初未分别汛守也今穆占因永興兩次失利輒思巧脫檄稱永興為簡親王之地於往者屢次詔旨殊屬違戾穆占簡親王自今以往毋得懷嫌互分彼此所有間地汛兵悉行撤回無論郴州永興遇逆賊來犯即大振兵力以期蕩滅甲辰命署副都統嶽爾多率兵仍赴福建副都統關保率兵赴江西上諭議政王等曰據福建所報海賊劉國軒等取同安水陸犯泉州前大將軍簡親王奏永興諸處賊勢稍退已敕將軍穆占撤間地之兵鎮防險要而大將軍安親王所遣援師已抵攸縣嶽州大兵復水陸齊舉賊欲深入能不懼歸路阻絶耶向以永興警急江省可虞因令署副都統嶽爾多率師赴江西今閩中事迫嶽爾多仍率師赴福建并移文浙江督撫將軍速各撥馬千匹給嶽爾多兵俾兼程馳往副都統馬思文自京率往漢軍兵四百人亦與嶽爾多同行移文大將軍康親王備夫船於浦城迎取大兵勿致有誤將軍王之鼎標兵六百人不必率往福建可仍留京口見今所發漢軍兵一千令副都統關保率赴江西南昌俟陜西所遣兵至江西視何處當用即協力從事并移會將軍穆占大將軍簡親王知悉敕將軍穆占等𠞰禦犯永興諸處賊兵上諭兵部福建海逆猖獗事勢急迫因令前赴江西署副都統嶽爾多仍率師赴福建江西關係重大其傳示將軍穆占大將軍簡親王等今前進擊賊尚非至急惟擊却侵犯永興諸處逆賊俾不能進薄江西福建乃為最要穆占等其同心詳酌力禦賊寇保固江西使萬無一虞戊申敕大將軍順承郡王勒爾錦遣兵赴嶽州大將軍貝勒尚善奏我兵既水陸攻嶽請敕順承郡王量留鎮兵於彛陵荆州諸處速撥每佐領兵各五人緑旗兵五千人馳赴嶽州軍前上諭擊破逆賊規定湖南在此一舉今逆賊大勢偏注於廣西鬱林湖廣郴州永興諸處順承郡王等其勿以彼疆此界置之不肯務善為圖維期濟國事荆彛諸處守兵遺令裁足餘兵悉發嶽州召劉進忠等來京師大將軍康親王傑書密奏討逆將軍劉進忠總兵官劉炎見在臣軍但彼等獲罪殊重深自疑懼今值調兵前進而山海醜類蜂起彼等益懷叵測殆不可定章下議政王等議言海逆犯漳泉不可不速行撲𠞰將軍劉進忠總兵官劉炎久歷海疆其於逆賊情偽地方形勢在所熟悉應移文大將軍康親王令彼等馳驛來京臣等詳詢明白再議具題上從之丙辰詔責大將軍簡親王喇布等將軍穆占奏臣屢啓大將軍簡親王請令和碩額駙華善等援永興迄今未遣華善等既未嘗往破浮橋又不赴永興宣調來代臣守郴州俾臣往取耒陽或擊來犯之賊然在永興諸臣於賊來攻時竟不拒截坐令三面受圍且永興所有滿兵每佐領八名有餘緑旗兵復及三千未嘗一戰上諭先授和碩額駙華善為將軍署副都統多諾為參贊敕令遣往永興何以至今不遣其於急要軍機貽誤非淺賊寇情形本令不時報聞比來並無所報殊屬不合簡親王俱明白回奏華善可否往郴州穆占可否來永興簡親王與穆占詳議至於永興兵力不為不足拉賽等不行却賊之故簡親王嚴察以聞詔釋幹都海等從軍效力上諭議政王等曰原任副都統幹都海阿進泰署副都統碩塔參領克什布滿丕圖圖班賴色驍騎校札親筆帖式馬爾泰護軍校表哈護軍羅丹俱從寬免死軍前效力幹都海阿進泰碩塔俱委夸蘭大與碩塔同議處之員俱委署軍職札親馬爾泰表哈羅丹俱為護軍並發將軍阿密達軍前效力幹都海等俟阿密達至南昌釋出委用札親等四人即行釋出仍凖出征護軍例給賞啓行丁巳諭將軍莽依圖等隨宜進止時將軍巡撫傅宏烈等自容縣退駐藤縣奏言廣西事不可問梧州亦復可虞請遣大臣一員令觀臣營進止並祈令都統馬九玉與臣合營效力上諭廣西軍務已委任將軍莽依圖額楚傅宏烈都統勒貝副都統額赫訥等自宜殫心籌畫和𠂻協謀期濟大事不必更遣大臣莽依圖等務相度機宜可進則進否則暫守要地整飭軍馬待時而動其馬九玉原令將軍等隨宜調遣不必合營戊午詔飭直省督撫提鎮核實兵數總督姚啓聖疏言設兵捍守本期有禆實用鎮將各官多以食餉兵丁充伴當書記軍牢等役至臨陳十不得七臣標亦有軍牢等役俱經全革另募入伍上諭總督姚啓聖革退伊標軍牢等役俱經全革有禆𠞰禦可嘉直省緑旗兵丁經制額數専為防守汛地征𠞰賊寇而設該管各官自宜實足兵數以資戰守督撫提鎮等經制兵內如有充伴當書記軍牢以及馬夫水夫等役悉行裁汰務足兵額儻仍不改陋習因循踵行該督撫等紏效從重治罪若督撫等徇庇或為科道指參或被旁人首發除妄行官員從重治罪外督撫等亦按徇庇治罪決不輕貸其通行曉諭復福建額兵設同安漳浦總兵官總督姚啓聖奏閩省寇在門庭兵不給用應增兵一萬八百人漳浦同安故有總兵官後同安改設副將漳浦總兵官之兵改入海澄公標下是以防禦維艱應仍設總兵官各一員疏入下之兵部部議以大將軍康親王等曽請增閩省緑旗兵一萬八百人未經允行況見議增督標兵三千餘人而署副都統嶽爾多已率滿兵馳往如更增兵一萬八百人總兵官二員必重糜糧餉應無庸議上諭該督身在地方深悉情形是以題奏宜如所請增兵一萬八百人須募有資力精健者充補同安漳浦俱設總兵官總督姚啓聖巡撫吳興祚提督楊捷公同商酌推舉謀勇素著者來奏敕將軍拉哈達等速援泉州大將軍康親王傑書奏副都統雅塔里棄同安退入泉州賊遂直前圍泉州副都統吉勒塔布提督石調聲退至興化惠安復陷臣隨檄將軍賴塔總督姚啓聖守漳州調將軍拉哈達速率兵來援泉州上諭海逆日以猖獗同安惠安相繼失陷泉州見被賊圍速宜調兵救援可檄趣署副都統嶽爾多疾馳以往平南親王尚之信所遣副都統尚之璋廣東提督侯襲爵等抵潮州日同總兵官馬三竒固守潮州著靖南王耿精忠侍郎達都等自潮州率滿漢官兵馳赴福建與拉哈達等協力𠞰除海逆以解泉州之圍既而康親王傑書復奏閩省地方失陷所在道路梗塞甚屬堪虞惟望署副都統嶽爾多統兵來至上諭兵部嶽爾多自出征以來初無寸效今率兵往復不倍道疾驅稽延時日殊屬不合其檄趣速進詔許大將軍所分遣將軍得専奏軍機上諭議政王等曰凡大將軍以印授參贊大臣充將軍分遣他所凡軍機事宜不必申報大將軍代題可直行陳奏若大將軍所遣二將軍會於一所大將軍即令一將軍為首取一將軍印還俾為參贊一切調度俱聽大將軍莭制己未詔增嶽州兵先是上諭詹事宜昌阿曰我水陸大兵並進攻嶽州今或宜戰克或宜困取何時何日可以恢復其確探明白速行奏聞至是宜昌阿奏今雖水陸圍嶽州而九貴山至今未獲駐兵故賊得往來此地以通樵採如嶽州不下長沙無船可用而荆州大兵亦不能渡江宜固守長沙荆州調餘兵以困嶽州俾內外不通斷其樵採賊勢困窮則十月內外似可克復然軍機朝夕有變今賊勢窮蹙衆心惶懼如有機可乘即旦暮克取亦不可定上諭嶽州為湖南咽喉要地必此地恢復則長沙荆州之兵始能前進大將軍順承郡王所部兵數不少攻取嶽州事關最要冝如大將軍貝勒尚善前疏所請速遣滿漢兵馳赴嶽州其陜西往江西之兵可勿往江西遣赴嶽州將至嶽州時如永興圍解即留此兵於嶽州同順承郡王所遣兵併力進攻嶽州儻永興之圍未解則由嶽州赴大將軍簡親王軍前河南安慶俱近嶽州河南巡撫董國興可遣標兵一千五百人安徽巡撫徐國相遣標兵五百人令賢能官統領俱赴嶽州將軍阿密達抵南昌釋幹都海等亦率之赴簡親王軍原護軍四十人俱令同往嶽州此諸路兵抵嶽貝勒尚善量增其軍所有水陸官兵於九貴山設立一營但有可克之機即進兵攻取敕將軍穆占赴永興穆占奏逆賊三面圍永興水陸道阻臣因復酌遣護軍甲兵緑旗兵及火炮令副都統布舒庫率之往會署副都統尼雅漢堅壁河南岸永興內外一切軍機令與拉賽薩克察巴圖魯合謀而動但郴州諸處廣逺遼濶鎮守乏兵諸遣江西贑州總兵官哲勒肯併其標下官兵速赴臣軍上諭平定湖南𠞰除逆賊俱委任將軍穆占大將軍簡親王等穆占宜親赴永興撲滅賊衆頃者都統王國棟率兵往鎮宜章宜章與郴州相近總兵官哲勒肯不必遣往庚申授尚之孝為宣義將軍遣赴江西先是尚之信奏臣弟尚之孝向蒙授平南大將軍之職藩下鎮將曽經統領今與臣共居一城體統難施每每引嫌心不自安請調之孝赴京師别用上允其來京至日給一品頂帶食正一品俸已而之孝上言臣詣闕請罪分當誅戮過蒙寬宥臣願募兵三千赴王將軍軍前𠞰賊報效上諭尚之孝既請募兵效力以報國恩可授宣義將軍暫駐南昌聽募兵三千俟兵數募足軍械完備赴大將軍簡親王軍前征𠞰逆賊大將軍貝勒尚善奏舟師敗賊於嶽陽湖偽將軍杜輝等乘船犯柳林嘴我舟師迎敵君山扁山舟師亦來合擊賊敗走斬獲甚多沉其賊船方進戰時夸蘭大薩爾海鉤輝船賊擲火薩爾海之船被燬署護軍統領扎喇克圖以舟助戰救薩爾海及兵百餘人并奪賊船而還上諭署護軍統領扎喇克圖助戰奪賊船可嘉事平議敘嗣後我舟進與賊戰有鄰近舟艦能助奪賊船者記名待敘其移知貝勒尚善俾通行傳諭辛酉敕尚之信遣兵守潮州之信奏鬱林滿漢官兵今已退至容縣潮州事勢可緩兼有靖南王耿精忠及滿洲大兵足以鎮守因撤原遣潮州副都統尚之璋還省城遇有警急可隨宜應援上諭頃因海逆猖獗侵犯漳泉已調靖南王耿精忠侍郎達都率潮州兵往援今若撤還副都統尚之璋則潮州止餘總兵官馬三竒駐守宜令尚之信速趣提督侯襲爵前赴潮州并量發官兵以補之璋之缺同襲爵三竒協力固守敕浙江總督李之芳等遣兵守福建延平巡撫吳興祚奏延建邵汀四府皆有賊伏兵我各路守兵疊經調發遣往漳泉請令浙江督撫發標兵二三千人來延平固守要害上諭海逆犯漳泉事在迫急浙江總督李之芳巡撫陳秉直量留兵守浙江而於各營兵內酌便抽選二三千人遣往延平至浙江兵丁屢經調發福建恐致浙地兵力單薄該督可召募有資力壯健兵丁五千人分𨽻各營甲子授大將軍貝勒尚善等攻取方略時詹事宜昌阿所遣筆帖式馬爾賽還兵州瀕行上諭之曰我船甚多湖中諸將亦衆公溫齊副都統杭竒德業立等似宜酌遣一員於陸路至若賊船大非我比賊雖各路赴援諒皆小舟少有巨艦況船艘非旦夕可成我沙船兵亦宜抽調陸地調時毋令賊覺諸路調來緑旗之兵酌令屯九貴山或貝子章泰或公溫齊副都統杭竒以一人駐守立營之時仍宜兼顧三眼橋地方賊或遁走即宜進𠞰蓋兵貴神速也貝勒等視賊得毋藐忽賊雖非我敵猶必慎為之防至嶽州一克即宜分兵往取湘隂長沙前雖有敕旨命克復嶽州之後即進取常德澧州今思深入常澧賊或襲吾後饋餉不易渡馬亦難總宜臨時相機而動至於賊船僅四十餘我船甚多宜載火器於小舟乘夜擾之勿使寧息近嶽州安塘筆帖式報我兵奪賊一船復沉其船一宜昌阿身在彼地嗣後一切應報事宜可悉以奏聞命兵部侍郎郭丕等按湖南軍事遣侍郎郭丕員外郎舒恕赴湖南按問軍中事宜因諭曰將軍穆占屢奏言大將軍簡親王援師不應機遣發致事不克濟簡親王何故不遣官兵其穆占前報逆賊全力偏注郴州果曽逼犯郴州否如未嘗來犯則郴州永興之間相距甚近穆占何故不𠞰滅永興逆賊以至若是此等事由可明白確察至地方形勢永興前後兩戰及逆賊侵犯情形一併察明嚴取供詞以奏今羣賊肆犯永興其郴州宜别委大臣量留官兵鎮守穆占身率兵前赴永興爾等至彼或應調穆占前赴永興或應仍留郴州其與穆占簡親王詳碓定議一面進發一面奏聞復令傳諭穆占曰穆占不量地方緩急不遣重兵鎮守致賊犯永興及請濟師又不迅遣精鋭官兵并力而往我朝諸將遇敵雖兵力單弱亦不退縮必奮勇攻擊是以都統伊里布護軍統領哈克三等陷沒於陳夫為將者當以朝廷大事為念徒為身計獨留精兵自護軍機坐失職此之由況穆占陛辭時曽面諭凡有分遣必厚兵力頃永興兩次失利朕心深為縈慮蓋緣穆占不厚兵力不調發精鋭之所致耳如近者大兵圍困長沙嶽州豈不可使并力平濠拔杙肉薄而攻破毁其城但朕心憫惻不忍官兵慘罹鋒鏑故令大隊舟師並進其諭穆占知之平定三逆方略卷三十九

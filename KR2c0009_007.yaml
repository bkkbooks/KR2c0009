body:
  text: 欽定四庫全書平定三逆方略巻七康熙十三年六月甲午朔命兵部宣諭耿精忠上諭兵部耿精忠之祖仲明於太宗文皇帝時航海歸誠優錫王爵効力行間勞績茂著及其身故黙勒根王不令承襲世祖章皇帝追念舊勲特允其子繼茂仍襲王封令兩鎮巖疆為國藩屏爰及朕躬惓懷勲裔恩寵有加後覽其病終遺疏有地方兵民凋敝賊寇未滅死不瞑目等語忠義肫篤深切軫念且因繼茂之子精忠自幼曽為近侍予襲王爵仍鎮閩省朕以精忠必能紹祖父遺訓殫竭忠猷無忝先烈乃不意近為逆賊吳三桂誘惑煽亂地方棄累世之忠貞搆一旦之狂悖既干國法復墜家聲朕猶念其祖父前功精忠係一時無知墮人狡討與吳三桂不同故將三桂子孫正法精忠在京諸弟照舊寛容所屬官兵並未加罪今湖廣遣寧南靖寇大將軍順承郡王統領大兵由湖南進𠞰雲貴鎮南將軍尼雅翰統領大兵由廣西進𠞰雲貴安西將軍赫葉及西安將軍瓦爾喀等統領大兵已攻克七盤朝天等闗直抵保寧刻期底定全川並𠞰雲貴吳逆指日授首定南將軍希爾根統領大兵由江西進勦福建平南將軍賴塔統領大兵由浙江進𠞰福建平寇將軍根特巴圖魯統領大兵由廣東進𠞰福建又遣揚威將軍阿蜜達鎮西將軍席卜臣安南將軍華善鎮東將軍拉哈達等各統領大兵駐劄江南京口等處調度征𠞰精忠殱滅亦在旦夕但念其祖父宣力累朝洎精忠之身遽至覆亡宗祀斬絕朕心深為不忍且吳三桂乃本身投誠之人背恩反叛自取誅戮精忠祖父以來受恩三世四十餘年非素蓄逆謀首倡叛亂者比爾部即𫝊諭精忠果能追念累朝恩徳及伊父忠藎遺言革心悔禍投誠自歸將侵犯内地海賊速𠞰圖功即赦免前罪視之如初朕以至誠待天下必不食言俾其善自審度勿負朕保全勲舊之意爾部即遵諭速行𫝊知於是兵部奏遣工部郎中周襄緒及耿精忠下一等䕶衛陳嘉猷賫勅赴福建尋又諭將軍賴塔圖喇總督李之芳巡撫田逢吉提督塞伯理曰耿精忠作逆蹂躪地方大干國法已遣發大兵於浙江江西廣東三路進𠞰但念其祖父曽宣力累朝洎精忠之身遽至覆亡宗祀斬絶朕心殊為不忍因遣周襄緒陳嘉猷賫勅往諭如精忠悔禍乞降赦免前罪仍恩遇如初爾等不可因此遂誤進𠞰機宜必精忠果請罪輸誠爾等即受降來奏若仍執迷肆逆不悛其藩下官兵有心存忠義者或擒斬精忠或率衆來降俱優加恩賞即隻身自歸者亦收留撫恤庚子命戸部侍郎達都往浙江督理大兵糧餉勅之曰兹以大兵進𠞰閩逆軍需浩繁職任重大必須專官綜理始克允濟特命爾前往浙江總理大兵糧餉兼管地方兵馬一切事務凡事與總督商酌而行有闋提鎮者亦與商酌文官布政使以下武官副將以下俱聽爾節制各官有能安輯地方撫綏百姓不誤糧餉者聽爾題叙奬勸如官箴有玷廢弛職掌苦累百姓輓輸稽遲者即行𠫭奏大兵糧餉當預為辦理毋致臨時有誤仍綜核出入嚴察虚冒簡閲兵馬整飭營伍相機調遣有應與將軍等商酌之處仍與平南將軍杭州將軍商酌凡有關於地方一切事務俱盡心料理勅中開載未盡之事聽爾便宜區畫爾膺兹重寄務持亷秉公攄志殫忠俾軍儲充裕民生乂安地方綏靖斯稱委任倘因循怠忽或措處乖方致誤重任責有所歸爾其慎之詔叙賚彝陵有功將士上諭兵部吳逆作叛以來湖南綠旗官兵降賊者衆惟彝陵總兵標下官兵克篤忠貞堅守地方近復兩戰彝陵奮勇擊賊勞績顯著若俟事平議叙則効力之士不得早沾國恩可即行叙賚以示鼔勵癸夘命將軍根特巴圖魯等帥師定廣信進取長沙巡撫董衛國奏叛弁柯昇勾連閩逆竊據廣信諸處麻棚地方賊兵繼起上諭將軍希爾根等至江西時根特巴圖魯等可先定廣信䕶軍統領察哈泰原令進兵荆州今改赴江西為希爾根參謀到日希爾根于所領兵内每佐領出驍騎三人付前鋒統領舒恕率領與根特巴圖魯合為之參謀由袁州進取長沙夾𠞰逆賊根特巴圖魯等進取長沙日期須豫啟順承郡王知悉將拉哈達所統每佐領兵一人亦令副都統斡都海率往江西與希爾根兵合參其軍務甲辰命總理糧餉左都御史多諾等供應湖南軍需上諭多諾等曰前遣爾等督理湖廣通省糧餉今聞岳州兵馬草豆匱乏爾等可分一人前往武昌備辦曩當太平之時湖北湖南巡撫二人分治今軍興之際不得仍以地方分屬為諉爾等㑹同湖北巡撫張朝珍即選才能官員備辦軍需無致缺乏岳州馬匹倘有不足可將順承郡王軍前馬量為撥給又王師渡江或取宜都等處所需舟艦當于荆州預造百艘其作何造辦及需用工費詳議以聞丙午調襄陽兵駐防蒲圻上諭兵部大兵進取岳州自岳至武昌中途應設滿兵防守前自懷慶赴襄陽每佐領䕶軍一人即令其䕶軍參領噶爾弼為副都統帥往與湖廣巡撫㑹議併量帶綠旗兵赴蒲圻縣駐守命多羅貝勒尚善為安逺靖寇大將軍帥師赴岳州固山貝子準達等帥師赴荆州上諭議政王等逆賊吳三桂今于灃岳諸處抗拒我師且用奸謀揺惑軍民之心分我兵勢宜増兵速行𠞰滅今令八旗每佐領出驍騎二人併派察哈爾䕶軍驍騎一半又䝉古四十九旗内與京師稍近者如科爾沁十旗敖漢一旗奈曼一旗克什克騰一旗歸化城二旗共出兵萬人以旗下兵之半及䝉古兵六千令固山貝子準達率往荆州散秩大臣多謨克圖為署都統參贊準達軍務又以旗下兵之半及䝉古兵四千以多羅貝勒尚善為安逺靖寇大將軍同固山貝子彰泰鎮國公蘭布率往岳州所調䝉古兵俱限八月初一以前至京擇䝉古貝勒以下領之尋理藩院以䝉古貝勒貝子公台吉等列名奏請上命科爾沁輔國公圖訥赫杜爾伯特部落台吉温布赴荆州巴林部落貝子温春台吉格哷爾圖赴岳州庚戌命副都統吉勒塔布領兵赴浙江提督塞伯理奏總兵官祖宏勲以温州叛上命駐江寧副都統吉勒塔布率右翼察哈爾全軍及每佐領甲兵一人赴浙江㑹同提督塞伯理守禦將軍拉哈達所轄䝉古兵悉令署副都統宗室巴爾堪率赴江寧聽將軍阿密達統轄松江乃海口要衝且與浙江連接阿密達額楚等可密咨提督楊捷若以松江可虞即酌遣滿洲䝉古官兵以副都統一人領赴松江與提督協守在京滿洲䝉古每佐領出驍騎一人漢軍每佐領二人以精奇尼哈畨碩塔一等侍衛穆森署副都統偕漢軍都統釋迦保領之前赴兖州與將軍拉哈達㑹議行事辛亥諭將軍尼雅翰等進兵機宜上遣侍衛二格賫諭諭尼雅翰等曰爾等咨兵部稱馬多羸斃積雨弓輭朕慮此時進兵未便恐爾等以頓師日久懼罪夫以千里之外軍勢曲折知彼知己豈可逆料朕不欲速惟圖萬全爾等俱係大臣聽謀畫以行其軍中情形及俘獲賊兵言賊進止之狀併爾等所見俱密行陳奏尋尼雅翰等奏六月十七日投誠偽守備薛麟兆等言吳三桂遣偽䕶衛至岳州令賊將堅守且趨進兵賊將稱待長沙造鳥機船到時水陸入犯又言賊營缺餉全賴長沙水陸運送長沙守兵不多臣等議俟秋涼相機進取壬子命將軍拉哈達赴杭州鎮守時杭州將軍圖喇以患病還京上命拉哈達移鎮杭州代圖喇掌將軍印務領其兵馬及自京所遣漢軍官兵其鎮東將軍勅印留付䕶軍統領察哈泰即令管理兖州官兵其往江西兵令署副都統公沃赫穆成額領赴將軍希爾根軍前因諭拉哈達曰鎮守杭州將軍圖喇因病罷任今浙江當多事之秋杭州諸處殊為要地以爾素有才能遣往暫理杭州將軍事務爾抵杭州可與副都統瑪哈達雅塔里侍郎達都等㑹同商酌務期固守封疆撫恤將士收拾軍民之心以副朕委任之意復諭拉哈達及賴塔曰爾等皆國家股肱大臣委任封疆重務凡事須商確者移㑹闗通協心謀畫以副朕委任之意勿各執己見慮有貽誤務念國事為重用茂厥績命經畧莫洛遣兵守朝天闗諸路上諭莫洛曰朝天關諸處闗係要害可於滿洲漢軍或緑旗官兵内酌撥防守為犄角之勢糧艘至彼遞相䕶送不為無助至漢中雖有滿兵猶恐力單且朝天關之外尚有别路可通漢中儻我兵深入後奸宄竊發據守鷄頭闗諸險亦屬可虞一切機宜爾當酌量以行又念保寧未能即得則我師益致勞頓輓運糧餉實為要務其源源接濟毋令匱乏命副都統巴喀領兵赴順承郡王軍前先是上命經畧莫洛遣副都統科爾崑進四川馬一豹赴漢中將軍席卜臣提督王輔臣俱赴荆州至是莫洛奏稱科爾崑官兵已遣赴廣元總督周有徳軍前馬一豹官兵已遣赴漢中副都統吳國禎軍前席卜臣則令率每佐領䕶軍一人往漢中總統馬一豹吳國禎等之兵以副都統巴喀率毎佐領驍騎一人同提督王輔臣往荆州上諭貝勒貝子等既率八旗及䝉古兵赴楚王輔臣兵不必發荆州或令輔臣從將軍赫業等進取保寧或仍駐平涼聽莫洛酌遣巴喀即率兵赴順承郡王軍前尋莫洛又奏逆賊固守保寧且廣元所屬百丈闗諸處賊衆盤踞恐科爾崑兵力單薄隨令副都統吳國禎俟馬一豹兵至即率官兵前赴廣元癸丑調廣東兵援桞州提督馬雄奏孫延齡逆衆不下萬五六千人臣雖堅守栁州衆寡不敵祈令大兵速進應援上諭栁州乃廣西要地馬雄既堅守請援速行平南王尚可喜總督金光祖酌發廣東兵前往接應如有機㑹聽平南王與提督㑹商進𠞰戊午命山東提督段應舉領兵赴浙江將軍賴塔帥師進福建將軍圖喇奏杭州兵單請増兵協守上諭撥京口將軍下綠旗官兵三千江南提標官兵二千調山東署提督事副都統段應舉率赴杭州仍聽將軍拉哈達節制段應舉既赴浙江將軍賴塔可帥所轄滿兵及綠旗兵五千進平福建命和碩康親王傑書為奉命大將軍帥師赴浙江多羅貝勒洞鄂為定西大將軍帥師赴四川上諭議政王等浙江四川兩路宜遣王貝勒貝子公等前往𠞰賊所以遣王等非以諸將才能不足念諸王貝勒皆朕懿親指揮調遣無所牽掣守禦征𠞰足增威重可授和碩康親王傑書為奉命大將軍同固山貝子傅喇塔率前鋒一百七十六人每二佐領合出䕶軍一人赴浙江又前調赴荆岳䝉古兵令各分一千人隨王至江寧時將此兵留駐更調駐守江寧喀喇沁土黙特兵同赴浙江授多羅貝勒洞鄂為定西大將軍同固山貝子都統温齊輔國公綽克託率貝子準達所領驍騎之半赴四川其遣往王貝勒貝子公下包衣佐領多者甲士酌量帶往包衣佐領少者以閒丁酌量披甲帶往至王貝勒所駐地方將軍在王軍前則將軍印不用如别將兵各用其將軍印尋又諭兵部貝勒尚善等至岳州將軍尼雅翰都統珠滿巴爾布䕶軍統領額司泰仍參贊軍務康親王傑書等至浙江將軍賴塔副都統拉哈吉勒塔布仍參贊軍務貝勒洞鄂等至四川將軍赫業瓦爾喀䕶軍統領瑚里布署前鋒統領穆占副都統佛尼勒仍參贊軍務其餘俱罷參贊辛酉勅浙江諸將固守台寧提督塞伯理奏温州屬樂清等營相繼降賊黄巖總兵標下太平營亦叛賊兵離黄巖止七八十里請速發大兵保守沿海邊地上諭樂清等營既相繼降賊則台州寧波可慮副都統拉哈所率包衣佐領兵且勿赴將軍賴塔軍前留駐杭州副都統吉勒塔布及拉哈之兵俱聽將軍拉哈達侍郎達都同議調遣保守台寧等處俟段應舉兵到令其固守地方拉哈兵及副都統瑪哈達兵仍㑹賴塔相機以行康親王固山貝子至時賴塔拉哈達聽王等指揮調度平定三逆方畧巻七

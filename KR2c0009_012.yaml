body:
  text: 欽定四庫全書平定三逆方略卷十二康熙十四年正月辛酉命大將軍安親王嶽樂進取長沙上諭兵部逆賊吳三桂據守嶽澧諸處恃有長沙衡州之粟今安親王率師往江西可令一到南昌即簡江西軍中馬匹由袁州取長沙斷賊糧道夾攻嶽州尋又諭今日事勢先滅吳逆為要安親王宜留兵守江西親統大兵或由袁州或由安州乘便進𠞰湖廣攻取長沙倘長沙未易下即令此兵擾賊耕種截其挽運取資於適不但我兵無轉輸之勞而嶽州糧盡賊可坐困吳逆自不能久據常澧矣其移文安親王速行臣謹按是時逆賊三桂得久據守嶽澧間者恃有長沙衡州之粟浮湘水達洞庭以資盜糧也皇上洞察賊情非斷其餽道難以猝滅乃命樂嶽帥師疾取長沙擾其耕種截其糧餉誠制勝之神䇿使嶽樂一聞上命即尅期前進則長沙賊守未固何難即拔既拔長沙則嶽州糧盡賊可坐困而吳逆不能久據常澧矣詎嶽樂等逗遛不前屢奉詔旨趣行始統兵進發逮攻下萍鄉賊已震怖復不能乘勝長驅急攻長沙以致賊將馬寶悉衆來援嬰城死守而湖南諸賊皆得茍延視息於此見皇上沈謀英斷無不洞見幾先也命敘浙江江西緑旗官兵上諭兵部自逆賊吳三桂耿精忠背恩反叛浙江及江西袁州贛州等處緑旗官兵奮勇𠞰賊固守地方深為可嘉應即議敘以旌其勞爾部其速議之壬戌命大將軍貝勒洞鄂等簡兵躡王輔臣後上諭議政王等曰王輔臣兵變雖下赦詔招撫猶恐未即歸誠擾害百姓今將軍席卜臣等兵已抵漢中送詣軍前馬匹留漢中者亦甚多貝勒洞鄂等其固守要害簡諸軍中願自效者付賢能大臣躡王輔臣後如輔臣歸順即令此兵仍回漢中倘或抗拒則相機勦定戊辰進封平南王尚可喜為平南親王上諭吏禮兵三部平南王尚可喜航海歸誠勳猷茂著太宗文皇帝嘉其勞績特賜王封及定鼎燕京復能殫竭忠忱贊襄大業世祖章皇帝知其夙篤忠貞畀以巖疆重任鎮守粵東海氛寧靖百姓乂安近因吳三桂耿精忠等叛逆該藩益勵忠純克抒偉略悉心籌畫數建膚功朕甚嘉焉事平優敘屢有俞旨前奏年老任重請以其子尚之孝承襲王爵已允所請今思該藩纍朝勳舊功著封疆宜錫殊榮以酬茂績平南王尚可喜著進封為平南親王即令其子尚之孝襲封尚可喜以親王品級頂帶支俸示朕優眷之意廣東文武事務著尚可喜照舊料理其親王之寶亦暫行掌管尚之孝統兵在潮著給與大將軍印應行封典爾部即遵諭行癸酉敕諭王輔臣當輔臣變叛上既遣其子繼楨往宣諭尋又頒專敕曉以大義發其悔悟之心於是輔臣留其子繼楨遣原任郎中祝表正具疏自理委罪經略莫洛上復命表正賫敕往撫敕曰前據陜西督撫奏稱入川兵丁忽爾生變念爾素性忠直朕所深知國家待爾寵渥非常必無負恩悖逆之事故特面諭爾子王繼楨前往宣布朕意恐爾尚懷疑懼又降專敕於爾詳加開喻今覽爾奏變起情形皆由莫洛控馭失宜軍心不服所致爾斂戢潰軍具疏請罪爾之心迹無他朕已洞悉往事一概不究前諭甚明其爾所屬官兵俱行寬宥照舊歸伍效用爾即率領官兵仍回平涼汛地照舊鎮守以固封疆莫洛標下原帶官員已各免罪作何委用爾與總督酌量題補其餘兵丁願歸農者令地方官加意安插願在爾標充伍者與總督商酌補入務令得所以副朕撫恤之意爾前功甚茂朕之待爾終始不渝其盡釋疑衷以圖後效果建殊勳佇膺懋賞命撫莫洛標下潰散官兵上諭總督哈占巡撫杭愛曰據爾等奏稱王輔臣兵變致經略標下緑旗兵丁驚潰等語朕思秦省兵士舊在行伍者戍守著勞新行召募者驟經調遣令俱隨征逺出深軫朕懷事出意外必非無因念其變起倉卒情非得已未忍加罪爾等即宣諭朕意速行招撫願歸營者隨便入伍願歸農者加意安插前罪一槩不究其官兵人等父母妻子見在原籍者俱行宥釋並不株連念伊等皆朕赤子特布寬典豫以自新勿得執迷不悟自貽伊戚爾等即廣行曉諭以副朕撫綏招徠之意諭大將軍貝勒尚善進兵機宜上諭兵部先因王輔臣兵變令嶽州官兵速進今輔臣既具疏悔罪雖未即降而大兵雲集秦地已可無虞宜行文貝勒尚善若嶽州可取即速進兵如勢有未便不宜輕動前已敕安親王由袁州取長沙度其將到相機前進尋常善等奏臣等正治攻具取嶽州賊更浚濠三重其間復設陷坑木樁竹簽周密環布臣等欲移營前進又恐時當霪雨江水泛漲營壘前後悉皆被水且我船與賊船甚近而荆河口又居我後賊據上流殊為可虞誠如聖諭不宜輕動臣當暫停進兵以俟機會乙亥命給保寧還師馬匹鎧仗大將軍貝勒洞鄂奏將軍席卜臣都統赫業總督周有德等抵漢中臣等即酌留官兵守漢中而親統餘兵出棧道途經鳳縣留兵防守至鳳翔復酌留護軍驍騎付赫業駐鎮隨率餘兵至西安但席卜臣赫業等兵勞苦已極馬匹鎧仗不能自辦請量行撥給上諭馬匹鎧仗行軍要需今席卜臣等兵既極勞苦見駐西安諸將帥酌量給馬每人二三匹其鎧仗著動正項錢糧修辦命增漢中守兵時前鋒統領穆占奏將軍席卜臣副都統科爾崑吳國禎馬一豹等領兵二千留守漢中上諭漢中要地宜置重兵貝勒洞鄂等於西安兵內每佐領撥士一人俾將軍侍衛坤巴圖魯副都統翁愛德業立率赴漢中協力固守其糧餉令巡撫杭愛駐漢中設法支給總督哈占陸續運送毋致缺乏命大將軍貝勒洞鄂等備王輔臣上諭貝勒洞鄂總督哈占曰王輔臣雖具疏悔罪正恐借此以緩我師乘間為固守計若輔臣果聽命待罪我兵但守疆界脫或揚言投誠而仍肆擾害勢將蔓延爾等即相機勦禦丁丑命將軍阿密達帥師赴蘭州上諭議政王等蘭州近邊要地應速遣兵駐守今保寧大兵已回西安達理善巴圖魯兵亦將至西安其將西安見在兵每佐領撥四五人以上令將軍阿密達副都統鄂克濟哈夸岱率赴蘭州勦禦逆賊併防階州文縣諸處令鄂克濟哈夸岱參贊阿密達軍務尋大將軍貝勒洞鄂奏蘭州誠宜遣兵防守但保寧還卒鎧甲馬匹未備達理善巴圖魯兵兼程而來恐難驟遣西安所恃以禦賊者賴有調來汝寧河南兵今將此兵發往倘王輔臣由陳倉諸路斷我棧道自秦州平涼一時來逼深為可虞上復諭曰今據報逆賊已逼蘭州若不遣兵速援賊將猖獗臨鞏被陷三邊一搖勢難猝定蘭州距秦州不逺我兵若往蘭州則秦州便可襲取而平涼諸賊亦可首尾夾攻阿密達等以文到之日即速赴蘭州保固三邊倘逆賊中道阻截即攻取平涼或奪路前赴蘭州其相機以行貝勒等速備馬匹器械給保寧回兵其達理善巴圖魯之兵亦給與馬匹以備勦禦臣謹按蘭州外控西陲內接臨鞏為秦中要區皇上預料逆賊必來侵逼以蕩搖我邊境若非以大師先據其地則臨鞏不保而巖疆為之騷動矣因命阿密達等統重兵赴守不獨保固三邊兼可為襲取秦州夾攻平涼之計奈洞鄂不能奉命速遣赴機少緩蘭州果陷而臨鞏諸處胥為賊有幸皇上亟命諸將帥分路進兵奮力齊攻而秦蘭臨鞏諸州郡旋即收復逆賊勢孤力蹙坐困於平涼良由調度迅速俾賊不暇自固故邊陲無警而全陜亦遂晏然爾庚辰諭鄂爾多斯兵暫停進邊先是王輔臣叛變遣理藩院員外郎拉篤祐等往調蒙古兵歸化城土默特二部四子部茂明安部烏拉特三部兵啓行前進鄂爾多斯兵亦嚴裝將發至是理藩院侍郎博羅特奏天寒大雪鄂爾多斯馬瘦不能前上諭土默特等七旗甲兵赴調前來深為可嘉至鄂爾多斯之兵與拉篤祐等馳驅往來天寒大雪士馬疲困殊堪閔念著暫停進邊仍各整理器械以俟調遣其七旗官兵令博羅特傳諭前進癸未調兖州兵赴安慶大將軍簡親王喇布奏江南財賦重地界接諸省宜增守兵今副都統蘇朗帥蒙古兵一千守池州署副都統額思赫率滿洲蒙古兵守蘇州臣復以蒙古兵二百協守徽州將軍華善之兵以五百赴浙江三百取饒州其見駐江寧者僅蒙古兵四百臣所統者兵不滿千請令將軍額楚等兵回駐江寧上諭額楚既抵江西不必引還令駐防兖州署副都統諾敏嶽爾多率滿兵速赴安慶以備九江湖口窺伺之賊江南有警即順流應援令簡親王統之京師滿洲蒙古每佐領出驍騎一人領以署副都統伊巴克圖馬爾齊哈漢軍每佐領出二人領以副都統郎化麟俱赴兖州令將軍察哈泰統之署副都統等為參贊兵到副都統孫承祖帥兖州所駐漢軍與諾敏等會於安慶至盛京已調烏拉兵七百駐守其更調盛京兵六百赴京師乙酉撫諭興安叛兵大將軍貝勒洞鄂等奏興安緑旗官兵以總兵官王懷忠尅餉苛虐且聲言調兵坑殺衆遂作亂共殺懷忠臣等出示安撫仍移會前往興安副都統穆舒渾兵中途暫止上命頒發諭付貝勒洞鄂總督哈占宣諭官兵尋隨征總兵官黨塞上京告變上又諭之曰據黨塞面奏王懷忠平日待下貪苛行事乖戾衆心不服以致激變朕以爾等曾隨征四川勦殺寇賊戮力勞苦今倉卒之變出於萬不得已非夙圖倡亂者比是以未忍加罪特頒寬典嘉與維新已經降敕大將軍貝勒總督宣諭今又令總兵官黨塞賫敕明布朕意將爾等從前罪愆槩行赦宥不究其各歸營伍勦賊樹功以圖後效勿懷疑懼以負朕寬宥恩撫至意倘仍觀望稽遲或聽姦宄煽誘之言妄行作亂則國有明法勿遺噬臍之悔未幾哈占奏敕諭抵興安文武各官集兵民宣讀莫不歡呼叩謝皇恩感激思奮衆心遂定丙戌命大將軍貝勒洞鄂等固守棧道諸處上諭洞鄂等陜西重道棧道關係尤急沔縣秦州乃通漢中要路前此川陜用兵頗失機宜今棧道若何據守沔縣秦州若何保固俾逆賊不得侵犯以保障全陜貝勒參贊大臣與總督會議務期萬全戊子諭大將軍安親王嶽樂進兵機宜先是嶽樂奏兵部移文令臣速取長沙但今江西所在賊擾人心未定臣若帥師前往則江西兵單可慮况臣乘舟至南昌陸路道險雨阻戰馬尚未全至今或宜進取長沙或先滅江西之賊臣惟俟敕旨遵行上諭逆賊堅守嶽州卒難攻取王所深知今若不速取長沙恐賊復增守備克復尤難王云先定江西再取長沙然彼時豈能必人心不搖豈能不留兵防守王宜分兵留守要害速取長沙至是嶽樂又奏江西形勢為廣東咽喉江南湖廣要衝見今三十餘城為賊盤踞且醴陵逆賊造設木城增偽總兵十餘人兵七萬猓猓三千堅守長沙萍鄉諸處臣若撤撫饒都昌防兵往長沙則諸處復為賊有不撤則兵勢單弱不能長驅且廣東諸路恐亦多阻臣欲先平江西賊冦無却顧之憂然後分防險要帥師前往上復諭之曰逆賊吳三桂久據湖南姦宄乘勢竊發滇黔川閩遂爾淪陷廣西陜西逆孽猖獗湖南一隅誠賊根蒂四方羣寇所觀望必速滅三桂底定湖南則各地小醜聞風自散今荆州兵未能渡江而嶽州兵又難驟進王抵江西宜由袁州直取長沙一以斷賊餉道一以分賊兵勢一以扼廣西咽喉一以固江西門戶烏合之衆自當瓦解荆嶽大兵即可乘機直進况寧羌告變川賊必通楊洪二賊窺我鄖襄擾我南鄧侵我荆州後路揆其大勢進兵湖南斷不容緩且南方卑濕延至夏月霪雨連綿大兵坐守日久不但戰馬多斃糧餉亦恐不繼是取進湖南不再計決矣王宜將江西要地速行整理稍有成緒即進取湖南勿得坐視致誤機會命總督蔡育榮還荆州上諭兵部前因大將軍貝勒尚善等欲攻嶽州故令總督蔡育榮率標兵前往今貝勒等以逆賊固守嶽州暫停進取其令蔡育榮以所部官兵仍回荆州命分滿兵守荆河口上諭議政王等今大兵全駐荆嶽恐逆賊以荆河口空虛乘隙來犯其令順承郡王於荆河口對岸撥兵防守平定三逆方略卷十二

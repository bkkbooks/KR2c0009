body:
  text: 欽定四庫全書平定三逆方畧卷六十康熙二十年十一月丙辰命復總督哈占蔡毓榮官先是哈占蔡毓榮以罪革職留任効力贖罪至是上諭吏兵二部總督哈占蔡毓榮率兵𠞰賊直抵雲貴勞績茂著可復其原官丁巳命免大將軍公圖海罪上諭兵部圖海年老有疾雖有微愆非㫁不可宥者所記之過其俱與寛釋癸亥大將軍貝子彰泰頼塔等奏克雲南省城大兵進圍雲南數閲月不下上慮曠日持久兵民胥困乃降敇趣之於是彰泰等即於十月初八日統率滿漢官兵進薄城下并力環攻賊勢惶迫無措二十八日夜偽將軍線緎呉國柱吳世吉黄明原任都統何進忠原任巡撫林天擎等謀擒逆首呉世璠郭壯圖以獻世璠聞變自殺壯圖及其子宗汾皆自刎死二十九日緎等率衆出城降遂擒首謀獻計之偽大學士方光琛及其子學潜侄偽學士學範至軍前磔之戮世璠屍傳首京師彰泰等以聞上嘉之曰覽貝子等奏統領滿漢官兵遵奉成命進取雲南圍困省城今復遵㫖進攻逆賊危迫偽將軍線緎呉國柱等設計通欵欲執逆渠獻城呉世璠及郭壯圖父子困急俱自刎而死斬首送京師逆黨方光琛父子俱行伏誅偽文武官員軍民人等悉皆歸誠恢復雲南省城疆宇蕩平具見籌畫周詳調度有方𠞰撫並用克奏膚功朕心深為嘉悦其從優議叙具奏尋彰泰等又奏偽將軍夏國相等敗遁廣東臣等檄令土官儂朋及防守臨安總兵官李國樑率兵追𠞰直抵西板橋環圍之塞其去路國相與偽將軍王永清黃福李攀龍楊公魁率偽屬官兵至軍前各繳偽印劄降臣等公議斬攀龍等於軍國相為呉三桂壻乃賊渠著名者宜送京師正法又都統希福追𠞰逆賊胡國柱等至雲龍州之青里屋國柱度不能脱遂自縊王敘李匡皆自焚死偽將軍王公良等率餘衆悉降臣謹按是時諸路大兵雲集滇南已圍其城若奮力亟攻不難立拔而諸將猶稽延時日不急於從事皇上念賊渠一日未除則兵民一日未得寧息因降敕趣師令速行進取我兵乃薄城下并力環攻賊勢惶迫世璠自殺其黨遂以城降於是羣冦盡滅諸路悉平王師騰獻凱之歌萬姓獲解懸之樂誠由皇上心切救民嚴師趣戰故能使逆冦一旦掃除天下共享太平之福而長頌永清大定之烈也十二月己亥以逆冦蕩平詔赦天下詔曰朕纉承丕緒統御寰區仰惟天地眷祐之庥祖宗付託之重聖祖母太皇太后慈訓之殷蚤夜孜孜勤求化理期於兵革寢息海宇乂安不意逆賊呉三桂負國深恩倡為變亂陰結奸黨同惡相援抗違詔令竊據疆土滇黔閩浙楚蜀關隴兩粤豫章之間所在驛騷肆騁痛毒三桂僣稱偽號逆焰彌滋負罪尤甚朕恭行天討分命六師𠞰撫並施徳威互濟或縶頸於闕下或駢戮於師中擒捕誅鋤以次收服乃三桂既膺神殛逆孫世璠猶復䲭張踞六詔之一隅延殘喘以拒命朕惟賊患一日不除則民生一日不靖策厲將士屢趣師期於是虎旅協心進逼城下賊衆計窮勢蹙通欵軍門約日獻城兇渠授首師克之日市肆不擾邊境晏如捷書既至上慰郊廟社稷之靈下抒中外臣民之憤神人胥恱遐邇騰歡念自變亂以來軍民荼苦如在水火披堅執鋭卒嵗靡寧行齎居送千里相望被兵之地既罹於鋒刃供億之衆復困於徵輸朕閔恤民艱不忍輒加額賦間施權宜之令用濟征繕之需意在除殘事非獲已而身處宫寢之内外厪閭閻之依中夜屢興旰食不暇惄焉思治八載於兹今羣逆削平疆圉底定悉剪歴年之蟊賊永消異日之隠憂用是蕩滌煩苛維新庶政大沛寛和之澤冀臻熈皞之風所有事宜開列於後於戲體覆載好生之徳秋肅必繼以春温法帝王更化之模義正尤期於仁育誕告天下咸使聞知欽惟我皇上聖徳誕敷神謨廣運削平羣逆敉定疆隅永底治安長銷金革鴻勲駿業振古莫京臣等伏覩八年之内兵間進止悉奉宸規凡水陸攻守之宜竒正疾徐之用諸將祇遵成命則所向有功稍一愆稽輒多僨績應如符契瞭若列睂今兹載筆是司惟按事直書不敢片言文飾臣等至愚且陋末由洞測髙深故於丕烈殊猷不能備悉第就管窺所及見諸事蹟確然有據者謹為揚㩁焉葢三逆素蓄狡謀多行不軌背恩反叛厥罪惟均而倡亂煽禍吳三桂實為戎首當三桂之初反也恃其險逺僭竊一隅變雖作於滇黔毒未流於鄰境皇上一聞党務禮等上變即料三桂老賊多詐必覘我未備亟争楚南窺伺巴蜀巴蜀阻隘而楚南魚稲之鄉茍為賊有未易猝破我兵先據之則可以搤其咽吭而使之立困故亟簡禁旅命順承郡王勒爾錦為大將軍統之南征撲滅逆冦隨調西安將軍瓦爾喀就近赴蜀堅守以備賊之旁軼又令前鋒統領碩岱等兵日支芻糗兼程先赴荆州固軍民之心即進據常徳以遏賊之内侵都統珠滿等馳往岳州扼水陸要害壯粤西聲勢以防賊之横截均飭其速發無失機㑹是皇上籌畧英明計慮深逺調遣布置誠至神速至周宻也設是時守土諸臣盡力干掫各保四封之内領兵將帥遵奉詔㫖並星夜遄行乗賊鋒未至控扼其險要則三桂之兵必不能深入川湖坐致罷敝固無難於立滅耳乃瓦爾喀師行少緩蜀變旋生碩岱等雖迅速抵荆未即長驅以守常徳珠滿等不亟至岳州遛逗武昌乖誤事機以致常徳長沙岳州相繼變作而湖南諸郡邑盡為賊有逆勢寖張孫延齡以桂林叛耿精忠以福建反震鄰及於江浙之區迨將軍赫業與瓦爾喀㑹師進克朝天諸闗已抵廣元不即規取保寧途次稽延俾賊得為固守計川陜督撫不能接濟軍食我師遂以糧盡引退王輔臣之兵復變於寧羌而漢興不守秦中亦多弗靖皇上既增發將士分討叛㓂更以諸路之中湖南最要爰趣大將軍順承郡王勒爾錦渡江𠞰賊而命大將軍貝勒尚善取岳州大將軍安親王岳樂取長沙又慮呉逆犯江西斷粤路調大將軍簡親王喇布赴江西鎮守勒爾錦顧不思前進安坐荆州老師糜餉屢失軍機尚善亦多端諉託宿留彌時岳樂既下萍鄉不乗勝亟拔長沙致賊黨來援嬰城相拒喇布不保固吉安為賊所陷復致尚之信叛於廣東當是時皇上絫降嚴綸趣湖南諸將速行攻擊而諸將始終猶豫瞻顧莫前以故逆燄披猖羣兇蠭起如滋蔓然甚難圖也幸皇上深悉地理灼見軍情謂彼時滅賊之機繫乎岳州取岳州非㫁其餉道不可因特遣尚書伊桑阿督造戰艦調集師徒授策於大將軍貝勒尚善察尼令其盡據江湖㫁賊餽運於是三桂見勢已危迫憂怖以死而岳州之賊食盡力殫棄城竄遁長沙常德諸郡以次收復羣冦之在川粤間者亦靡不悚讋喪氣湖南既平皇上遂命諸路大兵乗機赴𠞰而秦中諸帥狃於成見交章入奏皆言未可進兵仰藉聖明獨斷痛斥其非飭令大將軍公圖海等分路速收漢興規定巴蜀復特遣學士希福等齎敕鼓勵諸路緑旗官兵及將軍王進寶趙良棟兩軍先入恢復漢中龍安即調將軍烏丹為王進寶後繼將軍鄂克濟哈為趙良棟後繼遣郎中額爾赫圖等催將軍噶爾漢等進兵䕫州而敕大將軍貝子彰泰由貴州大將軍頼塔由廣西進取雲南更遣學士額庫禮等趣頼塔軍洎我師克保寧成都底平岷益隨令將軍吉哈禮趙良棟等兵赴滇㑹𠞰諸將因仰遵指示部分前趨賊果不能抵拒望風披靡我兵遂直薄滇池雲集霧合環攻其城郭逆孽世璠旋即授首醜類咸俘斬無遺而狂氛盡掃六詔底寧軍民胥得息肩矣耿精忠乗雲貴之亂竊踞八閩侵掠鄰封肆其兇虐浙東江右咸騷然其不寧大將軍康親王傑書奉命薄伐宜即親抵三衢董率戎伍擊破賊衆疾走仙霞而徒以温台伏莽未清駐節金華久淹月日皇上逺算宏圖揆其輕重以為先破犯衢之賊進平福建則其他小醜自當解散乃趣傑書亟赴衢州復示以成畫令分兵斷賊大溪灘餉道果大敗其衆逐北追犇直壓閩境巖闗旋下所至投戈精忠束身乞䧏而温州諸賊亦皆盪定精忠既䝉天恩曲貸猶自取誅戮結連海㓂潛搆逆謀為部人徐鴻弼等所發逮至京師推訊得實磔之都市亂萌消遏斯閩土所以無虞也尚之信負恩干紀脅父稱兵與三桂交通敢為大逆皇上命將軍拉哈達以兵抵潮陽莽依圖以兵臨韶郡兩路夾擊用蹙廣州之信忷懼無措始具疏服罪夫何歸順之後怙終好亂㒺有悛心屢奉明綸俾其親率官兵進𠞰潮州湖南而抗㫖不前後雖彊為出師輒自引退廣行不法復思一逞為其屬張永祥等首告皇上隨遣侍郎宜昌阿即訊又慮廣城或有意外因馬承廕叛敕將軍頼塔移師鎮潮以陰為之備迨之信既就拘縶其黨惡果擐甲執兵猝生變亂於時頼塔之兵已抵粤城故狡詐莫施悉為我軍所禽戮之信亦以逆謀得實伏誅禍本既除服領以南始按堵如故焉由是觀之平定三逆無一不本於皇猷即其餘叛逆之徒如王輔臣劉進忠楊來嘉譚洪馬承廕祖澤清等次第銷滅凡恩威兼施𠞰撫並用均仗聖謨夫豈内外諸臣所能仰贊於萬一者至於訓將帥以肅紀律賚士卒以示鼓勸設馬站以速奏報練水師以資戰功捍守内地之慎固防範邊陲之嚴宻招納賊黨之寛大綏輯百姓之慈恵遣兵則遞相遷代而行者不勞籌餉則就近轉輸而居者不困睿謀淵邃勝算周詳亦非諸臣所能見及者也葢皇上之洞賾燭微萬里畢照至明也決機發策羣議莫撓至斷也開誠布信賞罰無私至公也鏡往察來綜畫有素至豫也而一本於聖心之至仁不忍生民之罹於塗炭而亟欲出諸水火登之祍席故頻趣王師遄進而又絫頒諭㫖令諸將帥加意撫恤閭閻不得稍有侵暴即攻克城邑亦毋許妄戮良民神武不殺逺邁百王智勇天錫超越千古夫是以海㝢乂安黎庶康樂七徳咸昭五兵不試誠哉巍巍蕩蕩永清大定之勲億萬年無疆之祚也若夫平滇之後德音叠布薦上徽稱祗謁山陵徧行望秩告成功而不有却尊號而勿居典禮隆茂徳業愈光他如召還禁旅酌設鎮防安插投誠將弁而消隠慝分别逆屬人口而免株累屢蠲租賦以蘓民困頻加恩恤以酬軍勞自大將軍以逮兵士俱詳察其功罪有功者即畀之爵賞縱踈賤而不遺有罪者務加以處分雖至戚而㒺貰政令精明規模宏逺總之皇上乃聖乃神允文允武戡禍亂開大平經理靡弗盡善如上天之縡難以名言臣等雖勉綴數詞木過綜括大凡實自媿於至德豐功敷揚莫罄云爾平定三逆方畧卷六十

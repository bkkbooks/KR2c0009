body:
  text: 欽定四庫全書平定三逆方略卷四十二康熙十七年十月庚午命福建水師提督駐海澄總督姚啓聖奏前督臣李率泰奏設水師提督駐海澄方今水重於陸不可無總統重臣海澄公既召赴京師漳州宜設總兵官鎮守上諭向因水師提督駐海澄是以海逆敗遁今該督既行題請其令水師提督駐海澄調海澄總兵官駐漳州至水師提標應設兵丁可於新增兵及所裁海澄公標兵內選補丙子敕大將軍簡親王喇布帥師進討將軍穆占鎮守茶陵初喇布奏臣等恭接招撫逆賊敕諭即謄黃遍行粘示仍屢遣人招撫僞將軍胡國柱夏國相馬寶等以臣觀之攸縣較安仁尢要若前詣攸縣遣人招撫且相機而動均有禆益又於安仁可以兼顧但遣還夸蘭大塔爾拜所領每佐領兵二名臣屬兵力必致單弱請增發緑旗兵上諭簡親王身在彼地深悉情形宜如所請前往攸縣隨宜勦撫但兵分力薄可調永興副將周球赴彼軍前並移文總督董衛國選江西緑旗兵二千速遣詣簡親王軍以資進勦至是穆占奏臣及簡親王孰進孰守伏候上裁上諭逆渠已斃賊勢潰亂之際大兵亟宜前進𠞰撫並行機不可失大將軍簡親王同內大臣阿密逹前鋒統領希福等率每佐領十人并均配緑旗兵與大將軍平南親王尚之信公同定議或取永州或宜取何地相機而舉茶陵安仁永興郴州諸處俱令將軍穆占鎮守如地方無虞有機可乘聽其酌量進發丁亥總督姚啓聖等奏敗海賊於蜈蚣山恢復長泰海賊僞統領劉國軒等大隊由海澄犯泉州敗卻據長泰縣將軍賴塔等議留侍郎逹都守漳州而偕耿精忠及總督姚啓聖等率兵進討九月十九日與賊戰於蜈蚣山賊敗走破其七營斬僞總兵以下三千餘級生擒一千二百餘人遂復縣城己丑詔福建總督提督緑旗官兵得専調遣總督姚啓聖奏泉州見有閩浙提標緑旗兵二萬一千餘臣屢調㑹𠞰海冦迄今無一至者若必俟大將軍王令不免坐失機宜請敕提臣馳赴漳州共圖戰守之䇿上諭據報巡撫吳興祚提督楊捷等兵及滿洲大兵俱於十月初旬由泉州赴漳州如總督提督調用緑旗官兵必俟啓大將軍王未免遷延誤事嗣後一面調遣一靣啓知王等至總督提督皆朕信任封疆大臣務彼此輯睦期于疆場有濟辛卯命大將軍貝勒察尼議取嶽州之策先是察尼令貝子彰泰攻湘隂將軍鄂鼐以舟師不可分遣止之彰泰等還駐九貴山至是鄂鼐奏九月十八日北風大作飄我君山扁山船風稍息始得收集飄散之船賊乘鳥船五十餘乘間突出前往湘陰臣等未能擊卻比其還入嶽州又未能邀阻因請罪上諭克取嶽州所擊甚要以數百艘之船特遣將率師斷賊餉道截其水路乃鄂鼐等目視賊船突出不能阻截比其回歸又不能邀殺俾賊出入自如肆無畏忌鄂鼐等即應嚴加處分但方統率大兵泊湖勦賊俟事平之日嚴察重處鄂鼐及諸將佐俱令立功贖罪今賊已多集糧餉火藥于嶽州或仍應困取及作何進發貝勒察尼等速定議以聞丙申巡撫張朝珍請安置降兵于內地上不許朝珍奏各路軍前投誠官兵撥臣標效力者甚衆其間臧否莫辨請以臣標投誠效力各辨並嗣後自軍前發來官兵令分布安插于江南河南內地上諭今值𠞰撫並用之時若以見在武昌投降官兵安置江南河南恐後此來歸者將疑畏不前大將軍順承郡王貝勒察尼等其勿令若輩聚處隨宜分布安置于湖廣諸處俾各得所臣謹按投誠官兵本皆附賊之人一但勢蹙乃始來歸雖其中傾心效順者固多而稔惡未悛圖為不靖者亦自不少必處置得宜始可以潜消奸狡之萌開廣招徠之路張朝珍昧于事理請安插降兵于內地皇上以無故遷移已至者必將自疑欲降者或困之中沮若令聚處一方又恐叢集生奸致煩誅戮有乖好生之德乃命王貝勒等隨宜分布毋使羣居仍安置于湖廣諸處俾各得所於是反側者咸安輸誠者益衆蓋皇上措理之方安輯之道無事不盡善如此也十一月己亥詔授侍讀學士李光地為學士將軍拉哈逹奏海賊斷江東橋等處阻截援兵有泉州守制在籍侍讀學士李光地遣人至臣軍中為大兵鄉導由漳平縣朝天嶺小路入安溪縣光地復遣人沿途修通險阻接濟軍需光地身自前迎大兵文臣為國盡勞可否議叙上諭李光地當閩地變亂之初不肯從逆具疏遣人密陳機宜殫竭忠貞今又遣人迎接大兵指引道路平險隘治浮橋餽食物餉軍率民兵備辦糧米供給兵衆口糧矢志滅賊實心為國深為可嘉其從優授為學士詔豫投誠官貟俸大將軍順承郡王勒爾錦言先後投誠僞官及房縣來歸之僞總兵何以敬等雖授劄以示鼓舞而止食兵糧生計難給上諭何以敬等慕化來歸宜令得所以勵來者其悉豫半俸甲辰命侍郎禪塔海等監修嶽州戰船大將軍簡親王喇布奏臣今奉命進征其船艘仍前修造或宜停罷統候睿裁上諭簡親王前言茶陵攸縣水陸俱逹衡州諸處亟宜預造船艦以備故特遣侍郎禪塔海等前往監造今觀所奏如此足知從前初未詳審草率具奏宜俟事平察議禪塔海可以所備物料運至武昌監修嶽州損壞戰艦丁未敕總督董衛國等速平餘冦上諭兵部總督董衛國率師赴廣信勦賊已三月餘曾否撲滅迄今尚未報聞總督提督封疆大吏楊一豹等乃廣信一帶山谷小冦耳宜即為掃除總督董衛國提督許貞其速靖餘冦各還駐所辛亥命遣官招撫陷賊官貟兵民上諭議政王等吳逆既殞賊心震動宜遣吳三桂原屬人貟前往招撫山東按察使何育秀等十員內擇數人量加職銜給以敕書發大將軍安親王簡親王順承郡王貝勒察尼公圖海將軍穆占莽依圖軍前或徑令彼等親往招撫或聽其遣人先通音問然後身往招徠其公議發遣儻有濟于事仍量功大小從優議叙於是議政王等列育秀等名具奏上乃加山東按察使何育秀太常寺卿工部郎中張光嶽太僕寺卿奉天府治中佟啓聖通政使司左通政安丘縣知縣胡端通政使司左參議行人司行人崔啓元鴻臚寺卿武鄉縣知縣齊漳通政使司左參議各齎敕諭往諸路大將軍軍前招撫陷賊官貟兵民敕曰自逆賊吳三桂煽亂以來所在官民多被誘惑故陷身賊中莫能自拔朕已洞悉情形屢頒敕諭廣示招徠開其自新之路今逆首吳三桂已伏天誅念在彼脅從文武官貟兵民人等皆朕赤子素受國家恩養必非甘心從逆或志存忠義遲回待時或勢被迫驅無由歸化朕甚憫焉兹特命爾等齎敕往陜西大將軍長沙大將軍嶽州大將軍征南大將軍揚威大將軍荆州大將軍等軍前特行招撫爾等曩在滇黔素多親識易于開導必相信從須宣布德音相機勸諭務令陷賊人員翻然悔悟爭先來歸有密謀內應擒斬賊渠及率領兵民獻城納欵者俱赦其前罪論功叙録加恩安插俾令得所煌煌諭㫖朕不食言爾等奉兹委任務須殫心籌畫勿失事機或親身徑前招撫或先遣人諭曉後乃親往俱同各將軍等㑹議酌量而行若招撫成功量功大小從優議叙加恩爾等其勉圖報效以副朕定亂安民至意大將軍貝勒察尼奏舟師敗賊于陸石口十月二十二日僞將軍杜輝巴養元姜義乘船二百五十艘犯陸石口將軍卾鼐等率師分擊敗之獲其船斬賊無算至二十九日署副都統葉儲赫等復率師進擊嶽州破賊衆萬餘斬首甚衆甲寅敕大將軍貝勒察尼等水陸圍嶽州察尼等奏賊艘雖兩畨出城取糧據降人云取到之糧僅支十一月頃賊船悉出意在疏通餉道犯我栁林嘴鏖戰移時繼而僞將軍等率衆五千於髙家廟渡江犯我陸石口營臣因增遣署前鋒統領杭竒率兵赴陸石口俾禦賊之出求糧者上諭嶽州乃湖南咽喉如嶽州克復則常德長沙之賊斷難屯踞蕩平之績指日可期今湖水漸涸賊船難出故由陸路奮死來犯茍糧無缺乏豈肯如此纍出衝突耶以風濤之險船艦將士雖有傷折然賊急迫之形已著貝勒察尼等速宜水陸圍逼務期克復庚申調兵益大將軍貝勒察尼軍先是察尼奏舟師泊湖以來頻經出戰炮多壞損請發江南發貢子毋等炮一千送至嶽州又以君山髙家廟陸地設營請調荆州水營總兵官張忠並標兵赴嶽上皆從之至是又奏今湖水漸涸陸地漸出我兵營伍隔絶恐賊潛通饋餉請增發滿漢兵議政王等議不准行上諭困取嶽州關係重要據報賊糧將絶宜以閒地滿兵量調嶽州大將軍安親王遣赴永興每佐領兵二人已經撤還今長沙事機稍緩可發每佐領兵或二人或三人赴嶽州江西總督董衛國標下官兵選調二千五百人就近由銅鼓經武昌赴嶽州營于要地庶有禆于軍事此兵俱聽大將軍貝勒察尼等調遣壬戌命饒州總兵官髙登科率兵赴茶陵諸處大將軍簡親王喇布奏臣欽遵上諭率內大臣阿密逹前鋒統領希福學士薩海副都統保住署副都統雅哈喇雅秦等并滿漢官兵進討而留署前鋒統領薩克察巴圖魯副都統馬席泰署副都統額思赫楊古岱等併滿漢官兵于將軍穆占所俾之鎮守但茶陵攸縣諸處接壤江西止以此兵鎮守力甚單弱而臣隊進討之兵又不便再留恐大兵長驅前進之後賊以大隊來犯地方不無可虞上諭簡親王帥每佐領兵九人進征留每佐領兵一人防守江西總督董衛國提督許貞進𠞰廣信諸處餘冦建昌又有總兵官陳平駐守饒州逼近廣信董衛國等既撲𠞰廣信山賊其饒州總兵官髙登科悉統標兵馳赴茶陵攸縣諸處協守癸亥命提督楊捷為昭武將軍仍管福建陸路事務調京口將軍伯王之鼎為福建水師提督先是總督姚啓聖奏水師提臣貟缺奉㫖命臣等保題欽遵㑹同巡撫提督面議實無練習水戰可堪保題之員上命議政王等選舉至是議政王等列江南崇明提督劉兆麒浙江溫州總兵官陳世凱名以奏上諭楊捷自簡任福建提督𠞰禦賊冦恢復疆土勞績茂著授為昭武將軍仍以原品管福建陸路提督事務王之鼎才略素優鎮守京口克稱厥職仍以將軍調補水師提督丙寅命將軍覺羅舒恕遣兵赴藤縣先是將軍額楚抵藤縣奏兵多病疫上諭若病者未蘇可移師去藤至是額楚奏鬱林容縣潯州賊衆聲言三路來犯大兵不可動移臣兵病疫相仍見存無幾念臣深入廣西請增遣大兵上諭額楚仍駐藤縣將軍舒恕于南雄韶州兩處兵內擇有馬者每佐領各一人發額楚軍十二月己巳詔增荆州緑旗兵大將軍順承郡王勒爾錦奏臣所部滿漢兵水陸攻取嶽州竊犯荆州以圖牽制臣等即竭力守禦亦難保無虞乞許臣募緑旗兵萬二千人悉統槍手以濟防禦庶于疆圉有禆上諭順承郡王既言荆州兵單宜如所請聽募緑旗兵萬二千人悉統槍手并㑹同該督撫擇戮力行間有才能者授職管轄兵丁所需交槍令工部選發如需用輕炮王等具疏以聞丁亥敕尚之信及將軍覺羅舒恕帥師赴梧州將軍莽依圖奏本月初三等日逆賊來犯將軍額楚傅宏烈率兵接戰失利營壘俱陷賊勢猖獗不能遏禦藤縣失守見存兵力甚薄梧州勢危上諭今梧州可虞大將軍平南親王尚之信不必往湖南徑赴梧州與莽依圖等商酌調遣官兵併力勦賊以靖地方如王斷不可離省即速選精兵馳赴又韶州南雄已為內地將軍舒恕可率每佐領兵二人急赴梧州至將軍額楚傅宏烈等現在討賊俟事平旋師日察議敕大將軍公圖海等議守肅州將軍侯張勇奏河套彛人噶爾旦雖有與默得里䝉古結姻之信但世為仇讐恐爭西海之地甘肅兵單而臣且前赴秦鞏儻兩相戰攻內地難保無事肅州當兩彛往來之衝宜增兵鎮守上諭大將軍公圖海等身在地方輕重緩急是所悉知應否調總兵官一貟暫往鎮守肅州與總督哈占及張勇公議酌行庚寅以陳華等為總兵官先是僞將軍杜輝遣僞參將林寧等奉書請降大將軍貝勒察尼等慰諭約期遣回至是詹事宜昌阿奏本月十六日僞巴將軍下總兵陳華李超率文武官辨兵丁家口投誠詢之續降人貟據稱是月十五日夜事泄吳應麒即潜拘同謀諸人十六日昧爽約杜輝議事伏兵執之訊至日中絞死僞總兵等數貟及輝之弟侄親丁皆被殺上諭陳華李超等感戴國恩與僞將軍杜輝共約歸順事泄杜輝被殺陳華李超等仍來投誠殊屬可嘉俱授為都督同知總兵官支全俸留大將軍貝勒軍俾招徠賊黨所屬官辨按原品支俸家口隨彼等所欲安插得所復諭兵部陳華李超外投誠官內擇語言明晰洞曉賊情者二人令隨詹事宜昌阿之筆帖式馬爾賽挈之馳驛來京命總督董衛國率兵赴嶽州先是董衛國奏遵㫖進𠞰廣信逆賊楊一豹江機等屢擊敗之斬獲無算隨招撫僞都督陳得名等上因命董衛國率兵往防銅鼓營至是衛國言銅鼓營見今寧靜無事增防逆賊盤踞嶽長臣願親領標兵五千更調江西各營官兵數千赴楚效力上諭總督董衛國以銅鼓營無虞願親率標兵赴楚效力可嘉宜如所請統所屬官兵馳赴嶽州多備火器挨牌鹿角攜往擇賢能官留守江西酌調本省兵接續前進其標下官兵勿令分撥他處聽自統全部以行敕大將軍貝勒察尼等固圍嶽州詹事宜昌阿奏見今賊糧已絶僞屬官兵相繼歸誠搜獲逆賊往來文書俱係調諸路逆賊援嶽之事今並賊書密咨兵部上諭逆賊食盡勢窮調取援兵大將軍貝勒等宜約㑹鎮守各要地將軍大臣嚴緝奸細俾賊內外音問不通固我營壘以禦來援之賊務期克取嶽州並􅊾趣江西總督董衛國速行馳往乙未趣尚之信帥師馳赴梧州將軍莽依圖奏臣􅊾大將軍平南親王尚之信親身率兵來援梧州之信報稱見赴湖南㑹勦正慮調取之兵不能即至更有何兵可遣臣思梧州乃廣東門户逆賊近屯榕樹灘如不遣之信來援則地方深為可慮上諭頃已有㫖命尚之信不必赴湖南今莽依圖既以梧州勢迫為言尚之信其親統官兵馳往梧州勦禦逆賊許大將軍公圖海來京陳事圖海奏臣年老欲密陳所見有不便具疏者今秦省諸要隘守禦已固省㑹備有援師臣欲輕騎赴京一覲天顔面奏事宜下議政王貝勒大臣集議議政王等奏軍機事宜主帥無親身來奏之例上諭圖海攜大將軍敕印前來烏丹仍佩其將軍印暫統大兵已而圖海來京密奏訖上面授機宜隨令馳還軍前平定三逆方略卷四十二

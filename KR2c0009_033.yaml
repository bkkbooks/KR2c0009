body:
  text: 欽定四庫全書平定三逆方略卷三十三康熙十六年十月乙巳命將軍巡撫傅宏烈募兵時宏烈遣將軍莽依圖書言宏烈僅以兵五千獨當西路恐力不能支請滿洲將軍一人率騎兵千餘來至粵西以壯聲勢莽依圖以聞上諭傅宏烈進定粵西獨當一路宜以重兵自隨聽宏烈如廣西經制兵額便宜召募汛守新復地方兼𠞰冦賊又將軍穆占見領兵赴廣東夾𠞰韶州賊俟穆占抵粵破賊之後與將軍莽依圖等㑹議作何分兵赴梧接應宏烈聽酌量以行丙午命大將軍簡親王喇布遣兵益將軍穆占軍穆占奏臣在袁州養馬二十五日即赴樂昌因赴樂昌故不留兵長沙悉以大兵隨行上諭將軍穆占仍遵前㫖速分兵每佐領四人赴安親王軍前和碩額駙華善兵已全往江西簡親王可於見駐南昌吉安兵或穆占所經地方兵內分每佐領三人益穆占軍韶州方有賊警穆占不得久駐袁州令養馬二十日即馳至樂昌簡親王仍駐江西調度兵馬𠞰滅韓大任諸賊戊申命送馬至將軍巡撫傅宏烈軍前宏烈奏臣標兵數萬皆無馬匹一遇寬廣之地賊騎而我步無以取勝祈按數給與上命總督董衛國撥協解江西馬一千匹俟路通之日委賢能官員解與總督金光祖轉送將軍巡撫傅宏烈軍前未幾又發江西馬一千匹送往甲寅命彚集續順公官兵家口駐潮州大將軍康親王傑書奏續順公為海冦執往臺灣其官兵家口散處無所屬上命續順公官兵家口彚為一處令駐潮州以副都統張夢吉宋文科等統之同將軍賴塔等協守地方其官兵俸餉令侍郎達都如舊撥給將軍莽依圖奏敗賊於蓮花山九月二十四日僞將軍胡國柱馬寶等率賊萬餘犯韶州渡河東至蓮花山薄江寧大兵營額楚等率兵拒戰莽依圖等自城中遣兵夾擊破其四營斬獲甚衆賊大敗遂奔回帽峯山命統領江寧兵額楚帥師赴梧州上諭議政王等曰今韶州路通宜速發官兵接應粵西可移檄將軍莽依圖等分滿兵每佐領三人付統領江寧兵額楚率赴梧州與將軍巡撫傅宏烈併力𠞰禦至兩廣兵餉及馬關係緊要宜速給發以慰軍心前所撥餉銀已至贑州今遣戶部員外郎莫洛馳驛赴贑隨都統勒貝兵而行以餉銀送往南雄到日令駐韶州將軍等遣兵迎取轉發兩廣其撥遣馬匹令江西督撫選賢能官押送總督金光祖軍前命總督金光祖等取南寧諸郡光祖奏臣已遣標下官兵二千進取梧州又遣二千赴韶州俟大兵擊敗韶賊之後臣即撤回官兵率赴髙州同總兵官祖澤清直取南寧等府上諭韶州賊已為我兵擊敗速行攻定廣西正在此時金光祖可撤回赴韶官兵同祖澤清進取南寧柳州諸處賞賚將軍穆占部下官兵穆占奏臣遵部檄分每佐領兵四人付副都統龔圖於本月初十日赴安親王軍前因部檄不言留緑旗兵與紅衣炮故臣盡率緑旗兵攜紅衣炮以往上諭穆占如期養馬畢即速行𠞰賊其所率緑旗官兵皆係秦楚勞瘁將士官員可各加一級兵丁支正項賞賚丙辰命都統勒貝領兵赴韶州將軍覺羅舒恕奏臣閲將軍巡撫傅宏烈來書云若得滿洲大兵駐守梧州即可親統士馬進定廣西今韶州賊為我擊敗機誠難得且南安有滿兵駐守平南親王官兵復守南雄宜及此機㑹令都統勒貝率所部赴韶州協𠞰逆賊如此茍宏烈請兵亦可便宜策應上諭頃令統領江寧兵額楚率滿洲大兵已往援宏烈勒貝兵不必發往廣西但韶州所關甚要儻韶州賊尚未敗遁令勒貝星馳赴韶同將軍莽依圖等協力速滅逆冦辛酉命公溫齊以提督周卜世兵同赴荆州上諭兵部據山西提督周卜世疏稱所部兵千餘人至河南府譁譟僅能撫定爾部速檄公溫齊令其進發之時由河南府挾周卜世兵同赴荆州密為之防乙丑將軍莽依圖奏韶州賊遁逆賊胡國柱等為我兵擊敗震懾喪氣於九月二十八日棄帽峯山潛遁莽依圖等即分兵數道躡擊過樂昌遂復仁化縣命副都統額赫訥領兵赴梧州將軍莽依圖奏言今韶州無警將軍巡撫傅宏烈兵力單薄若無滿兵難以進勦故每佐領兵三名有半付副都統額赫訥率往協𠞰上奬諭之曰逆賊犯韶將軍莽依圖同額楚夾𠞰既大敗賊衆復行追擊仁化諸縣指顧悉平可為智勇兼擅凡為將帥者統率重兵殱滅賊冦底定疆圉不必一一候從中調度惟應機適變斯乃盡心報效期副委任之至誠也莽依圖當逆賊甫遁即遣副都統額赫訥等往援傅宏烈深可嘉尚頃已令統領江寧兵額楚赴梧州今既遣額赫訥行即令額赫訥毋稽留肇慶疾赴梧州與傅宏烈同定廣西額楚赫勒布仍留莽依圖軍前命尚之信發兵赴梧州上諭議政王等曰將軍莽依圖等所遣大兵尚屬單弱今粵東已定潮州韶州等處亦復無警可令平南王尚之信多選部下官兵付都統尚之瑛或總兵官王國棟帥赴梧州隨滿洲大兵接應將軍巡撫傅宏烈同定廣西戊辰命將軍莽依圖帥師定廣西莽依圖奏臣欲親提大兵進取廣西廣西既定乘勝即取衡湘但此行務期窮賊根株不得不厚集兵力以往請不拘何地就近分兵以益臣軍俾不誤進勦上諭見在韶州莽依圖部下兵每佐領七人外又增統領江寧兵額楚署副都統赫勒布兵每佐領三人近都統勒貝又率每佐領兵二人前往兵數已增於前莽依圖可留勒貝額楚守韶州親統大兵速赴梧州同將軍巡撫傅宏烈平定廣西廣西既定或進取湖南衡湘諸處或徑取貴州斷賊後路聽便宜從事壬申命叙福建軍功上諭兵部康親王既定閩疆應遣官賞賚其隨征官兵亦均有勤勞軍功即與議叙平定三逆方略卷三十三

body:
  text: 欽定四庫全書平定三逆方畧卷一恭惟皇上御極以來政教覃敷恩澤翔洽薄海内外罔不率俾方偃戈衅甲以文徳懐柔四方煦嫗生息休養萬姓兼容并覆銷弭孽芽時二三藩臣乆分閫於外便蕃錫予異數有加慮或怙寵而驕盈深欲保全其終始因其乞骸之陳請爰有勞還之簡書處其田廬豐其廪餼道里芻秣之費悉戒於有司俾歸故鄉長享茀祿生民無饋餉之艱士卒無逺戍之苦如天之福甚深甚厚乃滇逆吳三桂背恩反叛閩逆耿精忠粤逆尚之信相繼煽惑生民荼毒奄及八年當是時兇渠陸梁鴟張豕突醜類蔓延蜂結蟻聚仰荷天威赫濯六師四征戰守機宜悉從指授三方竊踞次第削平三桂窮蹙首伏㝠殛精忠之信既降復謀叛先後皆伏誅獨三桂孽孫世璠猶困守一隅逋誅逆命至康熙二十年冬十月大兵平雲南世璠授首十一月露布至京師上命宣㨗午門擇日告郊廟社稷躬謁列祖山陵念中外軍民勞苦徳音誕敷鴻恩湛被諸王貝勒大臣暨外藩王等咸謂功徳隆盛恭請上尊號皇上謙讓至於冄三未之聽許御史臣戴王縉因疏言皇上布昭聖武削平禍亂宵旰經營永清大定耿光盛烈曠古罕有請彚纂成書昭示無極疏入下内閣翰林院集議以聞禮部尚書武英殿大學士臣覺羅勒徳洪等謹議臣聞歴代紀載功烈俱有成書迄今可攷者唐興元間有紀功述元和間有平蔡錄平淮記㑹昌間有伐叛記宋建隆間有龍飛日厯天禧間有聖政記熙寧間有經武要略明洪武間將征伐次第彚為日厯蔵之金匱彼或借箸臣下不皆獨斷之功亦或蠢兹小醜有如摧枯之易猶揭之簡䇿炳耀可觀豈若我皇上神機獨運掃除大憝廸屢弗靖多方之衆降滅無遺孽告厥成功八載之間纎毫無遺算師不宿老方内乂安至仁大勇巍巍超越前代文之一怒武之七徳罔不攸兼於兹兹事體大顧闕而不書雖聖徳髙深而不自居覲揚於方將者或無以得其詳且何以使萬世之為亂臣賊子者懼御史臣言良是臣等昧死以聞制曰可於是宣付史館歴次用兵以来平定方略自康熙癸丑十二年三月始訖於辛酉二十年康熙十二年三月壬午平南王尚可喜疏請撤兵可喜世籍遼東明時為廣鹿島副將天聰八年航海來歸太宗皇帝招徠逺人不吝爵賞遂擢為總兵官崇徳元年封智順王順治六年改封平南王率所部兵從大兵下廣東因駐廣州凡二十餘年頗能戢兵御衆奉職維謹子之信素桀驁動違禮法可喜初遣入侍繼慮其觸冒法網奏請還鎮乃之信暴横日甚招納奸宄布為爪牙罔利恣行官民怨讟性嗜酒醉輒殺人常於其父前持刄相擬所為益不法至是可喜引年乞骸骨疏言臣自奉命鎮粤以來家口日蕃順治十二年曽具疏請解兵柄部臣以地方未寧俟後議方今四海昇平臣年已七十精力就衰正退耕隴畆之日伏念太宗皇帝時曽賜臣以遼東海州及清陽堡等處地今乞准臣仍歸遼東安插故土以資養贍計帶兩佐領甲兵及老穉閒丁約二萬四千有竒沿途夫船口糧請並議撥給疏入上嘉其意報曰王自航海歸誠克殫忠藎行間戮力平定地方効力累朝功績茂著綏戢東粤鎮守巖疆宣勞嵗乆覽奏年已七十欲歸遼東耕種情詞懇切具見恭謹能知大體朕心深為嘉恱今廣東已經底定王下官兵家口作何遷移安挿戸兵二部㑹同確議以聞部議東粤既寧應如可喜請於十五佐領内止以兩佐領官兵家口遷居遼東但尚之信統兵留鎮父子暌違且藩下將士皆昔與王共甘苦兩地離析亦非所宜全撤之便疏下議政王貝勒大臣集議議與部臣同詔從之兵部因言平南藩下綠旗官兵計六千有餘應仍留廣州令廣東提督臣統轄其一切夫馬舟楫俟開具人口馬匹確數及就道有期即遣官撥給報可七月庚午吳三桂疏請撤兵三桂山海衛人父襄為明督理京營總兵三桂以父廕為邉將歴封平西伯鎮山海關流賊陷京城三桂按兵不動襄降賊以書招之三桂行至寳邸聞賊據其愛妾輒忿恨旋山海闗宻請我師時和碩睿親王多爾衮西伐師次翁後三桂迎降命封為平西王隨大兵入闗追𠞰流賊順治五年同將軍李國翰等至漢中駐鎮其地及全蜀既定隨大兵平雲南尋進𬗟甸叙功封平西親王遂留鎮滇後奏請文武官弁乞自選置既得請益驕蹇縱恣陵轢命吏輒布其所私䁥於要地不為用者必阨之去治府第起園囿僣侈無等括明黔國公沐民莊田悉為已有誑稱水西土司反叛請攻滅之陽居拓地之切而隂擅其利諸水陸衝要徧置私人𣙜歛市貨因潜購硝黄諸禁物又詭稱䝉古侵中甸邉境要挾軍需以示額餉必不可減且日練士卒利器械隂蓄異志其舊部將則陕西提督王輔臣貴州提督李本深四川總兵吳之茂雲南總兵馬寳等時資給之倚為心腹及可喜乞歸奏允三桂不自安乃具疏請撤上仍以温㫖答之曰王自歸誠以來克殫精忠戮力行間功績茂著鎮守巖疆宣勞嵗乆覽奏請撤兵安插恭謹可嘉今雲南已經底定王下官兵家口作何遷移安插户兵二部確議以聞部議三桂及所部五十三佐領官兵家口應俱遷移疏下議政王貝勒大臣集議一議吳三桂鎮守巖疆宣勞嵗乆戮力行間平定雲南今三桂既奏請撤兵安插應將三桂并所屬官兵家口俱行遷移至於雲南有土司苖蠻雜居且控禦西陲尤屬要地宜遣滿洲官兵四千鎮守俟駐防官兵到日三桂啟行一議三桂鎮守雲南以來地方寧謐若令三桂遷移必須遣兵鎮守兵馬往來驛遞人民定致苦累且土司苖蠻雜居其地若撥滿洲官兵四千鎮守則力薄多遣則京城兵力又減應不必令滿洲兵丁駐防仍令三桂鎮守雲南為便奉㫖著議政王貝勒大臣九卿科道㑹同確議畫一具奏諸王以下所見不一仍兩議上一議往以雲南地方未定故令各省協濟兵餉使吳三桂等鎮守今地方底定仍令各省協濟使其鎮守非永乆之計三桂久鎮巖疆戮力行間勞苦又具題請撤安插應將三桂併所屬官兵家口均行遷移若遣滿兵永行駐劄路逺人衆難以遣發若不遣兵三桂遷移之時恐盗賊竊起應暫遣兵戌守俟戍守官兵到日三桂啟行一議吳三桂乆鎮雲南地方寧謐今若将三桂遷移不得不遣兵戍守雲南有土司苖蠻雜居若少遣兵則力薄多遣則京城兵減且戍兵往来暨三桂遷移沿途驛遞人民並皆苦累又戌守之兵係暫時屯駐騷擾地方殆未可定相應仍令三桂鎮守雲南可也奉㫖吳三桂請撤安插所奏情詞懇切著率領所屬官兵家口俱行搬移前來其滿洲官兵不必遣發該藩起行如有用滿洲之處該藩奏請時冄行遣發於是兵部言三桂所屬綠旗援勦左右前後四鎮官兵萬二千人應仍留武定曲靖楚雄等府令督提臣統轄報可丙子耿精忠疏請撤兵精忠祖仲明遼東人明時為登州㕘将天聰二年航海來歸崇徳元年封懐順王順治六年改封靖南王偕尚可喜隨大兵下廣東道卒子繼茂襲封駐廣州後移駐福建康熙十年繼茂卒精忠襲封王爵輒縱其下為奸利奪農商之業潛引海外私販肆行無忌大為閩人害又廣集不軌之徒轉相煽惑及聞可喜奏允亦不得已疏請撤兵得㫖王祖父以来世殫忠藎戮力行間勞績茂著及王襲封鎮守勞在巖疆覽奏請撤安插恭謹可嘉今福建已經厎定王下官兵家口作何遷移安插户兵二部確議以聞部議精忠及標下十五佐領官兵家口悉應遷移復下議政王貝勒大臣集議議與部臣同詔從之兵部又言精忠所屬綠旗官兵七千餘人俱令福建督提臣統轄報可臣謹按三桂等之初歸也或以私心被禍勢急無聊或以海島孤窮志切攀附我國家廣示招徠曲加撫納以覊旅異姓之臣授以顯爵示用人之無方俾領其衆以屬戎行雖有微勞凡啟疆闢土實惟我熊羆不二心之臣統率禁旅以徂征於四方宣猷建績彼實無預屬邉陲甫靖使各留鎮撫其地自分鎮以後志漸盈滿罔利漁民我皇上逺覽前史深鏡歴代藩鎮之害念若屬久握兵柄分駐巖疆殊為未便因其先後乞還遂賜俞允惟時廷議紛出我皇上不徇目前姑息之計収藩臣偏重之權聖謨宏逺矣八月壬子命禮部侍郎哲勒肯等赴雲南户部尚書梁清標等赴廣東吏部侍郎陳一炳等赴福建先是上諭兵部邇因四方底定三藩各具疏請撤已允所請地方應行事務及兵馬機冝必籌畫周詳乃為善後之䇿應各遣大臣前往㑹同該藩及總督巡撫提督商搉作何布置官兵防守地方並料理該藩等起行應遣官員列名具奏兵部尋具諸大臣名以請於是命哲勒肯等各齎敕諭以行御書賜吳三桂敕曰自古帝王平定天下式賴師武臣力及海宇寧謐必振旅班師休息士卒俾封疆重臣優㳺頥養賞延奕世寵固河山甚盛典也王夙篤忠貞克攄猷畧宣勞戮力鎮守巖疆釋朕南顧之憂厥功懋焉但念王年齒已髙師徒暴露乆駐遐荒眷懐良切近以地方厎定允王所請搬移安插兹特遣禮部侍郎哲勒肯等前往宣諭朕意王其率所屬官兵趣裝北来慰朕眷注庶㡬旦夕覯止君臣偕樂永保無疆之休至一應安插事宜已勅所司飭庀周詳王到日即有寧宇無以為念欽哉賜尚可喜耿精忠敕畧同九月丁卯朔命陜西總督鄂善總督雲南軍務寧夏總兵官桑額提督雲南軍務先是上諭吏兵二部雲南逺疆該藩官兵既撤控制須人當特設總督一員添設提督一員責成専管可速議以聞議上故有是命鄂善等未抵任後因三桂反道梗不得前改桑額為湖廣提督鄂善暫留湖廣軍前命豫給三藩官兵俸餉先是上諭戸部三藩既撤其官兵家口安插地方並所需房屋田土等項俱應預期料理務令到日即有寧居以副朕體恤之意至是又允戸部議三藩官兵家口起行之前預給俸餉六月其沿途夫船芻栗之屬仍俟報明撥給十一月丙戍吳三桂反殺雲南廵撫朱國治三桂素蓄異志陽請撤兵既報可與其黨日夜謀益急踪跡甚秘數遷行期哲勒肯等既至趣之上道三桂慮謀久事泄遂於是月二十一日勒兵反執國治殺之哲勒肯等被留先是兵部郎中黨務禮戸部員外郎薩穆哈及户部郎中席蘭泰兵部主事辛珠同至貴州為三桂夫船芻糗備及三桂反黨務禮等聞之遂馳出貴陽赴京上變李本深以貴州叛從賊雲貴總督甘文焜自殺三桂既反偽稱天下都招討兵馬大元帥以明年甲寅為周王元年貴州提督李本深叛應之主事辛珠不及行與筆帖式薩爾圖俱不屈死文焜聞變倉猝出貴陽将十餘騎自隨日行數驛十二月初八日至鎮逺府鎮逺縣守將已應賊率兵圍之文焜度不免手刃其子遂自刎筆帖式雅圖華善亦自殺先是文焜與貴州巡撫曹申吉以三桂反及本深從逆狀手書宻報川湖總督蔡毓榮毓榮調沅州總兵官崔世榮等疾赴貴州守禦令彜陵總兵官徐治都永州總兵官李芝蘭各率兵繼進更慮楚省兵單復檄南汝總兵官周邦寧赴楚應援及文焜死申吉降於賊賊兵遂逼鎮逺漸入楚境毓榮尋具以状聞十二月郎中李中黨務禮等還自貴州命議政王貝勒大臣議出師㑹議撥前鋒㕘領前鋒侍衛前鋒兵各一半毎旗䕶軍㕘領五員䕶軍校尉㕘領九員毎㕘領䕶軍校各一員每佐領䕶軍七名滿洲䝉古毎旗驍騎㕘領一員毎㕘領署㕘領一員散官二員驍騎校一員每佐領撥什庫二名及兵共十名漢軍毎旗㕘領一員毎㕘領署㕘領一員散官驍林校各一員每佐領撥什庫一名及兵共五名議入允行臣謹按成周之法伍兩卒旅之衆寓於比閭族黨之間為之長者則為之帥閒暇不忘講武一旦有事即可從戎後世惟唐之府兵得其遺意我朝禁旅萃於八旗適符古法兵皆天子之親軍而將皆腹心股肱𤓰牙訓習有素部勒嚴明無事則兵歸於伍將歸於朝有發則将皆夙儲兵已素練無簡稽召募之勞故三桂反書朝聞而調遣夕辦民方苦于塗炭望若雲霓而我師之馳驅㨗於風雨賊欲掩我之不備我則疾出其不意以制之詩曰王旅嘽嘽如飛如翰此之謂也詔停撤閩粤二藩召梁清標陳一炳等還丁巳命孫延齡為将軍以線國安為都統延齡孔有徳婿也有徳為明登州㕘将以天聰七年航海来歸尋賜都元帥敇印崇徳元年進封恭順王順治六年改封定南王率師下廣西後歿於軍無子有女四貞歸延齡延齡以有徳功為廣西将軍掌理定南王軍事延齡起家素微庸劣無行能懾四貞威不敢抗藩下將士易之又時擅殺人犯法都統王永年發其罪状命大臣往鞫得實遂罷職及三桂反上以廣西境隣貴州且重念有徳舊勞特授延齡撫蠻將軍令統兵固守又以國安為都統以其素忠鯁得軍心故也調西安将軍瓦爾喀進四川上諭瓦爾喀曰四川與滇接壤今雲南已反爾可率副都統一員悉領騎士選撥将領星馳赴蜀凡自滇入川險要之地俱行堅守大兵不日進勦雲南俟我師臨境賊勢漸分儻有可乘之機爾即與提督相機進討至西安等處朕當刻期遣發禁旅前来駐防臣謹按巴蜀乃滇黔之門户逆賊豈無窺伺之心顧尚有所未暇使我師扼蜀之險要進可以取滇退可以守豈獨賊咋死不得入而湖南之渠逆亦且狐疑狼狽徘徊前却盖廟筭深矣不意諸將師行少緩蜀變旋作闗隴弗靖致煩天討益服睿智之先見也己未命多羅順承郡王勒爾錦為寧南靖㓂大将軍帥師討吳三桂先是議出師時上命勒爾錦為帥多羅貝勒察尼都統覺羅珠滿鄂鼐伯伊里布覺羅巴爾布䕶軍統領伊勒都齊額司泰前鋒統領碩岱㕘贊軍務并都統范逹禮王國詔副都統路什巴圖魯託岱穆舒渾希福阿進泰肯齊赫蘇祐濟根特祖澤純宜思孝柯彛趙賴等同往是日上命給勒爾錦寧南靖㓂大将軍印總統諸將賜大將軍王暨貝勒大臣等袍服貂裘白金馬匹甲胄有差出征將士及匠役等各加倍賞銀以示優恤庚申李株等謀叛伏誅株等皆楊起隆黨也先是起隆詐稱朱三太子與株等隂相煽結謀不軌奸民多為所惑鑲黄旗監生郎廷樞家僕亦預焉事覺廷樞急赴公朝告變遣官兵捕治次第就縛惟起隆脫走事下法司訊據稱徒黨甚夥額皆裹白布身束紅帶為號約嵗餘於内城舉事㑹先發謀遂阻李株等相繼被獲至數百餘人法司以聞上命勘情罪甚者論如律其餘從寛原釋於是法司將李株等二百餘人咸論如謀反律寸磔其祖父子孫兄弟及同居暨伯叔父兄弟之子皆斬籍其家獄具上曰隂倡大逆由李株等九人可論如律蔡文等一百九十四人改斬至各犯親屬理宜按律収論但株累過多朕心不忍㮣從寛宥人口家産俱免入官臣謹按當法司㑹訊時賊黨口稱謀叛姓名約有千人上㮣置弗問神畿重地么麽蓄禍自于大戮而曲原汚染咸與維新不嗜殺之仁洵卓越往古矣命副都統瑪哈逹領兵駐兖州科爾崑領兵駐太原上諭議政王等大兵進攻楚蜀若須援兵自京遣發難以驟至且致士馬疲勞兖州地近江南江西湖廣太原地近陕西四川均屬東西孔道茍發兵駐防秣馬以待所在有警便即時調遣可令副都統瑪哈達駐兖州科爾崑駐太原臣謹按兵事莫善於佚而莫殆於勞廟筭深逺命將四出以次相繼酌道里之均為濟師之法緩則駐牧警即遞進自時厥後調遣不絶前者甫往後者復来師不宿老不疲勞應援若神所向有功以至於大定多藉於此葢數千里之間運之若臂指而通之若呼吸自古出師次第之方未有善於此也辛酉命直省巡撫仍管兵直省各巡撫將副㕘以下武職照舊管轄有總督省分巡撫仍聽總督節制復設撫標左右二營官兵壬戌詔削奪吳三桂官爵宣諭雲貴軍民敕諭雲貴地方文武官員軍民人等曰逆賊吳三桂窮蹙来歸我世祖章皇帝念其輸欵投誠授之軍旅錫封王爵盟勒山河其所屬將弁崇階世職恩賚有加開閫滇南傾心倚任迨及朕躬特隆異數晉爵親王重寄千城實托心膂殊恩優禮振古所無詎意三桂性類窮竒中懐狙詐寵極生驕隂圖不軌於本年七月内自請搬移朕以三桂出於誠心且念其年齒衰邁師徒逺戍已久遂允奏請令其休息仍敕所司安插周至務俾得所又特遣大臣前往宣諭朕懐朕之待三桂可謂禮隆情至蔑以加矣近覽川湖總督蔡毓榮等疏稱三桂徑行反叛背累朝豢養之恩逞一旦鴟張之勢横肆兇逆塗炭生靈理法難容神人共憤令削其官爵特遣寧南靖㓂大將軍統領禁旅前往撲滅兵威所至刻期蕩平但念地方官民人等身在賊境或心存忠義不能自拔或被賊驅迫懐疑畏罪大兵一到玉石莫分朕心深為不忍爰頒敕㫖通行曉諭爾等各宜安分自保無聽誘脅即或悞從賊黨但能悔罪歸誠悉赦已往不復究治至爾等父兄子弟親族人等見在直省出仕居住者已有諭㫖俱令各安職業並不株連爾等毋懐疑慮其有能擒斬三桂頭獻軍前者即以其爵爵之有能誅縳其下渠魁及以兵馬城池歸命自効者論功從優叙錄朕不食言爾等皆朕之赤子忠孝天性人孰無之從逆從順吉凶判然各宜審度勿貽後悔地方官即廣為宣布遵行先是諭吏兵二部今吳三桂背恩反叛伊所屬文武人員有在直省居官吏閒住者或心懐疑畏致罹法網有負朕撫育好生之意伊等雖有父兄子弟現在雲南亦不株連自今以後伊等非復三桂所屬之人俱是朕之官民務使安心盡職毋滋顧慮爾部即通行曉諭又諭陜西總督哈占提督張勇王輔臣等逆賊吳三桂儻有偽劄偽書潜行煽惑當曉諭官兵百姓令其舉首上聞爾等皆朕擢任股肱之臣扞禦邉境綏輯軍民惟爾等是賴其悉知朕意命都統赫業為安西將軍帥師同將軍瓦爾喀等由漢中入蜀䕶軍統領瑚里布為副將軍偕署前鋒統領穆占副都統延布率領官兵同往癸亥遣前鋒統領碩岱率前鋒兵先赴荆州上諭議政王等逆賊必犯湖南可先遣前鋒統領碩岱領前鋒兵兼程馳赴荆州固軍民之心并進據常徳以遏賊勢申明出師紀律時上覽兵部出師禁例謂立法尚寛冄加嚴飭因諭兵部曰遣發大兵原為掃靖叛逆以安百姓凡兵丁厮役於所在地方恐有恃強掠民財物拆人廬舎壊人器具汚人婦女擾害生民及損壊運河閘板樁木統兵主帥各宜體朕為民除叛用兵之意申明紀律嚴加鈐束儻有違禁妄行從重治罪著即速行曉示甲子外藩察哈爾和碩親王布爾尼等請率所部從討賊命回聽調遣布爾尼及巴林部落多羅郡王鄂齊爾科爾沁部落多羅冰圖郡王額濟音敖漢部落多羅郡王扎木素扎嚕特部落多羅貝勒扎木等来朝元旦㑹聞吳三桂反争請獻所攜馬匹助軍復有願率所部兵隨大兵進討者上諭之曰吳三桂本為流㓂所迫勢窮来歸之人朕推置心腹委以重任累進親王子為額駙恩養至此尚行反叛負國已極今已遣大兵進勦三桂雖反亦将安往朕與爾等俱同一體如有需用爾等之處可俟春回草青時冄聽調遣平定三逆方畧巻一

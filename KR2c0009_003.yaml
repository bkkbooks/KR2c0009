body:
  text: 欽定四庫全書平定三逆方略卷三康熙十三年二月乙未朔宣諭長沙官吏時賊勢逼近湖南長沙人心搖惑上命吏兵二部傳諭長沙諸處文武各官逆賊吳三桂虛聲恫喝以致巡撫盧震棄地濳逃已行拏究湖南文武各官仍能保乂百姓固守地方允稱盡職事平之日從優加恩護軍統領伊勒都齊兵抵荆州丙申護軍統領額司泰兵抵荆州戊戍命給王輔臣世職輔臣本秦人少年無賴從姜瓖為部將同瓖反王師逼大同殺瓖來降𨽻於英王後沒入正白旗下世祖皇帝聞其壯健留為侍衛經略洪承疇往湖南令從征所在多戰功授總兵官尋由援𠞰總兵官升陜西提督是時遣其子繼禎至京首逆劄因命給三等精竒尼哈畨併授其子繼禎為四品京官庚子都統覺羅巴爾布兵抵荆州甲辰將軍席卜臣帥師之西安乙巳諭都統覺羅巴爾布守常德覺羅珠滿守長沙上諭巴爾布及護軍統領伊勒都齊額司泰前鋒統領碩岱等常德為水陸衝要之區不可不預加防守大將軍兵未至之先宜令護軍統領一員率每佐領護軍一名同碩岱率前鋒兵盡移赴常德謹守地方巴爾布并所留護軍統領率兵暫駐荆州俟大將軍兵到後即進守常德如巴爾布至常德其先往常德之護軍統領可即移鎮長沙與都統珠滿合兵俱聽王指揮朕遙度兵勢似宜如此爾等身在地方倘勢有難行仍當相機調度不必固執慮違朕命義諭珠滿及副都統阿進泰肯齊赫等前諭爾等統兵鎮守武昌嶽州兹念長沙乃武昌咽喉之地又為武岡寶慶州郡水陸要途且壤連粵西爾等若進駐長沙既兼防水陸之衝更可壯粵西之勢俟大將軍兵抵荆當即遣護軍統領一員往助爾等協同防禦爾等啓行之日可即聞之巴爾布等並移檄廣西將軍提撫諸臣言我兵已抵長沙保固湖南爾等當各守疆土朕遙度兵勢似宜如此至軍中情形或有難行仍當相機調度不必固執慮違朕命是日諭兵部逆賊吳三桂反叛聞警之初即調總兵官徐治都守常德旋復撤回彛陵徐治都能久捍危疆可嘉事平之日及所屬將辨該部一併議叙其標下兵丁扼守要地往來奔馳殊為勞苦著總督蔡育榮酌量加恩賞賚臣謹按常德長沙扼湖湘之險當水陸之衝堅守以挫賊則全楚之勢俱在我矣聖謨區畫瞭若指掌茍是時守臣能戮力固守以待大兵旦夕之至而巴爾珠滿等受命疾驅以赴其急援兵集而人心固賊雖䦨出沅州而前有堅城頓兵疲敝進退狼狽旋必潰亡祇由盧震先奔楊遇明內叛人心已搖而兩將之援軍復逡巡而不進二郡坐失而嶽州尋亦陷宿師幾年然後收復於此益服宸衷先事之謀扼要制勝詳密而深固也丁未命將軍尼雅翰帥師赴武昌初原任廣東提督楊遇明素與三桂有舊以老乞休攜家寓常德其子寶應任雲南知府及三桂反授寶應為僞總兵以兵犯常德遇明內應知府翁應兆從之常德遂潰總兵蔡育榮以聞上隨諭前往安慶將軍尼雅翰於所領兵內簡選壯騎並前調江寧京口副都統二員兵二千名一併前赴武昌長沙等處與都統珠滿㑹商而行兵馬各自統轄尼雅翰仍帶將軍印餘兵令副都統席布領之仍駐安慶以待護軍到日牧養馬匹其京口副都統所領船艘令尼雅翰酌量帶往武昌席布所領護軍驍騎亦量留與船艘臣謹按先是預遣重兵雲集安慶據上游之勢扼長江之險故雖武昌兵單湖南震動而安慶之師朝奉調發可以夕赴無鞭長不及之慮無逺征勞頓之苦且在金陵者旦夕可以移鎮安慶在兖州者旦夕可以移鎮金陵數千里之間星羅碁布于以見廟謨之深逺焉己酉都統覺羅珠滿兵抵武昌尋湖廣巡撫張朝珍疏至言常德水陸四衝為我兵必爭之地今荆州已宿重兵嶽州尤當固守庶可兼顧長沙以通粵西聲息義可捍蔽省㑹以壯長江上遊更可與荆澧犄角為進逼常德之勢宜急措置以固要地上以都統珠滿頃遣往長沙今既抵武昌又調將軍尼雅翰領兵繼往㑹商機宜如尼雅翰未至聽珠滿于嶽長二府擇要固守壬子總督蔡育榮奏提桑額等領兵回荆州育榮奏本月初八日吳三桂兵至澧州方渡河澧州城守官兵以城叛應賊提臣桑額鎮臣周邦寧自常德還至州城外孤軍不能迎敵不得不退回荆州乞大兵星馳𠞰禦甲寅命都統覺羅巴爾布進兵湖南當澧州未叛時巴爾布奏稱臣與護軍統領伊勒都齊額司泰前鋒統領碩岱率兵以次抵荆州探聞賊陷沅辰常德繼叛四川全省又變提督桑額尚在澧州屢請大兵救援臣等隨發前鋒護軍二百人赴澧駐防今不難進取常德但恐既得之後守城則乏芻糧守江又無舟楫況聞川賊將犯荆州若兩地兵分則勢力亦分雖取常德終屬無濟故臣等㑹議暫駐荆州牧馬俟大將軍王到日舉師齊進至是總督蔡育榮奏稱長沙副將黃正卿參將陳武衡以城叛降賊上諭大將軍順承郡王勒爾錦前都統巴爾布護軍統領伊勒都齊額司泰等率兵已于二月初旬早抵荆州是時常德澧州尚未有變理應稍休馬力速赴常澧以戢兵民乃遲久不前以致常澧相繼皆陷近聞長沙亦有變可俟都統鄂鼐等兵至荆州令其鎮守荆彛諸處即令巴爾布等進兵攻取常澧以定兵民之心其鄂鼐所領漢軍併趨赴荆州又襄陽為我師來往之衝蜀寇必窺之地在王軍前漢軍都統副都統可酌率漢軍官兵留鎮襄陽先是上諭勒爾錦近聞常德已叛四川䕫州所在賊氛甚熾都統巴爾布兵力雖盛倘須兩路堵𠞰更宜增兵王可于所率驍騎內㨂擇肥馬每佐領撥二三人每翼以副都統一員領之速赴荆州巴爾布軍前若不得肥馬難于前進聽王酌量以行乙卯宣諭廣西將帥上諭廣西將帥孫延齡都統線國安巡撫馬雄鎮提督馬雄等保固粵西實爾等是賴今大師已抵武昌倘賊犯武岡寶慶長沙諸處爾等率所部官兵追𠞰其後大兵迎擊于前量此逆醜自可尅期撲滅以朕遙度自宜如此爾等身在地方必有確見宜同心協力謀定後舉以赴朕倚任至意事平之日自將帥以至卒伍皆當不吝重賞凡有機密軍情可啓寧南靖寇大將軍及武昌所在各將軍都統軍前彼處如有軍機亦令與爾等知之己未大將軍順承郡王勒爾錦奏分官兵防守襄陽勒爾錦奏稱臣等行至彰德據護軍統領伊勒都齊等報稱常德已反賊兵自蜀道直抵巴東臣恐襄陽危急隨令都統鄂鼐并每翼兩副都統率每佐領驍騎三人漢軍二人馳赴襄陽防守及接上諭即令鄂鼐速至襄陽偵探鄖陽一路情形如鄖陽無警即令兩副都統率每佐領驍騎二人徑往荆州都統巴爾布軍前疏入上乂諭勒爾錦曰襄陽總兵官楊來嘉向自海上投誠其才甚庸所屬官兵率皆藐玩將來慮有他故可將漢軍官兵留鎮襄陽即以此意密諭之但不必防間過甚恐致漏泄以速其變庚申申諭大將軍等嚴禁兵士侵擾百姓上諭兵部前大將軍王貝勒將軍大臣等出師之時曽經面諭凡大兵所到地方毋得苦纍百姓肆行搶掠侵及婦女各令嚴加禁飭諄諄告戒不啻再三近恐無知之徒不遵紀律擾害良民其速行順承郡王貝勒及各路將軍大臣等凡經過處所兵丁厮役不得私離營伍致犯民間秋毫有違禁者統兵主帥即行從重治罪并移檄各督撫凡出兵之地或有此等擾民者聽指名參奏若兵主以及將領不加嚴束以致妄行騷擾該督撫知而不參事發得實將兵主將領即行議處并治該督撫以瞻狥之罪應各令督撫刋示廣行傳諭臣謹按前者出師之始上之申明紀律已加嚴矣至是曽無幾時復諄切戒諭蓋愛民之心無刻而不惓惓也至懲將帥以故縱之罰豫督撫以參奏之權申之大法以曲用其仁心可謂至矣厥後禁兵之調發相屬必警之以民生之不易軍行之或不戒欲俾無犯秋毫所過如時雨蓋皇上之心如天地之澤物風露雷霆而生機未嘗一日不流行也如父母之愛子噢咻長養而疾痛慘怛未嘗一日不在已也毋論良民皆吾赤子固聞聲而感泣即其陷賊中者不能自拔皆延頸企踵以望王師故永清大定若易然也格天心孚民望實本於皇上愛民之一心矣命都統覺羅珠滿守嶽州上諭珠滿一等侍衛畢桑阿來奏爾稱馬匹稍肥即往嶽州防守甚善嶽州乃水陸衝要之地宜亟固守今將軍尼雅翰等率領沙船水陸兼行以備應援爾等前往嶽州並趣尼雅翰等速行又諭都統覺羅巴爾布畢桑阿來奏爾等曽言嶽州參將難于信任且兵力單弱請遣提督桑額總兵官周邦寧往嶽州防守今度桑額周邦寧前去已遲可將偏沅巡撫韓世琦軍前逰擊哈什庫即充嶽州參將選緑旗兵速往嶽州臣謹按湖南初警皇上即命將率師防守嶽州蓋嶽州據洞庭之險若賊竊踞以為巢穴難于驟克且平湖巨浸舟楫易通賊踞嶽州則武昌亟資防禦所以逆寇稽誅數載由諸將畏縮嶽州失守之故也皇上固己洞悉之于始及後趣兵進攻已入洞庭諸將猶以風濤險惡請暫退師詔㫖嚴切不許却尺寸逮至收復嶽州捷書一聞而師行遂有破竹之勢六年逋寇不數月而剃獮殆盡益知形便之地為兵家所必爭聖明先事之防與善後之圖即遙度而皆如親歷固非諸將所能窺萬一也辛酉命刑部尚書莫洛經略陜西上諭吏兵二部陜西邊陲要地西控畨回南通巴蜀幅員遼濶素號巖疆兹逆賊吳三桂煽亂滇黔四川從逆秦省地處鄰封恐有奸徒搖惑以致人心不寧雖有督撫提鎮等官各盡乃職但軍務繁重必須專遣大臣假以便宜相機行事方可綏靖中外保固邊疆刑部尚書莫洛前任秦督深得軍民之心諳曉地方情形兹特授為經略率領滿兵駐西安與將軍總督㑹同措置巡撫提鎮以下悉聽節制兵馬糧餉悉聽調發一切應行事宜不從中制文武各官聽其選用吏兵二部不得掣肘鄰省用兵當應援者酌量策應如有軍機將軍總督領兵以行俟湖廣四川地方底定即命還朝應兼職銜及應給敕印爾二部㑹同速議具奏及議上命加莫洛武英殿大學士仍以刑部尚書管兵部尚書事兼都察院右副都御史賜之敕印宣諭直省人民上諭戶兵二部逆賊吳三桂心若虺蛇行同梟獍負恩謀叛倡亂害民當明季闖寇入京三桂勢窮來歸我世祖章皇帝念其投順優待有加寵以王爵託以腹心嗣大兵克復黔滇巖疆初定令其移駐防禦畀以事權及朕即位以來推誠益至題授兩省官職聽其選擇給養家口兵丁嵗費不資且欲其感恩知報特加親王人臣之分已極委任之專無比乃去年伊自具疏求歸故土朕憫其久在邊逺勞於戎事年已衰殘欲令其父子祖孫得以完聚准與遷移遂其所請復為之區畫房地資給行糧眷念體恤委曲周至詎意包藏禍心久蓄不軌陽報起程日期遽乃擁衆倡叛蹂躪百姓竊踞城池散布僞劄妄為聲勢以致鄰近州縣無知之徒被其煽惑又復假造訛言濳行傳布以冀搖動愚民種種狡謀悖天蔑理即屢次發兵朕皆嚴諭將帥令體朕軫念斯民至意務期秋毫無犯無非欲救濟百姓安輯地方今寧南靖冦大將軍王等率領大兵各路進𠞰不日殱滅以正天誅三桂反覆亂常不忠不孝不義不仁為一時之叛首實萬世之罪魁行即懸首藁街以泄神人之憤猶恐小民未悉其由輒相驚疑不察虛實妄行聽信立意一差如蹈陷穽邪正之介即禍福之關身家性命所繫不小朕不忍赤子悮罹法網有傷天和爾部即𫝊諭直省督撫刋刻告示轉行所屬各州縣遍諭百姓俾各安生業勿聽訛𫝊以副朕保全元元之意孫延齡反執廣西巡撫馬雄鎮延齡乘滇黔煽亂心懷異圖又因都統王永年前發其過惡銜之特甚至是將稱兵先執永年殺之并殺副都統孟一茂等發兵圍巡撫馬雄鎮署據守陽朔大榕溪隘口桂林自此不通三月初七日兩廣總督金光祖以其狀奏聞命陜西督撫協理四川大兵糧餉上諭戶部蜀地人民稀少大兵所至艱于供億陜西與四川接壤餽運為便令陜西總督巡撫與四川總督協理供應癸亥命副都統根特巴圖魯席布移兵江西江西巡撫董衛國疏言袁吉二郡與長沙接壤兵單勢孤請就近速發徑兵以資彈壓上諭江西一省東接福建南界廣東西通湖廣為三省要地令前往兖州副都統根特巴圖魯前往安慶副都統席布率兵速赴江西省城原駐江寧副都統瑪哈逹將自京所帶甲兵移駐安慶其察哈爾左右兩翼官兵於兖州秣馬之後左翼官兵赴江寧聽江寧將軍統轄右翼官兵赴安慶聽瑪哈達總管臣謹按時閩粵雖未動搖而包藏禍心已久得此重兵于江西彈壓遂使賊勢阻絶厥後三逆各困一隅不得連結披猖首尾相應實賴此舉以扼其吭也調真定總兵官張和善協守武昌上諭兵部駐守武昌滿兵既往嶽州長沙其防守南汝之真定總兵官張和善即領官兵赴武昌協守念軍士自真定調赴河南今又遣往武昌實為勞苦令各以白金優賚之平定三逆方略卷三

body:
  text: 欽定四庫全書平定三逆方略卷四康熙十三年三月乙丑朔命諸路設筆帖式馳遞軍情時上以軍興孔亟驛遞奏報若如常期或悮軍機特令兵部每四百里置筆帖式一員撥什庫一名以速郵𫝊自京至荆州設筆帖式七自河南鄭州至武昌設三自直𨽻真定至漢中設十遇有警急軍務星馳接遞遲者以違悮軍機治罪尋又諭兵部江西驛路近為衝要亦應設筆帖式馳遞自南昌至京計十一程每程置筆帖式一員遇有警晝夜馳遞臣謹按兵貴神速往昔羽書旁午皆從驛𫝊别無他策可使疾迅我皇上睿略非常特於驛遞之外别設官以備馳驅往來奏報每一晝夜可行千餘里且互相更代事無稽悮人不疲勞諸將雖逺在軍中而禀承廟算恆如在几席之前聖謨區畫尺一所傳亦星馳電擊於數千里之外故能决機制勝削平巨憝用奏膚功郵𫝊之速其有禆於軍機者大矣都統鄂鼐兵扺荆州丙寅暫停廣東裁兵廣東經制額兵七萬六千八百二十人康熙八年議裁一萬二千八百二十人除汰過外尚有未裁兵六千餘至是上諭兵部粵東海疆幅員遼闊未裁之兵仍留之以資守禦丁卯命都察院左都御史多諾兵部侍郎勒布內閣學士李仙根往荆州督理大兵糧餉時諸臣往賜之敕印敕曰兹以滇黔煽亂大兵進𠞰軍需浩繁職任重大必須専官綜理始克允濟特命爾多諾總理大兵糧餉撫民事務勒布李仙根協理大兵糧餉撫民事務凡大兵所到之地備辦糧餉支給如遇轉輸不便處所與兵主王將軍等㑹同商酌以行督撫以下大小各官有能不苦纍百姓不誤糧餉者許爾等題叙奬勸如有苦纍百姓稽遲糧餉者即行題參議處支給大兵糧餉酌量辦理解運糧餉酌量取調官兵護送其辦理兵餉地方官如致遲誤護送錢糧官兵或不如數遣發或護送有怠玩之處應題參者即行題參應治罪者即行治罪仍綜核錢糧出入嚴察虛冒招撫土著大兵經過地方流離百姓務令得所兼理湖廣等處地方驛遞事務敕中開載未盡事宜聽爾便宜區畫爾等膺兹重寄須持亷秉公攄忠殫力俾軍儲充裕驛站無稽民生乂安地方綏靖斯稱委任如因循怠忽或措置乖方致悮重任責有所歸爾等慎之庚午命和碩額駙華善為安南將軍帥師鎮守京口副都統馬思文楊鳯翔內閣學士薩海同往諸臣瀕行召入內廷上面諭之曰兹以京口地當要害特遣爾等率兵往鎮雖駐其地儻傍近有警亦宜應援軍行往來與駐防之地務嚴禁軍士勿得擾民聞前者兵行所過率多擾害爾等當以為戒否則罪有所歸壬申諭大將軍順承郡王勒爾錦及諸將等進兵上諭勒爾錦等曰朕覽都統巴爾布護軍統領伊勒都齊額司泰前鋒統領碩岱等奏皆云以八月間進兵恢復疆土朕思雲貴尚未可輕進必俟四川全定之後方圖進取但湖南地界南連粵西東扺江右安慶近長沙副將又已降賊兵船盡為賊有今惟當相機速取常德以斷長沙後路使賊彼此不及應援更以將軍尼雅翰都統珠滿等統兵進逼長沙則長沙之賊非來降即棄城遁矣如此則賊膽自落百姓早得歸耕於我進取雲貴之師誠大有禆益也若不急行攻取使賊勢漸增妨民稼穡我兵深入芻糧轉運區處倍難據理揆度如此兵在千里之外豈能遙為指示但民心業已動搖廣西音信又隔儻江西更有賊警勢必遣發禁旅不惟饋餉浩繁且恐兵民之心又生叵測爾等前出師時止言進取雲貴之期不過八月耳今賊猶未至而已叛之長澧常德諸處乃亦欲待之八月設各處再有變者王將分兵以討否乎分之則兵單以次撲𠞰則馬疲矣為今之計惟先取常德長沙以寒賊膽方為制勝王宜集衆議以行又諭曰比聞逆賊吳三桂身至常德王所統兵馬稍加休息進取常澧之時狡冦知不能敵或出全力冒死以犯嶽州武昌未可料也王若進兵當密示將軍尼雅翰都統珠滿各於所往之地酌其近逺約定行期共圖前進庶幾萬全其荆州武昌兩地軍機互相關白務宜回顧武昌王等仍相機以行尋巡撫張朝珍奏至稱吳三桂兵水陸齊進將犯嶽州密遣賊二人潛入州城參將李國棟私行納欵乙亥大將軍順承郡王勒爾錦帥師抵荆州庚辰耿精忠反執福建總督范承謨精忠素庸劣然好亂樂禍又為三桂煽惑見湖南用兵有異志謀據福建是日紿總督范承謨㑹議軍事至則執之遂舉兵范承謨罵賊不屈賊幽之巡撫劉秉政從賊杭州將軍圖喇以是月三十日奏聞甲申命諸臣薦舉人材上諭吏部大兵進𠞰逆賊指日蕩平地方恢復之後即應設官撫綏民生料理事務頃以需人甚急已將漢軍堪用人員照該督撫所請發往軍前候用其漢人中素有清操及才能堪任繁劇者不拘資格著漢官大學士以下三品堂官以上據實保舉發往軍前與漢軍官員一體并用務期虛公舉薦有禆地方以副朕廣攬人才之意命副都統根特巴圖魯等援吉安袁州提督趙國祚駐防南昌巡撫董衛國疏稱長沙張夏二賊欲犯江西袁州吉安地方有纍卵之危請敕江南江西總督及防守江寧諸將領大兵速赴江西相機𠞰守上諭副都統根特巴圖魯現駐南昌若袁州吉安有警即率領滿漢官兵𠞰禦長沙冇可乘之機亦相機以行根特巴圖魯前往則南昌空虛可慮令提督趙國祚即率官兵駐防乙酉大將軍順承郡王勒爾錦奏官兵敗賊於彛陵時逆賊萬餘水陸齊犯彛陵於江兩岸各列五營是月初四日官兵奮力擊敗之獲其船賊遁回宜都是日勒爾錦奏聞壬辰命內大臣希爾根為定南將軍禮部尚書哈爾噶齊副之帥師赴江西護軍統領桑格參贊軍務吏部侍郎舒恕署前鋒統領及先遣往江西副都統根特巴圖魯席布亦同參軍務總督蔡育榮奏楊來嘉叛於穀城襄陽總兵官楊來嘉於是月十五日叛欲挾榖城官兵遁入西山調南漳逰擊李文忠㑹兵代池文忠不從具文申報育榮以聞上嘉文忠授以副將職銜定緑旗官兵賞格先是上諭兵部凡緑旗官兵效力行間立有破敵功績者理應議叙給與官職賞賚部臣遵㫖議凡緑旗官兵攻城克敵等功除已有定例議叙外如陳亡殉難官員自千總至兵丁例給恤銀而提督以至衛千總向未議及其大小各官俱准蔭子弟而千把總微辨不與嗣後照級髙下俱准給恤銀與蔭又如大兵所至之處或敵人堅壁相拒或大列陳勢相迎有能挺身先登以及越衆衝鋒者各依論功次第授以守備千把總等官至如先躍敵船立功者各依船大小等第授以都司僉書守備千把總等官並各給賞銀有差以示鼓勵議上從之著為令諭都統覺羅巴爾布護軍統領伊勒都齊速赴武昌時武昌有警故令巴爾布伊勒都齊以文到日速赴武昌甲午命副都統李林隆領兵赴襄陽林隆率漢軍官兵赴襄陽同都統范達禮協守令達禮總統如鄖陽等處有警達禮即酌量應援將軍瓦爾喀奏克陽平關時逆賊萬餘竊踞陽平關布列營伍設伏守險是月十八日瓦爾喀同署前鋒統領穆占等率官兵進𠞰自野孤嶺直扺陽平奮勇衝擊擒斬賊衆三千有餘復取陽平關及三寨平定三逆方略卷四

body:
  text: 欽定四庫全書平定三逆方畧卷十一康熙十三年十二月壬辰調兵守興安上諭兵部興安要地應遣滿兵鎮守令於署副都統鄂克濟哈等部内選驍騎二百人遣才能官員率赴興安與署總兵官党塞等協力同守癸巳江寧將軍額楚奏復婺源縣先是額楚奏婺源為賊所據如不取婺源即赴饒州恐賊探知大兵已去又來犯徽請俟婺源復後休息士馬相機進取饒州上諭額楚等若復婺源即進取饒州毋得因養馬遲緩令賊固守難於攻克致失事機至是額楚奏十一月十七日克復婺源於一二日間安撫殘黎即進取饒州上諭比聞婺源恢復良可嘉悦爾等兵單若進克饒州尤宜加意善後諸事相機以行丙申命大將軍貝勒洞鄂等速進四川上諭兵部曰覽將軍赫業等奏保寧大兵糧餉阻絶困乏已極經畧莫洛已於十一月二十八日進兵貝勒洞鄂等至十二月初三日方始啟行莫洛所統之兵俱係綠旗巴蜀山路險惡滿洲大兵若不相繼進發恐賊輕視漢兵旁撃後遮均未可定今保寧大軍惟貝勒等是賴勅諭一到貝勒等即兼程而進㑹同經畧莫洛速定昭化諸處接濟大兵勿得遲緩貽悞大計尋又諭大兵糧餉闗係甚重令陜西總督哈占巡撫杭愛多發官兵水陸防䕶令以次相繼勿悞兵食運至廣元將軍席卜臣副都統科爾崑四川總督周有徳巡撫張徳地等轉運軍前毋得稽遲致悞臣謹按師行糧隨所係綦重况大兵深入險阻已抵保寧轉運既艱侵遏可慮前者上已命莫洛分兵據守朝天闗諸處䕶致糧餉川陜督撫悉心營辦無誤軍需既又命莫洛親率將士䇿應大兵至是又慮莫洛所領綠旗兵為賊所易道里險陿或有意外之虞命洞鄂以滿兵繼之俾首尾聨絡誠計出萬全使莫洛洞鄂等能恪遵睿算連濟軍糈倍道前進則保寧士馬飽騰兵威殊壯佇見收復全蜀長驅入滇矣夫何逗撓不前餉道中梗以致王懐忠兵潰王輔臣叛變保寧之兵糧盡而還一切事機總不出聖明預料之内也丁酉勅將軍尼雅翰等速滅安福賊先是賊圍安福縣將軍尼雅翰等遣副都統幹都海前徃援𠞰至是總督董衛國奏安福陷上諭將軍尼雅翰總督董衛國公議速檄副都統幹都海𠞰滅賊冦至遣發將軍等原令保固江西全省非止鎮守所駐城池嗣後所轄地方告警即酌行調遣應援大將軍康親王傑書奏官兵敗賊於衢州偽總兵桑明等領賊五萬餘犯衢州將軍賴塔遣滿漢官兵於是月二十四日連擊敗之斬首萬餘庚子大將軍貝勒洞鄂奏王輔臣標兵叛於寧羗洞鄂奏本月初五日據經畧屬下筆帖式戴祐等稱初四日提督王輔臣兵叛於寧羗刼經畧營經畧標下官兵或敗走或從逆經畧等莫知所在今臣等不能前進即於本日退保漢中上諭大學士索額圖尚書明珠曰今報王輔臣兵叛恐人心震動醜類竊發前者各將軍大臣不遵指授互相觀望遷延不進以致逆賊得據大江之南賊渠未滅故又有此變朕欲親至荆州相機調遣速滅賊渠呉三桂若三桂既滅則所在賊黨自當瓦解生民得安爾等與議政内大臣宻議以聞於是内大臣塔達噶布喇頗爾盆巴泰大學士索額圖尚書明珠等奏聖駕親征滅賊誠易但皇上身闗天下之重若鑾輿前徃恐奸宄妄布流言事生意外况京師根本所係更要皇上不宜輕出惟當居中運籌指授内外臣工相機調發上曰卿等所言亦是朕且暫止親征至王輔臣兵叛不可不速發大兵前赴西安保固秦省前者署副都統鄂克濟哈等所率之兵分遣令徃西安興安今興安姑且停徃若遣徃西安之兵尚未啟行即於全部兵内擇馬壯者每佐領二人鄂克濟哈星夜率赴西安餘每佐領兵一人令副都統色格率駐河南府鄂克濟哈兵力尚單令將軍侍衛坤巴圖魯率所屬兵盡赴西安與鄂克濟哈及副都統翁愛總督哈占保守地方𠞰禦賊冦襄陽見有都統范達禮副都統李林隆之兵其副都統徳業立亦率每佐領驍騎一人星赴西安與侍衛坤巴圗魯等合兵併移文順承郡王度襄陽可虞即撥王所統兵每佐領一人遣徃駐守否則不必王與參贊各大臣公議酌行哈占翁愛等於大兵未到之先并力固守地方仍偵探情形不時馳報尋又諭兵部據報王輔臣兵變其反與未反尚未得實即輔臣果反或出一時迫脅亦未可知其妻孥俱善存撫勿遽加害傳諭總督哈占知之諭大將軍貝勒尚善等速取岳州上諭尚善等曰王輔臣標兵反叛貝勒洞鄂等已退守漢中今當人心惶惑之時若克復岳州則人心自定稍有遲緩恐所在揺動倍多可虞貝勒等何日決戰宜審機决䇿以期必得其速定議以聞命調盛京官兵赴京師上諭議政王等京師禁旅遣發頗多調盛京官兵一千令副都統鄂泰率之至京烏喇兵七百令副都統安珠瑚遣官領赴盛京其寧古塔兵令將軍巴海酌量調發鎮守烏拉辛丑遣理藩院員外郎拉篤祜等調䝉古兵赴陜西上諭議政王等秦省重要令理藩院員外郎拉篤祜圖爾哈圖鼐瑪岱徃調鄂爾多斯兵三千五百歸化城土黙特兵七百視西安路近即率赴西安若去省城紆逺即率赴蘭州其䝉古兵入何闗口令總督哈占巡撫華善遣人接應芻糧如秦省可虞速催調兵前徃若叛兵已散秦省無虞即移文停止其令鄂爾多斯貝勒索訥未歸化城土黙特都統古嚕率兵前徃尋又諭拉篤祜等曰爾等率領䝉古甲兵若已至邊内督撫檄令退還爾等毋得遽回仍星夜直抵西安若尚在邊外移文令退即當撤回若在邊内前塗遇有不虞即開路而進若報别路有警不必應援巡撫華善請兵爾等酌量分路率兵前徃䝉古兵至西安聴將軍調遣將近邊界令將䝉古兵由各闗口分道齊入廣為𫝊播以張聲勢後土黙特兵奉調遄行先他部至上乃奬諭之曰土黙特都統古嚕等為國効力率所部官兵星馳赴調應期而至殊屬可嘉事平之日其有功人員該部議叙命撥滿洲䝉古兵備調發上諭兵部秦中告警應預派滿洲䝉古每佐領驍騎四人有事即行遣發其領兵官員爾部量選應用壬寅命將軍哈爾噶齊赴江寧上諭兵部今大將軍安親王刻期抵江西將軍哈爾噶齊調赴江寧叅贊大將軍簡親王軍務鎮守江南乙巳命總督哈占宣諭倡亂官員兵丁初聞王輔臣兵變上即遣禮科給事中蘇拜賫勅偕輔臣子繼禎徃撫隨又諭哈占曰適據貝勒洞鄂等報經略莫洛提督王輔臣標下官兵叛變隨遣科臣蘇拜持諭招撫爾即遵㫖通行曉諭身任其事加意安輯明告倡亂官兵爾等皆因蜀道險逺糧餉不繼以致畏死情逼頓生變亂誰肯甘心從逆自造釁殃其不得已之情朝廷具已洞悉今特遣官前來安撫諭㫖甚明有如皎日爾等各有父母妻子恒産如能遵㫖來歸官職如故士卒願為兵者仍許入伍願歸農者令回原籍安挿爾哈占等皆朕倚信任用之臣務體朕至意速行撫諭早定地方并𫝊諭蘇拜曰爾偕哈占選擇能員不時賫勅招諭王輔臣并安撫亂兵爾與哈占商酌如應親徃即行親徃若有未可即遣能員前去務殫心籌畫以期必濟丙午敕大將軍順承郡王勒爾錦沿江預備戰艦嚴加守禦平南王尚可喜奏逆賊於衡湘造船千餘欲分發岳州荆州併進取江西將來春水泛漲沿江一帶宜預為設偹上命大將軍順承郡王等量造戰艦於沿江要地嚴加防守逆賊侵犯即行撲𠞰仍移知岳州大將軍貝勒尚善等命江寧將軍額楚駐師南昌額楚奏部文令臣等俟安親王到江西即率所部兵回江寧今安親王將到臣等酌量飼馬仍回江寧上諭大將軍簡親王及將軍華善帥兵駐守江南額楚之兵既抵江西即於南昌駐牧不必仍回江寧俟安親王前抵南昌額楚兵或赴撫州與將軍希爾根合兵進取建昌廣信諸處或㑹同王師進𠞰或駐守南昌聽大將軍王指授命遣兵迎還廣元保寧大兵上諭議政王等曰王輔臣標兵背叛廣元保寧大兵闗係甚重應遣兵接應若調將軍侍衛坤巴圖魯等兵及西安兵發徃恐王輔臣回據平凉西安守備單弱應以京城所發兵每佐領三人速催啟行其羸瘠馬匹留秣太原健壯者星夜選赴西安於諸軍内量撥留西安駐守餘兵速遣赴大將軍貝勒軍前接應廣元保寧大兵回至漢中戊申命將軍阿宻達等帥師赴西安先是上諭議政王等秦省重要令將軍阿宻達即率䕶軍四十人自江寧速赴河南府併統副都統色格之兵暫駐鎮守俟每佐領四人兵到日即率赴西安至是上又諭阿宻達即率色格兵速赴西安京師所派每佐領兵四人以一人令夸蘭大等率赴河南府聽色格管轄其三人以達理善巴圖魯署副都統率之由山西赴西安江寧將軍額楚奏復饒州賊衆三千餘於雲吉峰拒戰將軍額楚署副都統宗室巴爾堪率兵擊敗之進攻饒州賊棄城遁是月初三日遂復府城庚戌大將軍康親王傑書奏官兵敗賊於金華偽都督總兵徐尚朝等率馬步賊三萬土冦二萬復犯金華是月初七日副都統瑪哈達都統巴雅爾總兵官陳世凱等率兵於積道山連戰敗之攻破木城殺賊二萬餘招撫偽官及兵七百餘人命總督鄂善等領兵赴興安上諭議政王等曰陜西興安州西近漢中北接潼闗東南直通鄖襄最為要地今秦中有警特遣大兵鎮守其副都統穆舒渾帶至襄陽之兵及䝉古甲兵増足一千令總督鄂善副都統希福率赴興安保固漢中諸處穆舒渾仍回荆州至於興安襄陽地屬接壤應令張犄角之勢有警即行互援都統范達禮副都統李林隆提督李胡拜等鎮守襄陽榖城如兵力單薄大將軍順承郡王等酌量遣兵協守尋以鄂善希福到日方行遣發恐致遲緩即令穆舒渾於諭到之日率所部兵馳赴興安鄂善希福亦於諭到之日率䝉古兵赴興安與穆舒渾同守漢中諸處命原任山東援𠞰提督周卜世為山西提督上諭兵部秦省告警三晉接壤之地應設提督以資彈壓其以原任山東援𠞰提督周卜世為山西提督統轄全省率標下官兵駐平陽府命將軍尼雅翰帥師赴廣東時平南王尚可喜以年老衰病亟請滿洲大兵彈壓全粤上命將軍尼雅翰率所部兵同副都統綽克托速赴平南王軍前協守粤東辛亥總督哈占奏王輔臣叛殺經略莫洛哈占奏經畧莫洛標下中軍官呉石珊自棧道逃回去經畧駐兵寧羌州南教塲本月初四日王輔臣標兵猝叛攻營經畧親隨滿兵併力射却之既而輔臣挾衆來攻礮矢齊發經畧中礮死章京筆帖式等或逃出或為賊所殺初七日輔臣率叛兵至沔縣欲與貝勒戰值其標兵五百及經畧標兵諸處運糧兵共二千餘一時星散輔臣勢孤遂回略陽壬子敇大兵進福建應援海澄公黄芳度芳度奏臣感念國恩誓不與賊俱生練勁卒滿萬堅守漳城及龍漢五縣耿逆潛師援漳浦臣分兵邀擊賊衆大潰鄭逆復遣偽侍衛及叛鎮趙得勝來攻漳浦乞發大兵不拘何路進閩與臣併力掃除逆冦上諭芳度堅守孤城練兵殺賊屢次間道陳奏忠貞可喜著於平閩之日併標下有功人員從優議叙平南王尚可喜俟克復潮州後即發兵應援芳度平定閩省大將軍康親王傑書將軍希爾根等由浙江江西進𠞰福建大兵一到先移知芳度令速前迎來㑹癸丑命發帑金採辦陜西芻糗總督哈占奏陜西百姓供應芻糧疲於奔命請令山西就近輸運上諭山西運糧水路則有黄河汾渭之險陸路輸輓道逺勞費民不能堪令支户部庫銀十五萬兩擇能員解至西安採辦秦民正值困苦之際需用糧草若價值稍增民争什一之利自樂輸送庶不有悞軍需儻有不肖官員苛派侵尅使民不得均沾實惠督撫指名劾奏從重治罪平定三逆方畧卷十一

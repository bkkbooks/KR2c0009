body:
  text: 欽定四庫全書平定三逆方略卷五十九康熙二十年八月辛巳朔命給都統王國棟恤典上諭兵部原任平南王下都統王國棟矢志忠貞臨難不屈捐軀為國深為可憫可給與拜他喇布勒哈畨又一拖沙喇哈畨并恤銀及祭葬銀以示優恤命録用效力行間武職官員上諭兵部在外武職官員內有未經從逆效力行間勤勞日久枕戈藉甲身冒矢石建立功績者雖經議叙紀録加銜加等但未得補授實缺仍在各標空縻歲月閒散無依或有赴部無缺候補日久食用艱迫俱屬可憫宜令赴部詳驗原劄即行補用其作何録用確議以聞己丑命總督哈占招撫土司安泰寧將軍總督趙良棟奏建昌衛土司安泰寧猶抗不剃髮收聚賊衆逆跡顯然理宜𠞰滅以定民心上諭建昌地關重要川陜總督哈占將軍王進寶四川巡撫杭愛等多方招撫土司安泰寧勿致生事若抗拒不服該將軍酌撥官兵速行除翦甲午命大將軍簡親王喇布兼轄南寧兵大將軍賴塔奏進𠞰滇南時曽於粵西南寧府留每佐領兵三人雲南南寧相距甚逺難以遙制乞撤此兵還京師上諭雲南省城尚未恢復南寧之兵不便撤還雲南南寧相距甚逺賴塔難以遙制此兵可令大將軍簡親王喇布兼轄己亥命量撤四川廣西及荆州漢中諸路滿兵還京師大將軍貝子彰泰賴塔等奏今逆賊馬寶等俱降夏國相黨與解散奔竄廣東境內胡國柱雖率衆往鶴慶麗江尚未撲滅現有都統希福提督桑額率兵追捕逆賊形勢與前不同臣所有兵力似已足用據報將軍噶爾漢總督哈占率兵已抵貴州威寧總理糧餉學士佛倫等言此兵皆至雲南則糧餉不足供用至日以厮役補充缺額兵量行察汰則糧餉不致多糜而圍城兵亦足用上諭雲南兵既足用總督哈占盡率彼攜往之兵還四川駐川屬要地兼顧川陜四川所有滿兵留一千使副都統得爾德率之防守要地其餘俱令來還西安滿兵自四川還者令將軍佛尼勒率之鎮守漢中漢中所有滿兵俱令來還荆州亦係內地貝子準達及所統兵俱令來還粵西今已平定柳州留每佐領兵三人南寧留每佐領兵一人其餘俱令大將軍簡親王喇布率之還京副都統莫達等兵令駐守貴陽署副都統諾敏兵令退駐沅州命遣醫往雲南治兵有疾者上諭禮部聞雲南官兵疾疫者甚多彼土苦無良醫其令太醫院醫官胡養龍王元佐馳驛前往治之臣謹按殄滅冦氛固資兵力而使之鼓舞效命實由於軫恤有加我皇上撫養軍士恩澤素深及受遣四征又念其勞苦厚之以廩糧資之以馬仗頒發帑金頻行奬賚且屢諭將領諸臣時時加意拊循是時大兵已薄滇南城下因不耐水土多有疾病皇上復加軫念以彼地苦無良醫特遣太醫院官馳往療治聖心至仁憫恤士卒誠為亘古所未有宜乎三軍之衆感戴髙厚同心協力滅冦恢疆立奏捷功也九月丁卯嚴飭大將軍公圖海兵部奏大將軍公圖海咨稱將軍王輔臣自漢中來至西安於八月二十九日病故其壻薛英等請攜骸骨家口往平涼其標下官兵作何區處乞部議奪察輔臣下官兵原係多事之時添設今四川陜西俱已平定此兵宜裁去其官辨聽該督酌量題補更移文陜撫輔臣骸骨家口俾送至京師上允之復諭曰王輔臣乃旗人其呈請骸骨家口發往平涼圖海乃為咨部請示殊不合其嚴飭行己巳敕將軍覺羅吉哈禮移兵合圍雲南省城吉哈禮奏臣自雅州深入已抵金沙江官兵多病糧餉久絶勞憊已極勢難追𠞰胡國柱等上諭將軍吉哈禮可率兵前往與大將軍貝子彰泰合軍圍困雲南省城如往追胡國柱都統希福提督桑額等兵力單弱貝子彰泰等仍酌發驍壯之兵以濟之尋署副都統熙符咨稱將軍吉哈禮自惠泉衛疾作行至武定府於九月一日身故兵部以聞上諭將軍吉哈禮既已病故此兵抵滇令大將軍貝子彰泰統轄其將軍敕印彰泰仍行收貯辛未敕令戴罪官員兵丁速取雲南省城上諭議政王等曰雲南省城圍困已久若不速為克取未免勞敝兵民糜費糧餉今逆賊外援已絶株守孤城窮迫已極我軍中戴罪圖功之員不少宜令其攻城建績以贖前愆且投誠官兵內亦多有欲立功贖罪者今惟遷延引日待賊食盡恐糧餉漸至於虛糜兵丁亦苦於疾病其移檄大將軍貝子彰泰賴塔等均派戴罪官兵及投誠緑旗官兵速行攻取雲南省城甲戌命副都統得爾德仍留雲南大將軍貝子彰泰賴塔等奏先奉上諭令副都統得爾德率兵守四川今得爾德呈請願留雲南效力議政王等議不准上諭得爾德既抵雲南即留軍前其留蜀官兵令參領傅喀統之鎮守蜀地馬寶伏誅時馬寶械送至京上諭馬寶身受國恩不思報效逆賊吳三桂背叛即首先從逆所在抗拒大兵後大敗於楚雄欲逃無路始來投誠情罪殊為可惡著即凌遲處死梟示乙亥命撤雲南老弱廢疾官兵還京師大將軍貝子彰泰賴塔等報稱見在雲南大兵需餉甚多倘有不繼所關甚大公議於臣等二路兵內凡厮役補充甲兵中傷殘廢老邁官兵及陳亡病故官兵骸骨俱令佐領博霽等率之於本月六日啓行前往湖廣荆州護軍統領佟佳率至之兵已付副都統妙齊納統領令駐守貴州安順又令將軍蔡育榮等於圍困雲南緑旗兵內量裁六千人上諭廢殘官兵及亡故官兵骸骨若留於荆州徒費錢糧可俱徑攜至京此官兵及大將軍簡親王喇布率還之兵何隊先至武昌可候齊到喇布一同攜歸十月甲申命大將軍貝子彰泰賴塔等遣兵防守中甸彰泰等奏中甸諸處從來皆𨽻麗江原為內地吳逆隂蓄異志康熙九年割給䝉古此地逺在金沙江外我朝從未遣兵駐守且逆賊胡國柱等復奔鶴慶麗江而雲南省城尚未恢復不便即議遣發官兵駐守議政王等議言俟恢復雲南省城𠞰滅胡國柱之日令貝子彰泰等詳議以聞上諭中甸最為要地前於鶴慶麗江雖設總兵官一員令其兼轄中甸但無専汛官兵似猶可慮其移文大將軍貝子彰泰賴塔將軍總督趙良棟巡撫王繼文提督桑額酌量遣發緑旗官兵鎮守俟達賴喇嘛使至理藩院以遣兵鎮守之故移文曉諭壬辰命撤閩粵藩下旗員還京師上諭議政王等曰今逆賊殄滅疆宇悉平耿精忠尚之信屬下旗員俱應撤還京師量行安插除將軍馬九玉并隨伊出征官員外其在福建及移駐杭州耿精忠屬下官員廣東尚之信屬下官員悉令來京啓行之時該將軍大臣撥滿洲章京每翼各一員并酌撥緑旗官兵護行沿途勿使生事癸巳降貝子準達為鎮國公議政王等奏固山貝子準達率蒙古兵前赴荆州不即與順承郡王勒爾錦詳議渡江討賊勉圖前進失誤機㑹不能擊敗來犯鎮荆山之賊俾鎮荆山為賊所據遺棄陳亡兵丁尸骸副都統蘇祜濟遣人請援不即遣兵往助致二處髙阜皆為賊有屢命進𠞰逆賊談洪彭時亨等乃託故逗遛不行前進準達宜解宗人府左宗正任降固山貝子為鎮國公上從之丁酉命由蜀進滇滿兵屯駐建昌諸處大將軍貝子彭泰賴塔等處署副都統熙符率每佐領兵一人自四川來至雲南今雲南糧餉甚艱且滿漢官兵亦已足用大渡河與雲南相去甚逺恐後來勞憊之兵難以全至不可不預為籌畫上諭雲南見在糧餉未充兵已足用其自蜀赴滇之兵已渡大渡河者副都統席布率之駐建昌仍聽大將軍貝子彭泰等調遣未渡者令席布委一人之首領就近還駐成都聽總督哈占統轄辛丑命嚴趣各省錢糧速致雲南大將軍貝子彰泰賴塔等奏今滇城未復值兹冬寒草枯牧畜無所兵卒養馬甚艱部撥錢糧請速趣運致上諭户部部撥軍餉雖程限甚嚴往往不能即達者皆因該管及沿途官員不速行輸解督趣遷延時日之故爾部移文各督撫已起解者星夜速趣運致未起解者速令啓行更檄沿途督撫嚴督所在官員趣所運錢糧速達雲南勿誤若沿途官員有違誤者并該督撫從重治罪決不輕恕甲辰命設雲南督標官兵發將軍總督趙良棟原兵還陜西議政王等奏雲南大兵供億浩繁今羣冦盡滅疆土寧靖將軍總督趙良棟自陜西率領進𠞰官兵冝暫留五千於雲南餘俱令發還陜西俟雲南省城既復所留之兵亦即發回上諭將軍總督趙良棟宜設督標經制官兵可取前任雲貴總督標下隨征之兵補入如不足更以雲南投誠支糧之兵補入其管兵官員聽趙良棟選擇才能擬補具題既設此兵其原統進征雲南緑旗官兵勞苦日久俱令發回陜西固守各汛陜西為邊疆重地關係甚要趙良棟進𠞰時曽留官兵於四川防守要隘總督哈占可撥四川官兵更代防守此陜西官兵亦速發原汛固守疆圉丁未命造浮橋於盤江巡撫楊雍建以修造鐵索橋宜用何項錢糧具疏請示工部議動用捐助錢糧上諭諸凡馳遞軍機轉輸兵餉所關綦重不容頃刻緩今修造鐵索橋必致稽遲時日聞盤江可造浮橋貴州巡撫楊雍建可速行監造浮橋其鐵索橋俟錢糧充足之日該督撫題明動支正項錢糧修造平定三逆方略卷五十九

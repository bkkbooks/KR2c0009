body:
  text: 欽定四庫全書平定三逆方畧卷四十七康熙十八年九月甲午趣大將軍貝勒察尼等速取辰龍關時察尼遣署前鋒統領蘇祜濟偵視辰龍關賊勢蘇祜濟還言辰龍關路徑堙塞甚固賊與民一無所見河渠畢涸大兵不可立營安塘筆帖式報聞上諭今賊勢大敗正在摧破凡為將軍大臣者各宜盡心効力乗賊無措即行追𠞰速靖地方武岡州楓木嶺係辰龍關後路逆賊必自震動貝勒察尼等遣蘇祜濟偵視蘇祜濟不探聴賊中確音遽報賊與民一無所見復云大兵不能立營規避退縮殊為不合貝勒察尼等其速取辰龍關前至鎮逺與大將軍安親王等兵㑹共議進定雲貴事宜以奏又諭議政王等以内廐馬一千匹兵部太僕寺馬一千匹頒給進取辰州大兵乙未勅大將軍安親王岳樂等議分撒大兵之半還京師上諭議政王等今武岡州楓木嶺俱經恢復賊不能据辰龍關必至自遁安親王簡親王貝勒察尼所部大兵皆宜速赴沅州如有破賊機㑹聴若等酌量而行大兵宜撒其半還京師到日别撥禁兵更代以休養之兵力收定餘地大兵作何分撒安親王等確議奏聞駐沅州候㫖詔賚還京䝉古將士上諭理藩院䝉古兵隨大兵征𠞰雖未有竒功顯績然勤勞數年宜加恩賚今將至京師其將領賜以鞍馬餘衆各給以羊及諸物宜迎至柏鄉縣將到日令先期報知遣䝉古内大臣二人前徃庚子提督孫思克奏請暫緩進取漢中興安上切責之思克以漢中興安未便進取因列欵入奏語渉矜張上命内閣兵部大臣傳諭議政王等孫思克奏稱賊多歩行踰嶺登山如履平地小路曲徑賊所稔知我兵前進恐賊由紆徑潛躡我後以絶餉道為害滋甚朕思秦地緑旗之兵為數甚多其中歩兵不少且各省緑旗兵向推秦兵精鋭賊能䟦渉山嶺我兵豢養有年何獨不能况漢中興安為秦内地滿漢大兵經行熟悉何得視同絶域見聞罕及輒荒誕其辭凡𠞰賊安疆用兵將帥審酌調遣前後籌畫其運餉後路恐致㫁絶必詳度以合機宜乃一定之道也儻以賊間道潛来㫁絶餉道為憂怯懦不前則永無破賊之日矣又疏言大將軍公圖海分滿漢兵為四路雖分賊勢終憂兵單緑旗兵每人止有一馬且未必皆强壯可用之兵惟滿洲大兵堪任苐為數無多雖欲另調又恐秦地三邉畨彞甚衆當此秋髙馬肥思逞之候實無兵可調不若俟来春二三月間塞外草尚未生水泉猶涸之時多調邉兵以資戰守各路進發朕思秦中滿兵不少緑旗兵較各省更多今稱兵力單弱顯屬畏縮憚於進兵且各省緑旗兵止一馬曽無多給而且越境征𠞰粤東粤西閩楚諸處今又進定滇黔較之平定境内漢興勞逸何如耶向者凡將軍提鎮募兵時必選精壯勿使濫收充數定例嚴明今若以秦兵皆非强壯難以應用則孫思克職任何事觀此則欺蔽之情更顯然矣且有大將軍公圖海在彼乃妄議大兵多寡殊屬狂妄又云畨彞之人馬肥思逞欲俟来春二三月間草枯泉涸之時進取設或二三月間進取之後四五月間畨彞馬肥思逞將若之何正值秋成凉爽各處賊冦大敗震驚之餘不速行平蕩反欲於来春青黄不接之時進取是又何意也又奏稱秦省大半皆山地瘠民貧不産粳稻所種惟麰麥菽豆之屬向有捐納一事稍禆用兵今例已停罷民受採買之苦且山路險阻必資負戴駝運其僱賃之價數倍於應輸之賦今各路需餉甚多山徑狹隘輓運維艱時當初冬草枯葉落畜牧無資欲俟来春調集官兵務期兵强糧足共圖進取者職此之故朕思粤東粤西諸省山嶺亦多何曽預備糧餉官兵豈有止食稻米不食他粟之理至於捐納各省俱停止留粤西事例以資平滇軍需之用自定秦省數年以来未曽勞民轉運且漢興雖多險阻乃陜西内地非隔省百姓轉輸可比今恐輓運累民至春又誰為轉送耶當逆賊敗遁之時急令進兵者正為早定地方以安百姓耳採買恐累於民巡撫杭愛題奏已經改定今以請開事例轉運維艱為辭其規避進兵明甚又疏稱八旗出征官兵今年七月二十八日京師地震房屋傾壞壓斃人民聞之皆蹙額相顧人各懐内顧之憂臣所以暫停進取以回天意俟人心稍定再議進兵未晚朕思八旗官兵世受豢養朕之加意臣僚士卒尤為渥厚不特房屋傾圯細故即赴湯蹈火誼亦難辭孫思克封疆大臣凡事不加詳察妄言人情皆動以惑軍心殊失大臣之體細察孫思克疏内前後情由惟躭安逸怯於進兵列欵巧奏且自秦省有事孫思克等係封疆大臣俱應按律議處念同大兵進𠞰宥過計功給以世襲之官加以不次之擢當捐軀報國破賊安疆自請前進効力乃孫思克身任提督統轄全師不思奮力前進反煽惑滿漢動揺民心飾辭妄奏深負朕擢用之恩情罪殊屬可惡其令翰林學士喇薩禮速徃嚴取口供来奏未幾喇薩禮具辭還奏上曰孫思克理應嚴察治罪但今方統兵與大兵分路進𠞰俟事平之日再議壬寅命留湖廣總督蔡毓榮及司道官於鎮逺恊理糧餉學士佛倫等奏大兵進取辰沅不乆即至鎮逺臣等先於荆州常徳澧州諸處預備進黔兵餉黔地人夫不足將湖南人夫作何分派運送宜㑹同酌議請留湖南巡撫韓世琦與臣同駐鎮逺上諭總督蔡毓榮酌量留司道各官同駐鎮逺恊理糧餉學士佛倫等奏運致兵餉招徠民人事宜上從之佛倫等奏察鎮逺至黔中不通水道非僱募人夫擔負陸運必至有悞大兵糧餉是以臣等與雲貴督撫等共商作何派集人夫酌量定議由鎮逺至黔中令臣等所攜官員筆帖式同司道及賢能府州縣各官酌量安塘數處預集人夫聯續起運抵黔預為之備其大兵到滇支給事宜令黔撫楊雍建同滇中督撫等公同料理但黔民稀少且值逆賊叛亂未必不多流亡如民夫難於催募請令將軍㑹同該督撫商議并請勅將軍及黔中督撫撫綏招徠彼土人民令民互相貿易庶於糧餉有禆上命如所請行之甲辰復定南王下投誠官原職理事官麻勒吉等疏稱劉彦明等投誠官兵八千餘人悉已安挿得所偽官傅竒棟袁鳴佩等家屬俱在雲南孑身来歸請加安挿上曰定南王藩下官員及投誠官員未變之先察係何官即留其原官職銜其餘愿為兵者補入本省各營愿為民者許令歸農務俾得所丙午詔加馬九玉太子少保授王承業等為援勦營副將叅將將軍莽依圖奏靖南王下都統馬九玉等所屬官兵遣令平定廣西自至臣軍以来管副將事王承業管叅將事李雲曹應鵠張朝瑞童茂等首舉逆賊呉世琮書札且撃殺賊冦救援南寧得彼之力為多進𠞰雲南時儻不攜若屬以徃則如此整練精兵得之甚難但彼等俱未給有定銜指有定缺恐或不能實心奮力請量給官職并都統馬九玉酌量鼓勵庶深入𠞰殺實為有濟上命議政王貝勒大臣集議議政王等奏言察王承業等隨同大兵進𠞰廣西逆賊著有勞績宜將五營官兵設為援𠞰營王承業李雲曹應鵠張朝瑞俱授為副將童茂授為叅將其所屬官員俟該將軍具題到日聴兵部議覆都統馬九玉係旗下官員俟叙滿洲官員之日一併議叙上諭馬九玉自閩中以至兩粤同大兵効力可嘉其加太子少保餘並如議辛亥命大將軍簡親王喇布帥師赴廣西桂林駐守將軍莽依圖奏湖南大兵見在武岡諸處禦敵臣等一軍先向雲南進發則廣西恐有他虞上諭桂林要地宜發滿兵防守議政王貝勒大臣㑹議具奏議政王等議定據將軍莽依圖咨文都統希福等已罷徃南寧從賓州桃屯之地還守桂林宜令希福姑駐桂林鎮守莽依圖平定廣西境内未靖之地上諭希福所攜兵馬若駐守桂林則莽依圖所部前進之兵不免單弱宜令大將軍安親王簡親王等以上三旗及簡親王所屬王府佐領兵盡行撥發併添撥每佐領下甲兵或二人或三人令簡親王親率速徃桂林駐守令副都統布舒庫叅贊簡親王到桂林日希福悉率所部兵㑹莽依圖前進恢復疆土内大臣阿密達都統穆占㑹安親王公同商酌而行俟到沅之日其分兵遣還事宜定議以聞甲寅命械祖澤清来京總督金光祖奏官兵分路搜山於八月十七日擒獲祖澤清并其子良楩上諭逆渠祖澤清背負國恩屢行反叛情罪重大命平南親王總督巡撫遣官械送澤清父子及家人来京十月乙丑命内大臣侍衛坤巴圖魯等還京師副都統博霽隨大將軍簡親王喇布率兵前進上諭兵部曰内大臣侍衛坤巴圖魯都統畢力克圖侍衛覺和托等出師日乆年已衰邁不能馳驅左都御史舒恕患病果真此等實繫衰病大臣官員可察明撤回京師至副都統博霽等兵見駐南雄今南雄已為内地愽霽甫徃未經効力且大將軍簡親王兵少愽霽可率其衆前赴廣西吉安所駐滿兵亦令前赴大將軍安親王軍前如有非要地而駐兵者俱察遣用兵所在俾之進𠞰可移文諸路大將軍將軍等各察所部列名以聞大臣官員稱病留止城邑者亦令察明具奏已而大將軍公圖海奏稱坤巴圖魯覺和托二人遵㫖令還京師外臣等於十月初二日四路並進己近賊境或仍撤彼還京或俟恢復漢中興安之日遣還伏俟睿裁上諭畢力克圖俟恢復漢中興安之日遣還京師戊辰命大將軍康親王傑書等速議撤還福建大兵之半上諭議政王等福建滿兵為數甚多可否撤還其半其移咨大將軍康親王靖南王各將軍大臣督撫提督等公同酌議如克取厦門諸處及鎮守地方雖撤滿兵之半尚可足用宜令何人統率回京其留守之兵何人統率以及滿兵撤還之後俾必無他虞令還京及駐守之人詳議具保限四十日内具題命將軍噶爾漢等從上津進兵與大將軍公圖海夾攻興安噶爾漢等疏稱臣等帥兵至白河縣偵知前路險阻山徑狹隘馬匹難行因復商酌簡選兵馬從上津路進發上諭將軍噶爾漢總督楊茂勲提督佟國瑶身臨賊境深知其地險要可從上津一路進師視陜西大兵進𠞰之㑹與大將軍公圖海等夾攻興安賊冦迅復疆土可移咨圖海知之辛未遣内閣學士希福等齎勅趣諸路統轄緑旗官兵將軍大臣等分路進勦立功學士希福郎中烏黑齎勅赴陜西勅諭曰皇帝勅諭將軍張勇王進寳提督趙良棟孫思克自逆賊呉三桂背思反叛遣發大兵各路征𠞰平定彊圉撲滅賊冦湖南廣西福建諸處以次恢復餘賊逃潰盤踞水陸險阻冀圖抗拒若爾殘冦雖無煩速𠞰不乆自當殄滅但朕軫念民生急於拯救令其得所故欲掃除餘孽以靖土宇今賊既敗遁負險無容專恃馬兵若用緑旗歩兵之力於滅賊殊為有濟况我緑旗兵較之賊兵甚强爾等素受國家厚恩勠力行間樹績邉疆甚多殫矢忠貞圖報恩眷朕所悉知爾等當各率所屬緑旗兵作何調度始能恢復其詳議具奏如爾等盡力報効恢定漢中四川朕必不拘成例優與加恩爾等官兵前進則滿洲大兵亦即相繼進𠞰接運糧餉不致匱乏兹事所係甚為重大速詳加酌定以聞又令希福等傳諭張勇等曰自古漢人逆亂亦惟以漢兵𠞰平彼時豈有滿兵助戰哉今逆賊大敗乗此逃散之際理宜速定四川天下緑旗兵無如陜西强壯而其數較各省倍衆在陜西大臣官員又皆具有才能將滅之冦何難𠞰除爾等不即平定四川豈縁爾等名位事權輕與儻謂地屬險隘自古以来險隘之地若不攻取豈有自定之理作何調度官兵幾路進𠞰事宜確議以聞又遣給事中莫洛郎中宜爾赫圖齎勅赴湖廣詹事庫勒納郎中額爾赫圖齎勅赴廣西其勅諭大指畧同己夘詔將軍巡撫傅宏烈駐鎮㑹城選調標兵進𠞰宏烈奏粤西進雲貴有二道一由南寧將軍莽依圗已遵㫖統滿漢大兵前進矣臣愿由慶逺一路親率官兵直取雲貴上諭粤西初經恢復傅宏烈仍駐㑹城同理事官麻勒吉等平定境土撫綏百姓供應大兵糧餉其傅宏烈標下官兵可選精鋭聴王與將軍進𠞰調用壬午將軍侯張勇奏請暫止勿進漢中興安上不許張勇疏言時屆寒冬堅氷載路轉餉為艱祈暫止陜西兵進征漢中興安及進取荆州常徳衡州永州廣西諸路兵馬俟明春再行齊發上曰近閲大將軍公圖海等奏分兵四路進取漢中興安而諸路大將軍將軍等各領大兵相機𠞰賊平定疆圉將軍侯張勇所請不准行命招撫賊黨王屏藩等上諭議政王等曰背恩反叛之罪在呉三桂其呉應麒胡國柱等咸係附和之人今雖諸路賊冦敗遁破滅在即朕俯念黎民早欲使疆圉平定其呉應麒胡國柱夏國相王屏藩馬寳郭壯圖各書勅一道分發各路大將軍將軍總督提督巡撫等招撫頒招撫勅諭曰皇帝勅諭王屏藩胡國柱馬寳郭壯圖夏國相呉應麒爾等本係呉三桂藩下之人曾受世職當三桂反叛時爾等率同逆黨抗拒大兵其後力窮敗遁今復竊踞一隅遲迴觀望荼毒生民兹湖南廣西漢中俱經底定賊勢摧敗殄滅可期爾等所明知也每念滇黔皆朕赤子久罹兵燹不得早見太平朕心殊為憫惻今特降專勅詳加開諭爾等若悔罪歸誠其從前抗拒之罪悉為赦免仍論功叙録至爾等標下將士如同心歸順亦概從寛宥酌量加恩但念繫戀父母妻子人之常情或因父母妻子尚在滇黔心懐瞻顧爾等皆掌握兵柄之人非微末將弁且爾等彼此無不洞悉若即率所部兵徑還雲南誰能阻遏如爾等一路兵馬果能先退諸路亦必相率遁逃誰能自立大兵到日相機接應不特保全家口亦可建立功名或能開導呉世璠共来歸順厥功尤懋煌煌諭㫖炳如星日朕不食言近日歸順各員朕皆赦其前罪論功録用亦爾等所知爾等其盡釋疑𠂻勉圖後効以副朕懐逺矜全至意又諭兵部今兹招撫與徃者不同因彼情實昭然故特頒勅書令各大將軍將軍等加意曉諭以革其心勿得視為泛常爾部即移咨各大將軍將軍等實心任事務達賊營通行曉諭戊子詔䘏死事都統伯伊里布等上諭户部曰都統伯伊里布在朕左右乆知其人率兵出征殊多勞績原期凱旋之時仍與相見忽聞陣亡深軫朕懐今恐喪費不給特賜銀六百両䕶軍統領哈克三陣亡且勞績可嘉部䘏之外再給内帑銀五百両將軍王進寳奏恢復鳯縣諸處是月初八日進寳等率兵進取四川與賊戰於利橋紅花鋪諸處敗之斬殺甚衆遂復鳯縣兩當縣庚寅提督趙良棟奏復徽州時良棟欲取徽州由密樹關一路以正兵攻險要設逰兵於黄渚關以牽賊勢及抵宻樹關連戰敗賊即從紅川前進别遣官兵取徽州賊不能支遁走遂復州城平定三逆方畧卷四十七

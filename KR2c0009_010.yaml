body:
  text: 欽定四庫全書平定三逆方略卷十康熙十三年十月壬辰大將軍簡親王喇布帥師之江寧癸巳命副都統蘇朗防池州諸處巡撫靳輔奏都統釋迦保及署副都統雅賚阿喀尼等兵先後前來請以先至者駐池州後至者駐安慶互為聲援上諭釋迦保雅賚阿喀尼等兵仍赴江西安慶既有提督王永譽駐守其副都統蘇朗兵或駐池州或恢復建德之日即駐建德靳輔蘇朗商酌以行丙申大將軍安親王嶽樂帥師之廣東是日總督金光祖奏廣西全省變動賊勢愈熾入粵大兵應取道南雄星馳赴救上諭大將軍安親王已帥師由廣東進定粵西其防守事宜兵未到時聽總督與平南王商酌以行己亥命經略莫洛速援寧羌上手敕諭莫洛曰據坐塘筆帖式報有賊三路來犯寧羌被圍念爾總統川陜必有成算始行進兵朕可無憂但寧羌地屬陜西且為大兵後路當此糧匱兵疲又不得不厪朕懷爾宜速行救援使大兵如渴遇飲庶幾有濟辛丑命江南江西諸將帥速𠞰湖口賊總督董衛國奏賊犯湖口上諭湖口縣係江南江西要衝將軍希爾根總督董衛國宜會商機宜速行𠞰滅又署副都統碩塔穆森見統兵赴江西可便道先剿湖口逆寇再赴南昌湖口切近安慶其先抵安慶官兵巡撫靳輔亦即發往湖口協勦尋靳輔奏湖口彭澤相繼被陷浮梁鄱陽諸賊嘯聚日衆上復命署副都統雅賚阿喀尼到安慶即統兵馳赴彭澤湖口𠞰賊碩塔穆森已至九江令與雅賚阿喀尼等合兵平定湖口諸處協取饒州即赴南昌乙巳命平南王尚可喜增兵赴梧州可喜奏稱內地兵單根本虛弱如李三官七乘機竊發雖旋為掃蕩而尚有黨羽潛伏于山陬海澨之間急宜芟除故臣于八月二十日調總兵官班際盛自梧州回省上諭梧州兩粵接壤要地今粵西有事之際李三官七賊寇滅後尚可喜即增兵令班際盛速赴梧州𠞰滅丁未設武昌漢陽沿江戰守之備上諭兵工二部武昌漢陽一帶沿江之地俱屬重要防禦之䇿不可不豫宜于沿江要害多築墩臺環列火炮令諸軍畨守以固省會又武昌臨江所在湖汊甚多宜亟設江汛戰船多製火炮并召募鳥鎗兵一千為戰守之用命經略莫洛等遣兵守寧羌總督哈占奏四川賊衆先立營寧羌州文廟山參將陳應奎等鼓勵士卒夜襲賊營賊遂大亂遁回南山上敕經略莫洛等遣副將雷繼宗兵及提督王輔臣標兵固守寧羌諸處又大將軍貝勒洞鄂處進川之時若寧羌有賊即便道剪滅再入四川命大將軍順承郡王勒爾錦調兵防守九江上諭兵部九江三省水陸要衝大將軍順承郡王勒爾錦就近于雲貴兩提督內量調一員率領甲兵及標下官兵速赴九江防守將軍阿密達總督阿席熙等速造戰船百艘發往九江辛亥大將軍康親王傑書奏官兵敗賊於衢州耿逆偽都督周列等領賊二萬餘自常山來立營焦園陸寺西果園紅橋諸處聲言攻取衢州將軍賴塔總督李之芳遣副都統瑚圖等率兵於是月十七日分路奮擊大敗之斬賊萬餘戊午命給袁臨總兵官趙應奎世職上諭兵部袁臨總兵官趙應奎效力巖疆屢殺賊有功今又出首逆劄忠藎茂著給拜他喇布勒哈番又一拖沙喇哈番己未擢副將陳世凱鮑虎王廷梅為溫州黃巖平陽三鎮總兵官上諭兵部溫州黃巖平陽三鎮雖未恢復應豫補總兵官以便召募操練其以副將陳世凱為溫州等處總兵官鮑虎為黃巖等處總兵官王廷梅為平陽等處總兵官敕粵東文武將吏聽平南王尚可喜節制上諭議政王等自吳三桂叛逆以來平南王尚可喜為國抒忠厥功茂著當兹粵東軍興之際督撫提鎮以下俱聽王節制嗣後補授文武官員聽王選補奏聞其一切調遣兵馬及招撫事宜亦聽王酌行十一月庚申朔命將軍尼雅翰等速赴南昌先是上命尼雅翰及都統釋迦保等進取南康赴南昌署副都統碩塔穆森雅賚阿喀尼等進取湖口彭澤都昌撫定其地再取饒州赴南昌至是將軍希爾根等奏賊犯撫州等處臣隨令副都統席布率每佐領驍騎一人前往應援調鎮守九江城守尉烏黑等前來會城上諭將軍尼雅翰等兵各遵指授速定地方星赴南昌至九江扼要重地如城守尉烏黑等前往省城將軍希爾根總督董衛國等即酌發官兵鎮守大將軍安親王速赴江西酌量調度敕經略莫洛速進四川時大兵駐廣元缺餉兩月略陽糧艘為賊焚劫經略莫洛又奏賊方屯踞七盤朝天諸關我師餉道梗塞上乃命莫洛率兵速赴七盤朝天等處會同將軍席卜臣𠞰滅賊寇疏通餉道進取昭化與大兵協力克復保寧尋總督哈占奏蜀中水陸賊阻糧運難繼且逆賊窺伺陽平諸處上復諭大兵徂征惟餉是賴今既糧運難繼我師未便久駐令大將軍貝勒洞鄂經略莫洛四川總督周有德巡撫張德地等撤保寧兵回廣元經略等親身殿後調廣元兵回漢中固守陽平等處殱除寧羌諸賊整頓士馬再圖恢復遣副都統色格等領兵赴河南府議政王等奏經略莫洛若進四川西安空虛應發大兵駐防上諭河南府乃四達之地距潼關鄖襄皆近駐師其地則所在有警俱可䇿應其遣副都統色格并令一等侍衛鄂克濟哈署副都統率每佐領驍騎三人往駐河南府癸亥命總督蔡育榮領兵赴嶽州時大將軍貝勒尚善疏請遣荆州緑旗兵赴嶽上因命總督蔡育榮率標下緑旗官兵酌帶荆州舟艦前往嶽州其沿江一帶令大將軍順承郡王撥兵固守戊辰將軍尼雅翰奏復南康府時耿逆偽都督李大元等率賊萬餘屯南康崖口將軍尼雅翰同副都統綽克托于十月二十二日率兵擊敗之斬獲甚衆克復府城命分京口戰船赴嶽州大將軍貝勒尚善等請撥京口沙唬船五十艘并水手發往嶽州以資進取議政王等以荆州船二百前經酌量發往至京口沙唬船亦已遣發百艘今再增發必須配兵恐京口舟師單薄且值西北風時作泝流而上不能速至議不準行上特命如所請撥京口沙唬船速往聽貝勒等乘機進取勿俾借口待船致誤軍機其京口缺額之船令簡親王與將軍督撫等速行補造己巳諭大將軍貝勒尚善等進兵機宜上諭尚善等覽烏丹所齎爾等奏疏朕心深為嘉恱兩貝勒皆朕懿親運籌決䇿破賊立功在指顧間朕遙度機宜于爾等疆場之事或有裨益特頒手詔示爾爾等請調荆州緑旗甲兵備用細思順承郡王渡江攻戰未有定期王若不渡江則滿洲蒙古甲兵鎮守荆州彞陵原無不足今檄蔡育榮標兵往嶽州又據烏丹口奏賊浚重壕相拒甚堅今令緑旗兵以車運土囊填壕赴戰隨遣滿洲蒙古精兵繼進攻取必獲全勝緑旗官兵宜深加撫恤至臨陳時明諭賊人有解甲來歸者即與保全恩養安插朕未親履行間但披覽輿圖據臆懸斷所期爾諸將等恩威公普無間親疏嚴飭哨探申明法紀速成破賊之功永表旗常之績爾等所有籌畫即行密奏兩貝勒及大臣等兵士無恙并疏以聞臣謹按閫外之寄將能而君不御然帝王仁覆六合智周萬里指揮決䇿動與時宜以成掃蕩廓清之烈斯稱神武焉我皇上頒十行之札措置機宜周詳款曲藹然家人一體之慈雖三代誓誥曷以加兹至于解甲投誠即與保全曲加愛養所以攜逆賊之黨安反側之心義聞仁聲昭著中外尤削平禍亂之本計也調兵援桐溪總督蔡育榮奏竹溪本無縣城文武官民據守桐溪中峯二寨逆賊楊來嘉等合謀侵犯致中峯寨失陷今桐溪寨告急亟請附近兵應援上諭竹溪去陜西白土關甚近經略莫洛總督哈占巡撫杭愛提督王輔臣等速令汛防官兵就近應援鄖陽提督佟國瑤遣協𠞰官兵馳救都統范達禮副都統德業立等亦嚴加固守相機堵𠞰毋致蔓延辛未申諭諸路出征將士安撫百姓上諭兵部曰凡陷賊地方皆我赤子今者詰爾戎兵四征不庭原以除暴安民念愚氓被脅截髮特一時貪生畏死之恆情若大兵所至槩行誅戮非朕救民水火之意百姓無由自新狡賊反得藉以煽誘嗣後大兵進𠞰有鄉民持械拒敵及竊踞城池山寨不即迎降者仍行誅戮其餘槩從寬免至𠞰殺賊徒自應俘其子女但賊營婦女多係虜掠脅從破賊之後凡所虜難民子女許民間認領不得一槩妄收爾部其傳諭滿漢官兵咸體朕意無忽臣謹按六師奮揚天討式遏亂略凡屬同惡胥與剪除所以正邦典伸國威也我皇上好生之德侔乎天地特寬脅從之衆以開向化之途縱賊營所掠子女禁勿濫留俾民人散亡之家室復得保聚殘黎如出湯火而登袵席之上所以皇仁丕播萬姓恱服也甲戌命輔國公綽克托帥師守漢中前鋒統領穆占等奏漢中乃川陜要地邇者緑旗官兵難以深信滿兵雖少仰賴皇上威靈似可固守上諭漢中係陜西咽喉為大兵後路糧運要道令輔國公綽克託率所部人員并統轄副都統馬一豹兵駐守漢中再撥西安滿兵百人速往漢中令巡撫杭愛統轄同綽克託協守庚辰敕進閩大將軍保護續順公沈瑞等家口平南王尚可喜奏續順公沈瑞副都統鄧廣明及官兵家口共二千餘人為叛鎮劉進忠驅入福建拘留漳浦恐大兵進𠞰玉石難分上諭續順公沈瑞家口被賊拘留殊為可憫此係有功之人理應保全令大將軍王等進𠞰恢復之日留意察訪保護得所大將軍康親王傑書奏官兵敗賊於金華耿逆偽都督徐尚朝等率馬步賊五萬至金華城外列二十餘營副都統瑪哈達三等台吉察渾都統巴雅爾總兵官李榮等于是月十一日率滿漢蒙古兵奮勇夾攻殺賊二萬餘陳斬賊將吳榮先等三十餘人乙酉將軍尼雅翰奏官兵敗賊于袁州吳逆偽都督同知朱將軍與麻棚偽總兵黃乃忠丘善我合兵數萬自萍鄉犯袁州副都統幹都海署副都統公沃赫穆成額總兵官趙應奎率滿漢官兵于是月初四日敗賊於西村斬首萬餘又登山擊敗賊衆斬首五千餘級丁亥命分兵守襄陽諸要地上諭兵部曰往者令總督蔡育榮率兵會同都統范達禮等協𠞰楊洪二逆今育榮既赴嶽州二逆可暫停進𠞰除副都統宜思孝柯彝率兵駐防鄖陽均州外令襄陽總兵官劉成龍率兵鎮守南漳雲南提督李胡拜率緑旗官兵及駐劄襄陽漢軍鎮守穀城都統范達禮副都統德業立仍守襄陽若更有險要之地令范達禮等酌量調守賊出犯時即相機堵𠞰俟大兵平定湖南達禮育榮等仍進𠞰楊洪二逆戊子諭大將軍康親王傑書進兵機宜上諭傑書曰浙江賊寇在在竊發騷擾地方皆由耿逆未滅之故若𠞰除耿逆則小醜自滅今或固守金華諸處由仙霞嶺分水關入閩或固守杭衢從金華進克溫處平定浙省𠞰滅閩賊聽大將軍王酌量速行命增遣西安兵守漢中調河南兵赴四川輔國公綽克託等奏副都統馬一豹所統之兵經略莫洛已撥守西鄉紫陽白土關此俱緊要隘口未可輕撤臣所屬官兵及見發西安官兵數少力薄請增發西安滿兵四百人同守漢中上命增遣西安滿兵二百人速抵漢中綽克託於所屬內酌量添甲與巡撫杭愛協同守禦西安省會要地署副都統鄂克濟哈等率兵至河南府時速遣材能參領率每佐領驍騎一人赴西安平定三逆方略卷十

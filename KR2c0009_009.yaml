body:
  text: 欽定四庫全書平定三逆方略卷九康熙十三年九月壬戌朔命將軍額楚等帥師赴徽州總督阿席熙奏饒州逆賊犯徽州婺源縣上諭徽州浙江接壤要地將軍額楚署副都統宗室巴爾堪等於揚威將軍所統驍騎并江寧將軍所轄兵內酌量率赴徽州堵𠞰逆賊署副都統碩塔穆森以鎮守兖州滿洲蒙古驍騎移駐江寧更發京師滿洲蒙古每佐領驍騎一人以正藍旗王府長史雅賴正黃旗一等侍衛阿喀尼為署副都統率之往駐兖州命將軍哈爾噶齊帥師赴袁州巡撫董衛國奏吳逆偽將軍二人率猓猓數千來犯長沙糾集羣盜聲襲袁臨窺伺江西已入袁州境內上諭袁州距吉安不逺吉安贑州又通粵要路今賊入袁境將軍希爾根等停𠞰撫建諸賊以兵分與將軍哈爾噶齊率赴袁州與總兵趙應奎併力𠞰禦其希爾根所餘兵馬或進𠞰撫建或固守南昌相機以行尋衛國又奏賊陷都昌上復諭將軍希爾根巡撫董衛國提督趙國祚等速行𠞰滅江南總督阿席熙安徽巡撫靳輔嚴飭接壤將辨加意防禦乙丑調署副都統碩塔等兵赴安慶先是令碩塔穆森率師赴江寧至是因總督阿席熙奏賊逼祁門上乃命碩塔等徑趨安慶駐防尋又調河南提督王永譽為安徽提督率所部兵以往戊辰命大將軍順承郡王勒爾錦詳議進兵機宜上遣侍衛烏丹塞瑚立傳諭勒爾錦曰朕手諭與王者再所言似合機宜又兩遣侍衛往未見王回奏滿漢兵宜加撫恤餽餉亦不易若何進戰一在於王今所在蠢動豈不可虞大將軍出征進止調度必待中旨於古未聞因王等與賊相持朕不自暇逸屢有敕諭冀或有一當耳非朕欲從中制也王等始出兵時兵亦不為不足今四路進討王亦知之四川兵取朝天關陽平關在保寧與賊相拒與嶽州同王等勿以四川兵將抵貴州湖南兵可緩進保寧較嶽州城更堅也康親王進𠞰閩賊雖屢奏捷朕不為喜吳三桂乃賊渠惟破嶽州灃州方可喜耳王等初至軍言馬未肥又言天熱多雨難行今當可行之時王等規取嶽州或渡江取灃州或令都統尼雅翰往江西取長沙此三事王與貝勒諸將帥熟議以聞勿惟朕諭與議政大臣之議是從勉建良策欣聞捷音臣謹按扼險據要制勝之上策皇上深鑒乎此以嶽州諸處地屬雄峻屢命諸將速往據守以遏賊鋒乃諸將不能奉行睿算遂使形勝之地反為賊有至是上念三桂為逆徒渠首灃嶽實荆楚咽喉必先取灃嶽滅三桂則羣賊自望風而潰故既以手敕諭勒爾錦用兵方略又遣侍衛傳旨令其相機規取灃嶽長沙諄詳委曲切中機宜藹如春溫凜如秋肅勒爾錦等果能仰遵成畫尅期前進則諸路悉平賊氛迅掃矣乃竟觀望不前坐失機會逮詔旨屢趨猶逗留如故俾逆賊得為固守之計曠日持久糜餉勞師皆勒爾錦等不奉廟謨之所致也己巳命經略莫洛等進兵廣元規定四川莫洛奏臣於本月十一日由秦州進川貝勒等到西安時養馬繼發請命四川總督周有德巡撫張德地副都統科爾崑等固守朝天廣元諸處轉運大兵糧糗并敕將軍等拒守保寧以待大兵之至上諭經略莫洛身在地方軍機緩急自有確見令與將軍席卜臣前往廣元進取昭化疏通糧運平定四川總督周有德巡撫張德地副都統科爾崑等於經略未到之先將廣元所有糧米運送軍前又廣元兵少甚屬可虞或令席卜臣兵先赴廣元秣馬以待或候經略同發俱令莫洛酌行是日又諭郿嶺大二郎小二郎諸處俱係險要周有德張德地科爾崑等酌撥官兵固守勿俾賊兵斷我後路若廣元兵單未便分撥即移會莫洛席卜臣酌量調度癸酉命署副都統雅賚等領兵赴江寧總督阿席熙奏徽州府及歙祁門等縣陷賊江寧將軍額楚於本月初七日率兵赴徽州進𠞰上諭江寧所駐大兵將軍額楚既率赴徽州江省係水陸要地即令署副都統雅賚阿喀尼等停往兖州率兵徑赴江寧其駐劄兖州漢軍都統釋迦保俟京師新發禁旅到日亦率兵速赴江寧在京滿洲蒙古每佐領驍騎一名每翼委署副都統一員漢軍每佐領發兵二名共派副都統一員每翼委參領一員率赴兖州駐劄尋以一等侍衛諾敏長史嶽爾多為署副都統并遣漢軍副都統孫承祖率兵以往戊寅命大將軍康親王傑書先定溫州黃巖諸處提督塞白理奏黃巖失陷總兵阿爾泰從賊上敇康親王傑書先𠞰滅浙省溫州黃巖諸處賊寇平定地方然後進𠞰福建命將軍尼雅翰等赴援袁州進取長沙將軍希爾根奏吳逆遣賊來犯袁州耿逆竊踞廣信等府今若分兵應𠞰恐兵單不利上諭署副都統碩塔穆森不必駐𤾂速赴南昌到日令署副都統穆成額率南昌兵速赴袁州與總兵官趙應奎并力固守署副都統公沃赫救進賢兵回日亦赴袁州若大兵未到之先賊勢猖獗趙應奎相機退保險隘以待大兵之至將軍尼雅翰將所率江寧兵及碩塔穆森兵酌量率赴袁州統領副都統幹都海沃赫穆成額等兵平定袁州進取長沙如吉安無警其幹都海兵聽尼雅翰調度酌遣又安慶係要地漢軍都統釋迦保署副都統雅賚阿喀尼俱率兵速赴安慶并趨提督王永譽刻期抵任如安慶等處有警令將軍阿密達華善等相機救應己邜命和碩簡親王喇布為揚威大將軍帥師赴江寧侍衛坤巴圖魯為振武將軍帥師赴汝寧上諭議政王等江南天下要地兵力單薄其授和碩簡親王喇布為揚威大將軍派兩佐領合出護軍一人上三旗包衣佐領兵每旗百人復令簡親王除伊包衣佐領全軍外將所部人衆酌選披甲率往江寧統轄將軍阿密達兵及江南滿洲蒙古漢軍相機調度保固全省將軍阿密達額楚華善王之鼎總督阿席熙並同參贊又河南地廣兵少恐姦宄乘間竊發令每佐領出驍騎二人授侍衛坤巴圖魯為振武將軍率赴汝寧駐防左翼遣副都統覺羅夸代右翼以長史阿爾瑚為署副都統偕行尋又諭簡親王到江寧時令副都統蘇朗率蒙古兵一千往鎮安慶其安慶都統釋迦保率所部漢軍速赴南昌鎮守到日南昌署副都統碩塔穆森兵前往袁州會合將軍尼雅翰等兵與總兵官趙應奎合力𠞰禦若蘇朗兵到安慶時署副都統雅賚阿喀尼率所部兵亦速赴南昌鎮守甲辰將軍希爾根奏復撫州是月初七日夜逆賊來犯我柵我兵分路迎擊敗之于十一日恢復撫州尋希爾根奏閩賊東距建昌滇賊西犯袁州勢難分應若臣舍建昌而援袁州恐撫州已復旋棄江右何日可定仍宜合力以𠞰建昌之賊上諭撫州雖不可棄袁州亦屬要地希爾根兵可破建昌則進若難以徑進且鎮守撫州令將軍哈爾噶齊仍率兵援袁至于所復地方更令總督提督發新募兵速赴將軍軍前以資守禦命江西巡撫白色純赴贑撫定人民上諭兵部今將軍希爾根等擊敗賊衆恢復撫州不久即定建昌廣信諸處亟須撫安百姓其令巡撫白色純星赴贑州爾部速行移會乙酉詔復續順公沈瑞官爵平南王尚可喜奏續順公沈瑞身陷賊中不甘從逆屢遣人通言請兵拯救臣因遣官兵赴閩接應今已迎回粵東上諭續順公沈瑞不甘從逆挈家回粵情屬可憫令復還原爵仍管伊標官兵駐劄廣東命和碩安親王嶽樂為定逺平寇大將軍帥師規定廣西時總督金光祖奏廣西提督馬雄左江總兵官郭義降賊全省變動上命和碩安親王嶽樂為定逺平寇大將軍率每佐領護軍一人侍衛坤巴圖魯所帶每佐領驍騎二人并王所屬包衣佐領護軍驍騎速赴廣東令都統覺羅霍特伯郎素副都統吉圖堪珠拉禪偕往以郎素為署護軍統領兵至江西日或由袁州進取長沙平定廣西或徑抵廣西𠞰滅叛逆聽大將軍王與都統等商酌以行又每佐領出驍騎一人付侍衛坤巴圖魯隨後率往汝寧尋又命輔國將軍瓦山隨大將軍安親王進討丁亥將軍額楚奏復徽州命即帥師進取饒州先是上䇿額楚不日必取徽州恐取徽州後額楚等按兵不進諭令克城之日徑赴江西速取饒州至是額楚奏言敗賊績溪克復縣城本月十八日乘勝進至徽州賊望風潰遁郡城遂復時巡撫靳輔報賊逼池州上命額楚等量留兵駐徽州速行進取饒州會合江西兵平定三逆方略卷九

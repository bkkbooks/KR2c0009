body:
  text: 欽定四庫全書平定三逆方畧卷三十一康熙十六年六月戊申尚之信奏率兵民歸順之信奏臣聞將軍莽依圖兵抵韶州即於五月初四日率省城文武官及兵民薙髪歸順復遣署都統尚之瑛等代臣赴韶迎接王師上命之信襲其父可喜平南親王爵原任兩廣總督金光祖奏率兵民歸順光祖奏臣標舊兵遵臣宻諭於四月初二日斬首叛副將雷孚言擒繋偽總督董重民等臣於二十日抵肇慶聞王師進粤隨曉諭兵民薙髪歸順上諭尚之信金光祖等即將偽總督董重民及所執偽官品大者俱不聽薙髪委官兵䕶解來京沿途將軍督撫提鎮亦添兵傳送毋致疎虞壬子諭大將軍康親王傑書備劉進忠上諭兵部據尚之信奏劉進忠以康親王招撫文檄潛送呉逆召兵自救足知進忠心懷詭譎非實意歸誠其檄康親王密為之備命江寧巡撫慕天顔督造鳥船大將軍貝勒尚善等奏言得鳥船四十艘即可破賊上乃命慕天顔如數速造以資大兵之用尋慕天顔上言所造鳥船甚多必須時日臣躬自督工期以六閱月告竣上諭岳州需船甚急若六閱月始竣則秋冬已過有誤破賊之期慕天顔其晝夜并力務於八月内竣工遣往岳州丙辰以馮甦為廣東巡撫時尚之信奏偽巡撫馮甦不忘國恩恊謀歸順上因授馮甦為廣東巡撫已而巡撫傅宏烈又奏馮甦為逆賊呉三桂顧待甚厚且其家屬俱在雲南今兹投誠乃出於窮迫請安挿内地以絶其暗通聲息上遂補馮甦為刑部侍郎令其來京命侍郎覺羅舒恕為安南將軍上諭議政王等曰侍郎覺羅舒恕既駐贑州統轄滿漢兵防守地方不可無印副都統楊鳯翔所留安南將軍印見在平㓂將軍華善所其令華善遣的當人員齎印速赴江西付總督董衞國轉送舒恕丁巳尚之信奏祖澤清降之信歸順後即傳檄粤境原任髙雷總兵官祖澤清遂率所屬官兵於五月十九日薙髪投誠髙雷廉三郡悉定命大將軍簡親王喇布調兵守江西省城總督董衞國奏據在省官員報湖廣平江及銅鼓營逆賊聲言出犯甚急臣已留提督趙頼兵守樂安而身還省城遣兵赴𠞰適簡親王復調臣標兵前往樂安臣即啟覆簡親王簡親王遂責臣以輕王慢㫖既奉嚴諭何敢有違隨撤進𠞰銅鼓之兵發往樂安但省城乃楚粤後路最屬𦂳要留省滿兵止二百餘又無緑旗官兵萬一有警恐難禦遏致負皇上任使乞賜罷斥另簡賢能以副總督重寄上乃切責喇布曰前屢詔喇布進勦吉安屢以省㑹重地不便輕離為辭今既赴吉安省㑹何遂可緩耶省城官兵盡調逺地輕率已甚且以輕王慢㫖之語恐赫調兵尤屬不合喇布等其速撤可緩地方官兵鎮守省城務使無虞嗣後調度緑旗官兵皆與總督董衞國㑹商行之衞國亦照舊供職己未諭將軍莽依圖用兵機宜時翰林院侍講學士顧八代赴莽依圖軍前上令傳諭莽依圖曰用兵利在神速毋稽遲貽誤或不得已擇便而進者有之凡此機宜爾自熟悉近以逗留誤事如長沙荆州諸處其明驗也命調提督嚴自明赴廣州時尚之信奏提督嚴自明係呉逆舊屬不知軍旅今粤東初復兵心甫定若以控馭無術形迹可疑之人復令統轄恐兵民不安上諭兵部據尚之信來奏宜撤嚴自明還京師但撤還自明恐將來投誠者皆懷疑不前其優加自明為將軍調赴廣州閒住已而自明奏言臣既掛彈章宜避疑嫌乞賜撤還或安置畿輔或隨侍輦轂上乃命自明俟新提督到日即還京師辛酉諭諸將帥招撫陷賊官吏軍民上諭各省王貝勒大將軍將軍總督巡撫提督等逆賊呉三桂背恩倡亂散布偽劄誘惑兵民迫脅官吏以致生民塗炭所在騷然今各路大兵𠞰撫並行平凉福建廣東諸處相繼平定文武大小官員兵民人等俱被恩賞安插得所惟湖南四川雲南貴州官員兵民人等仍陷賊中未得歸順念此等俱受國恩必非甘心從賊葢有懷忠義之心而無脫身之路者亦有身被迫脅懼罪疑畏者今大兵雲集不日蕩平賊冦玉石難分朕心深為不忍特頒敕諭概示招徠凡在賊中文武兵民人等悔罪歸順前事悉赦不問如常加恩或有擒殺賊首投獻軍前及以城池兵馬來歸者仍論功優敘爾等即宣布曉諭以副朕寛仁矜全之意庚午命大將軍康親王傑書調劉進忠等駐福州以都統頼塔守潮州上諭傑書曰據筆帖式塔穆哈圖報潮州劉進忠已於本月初六日薙髪投誠今進忠復遺書呉三桂為平南親王尚之信舉發是進忠投誠本非真心不過勢窮就撫耳又總兵官劉炎所遺呉三桂書亦皆搜獲其心迹與進忠畧同此等皆心懷反側久留潮州必致生變若果已投誠康親王等即託言欲與相見以計撤回留駐福州設或遲疑不至速行奏聞進忠等既撤則令將軍拉哈達以兵之半守漳泉都統頼塔率其半守潮州仍令尚之信遣原任潮州總兵官王國棟盡率其標兵詣頼塔恊守臣謹按劉進忠等皆係反側奸徒其投誠也不過因我兵進逼潮州尚之信等又以廣城歸窮蹙無歸乃俯首來降本非真心効順者也故前此既報投誠潛以招撫檄文送三桂所乞兵自救時皇上已洞見其詐命傑書宻加防範至是雖經薙髪復遺書三桂為尚之信舉發皇上慮其有變又命傑書以計撤還福州彼時進忠等雖不得已而往而中懷叵測究未革心後果與耿精忠等謀為不軌頼大兵有備狡謀莫逞不然則久留潮州倉猝變起必又煩王師之撲勦矣要惟皇上明如日月無隱不燭所以能弭亂於幾先也壬申免陜西平凉慶陽田租上諭户部平凉諸處遭逆賊變亂已閱二載田土荒蕪民不得耕其租税量予豁免令總督巡撫曉諭小民務使得沾實惠癸酉命將軍莽依圖速還韶州將軍覺羅舒恕等奏將軍莽依圖遺臣書云我等駐韶州候㫖調遣因尚之信屢遣人來言劉進忠等尚未薙髪遂留副都統穆成額駐守韶州而身偕將軍額赫訥於本月十一日領率官兵前赴廣州上諭前議令簡親王大兵俟粤東既定即進取衡州將軍莽依圖兵俟馬到即進取湖南平南親王尚之信等進取廣西今劉進忠等已薙髪投誠潮惠無虞莽依圖其速回韶州同各路大兵分道進𠞰甲戌命鑾儀衞鑾儀使王可臣為廣東提督時授廣東提督嚴自明為將軍故以可臣代之七月丁丑革原任兩廣總督金光祖職戴罪圖功光祖奏臣前窺察衆情多有猜疑隨將臣總督兩廣關防蹔行秘藏託言失去今雖用原藏關防為信綏輯人心然受兩粤重寄不能預籌保固一旦被陷貽悞封疆臣罪難逭上諭金光祖身膺兩粤總督重任不能保守封疆致地方陷賊前奏關防已失今又稱收藏如果曾收藏其具題失印之時何不以此情宻奏觀此明屬巧飾本應革職從重治罪念其與平南親王尚之信宻謀反正復定粤中著革職仍留原任戴罪圖功丁亥命大將軍簡親王喇布曉諭韓大任等喇布奏言聞吉安逸賊韓大任等屯寧都樂安諸處臣隨調滿漢官兵三路追𠞰仍行文招撫今大任等意欲投誠啟請轉奏上諭前王輔臣等投誠俱已免罪復用近又特詔傳諭被脅從賊官吏自㧞來歸赦罪議敘簡親王即以此意曉諭大任等其兵部印文一併發往辛夘命尚之信等援韶州大將軍簡親王喇布等奏偵得呉三桂所屬偽將軍七人率賊三萬至宜章欲犯樂昌又欲分兵犯南安上諭逆賊至宜章屯駐復欲分兵南安勢必窺伺南韶簡親王宜預為守禦之策以固疆圉又潮州劉進忠劉炎等俱已薙髪歸誠粤省官兵無東顧之憂平南親王尚之信將軍莽依圖即親統滿漢官兵赴韶協𠞰湖南逆賊將軍舒恕領兵防守南安南雄諸處為韶州聲援或未便身離贑州亦當量遣官兵馳赴尋舒恕奏據副都統穆成額報逆賊于本月初五日圍攻韶州甚急臣即與巡撫佟國禎總兵官哲勒肯等㑹商遣署副都統赫勒布率滿漢官兵赴援上復諭韶州江粤咽喉必争之地尚之信莽依圖等以文到日即率兵速赴韶州舒恕亦相機應援簡親王仍分兵赴贑以資防禦臣謹按韶州江粤咽喉又接楚南之境皇上知其地居形要賊所必争早已令官兵汛守嚴加備禦至是呉逆因尚之信歸順我兵復規取廣西心懷惶懼遂大糾賊衆蒙死攻韶意在遏我後路侵我廣東皇上復慮韶州脫或有失則廣東不無可虞乃亟調諸將星馳赴援於是我兵併力内外夾擊逆賊大敗隨棄營遁去粤疆得安皆由防範周密調遣神速故能保韶郡要害之地深挫賊鋒使逆宼不敢復窺東粤也丁酉命加祖澤淸都督同知仍管總兵官事原任髙雷總兵官祖澤清奏罪臣束兵無術臨難偷生蓄恨兩年始得乘機斬賊率屬歸順有罪無功奚敢置喙臣謹束身伏鑕静聽處分上諭祖澤清先雖被脅從逆仍感戴國恩宻謀斬倡亂逆弁陳加正擒偽將軍謝厥扶等薙髪歸順其加都督同知仍管總兵官事命將軍穆占以師㑹大將軍簡親王喇布進定衡永諸郡先是大將軍安親王岳樂等奏大兵乏糧樵採至二三百里外上乃命穆占速行分道進𠞰湖南其進兵機宜仍行奏聞至是岳樂等復奏臣等兩軍并駐日久求糧芻益艱宜分兵往岳州水路夾攻今臣等共議令將軍穆占與其所偕大臣及前鋒二百䕶軍每佐領三人驍騎每佐領三人蒙古兵五百漢軍一百五十緑旗兵三千前往岳州臣軍惟留穆占所部䕶軍毎佐領一人驍騎三人并援𠞰營兵三千人礮五十上諭大將軍貝勒尚善等前奏須得鳥船始可破賊已命巡撫慕天顔督造今即將軍穆占統兵到岳亦必俟鳥船告竣然後進攻度鳥船到彼正當隆冬水涸難以前進若俟明年水長進兵勢必坐守岳州虛糜日月穆占宜勿赴岳州以兵㑹簡親王規取衡永諸處遏賊後路如此則粤東得以寛緩而粤西欲降者亦可乘間來歸穆占等其即率赴岳官兵速趨茶陵攸縣與簡親王兵合協力進取衡永諸處命巡撫傅宏烈為撫蠻滅宼將軍宏烈奏臣前請大兵接應力任進取兩廣今廣東全省已定廣西乃臣專責無可他諉臣與將軍莽依圖等議欲進取廣西縁敕印未至無以為信且臣兵寡弱必得尚之信官兵同臣進取庶克有濟又收復廣西雲貴須招集土司土司官員專取慿於印信若以廣西雲南各土司印信頒發招撫一處即給一新印以杜反覆則逆賊可不煩大兵而滅矣臣標官兵經年缺餉兼少馬匹請量撥給以資進勦上諭覽奏詞意忠懇傅宏烈可仍以廣西巡撫為撫蠻滅宼將軍給以勅印令尚之信速遣所屬官員與傅宏烈同定廣西土司印信禮部鑄給其官兵錢糧令總督金光祖給銀十萬兩俟秋凉再發馬匹尋又命户部撥銀十萬兩解赴宏烈軍前庚子尚之信奏復惠州時海賊劉國軒竊踞惠州聞尚之信劉進忠等歸順大兵將至於六月初十日棄城潛遁偽總兵陳璉等以城降辛丑命大將軍簡親王喇布等調遣官兵固守袁州萍鄉喇布奏吉安贑州南安皆重地臣等兵力甚單議撤駐袁兵每佐領三人并撤統領江寧兵額楚署副都統楊古岱等還吉安以備調遣其袁州萍鄉諸處乞令安親王分兵防守上諭安親王及將軍穆占之兵不便分遣袁州萍鄉係安親王大兵後路簡親王仍量調通省官兵嚴加防守甲辰尚之信奏瓊州官民歸順原任瓊州總兵官佟國卿等聞尚之信歸順隨於五月二十九日率兵民薙髪輸誠粤東悉定平定三逆方畧卷三十一

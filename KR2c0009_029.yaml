body:
  text: 欽定四庫全書平定三逆方略卷二十九康熙十六年三月戊寅命督捕理事官麻勒吉招撫孔四貞時偽監軍道信勝將軍傅宏烈遺侍郎覺羅舒恕書曰孔王女四貞曽向宏烈言無刻不以太皇太后為念若降恩綸赦孫延齡罪封四貞為郡主則可以成事前定藩兵廢延齡推線國安為帥逮國安死又擁戴其子成仁今復執成仁𨽻於四貞一切軍事悉四貞主之舒恕以聞上諭兵部抄録侍郎舒恕等奏疏并傅宏烈移文發麻勒吉俾招撫孔四貞仍令大學士撰敕與麻勒吉先令録示四貞如果有意投誠再行頒敕己邜大將軍康親王傑書奏官兵復泉州海賊偽將軍何祐等自興化敗遁復糾賊三萬餘固守泉州鄭錦又遣偽總統王進功率賊三千協守將軍拉哈達等率滿漢官兵進攻二月初九日拔其城逆賊潰遁我兵乘勝追𠞰多所斬獲庚辰大將軍康親王傑書奏官兵復漳州時海賊鄭錦大敗于興化泉州遂爾喪膽棄漳州海澄而遁海澄偽副將孫紹芳漳州偽知府程夢簡等相繼於軍前納欵將軍拉哈達等統率大兵于二月二十日抵漳州遂復府城及海澄等十縣閩地悉平傑書奏至上降諭嘉之曰王統率官兵自衢州入仙霞關直抵福州𠞰撫並用所向克捷擊逐海賊收復全閩安輯百姓克奏膚功深為可嘉有功人員著議敘具奏甲申命大將軍康親王傑書分兵進潮州以署副都統莽依圖為鎮南將軍帥師進廣東上諭議政王等曰今閩地悉定大將軍安親王圍困長沙已久將軍穆占復帥師進𠞰將軍鄂鼐統兵水陸赴嶽殱滅吳逆蕩平諸寇在此一舉康親王宜及兵威大振之時分遺官兵同耿精忠兵進取潮州其進𠞰留守機宜速議以聞又大兵分路進擊逆賊不暇窺贑其授署副都統莽依圖為鎮南將軍精簡士馬夾攻廣東以副都統額赫訥署副都統穆成額參贊軍務令侍郎舒恕量留甲兵同巡撫佟國禎總兵官哲勒肯鎮守贑州諸處至江西建昌諸處大兵俱已撤赴吉安簡親王軍士卒甚衆酌撥每佐領三人合在贑大兵令莽依圖共選每佐領六七人俟康親王所議俞旨到贑即率之前進尋尚之信傅宏烈密疏納欵劉進忠苖之秀各報投誠遂以之信等原疏抄發傑書令將軍拉哈達及耿精忠等速進廣東未幾傑書奏福建既平即欲親統大兵入粵但省會重地未可輕離且自福至漳相距甚逺兵馬到彼必須休息恐遲至炎暑難以進師今漳汀見兵密邇粵境宜選將士有馬者令將軍拉哈逹都統賴塔等率之同耿精忠先赴潮州後當繼遣官兵接應上報可復諭議政王等曰康親王大兵平閩人馬疲敝難以深入粵地令酌分官兵前赴潮州若劉進忠等迎降暫駐彼地即移檄令尚之信知之仍趣莽依圖兵速進廣東臣謹按大兵初進閩中尚之信等皆聞風震讋已有歸順之意然吳逆黨醜在粵者尚多猶不免兩端觀望至是皇上以海賊敗逃閩中底定且大兵分道進𠞰湖南逆賊無暇窺贑州諸郡儻不乘機取粵恐賊兵漸增據守要害則粵東既難猝下而心欲歸降者或亦因之中沮乃命傑書遣兵赴潮莽依圖帥師入粵于是軍威大振賊勢羣摧之信等遂率衆來投劉進忠等亦窮迫歸順而粵東郡縣以次收復矣是皆睿算昭灼知己知彼應機趨利無少遲疑之所致也申飭諸將詳核官軍功罪兵部奏侍郎班迪等咨稱吉安兵士罪狀向無供詞今始訊問必須時日上諭前原任將軍赫業瓦爾喀等于蟠龍山為賊衝營一案並未審明口供確驗地方造具清册兾圖朦溷今大將軍簡親王喇布等又將吉安軍情不行嚴審取供殊屬不合我國家從來軍法嚴明並無茍且怠玩之例嗣後各將軍應察明官軍功罪確驗地方取供造册以俟稽核若仍蹈襲故轍將統兵將軍等俟事平日嚴加議罪甲午命送馬長沙軍前上諭兵部今福建江西陜西俱已底定而諸將又分路進取湖南宜協助馬匹以資大兵王貝勒以下文武各官可酌量捐馬并撥內廄馬一千送赴長沙軍前每旗選賢能官二員令太僕寺卿溫岱統之以行溫岱等過南昌即啓聞大將軍安親王酌撥官兵于袁州萍鄉醴陵諸要地迎接沿途務保萬全溫岱等直抵長沙交明始回乙未諭尚之信等速迎大兵時尚之信傅宏烈各遣人密疏請兵上諭大將軍安親王圍困長沙已久將軍穆占復進定湖南將軍鄂鼐又赴嶽州水陸夾攻逆賊吳三桂無暇窺粵且大將軍康親王令將軍拉哈達等統兵下潮州將軍莽依圖等亦率兵入粵之信宏烈其各率所部速迎王師協𠞰凶逆赦劉進忠等罪時原任潮州總兵官劉進忠碣石總兵官苖之秀遣人投誠大將軍康親王傑書以聞上命宥進忠之秀及標下官兵罪仍以進忠為潮州總兵官之秀為碣石總兵官隨大兵進𠞰尋授進忠征逆將軍己亥命總督董衛國領兵𠞰賊衛國奏楊玉泰等孽盤踞宜黃樂安崇仁山谷中荼毒生民慘惡殊甚若不早為除剪勢必燎原臣請親統標兵前往撲滅上可之未幾衛國偕副都統尼滿提督趙賴總兵官許貞等率兵分𠞰敗賊於大嶺遂復樂安玉泰窮蹙率衆來降壬寅命大將軍簡親王喇布戴罪圖功革參贊哈爾噶齊等職隨軍自效時侍郎班迪等還自吉安以所察軍罪奏聞上諭大將軍簡親王喇布自至江西初無勞績圍困吉安日久不下賊遁又不能邀擊其令戴罪圖功參贊哈爾噶齊巴爾堪等營壘失守情罪重大俱革職披甲自效副將軍希爾根年老衰憊其撤回南昌暫駐將軍額楚臨陳指揮不舉發首遁者明係身先敗遁欲自掩己罪也其削去將軍參贊姑留世職仍統江寧官兵戴罪圖功見在吉安參贊大臣均不勝任其以都統勒貝護軍統領哈克三副都統布舒庫前往為參贊大臣更選八旗護軍參領及各王府長史共八員一同遣發為夸蘭大彼處所餘夸蘭大盡行汰去又吉安炮手俱未諳練每翼精選炮手二人發往軍前班迪等所訊軍狀姑俟事平再議癸邜詔察殉難官員骸骨并妻子資送歸里上諭吏户兵三部自吳三桂煽亂以來用兵地方文武官員或矢志固守勢窮莫支盡節封疆或身陷賊中堅貞不屈橫被慘害或從容就義合家殉難視死如歸此皆為國捐軀克全忠節深為可憫其有骸骨未能歸葬妻子尚寄逺方孤苦無依更堪軫惻宜加恩恤以慰忠魂其令各督撫察明凡殉難文武大小官員骸骨并其妻子俱準動正項錢糧資送歸里以昭朕優恤忠節至意臣謹按人臣服官受祿處無事之時則殫心職守遇有事之日則為國捐軀此乃古今之定義天地之常經也當吳三桂煽亂以來守土官辨感國家豢飬之恩忘身殉義情雖可憫要皆分誼當然皇上乃于恤典之外復命督撫察明收其遺骸資送其妻子歸里是誠皇上勸忠之至意破格之殊恩凡為臣子者可不益思報稱也哉乙巳命運紅衣炮赴長沙大將軍安親王嶽樂等奏臣軍中炮既皆小且復無多乞將吉安荆州或西安大炮運至長沙以便攻城疏入下議政王貝勒大臣集議議政王等議曰方今時勢攻取長沙𠞰滅湖南逆賊最為要務宜撥新鑄大紅衣炮二十具令兵工二部官各一員驛送南昌至袁州令總督董衛國撥兵護送由袁州至長沙未設驛站令董衛國動支正項銀兩多雇夫役以備轉運俟溫代至袁州即管領此炮與安親王所遣迎馬官兵偕行其送炮官員即令來還上諭解送馬炮關係重大將軍穆占其親統官兵赴袁迎接儻未便親往可選同去大臣一員前來接應直達長沙勿致疏虞命大將軍順承郡王勒爾錦勒兵臨江大將軍公圖海勒兵逼漢中先是上諭據荆州坐塘筆帖式報賊犯逺安旋復退回逆賊或因我兵進取長嶽虛聲牽制亦未可知大將軍順承郡王勒爾錦等應作進兵之勢揚言渡江以疑賊兵至是大將軍安親王嶽樂等奏逆賊吳三桂糾聚賊衆死守長沙上復令勒爾錦速勒兵臨江更令圖海整飭陜西滿漢官兵進扼漢中要路移檄聲言進兵以分賊勢儻機有可乘即行進𠞰丙午總督董衛國奏官兵復吉安大兵圍困吉安日久賊糧匱勢蹙于是月二十一日夜出南門趨舟東竄我兵遂入城詔責大將軍貝勒尚善等先是尚善等報二月二十六日撥滿洲蒙古緑旗兵一千餘人由嶽州送馬三千餘匹赴長沙上諭大兵需馬甚殷非尋常比貝勒尚善等去賊甚近必審知萬無一失方行遣送然長嶽之間路未甚通若逆賊阻截護兵力單難保無虞宜預約安親王遣兵相迎度兵且來然後發往且將軍鄂鼐率兵赴嶽尚善所知或俟此兵到後更多添兵力俾無他慮方可遣行今但以千兵護送如許衆馬殊為輕忽倘事出意外既於我不利且為賊資則是尚善明誤征勦大事尚善其速偵送馬消息以聞尋尚善等報官兵解馬於本月初八日抵七星臺遇賊伏兵為所邀奪上命尚善等明白回奏尚善等引罪上切責之曰尚善等統兵赴嶽已歷三載糜餉勞師未獲寸土今又將送往安親王軍前馬匹冒險遣發且以少兵護行致中途被奪終為賊利貽誤大兵急需情罪匪輕宜即從重處分念其見在征𠞰姑俟事平察議未幾大將軍安親王嶽樂以遣兵迎馬緩致中塗被劫奪亦具疏引罪上復切責之曰𠞰滅逆賊惟馬是賴貝勒尚善等遺書預約三月初二日馬到長洛河而嶽樂故失期約不遣兵往迎目覩戰馬數千盡為賊有大喪軍資情罪甚大事平之日從重議罪臣謹按長沙軍前戰馬缺少皇上念大兵急需所關至巨命撥三千餘匹由嶽州送長沙復諭令尚善多遣官兵護行嶽樂分發士卒迎取廟略指授備極周詳乃尚善僅撥千人付之羣馬令赴長沙報至之日皇上即預料中途必當有失隨降諭尚善深以輕忽為咎尋果因將護力單來迎兵緩致所遣之馬為賊邀奪皇上熟悉道里之可危早見事勢之必至睿謨深慮抑何明且逺耶命將軍莽依圖帥師速赴韶州額楚帥師速赴袁州時吉安既復尚之信又請迅發大兵上諭大將軍簡親王等將王府佐領下兵及大兵內選有馬者每佐領三人速發贑州此兵到日將軍莽依圖等即選足每佐領七人速赴韶州仍與尚之信相聞令立圖內應袁州乃安親王大兵後路其以滿兵每佐領四人以上及自安慶發往緑旗兵一千並付額楚俾赴袁州屯駐為安親王後繼前所送馬炮到袁州付與來迎官兵額楚仍添兵護至長沙至吉安親復簡親王可偕多諾統每佐領兵三人及自安慶發往緑旗兵五百人併城守官兵駐鎮吉安更撥每佐領兵一人添發贑州令侍郎舒恕統領防守其餘缺少馬械之兵并緑旗官兵付副將軍希爾根提督趙賴令回南昌整繕候調簡親王同理事官麻勒吉酌遣幹辦人員齎諭招撫原任貴州提督李本深巡撫曹申吉廣西提督馬雄將軍孫延齡等平定三逆方略卷二十九
